body:
  text: 第十七回薛丁山全家遭刑樊梨花法場脫難話説中宗被廢武後專權竟下旨將兩遼王府中殿前掘一個地坑以便埋放叛臣家口的尸首一面命武三思統兵打掃法場三日後將薛丁山一門三百八十五口老少男女盡皆斬殺這旨一下衆功臣誰不寒心但無法挽回只好暗暗傷感行刑先一日城中禁止行人城門閉上百姓家家閉戶到了五更武三思統兵在天牢門首排圍直至法場之上又挑選幾百勇士進牢把薛丁山一門三百八十五口盡皆綁縛押出天牢丁山咬牙切齒罵樊梨花道不賢婦生得好兒子今日一門老少盡做無頭之鬼皆因你生此逆子才有今日之慘樊梨花淚下道兩遼王不必怨我這也是前世的冤仇今生來報可記得當初在西涼時滴淚斬楊凡今此逆子即楊凡轉世造此大逆殺盡一門正是冤冤相報宿世之仇今何獨犯於我難道説我今日就能脫此一刀麼丁山忿恨不已軍士押到法場此時狂風大作日色無光半空中來了梨山老母停住雲光往下一看只見綁縛之人有如螞蟻堆在法場之上老母歎道一點冤仇行此大報但樊梨花命中不該吃刀説罷老母把手一招那樊梨花身上的繩索寸寸皆斷呼的一聲將樊梨花攝上半空雲之中下邊軍士呐喊叫不好了樊梨花騰空走了武三思大驚分付軍士不許聲張由他逃走罷叫軍士開刀衆劊子手一齊下手半空中梨山老母叫聲徒弟你未該脫此凡胎為師的特來救你你今試看下邊一門誅戮之苦樊梨花往下一看只見薛丁山高氏程氏薛猛薛勇張氏邵氏以及親丁老小人人被殺血光直沖鬥牛不覺淚如雨下五內俱裂幾乎墜下雲端那三歲的假薛蛟卻不用綁放在地上執刀便砍忽正北上一朵祥雲如飛而至一道人往下一招呼的一聲把孝思攝入空中軍士呐喊不好了薛蛟又飛上天雲了武三思驚道一定是樊梨花作法攝了去其餘盡行斬訖遂入朝復旨梨山老母在雲光之內看那道人乃太乙山竇青老祖忙打一稽道此子乃江淮侯之子仗義替換薛蛟大命不該吃刀道兄該帶往仙山撫養成人日後也有一番事做老祖道正是貧道所以火速趕來救他上山因指樊梨花問道此位就是天魔女麼老母道正是小徒老祖點頭叫聲天魔女只因你幡桃會上對金童一笑思凡金母把你貶下紅塵受苦三次羞罵白虎關斬了九醜星楊凡怨仇相報故楊凡托生汝腹殺你一門家口刀刀見血你今災難未滿未該回上瑤池待災返難滿之日脫了凡胎才上瑤池永奉金母道兄你今帶天魔女回仙山貧道去了送別老母帶孝思回太乙山而去這邊樊梨花跟梨山老母回西南洞島山而去再説兩遼王府內殿前掘一數丈深坑軍士扛擡薛家三百八十三人尸首到了坑上將尸首如臘一樣腳搭在肩上填在坑中上用三皮石板三皮生鉛埋蓋以生鐵熔化澆成墳堆立一石碑上刻四行字道反叛薛家門鐵石壓其身萬年千載後懷恨鐵丘墳把府門鎖釘撥二百多軍士把守如有人來哭祭者即系叛臣之黨拿住斬首武三思回朝奏道叛臣家口俱已正法單騰空走了樊梨花並攝去了三歲的薛蛟其餘已盡斬首遵旨造下鐵丘墳特來繳旨武後道樊梨花走了也罷只是那薛剛逃遁在外未經拿獲終為大患武三思道太后前已詔諭天下畫影圖形嚴行輯拿不怕這賊飛上天去少不得有日拿住正法請娘娘放心武後聽了此言也就放心本知後事如何再看下回分解
