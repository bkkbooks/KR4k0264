body:
  text: 第七十二回武三思花園逢怪廬陵王長安被難再説武三思兵敗走了三百餘裏到了上安鎮方收住殘兵敗將折兵大半把人馬屯扎上安鎮寫本上長安請再調兵將以圖進戰時值六月天氣武三思受不得暑熱即叫地方來問他此地可有什麼潔淨所在可以避暑麼原來這鎮上有一紳戶的大花園因園中有怪迷人無人敢往空間在彼地方就把這座花園説與武三思三思即時移進園來揀了一座涼廳作臥房其餘人役俱在耳房居住人馬屯扎在鎮以候長安兵到秋後進兵三思住了幾天一日傍晚獨自間步乘涼至荷花池邊亭上坐下忽聽得他對面假山石後有歎息之聲三思遂起身繞過荷花池步過假山看見三間房屋門口坐著一個少年女子滿身穿白生得幹嬌百媚獨坐在彼手托香腮在那裏歎氣三思一見上前問道小娘子你是誰家宅眷為何獨坐於此女子擡頭看見武三思立身答道妾乃本園房主義女姓白名月花新喪夫君守寡在此請問尊官是誰説罷俏眼丟情弄的三思心神飄蕩叫聲小娘子我乃當今皇帝之侄忠州王武三思便是因征戰九焰山反賊薛剛兵敗至此借國避暑白月花道原來是王爺失敬了請進來坐三思走進房來見房內擺設得十分齊整白氏斟上一杯香茶雙手送過來三思接茶便吃味甘如蜜大凡狐狸精媚人專將嗤味變作香茶哄人吃憑你至誠君子吃了他的茶也要被他弄上手這白月花乃是一個八百餘年的妖狐更善迷人何況武三思是個好色之徒見他這般留情不覺欲念難遏挨近身來以言挑動白氏白氏笑嘻嘻以情言答應三思抱住求歡他並不推辭兩人脫衣卸褲共上牙床合歡雲雨大戰三合方才相抱而睡直睡到紅日當空方才起身白氏叫聲王爺妾一旦失身於你但願你收妾常伴枕席三思道這何用你説但秋後長安兵到便要再征九焰山當先送卿至長安府中居住白氏道王爺妾自幼學習武藝遇異人傳授法術拿大將如同反掌王爺若打九焰山妾願同行幫助以拿薛剛三思大喜道卿能用什麼兵器白氏道會使雙刀待妾取來使一路與王爺看説罷向壁上取下雙刀使將出來如兩道白光飛舞並不見人喜得三思連連叫好武三思自此日日與白氏飲酒作樂不表且説武則天接著三思告急本章看了知張天輝陳亡新唐國遣披霞公主相助所以得勝請調兵將再圖進剿送與諸臣計議發兵武承嗣道為今之計莫如調幾鎮諸侯前去征討張柬之道不可凡各鎮諸侯皆先朝舊臣與薛家和好薛剛之反一欺王子出在房州二欺朝內無良謀之人所以敢反若調諸侯去討萬一與他和合非但有喪天朝鋭氣且見兵刀日起矣依臣愚見不如召廬陵王入京使薛剛起又無名則人心自然離散那時遣天將征之自無不克也武則天道狄梁公在日亦曾勸朕召他入京彼時朕已許之不料事繁忘了非卿所言朕幾誤事即下旨差太尉敬暉前去房州宣召廬陵王入京武承嗣聞之大驚忙與張昌宗計議昌宗道不妨待他來到長安那時定害之二人計議已定不上半月敬暉保廬陵王夫妻到京入朝見駕武氏見了母子之情也覺傷感下旨起造皇府與廬陵王居住武承嗣忙與張昌宗道廬陵王已到如何下手昌宗道此事性急不得我想正月元旦乃皇上聖壽待我啓奏大放花燈十日待各鎮諸侯差官賀過聖壽回去了到半夜點起軍士扮作強盜圍住廬陵王府只一把火便燒得乾乾淨淨矣武承嗣拍手道妙妙妙再説武三思屯兵上安鎮到了秋涼不見長安兵到選收兵回了長安推病不出按下不表且説九焰山徐美祖排算陰陽即與薛剛説了要他長安救駕薛剛道一舉而兩得我正要去祭掃鐵丘墳但不知廬陵王何時有難徐美祖道事不宜遲須趕到長安以正月初一夜間行事只是此去關口盤查須設一個計策入長安才好薛剛道但憑仁兄主持徐美祖即喚烏黑龍烏黑虎分忖道你二人領精兵二十名帶一群馬匹扮作販馬客人到長安和化門外三十裏地名萬龍村埋伏元旦夜三更時分如此如此又叫烏黑彪烏黑豹分忖道你們領十名小校前去潼關左近埋伏如此如此又分付薛剛紀鸞英入長安如此如此又分付吳奇馬贊南建北齊衆頭目如此如此又分付鄭寶領小校五百到龍川埋伏如此如此各人領計下山去了徐美祖在山守寨卻説長安城內隔年早打燈棚正月初一日三更時分合齊點燈各鎮諸侯俱差官到京五更三點武氏設朝受賀天明張柬之私同敬暉來至廬陵王府二人人見就説千歲今夜有殺身之禍廬陵王大驚失色忙叫二卿救我張柬之道臣也不知今夜千歲有難狄仁傑臨危之日付臣三個錦囊説今夜二更千歲有火燒身之難臣當初造府之時依囊令匠人在殿東暗暗造成一個地道直通出府可以脫身臣今來知會千歲今夜若有響動可開地道脫身逃出臣令敬暉在大通橋救千歲出城廬陵王含淚作謝二人回去欲知後事且聽下回分解
