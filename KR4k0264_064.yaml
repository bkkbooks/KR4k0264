body:
  text: 第六十四回兩兄弟彩球各半廬陵王駙馬得雙當下弟兄二人行近房州離城止有數裏二人肚中飢餓走入面店坐下叫拿面來吃小二應道來了只見又走進兩個人來一個是鴛鴦臉一個是五色臉你道是誰就是吳奇馬贊奉命來知會廬陵王一時肚飢也來吃面小二見了先有三分害怕他二人就在薛蛟薛葵對面坐下大叫小二快拿面吃來小二應聲就拿兩碗面先送在吳奇馬贊面前薛蛟二人大怒喝道我們先來到不送面來吃倒送與後來吃欺我們麼薛葵伸手一拳把小二打倒在地吳奇二人喝道你這黑臉小子打死人難道不償命麼薛葵大怒走過來雙手掇起兩碗熱面照吳奇二人臉上一潑潑了吳奇馬贊一臉麵湯二人大怒喝道小雜種吳奇照薛葵面上就是一拳薛葵右手格開吳奇左手一進抓住吳奇肚皮如提小雞一般按在地下掄拳便打馬贊搶上來薛蛟飛起左腳正中馬贊後肩覆身便倒被薛蛟一腳踏住掄拳便打打得他二人宛如殺豬一般叫喊薛蛟道這樣沒本受打的東西饒他去罷把馬贊夾頸一把提起從店內直拋過街去跌了一個發暈薛葵把吳奇夾胸提起也望外邊一拋拋到過街跌了一個半死看的人都唬的目瞪口呆吳奇馬贊爬起來好似殺不倒的小雞一般跑了薛蛟二人坐下店主人陪笑把面送來二人吃了面還了錢出店竟往房州城中尋店住下次日起來見街上人集三聚五都是往教場中去看公主拋球招駙馬的薛蛟薛葵也就跟了衆人往教場而來一到教場只見人山人海擠擁不開薛葵在前把雙臂往前一抗兩邊的人一齊裂開薛蛟薛葵擠至彩樓下一看見樓高有三丈四面皆用彩緞扎成樓下坐著武國公馬登大夫魯仲分付作樂吹打三通樓上安陽公主把鬥大彩球供在香幾上宮娥開了正富燒起香來公主倒身下拜祝告天地神明弟子奉父王之命今日在此他球招親只求拋中有緣以定終身大事祝畢再拜而起雙手捧了彩球步至窗口望下一看見有許多人但不知誰是有緣將球向上一拋那些人都仰面望著那彩球那球在空中滾到東人擠到東滾過西人擠過西一齊伸手都想按住彩球那球卻忽的一聲照薛蛟頭上打來薛蛟伸手接住薛葵劈手便搶兩下一奪把彩球扯做兩半兩人各拿半個當下弟兄二人爭鬧不清早有馬登魯仲上前勸道此乃公主婚姻大事打中那個便是那個搶奪如何使的薛蛟道明明打中我我兄弟搶了半個去薛葵道你也伸手接球我也伸手接球一齊接住你扯了半個去我也有半個在此雖然是兄弟手足到了這婚姻大事如何肯讓你馬登魯仲道這事我兩個也做不得主你二人同我去見千歲聽千歲公斷説罷遂帶二人來至王府馬登魯仲先入內將弟兄兩個各扯半個彩球爭鬧不清細細奏明廬陵王分付召二人進見二人聞召即時走進來朝見禮畢薛蛟道千歲作主一言公斷薛葵道一齊接住彩球他扯了半個我扯了半個大家都有分千歲若因他生的標致招為女壻我生的醜陋不招為駙馬這是不伏的呢廬陵王笑道彩球如今你弟兄各扯一半孤也甚難定奪我想當今之時勇力為先孤有鐵胎弓一張重有萬鈞你二人哪一個開得此弓即招為駙馬如都不能開一齊無分內侍遂把鐵胎弓先遞與薛蛟薛蛟接弓只一扯輕輕扯滿遂把弓放下面不改色廬陵王大喜薛葵拿過弓來盡力一拉一聲響亮把鐵胎弓折為兩段廬陵王大驚薛葵道這樣的弓什麼重有萬鈞如今他也開了我也開了且折斷了卻怎生分斷廬陵王道你二人姓甚名誰何方人氏説明了孤自有個道理薛故道本州黑龍村人氏姓薛名蛟年十五歲這是我兄弟名叫薛葵年十三歲馬登道我記得薛猛之子名叫薛蛟當初法場中被大風刮去的莫非就是你麼薛葵道你也太多心了既我哥哥是薛猛之子就不該有我是他兄弟馬登笑道你言也是這是同名同姓的人了廬陵王道孤有兩個公主長名安陽年十五歲配薛蛟次名端陽年十三歲配薛葵等你二人長成了即便成親二人大喜山呼謝恩廬陵王分付備宴款待未知後來如何且聽下回分解
