body:
  text: 第六十七回新唐國薛剛成親路旁亭鄭寶結義話説薛剛三人次日來至國王午門投了平西侯的書劄此時國王納羅早朝未退見了書劄知是平西侯的內侄薛剛前來借兵暗想兩遼王三子薛剛乃樊梨花所生當初樊梨花下西涼不滅我邦有恩於孤今薛剛來借兵正好報他之恩豈有不發兵相助之理況又有平西侯的書劄更不好推辭分付請三人進見薛剛三人來至殿下參見國王國王賜坐坐下薛剛把始末根由説了一遍懇求大王發兵相助事成之日自當重謝國王見了薛剛人品生來異樣真乃圖王霸業之人便道孤家當初蒙令堂太夫人之恩未曾報答今爵主一門遭難大唐天下又被陰人據占發兵相助分內應該請問爵主今貴庚多少有幾位令郎薛剛見問不覺流淚道薛剛因造了大逆逃出長安在臥龍山娶一妻子因武三思所遏兩個拆散至今十三年並不知下落因此癡長三十二歲尚未婚配國王道不孝有三無後為大孤有一女名喚披霞公主儀容俊雅勇冠三軍能算陰陽今年十九歲爵主如不棄願結姻親薛剛暗想我今來借兵如若不允國王定然不悅莫如允了得此妻子也可以相助便欠身答道蒙國王見愛敢不從命國王大喜道爵主既允今日就成親分付內宮服侍披霞公主出殿作動番樂與薛剛交拜成親過了三朝薛剛告知公主九焰山專專仰望兵到求公主即奏國王發兵起行公主道發兵不難但這一路前往九焰山豈不被武氏知覺且一路關津緊守如何能過去不如駙馬先回我處點起西兵十萬假稱新唐國率西域各邦王子去長安進貢彼信為真一路上決無攔阻竟至九焰山來會便了薛剛大喜即同公主上殿奏知國王國王允奏備宴與薛剛餞行宴畢薛剛拜別國王公主同南建北齊起行披霞公主點齊十萬西兵隨即動身不表且説薛剛三人一路回來過了興唐府見路旁有一涼亭三人入亭坐下少歇忽聽老鴉在樹上亂叫北齊道三哥可惜此處沒有弓箭若有待我賞這老鴉一箭正言間忽聽得彈弓響亮四彈一齊發來正中四個老鴉頭頸打落樹下南北二人大叫妙妙妙是誰有此手段薛剛回頭一看亭後一人面白無須手執彈弓走過亭來便取老鴉薛剛忙起身把手一拱道請了那人道請了薛剛道聽足下聲音不是西涼人請問尊姓大名那人道果不是西涼人乃中原關西人姓鄭名寶因為商折本流落於此回鄉不得仗著這彈子本事彈鳥度日吾兄尊姓大名南建道這是兩遼王三爵主大名薛剛鄭寶道這就是大鬧花燈的通城虎薛三爺麼南建道正是鄭寶納頭便拜道久仰大名今日得見是為萬幸敢問爵主為何在此薛剛便借兵之事一説知鄭寶道爵主如若不棄願為帳下一小卒何如薛剛大喜道兄苦相從剛願結為兄弟鄭寶即拜薛剛為兄就留三人同至寓所收拾野味相待到了次日四人一齊奔鎖陽城而來欲知後事再聽下回
