body:
  text: 第九十七回下南唐諸姦受縛上長安武後還宮再説武後同武三思人等從地道逃出長安星夜奔往南唐不一日到了南唐南唐王率衆出城迎接母子一見大哭一場武後即把廬陵王來迫情由訴了一遍南唐王安慰一番就請武後人等入城居住不題再表薛剛一日入朝奏道臣前蒙恩旨開墳之後即下甫唐討這報仇乞陛下準臣興師兵下南唐以報臣一家三百八十餘口之冤中宗道據卿所奏朕無不依但武三思乃朕母族若要殺他天下之人皆以朕失親之義今命卿興師前去可赦三思一人朕再命一員官齎詔先往曉諭南唐王南唐王見詔諒必拱手聽命捆縛諸姦獻出是朕恩威並用而彼自然心服也薛剛領旨謝恩退出中宗即命徐美祖齎詔先往次日薛剛點齊家將並部下軍馬即向南唐進發卻説南唐王一日早朝忽見門官來報皇帝詔書到南唐下即令排香案出大門外跪下接詔徐美祖將詔書開讀奉天承運皇帝詔曰朕以不才安居大位雖為天運不絶唐柞實乃群臣恢復之功今念母后前日所為皆由權姦蠱惑致失天下臣民指望但母子生情難以究問今特遣國師前來請母后還朝武三思系朕母族姑念至親準其改過偕同母後來歸其餘姦心綁付國師帶來進朝擬罪特此諭知毋違朕意詔書讀畢南唐王叩首謝恩起來收了詔書然後與徐美祖見禮設宴款待就喚內嬪請武後與武三思更服還朝將張天左張天右薛敖曹許敬宗張易之張昌宗等俱捆入囚車交與徐美祖隨令部下軍士護送起程南唐王親送出城到十裏外拜辭武後又與徐美祖辭別徐美祖領了人等向長安而來到了次日忽見一隊人馬簇擁而來原來是薛剛領兵來下南唐要拿一班姦黨薛剛一見徐美祖就跳下馬來徐美祖看見薛剛亦跳下馬二人行禮徐美祖説出情由就引薛剛來見武後武後不勝慚愧薛剛向前作揖稱一聲千歲武後強應一個免字薛剛見他面有愧色再不答話回頭一看囚車內囚著張天左一班姦犯一時憤起拔刀就要砍殺徐美祖忙止住道此系禦犯不可動手須解到聖上面前定罪方妥薛剛方才住手遂同徐美祖班師而行不一日已到長安中宗率文武官員出城迎接母子相見悲喜交集武後亦自悔從前不是中宗請武後並三思入城進宮即令軍士將囚車一班姦犯交與薛剛處決薛剛聞旨奏道臣焉敢妄決請陛下旨意中宗道此乃卿家仇人毋得再啓任卿處決便了薛剛謝恩退出來未知如何處決再看下回分解
