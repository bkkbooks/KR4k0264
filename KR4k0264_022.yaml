body:
  text: 第二十二回鸞英避難黑龍村薛義忘恩貪爵位當下鸞英産下薛葵坐了一會思想夫妻離散如今我往何處去安身左思右想忽然想起母舅了守一現在湖廣房州黑龍村丁家莊居住不免前去相投權且住下打聽丈夫的下落再作計議主意已定遂把薛葵放在懷中包好抱了薛蛟解韁上馬直往湖廣投了守一去了且説薛剛殺出重圍行了一夜見無追兵方才放心思想山寨雖破我妻手段高強料不喪于武氏之手但夫妻分散無處安身卻往哪里去了想了一會忽然想起泗水關總兵薛義當初在長安我救他出獄又與他於此前程我去投他定然留藏想定主意遂撥馬往泗水關來看官你道薛剛造此大逆薛氏宗枝盡行拿斬這薛義如何卻平安無事因他賄囑了張天左題明同姓不親所以依舊做官那薛剛到了泗水關寫了一封書來至總兵府煩中軍傳進去薛義正同妻子楊氏在私堂間話忽見傳書進來拆開一看不覺大驚楊氏問道何處來書為何大驚薛義道夫人那兩遼王爵主薛剛自從大鬧花燈之後逃走在外纍及一門殺絶埋造鐵丘墳多虧張太師與我題明同姓不親免遭其禍他竟大膽私祭鐵丘墳反了馬登同他殺出長安拿住他的從人知他在臥龍山落草武三思提兵打破臥龍山又拿他不住他如今來投我現在府外如何是好楊氏道既是恩人逃難至此理應宜作速迎請進來留藏府內以報昔日大恩薛義道真乃婦人見識那明詔上説拿住薛剛者封萬戶侯藏匿者即系叛逆全家誅戮難道不顧滅門之禍依我誘他進來拿他解上長安做了萬戶侯永享富貴楊氏大怒道天下有你這樣沒良心的人當日救你出獄又與你幹此總兵之職今日他家破人亡來此投你不思報恩反以仇報自己忘恩背義死在目前還想做甚萬戶侯永享富貴薛義聞言大怒喝聲賤人嫁雞隨雞怎敢氣我送一腳踢來不防正中楊氏陰門往後便倒丫頭上前扶時早已死了忙叫不好了夫人死了薛義道不許聲張俟拿了薛剛再收殮夫人且把尸首擡過一邊又囑咐家丁如此如此不可泄露叫中軍開門快請下書人相見薛剛見請即便入府薛義一見薛剛納頭便拜道小人昔承恩人相救得榮任於此時刻難忘昨聞長安之事一門遭戮又聞思公逃避在外我差人四下尋訪並無下落小人日日記念日前得報恩公同思主母紀氏夫人在臥龍山棲身又被武三思所破恩公得脫虎穴逃遁至此還算不幸中之幸今日可放心在此多住幾時等小人操演人馬再招義兵與恩公殺上長安以報大仇便了薛剛流淚道若得如此感德不淺薛義道恩公説那裏話分付家丁備酒薛剛道令正夫人何不請來一見薛義道賤內有病臥床多日所以尚未拜見恩公薛剛乃是一個直人並不疑惑説話之間早已擺上筵席二人共飲不知酒後如何再看下回分解
