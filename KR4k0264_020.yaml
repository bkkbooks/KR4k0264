body:
  text: 第二十回薛剛一掃鐵丘墳馬登力救通城虎話説薛剛夫妻二人回至寨中忽見差往長安探事的嘍羅回來所探之事與敬猷所言無二薛剛大放悲聲哭死復活遂叫妻道我在此朝歡暮樂可憐我一門老少刀刀見血又造此鐵丘墳于心何忍我明日要別你下山前往長安祭掃鐵丘墳聊表我心再圖報仇泄恨鸞英道官人你生長長安誰不認得且一路上畫影圖形拿你你這一去豈不是自投羅網倘有不測這三百八十余口之仇何人去報我若不懷孕同你前去或可相助一二我今又不能同你去你體要差了主意不去的為上薛剛道不妨路上誰敢拿我就是諸賊臣知風我也不怕他拿我你可放心待我祭掃了鐵丘墳即便回來包管平安無事鸞英再三苦功他總不聽堅持要行到了次日薛剛打扮做差官模樣身邊暗帶兩條鐵鞭選兩名勇力嘍羅跟隨鸞英相送下山再三叮嚀一路小心速去速來夫妻山下拜別薛剛一路果見畫影圖形要拿他他也不放在心上一口到了長安等至天晚挨門入城叫小校買了香燭金紙酒肴候至夜靜來到自己門首月光之下看見府門封鎖當門立一石碑上面刻的字念了一遍大怒雙手把石碑掇起放倒在地將門鎖扭下來推門而入兩個小校將門閉上跟至大殿薛剛見大殿拆去造下鐵丘墳陰風凜凜甚是淒涼小校把香燭點起排下祭禮薛剛侄身下拜放聲大哭全無防避不料一哭外邊把守軍士就聽見了忙來門首探望見石碑放倒聽得哭聲明明是通城虎內中一個軍士低聲道我想薛剛十分厲害我們拿不住恐怕返送了性命不如分頭去報領兵來拿衆軍齊説有理火速去報話説武三思在府忽聽報道薛剛祭掃鐵丘墳即刻傳集兵將親自統領奔鐵丘墳而來這邊張夭左張天右得報飛報入宮武後命武承嗣率禦林軍去助武三思卻説薛剛哭祭一回化了紙錢即在墳前遂與兩個小校吃祭禮忽聞外邊人馬齊至喊聲大振兩個小校唬得半死薛剛道不要慌有我在此取出雙鞭走至府門開了門拒門而立武三思催兵搶入門來薛剛大吼一聲揮起雙鞭打倒了十余人其餘俱倒退出去薛剛奮勇衝殺不多時武承嗣領禦林軍又到內周邊了一個水泄不通憑你英雄好漢插翅也難飛去到了天明各府俱知此事嚇得程咬金只是氣喘忽越王羅章武國公馬登等齊來見咬金道這薛剛真正膽大包天不想生法報仇反來祭掃鐵丘墳是自投虎口他死不足恤只可憐誰與兩遼王報仇接代老千歲有何妙計救他咬金道列位也是呆子誰肯舍了家眷前去殺開一條血路引他出來同他斬開城門而走衆人聞言俱各呆了馬登一想叫聲程千歲我的妻子已死又無父母兄弟只有一個七歲小兒馬成我回去放走家人將小兒寄在千歲府中待我救他咬金道將軍若能如此薛剛性命可保事不宜遲快去快去衆人一齊催促馬登即時上馬回府不多時只見馬登頂盔貫甲抱著馬成來到魯王府中將馬成交與咬金即時飛馬奔鐵丘墳來那薛剛在鐵丘墳內仗著雙鞭死命拒住府門殺得滿身是血總衝殺不出來武三思武承嗣催兵圍住卻也不能近前拿他到了巳牌時分只見馬登一騎飛來大叫開路軍兵一見是武國公兩下列開讓他沖入重圍來至鐵丘墳門首大叫薛剛快隨我走薛剛此時顧不得兩個小校搶出門府馬登一馬當先薛剛步行在後衝殺出來軍兵齊喊道武國公馬登反了武三思武承嗣聽了忙來攔住馬登挺槍直取三思薛剛搶入一步舉起雙鞭照武承嗣劈胸打來承嗣一閃不料坐馬跳起跌翻下地薛剛騰地跳上他馬更加威風馬登虛閃一槍架開三思的大刀大叫薛剛既得了馬不可在此戀戰你我並力殺出長安就可得生了薛剛道大人説得有理遂同心並力衝殺出去三思領兵追趕馬登取弓搭箭照著三思射來三思眼快急忙閃躲不想正射馬眼那馬亂跳將三思跌下馬來軍士急救了三思誰敢再追馬登薛剛一到了光大門門軍俱各殺退二人斬開城門走出長安直奔潼關而來欲知後事再看下回分解
