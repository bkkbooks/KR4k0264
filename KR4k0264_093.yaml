body:
  text: 第九十三回騾頭太子受元戎梨山老母遺徒弟話説武則天聞報蘇黑虎全軍覆沒大驚失色與群臣計議張天右道長安兵馬雖多苦無良將難以有濟請陛下速發詔召天下勤王兵馬一面挂招賢榜倘有能人揭榜即授以大兵還可以退薛剛人馬則天依奏即發詔召天下勤王之兵一面張榜午門招賢且説江南六安山鐵板真人坐在洞口忽一陳風來鐵板真人把絲瓜頭一伸緑豆眼一睜將蒲扇手抓住尖尾一嗅叫聲呵呀原來薛剛造反已入潼關武後挂榜招賢我何不發騾頭太子前去使他母子相見以拿薛剛保周朝天下便起身入洞叫賢徒何在騾頭太子道師傅有何分付鐵板真人道徒兒你可知你的生身父母是誰騾頭太子道不知也鐵板真人道你母便是則天皇帝你父便是如意君薛敖曹十六年前你母生了你見你奇形怪狀將你拋入金龍池內彼時我從雲光內經過救你上山教養成人目今薛剛造反已入潼關你母挂榜招賢我今打發你到長安揭榜與你母父相見我煉有黑煞飛刀在此付你帶去倘遇薛剛將士勝他便罷若不能勝發起此刀即能取勝保你母掃平薛剛重興大周天下你今速下山去罷騾頭太子道弟子不知路徑如何到得長安鐵板真人道待我傳你一個土道法來去如飛可以立至遂將土遁法傳他騾頭太子拜別師傅駕起土遁到了長安果見午門挂榜上前揭下皇榜校尉一見大驚喝道你是人是鬼敢揭皇榜騾頭太子道你們快去通報説十六年前拋入金龍池內的騾頭太子蒙仙人救上名山今日特來朝見母皇以退薛剛校尉聽了火速入朝將此言一一奏明武後聞言羞慚滿面心中明白暗想他説被仙人救去或有大法破得薛剛也未可知下旨召入騾頭太子來至金階俯伏山呼朝拜則天見他頭面與騾頭無二好生難看下旨平身叫聲皇兒當日朕生下你來因你不像人形拋入池中那知仙人救去至今十六年又得相見但不知那仙人是誰騾頭太子道是江南六安山鐵板真人因聞母皇為薛剛造反長安將危特授臣兒神刀九口以拿薛剛保母皇天下武後大喜帶騾頭太子退朝薛敖曹迎駕入宮武則天就把騾頭太子始末對薛敖曹説明叫皇兒過來見你父後騾頭太子拜見父後留宴後宮次日則天坐朝封騾頭太子為兵馬大元帥領兵二十萬去到霸林川剿滅薛剛騾頭太子領旨領了兵馬出了長安至霸林川屯扎唐營探軍飛報入營説武氏差中宮太子為元帥統領大兵屯扎霸林川請今定奪薛剛聞報沈吟道武氏生有六子長即吾主次李坤現在金陵為南唐王第三四五俱皆早亡第六李坎現為東北唐王第七當年被我踹死今又有什麼中宮太子領兵前來這也奇了吳奇馬贊道必是武氏淫亂私生出來的雜種咱二人前去探一陳便知端的説罷二人領兵上馬到周營討戰騾頭太子聞報即拿鐵棍大步出營吳奇馬贊一見唬了一跳休説眼中不曾見就是耳邊也不曾聞有這樣的人分明是騾精遂喝道你是人是怪騾頭太子喝道大周則天皇帝是我的母帝如意君薛敖曹是我的父後我乃兵馬大元帥騾頭中宮太子是也吳奇馬贊哈哈大笑道我説是個雜種分明是武氏與叫驢睡了所以生出這騾頭人身的怪物來騾頭太子聞言大怒掄棍打來吳奇馬贊各舉兵器相迎戰有六七合騾頭太子回身便走吳奇馬贊隨後趕來騾頭太子伸手把腰邊金筒蓋一揭叫一聲寶貝出來吱吱兩聲響兩口黑刀起在空中如兩條黑線一般落將下來吳奇左肩中了一刀馬贊後背也受了一刀大叫呵唷回馬便走騾頭太子回身追趕吳奇馬贊早走入營中騾頭太子把手一招收了神刀仍抵營討戰吳馬二人到營中下了馬不能言語仰後便倒人事不省薛剛忙問從軍如何從軍就把交戰被傷情形説了一遍薛剛驚訝不已看二人傷處無血只流黑水皮肉皆黑急取金槍藥敷治並不相干軍士又把騾頭太子在外罵戰薛剛大怒叫薛葵出去會戰把他捉來薛葵得令沖出營來一見騾頭太子大笑道原來是個母馬生的個小騾精騾頭太子聞言氣得兩隻怪眼突出界內如風響一般掄起鐵棍便打薛葵把大錘打中鐵棍那騾頭太子震得兩臂皆麻虎口盡裂只見兩隻長耳直豎騾口張開足有一尺闊叫聲呵呀便走薛葵拍馬追來騾頭太子急把金筒蓋一揭叫聲寶貝出來吱吱一聲響只見一口黑刀起在空中薛葵擡頭一看見是一條黑線笑道這樣東西二將也受不起真真沒用把錘往上一架正中左臂見骨方止薛葵大叫一聲回馬便走騾頭太子把手一招收了神刀因虎口震裂收兵自營薛葵回至軍中下馬入帳翻倒在地人事不省流出黑永急得薛剛暴跳任憑百般醫治總是不效廬陵王也來看視見他三人倒在地上皆人事不省看看將死不覺淚下叫聲徐三兄孤只道一入潼關即便重定不料騾頭大敗吾將倘有不測大事去矣徐美祖道主公且休著急嘗聞古聖王求禱上天必有報應主公何不求禱上天廬陵王沐浴更衣設立香案拜祝皇天後土告曰若唐家氣數已絶即盡命於此地若氣數未終中興有日上天垂念救全三人性命降下異人破彼飛刀平安無事然後捉拿騾頭以報此仇拜祝一番納悶在營按下不表且説西南澗離島山梨山老母忽然心血來潮老母覺而有感是因薛剛保廬陵王中興已入潼關在霸林川被騾頭困住鐵石星太陰星太白星中了黑煞刀將在臨危應該天魔女下山去救就喚樊梨花出來道賢徒你知我喚你的意思麼樊梨花道弟子已知我子薛剛保唐室中興在霸林州被騾頭刀傷薛葵吳奇馬贊師傅喚弟子出來無非差我下山去助我子救此三人性命弟子即刻就行老母道你今下山前去母子重逢破了騾頭上長安開了鐵丘墳當速速回山不可貪戀紅塵更加罪逆樊梨花合掌領命拜別老母駕起雲頭不多時來至霸林州把雲頭一按落在唐營前叫軍士去報薛剛説一品夫人樊太君來此軍士即忙報上大帳薛剛聞言分付大開營門率衆出迎一見樊大夫人雙膝跪下道逆子薛剛迎接母親樊梨花見了薛剛不覺淚下叫聲我兒你起來薛剛起身跟樊太君入營薛剛率紀鸞英披霞公主拜見了婆婆薛蛟薛雲薛鬥拜見了祖母尚姣英飛鏡公主秦擺花拜見了太婆大小衆將一齊參見畢樊太君叫薛葵吳奇馬贊擡來取出三粒金丹各各分開將半粒抹在刀傷之處水化半粒灌入口中只見傷口立愈三人即刻蘇醒一齊起來見上邊坐著一個老道姑薛葵問道上邊坐的是誰薛剛道是你的祖母樊太夫人薛葵聞言忙忙下拜吳奇馬贊也過來叩頭薛剛分付備筵與樊太夫人接風賀喜因樊大夫人是吃齋另設素席相待其餘衆人殺牛宰馬各各開懷暢飲盡歡而散欲知端的且聽下回分解
