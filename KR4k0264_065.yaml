body:
  text: 第六十五回薛剛奏章聞子侄兄弟回訴紀鸞英話説廬陵王正要備宴款待駙馬忽見教師屈浮魯入見奏道今有薛剛差吳奇馬贊有事啓奏在外候旨薛蛟二人聞言吃了一驚叫聲嶽父王什麼薛剛可就是那踢死皇子驚殺朝廷的通城虎麼廬陵王道正是薛蛟道他造下大罪永不赦宥如何千歲不拿他正法他叫人來奏什麼事廬陵王道你不曉得就把屈浮魯打擂臺遇薛剛赦他的罪在黃草山糾人以保中興之事説知二人喜出望外忙俯伏道千歲真乃仁德之主赦我父叔恩同天地廬陵王驚訝道二位駙馬敢是薛剛之子麼薛蛟道臣乃兩遼王長孫薛猛之子當年囚在天牢只得二歲蒙江淮侯敬猷將己子孝思換臣出牢那法場中被風刮去的乃江淮侯之子臣叔父薛剛在臥龍山娶嬸母紀鸞英江淮侯因住揚州路過臥龍山將臣交與臣叔後武三思兵打臥龍山臣叔父嬸母亂軍中沖散嬸母抱臣殺出重圍在荒郊産下薛葵逃至黑龍山投依丁一守家居住今已十三年了但不知叔父下落那知千歲恩赦正臣叔侄父子重見天日矣廬陵王聞言大悅遂宣吳奇馬贊進見吳奇馬贊進來一見薛蛟二人吃了一驚忙叫千歲這兩個小孩子如何也在這裏廬陵王道這二位是孤新招的駙馬與你二位是至親你二位為何著驚吳奇二人就把面店被打情由説明請問千歲他二人如何與臣是至親廬陵王道二位駙馬這吳奇馬贊是你叔父父親的義弟你不知打了他你二人須陪他兩位一個禮薛蛟二人深深一揖叫聲二位老叔小侄告罪了吳奇忙忙答禮廬陵王指道此位是薛猛之子薛蛟此位是薛剛之子薛葵吳奇二人聞言大喜道不料這位就是薛三哥的兒子面貌竟與三哥一樣的黑不知嫂嫂如今在那裏薛蛟道在黑龍村舅公丁一守家居住不知叔父如今還在黃草山否吳奇道不在黃草山上當年見過千歲之後與我二人行至中途進入荒山收伏南建北齊並烏氏五弟兄屯扎在九焰山數年來招有五萬人馬目今薛三哥往鎖陽城見你姑祖丈竇必虎去了要求他去西涼借人馬一回九焰山即便起手故此差我二人前來知會千歲廬陵王聞言大喜屈浮魯道二位將軍且回九焰山二位駙馬旦回黑龍村待薛剛借了西涼兵回九焰山起手我保千歲自來同入長安若先將千歲名頭舉出非但大事弗成反害主公不淺矣吳奇二人道薛三哥也是這個主意所以先差我二人來知會薛葵道二位老叔如今且同我弟兄去見了家母待我父親借兵回山房州得報我二人與母親先來九焰山見了父親保千歲殺上長安除戮武氏諸黨請嶽父王復登大寶中興天下廬陵王大喜分付排宴款待衆臣宴畢薛蛟薛葵吳奇馬贊拜辭了廬陵王起身回黑龍村來次日到了黑龍村薛蛟薛葵先入內見紀鸞英細細稟知其事又説現有爹爹結義的兩位老叔在外請母親出廳相見紀鸞英聞言不勝歡喜遂同薛蛟二人來至外廳吳奇馬贊上前行禮鸞英亦拜下去禮畢起身坐下道嫂嫂恭喜兩個侄兒小小年紀如此英勇可喜可賀未知如何再聽下回
