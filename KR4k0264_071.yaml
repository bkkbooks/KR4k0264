body:
  text: 第七十一回父子不認相交戰夫妻會面破周兵當下一行人合在一處忙奔九焰山來將近九焰山望見周兵遮天蓋地屯扎在前薛葵道我們須分三處殺入周營去殺他一個落花流水方有興致薛蛟道有理當下紀鸞英吳奇馬贊南建北齊並衆莊丁從中路殺入薛蛟從左殺入薛葵從右殺入三路殺入周營那薛葵的兩柄錘撞著人人死撞著馬馬亡撞著兵器兵器齊折那薛蛟的白龍槍更加凶狠撥兵挑將猶如腐草那鸞英的一口刀萬夫無敵更兼吳奇等四人並衆莊丁個個都是不要命的死殺把一個周營踹的紛紛大亂喊殺之聲震動天地那山上偏遇薛剛出來巡關望見周營大亂想道定有兵馬在內衝殺遂策馬下山乘勢殺入周營只見人山人海薛葵一馬沖來父子各不相認薛剛挺槍便刺薛葵舉錘打來正打中槍桿薛剛在馬上身子一震雙手虎口都震麻了吃了一驚喝聲站住我且問你你這小孩子是誰周營中不曾見有你你是那裏來的薛葵喝道你問我麼聽真著吾乃兩遼忠武王薛仁貴之曾孫兩遼王薛丁山之孫雙孝王通城虎薛剛之子我名薛葵薛剛聞言喜出望外叫聲我兒我就是你父親薛剛薛葵道你不要冒認討我的便宜小爺卻不是好惹得的呢薛剛道我兒我就是雙孝王通城虎當年在臥龍山與你母分離你是分離後生的前日吳奇馬贊對我説知我方才明白薛葵想了一想方叫一聲爹爹如此説一些不差恕孩兒交兵之際不便下馬到山上自當拜見母親正在中營廝殺爹爹快去接應孩兒這裏不用你那薛剛大喜直入中營衝殺卻好正遇吳奇四人一齊殺來看見薛剛叫聲三哥嫂嫂紀鸞英在後須速去接應我上山去報披霞公主叫他發兵來助你説罷殺出周營上山去了薛剛只望中營大亂之處殺來果見紀鸞英在內夫妻一見並力衝殺再説九焰山披霞公主得報即率西兵下山來殺入周營周兵如何抵擋得住四下奔潰武三思率衆棄了營寨大敗逃走薛剛紀鸞英薛蛟薛葵會合披霞公主人馬追殺三十餘裏搶下盔甲槍刀馬匹不計其數得糧十余萬鳴金收軍回九焰山夫妻叔侄父子相逢各訴離別之情排宴賀功不表欲知後事再看下回
