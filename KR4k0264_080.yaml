body:
  text: 第八十回文豹交戰逢薛葵羅英奉計救文龍當下烏黑龍被白文豹往地下一拋只跌得半死停了一會方才醒來遂爬起跑上山去告知其事薛剛聞言大怒飛身上馬帶領衆將沖下山來大聲喝道哪里來的小孩子怎敢在此稱能白文豹笑道你們都下山來試試我的錘麼薛剛大怒掄槍便刺文豹舉錘相迎一連三錘三架震得薛剛盔斜甲散吳奇馬贊鄭寶等齊出陳來把文豹圍住文豹使開雙錘如風車兒一般在內亂打打得衆將如走馬燈相似薛葵在關上望見忙忙上馬沖出關來殺入陳中掄錘就打文豹舉錘相迎二人戰了五十餘合不分勝敗忽然白雲領兵殺至前來接應文豹拋了薛葵打馬回營薛葵也拋了文豹回馬上山兩下各各收兵次日白雲龍父子討戰徐美祖下令緊守不與交戰一連數日按兵不動白雲在營計議如何攻得破九焰山白文龍道一面攻他自然難破須要分兵四面攻打方可白雲道此言有理遂聚集衆將分撥人馬令白文虎領兵五萬從東路攻打今白文豹領兵五萬從西路攻打自己領兵五萬從山後攻打令白文龍領兵五萬看守大營倘有賊將反來攻打我營切不可輕出與他交戰只連放百子炮為號我們即來救應文龍應諾白雲與文虎文豹分兵往九焰山攻打怎奈山上守得堅固如何攻得破那徐美祖今鄭寶吳奇馬贊烏黑彪烏黑豹領兵下山殺入周營不可傷害白文龍只劫了糧草上山五人領命下山而來探軍飛報入營文龍想道今日我須拿兩個強盜也顯顯我的手段遂領兵出營鄭寶掄刀便砍文龍搖時戟相迎戰了三合文龍抵擋不住回馬便走五將奮勇趕來文龍不敢入營落荒而走五將沖入周營糧草盡行劫去文龍回營看見糧草全無遂放起百子炮來白雲文虎文豹人馬盡來接應不見賊人只見糧草劫去大怒喝道狗畜牲我分付的話你不聽偏要出戰以致糧草盡被劫去喝左右綁下重打四十又道星夜往紫剛關與我押解十萬糧草來略有差池定然斬首文龍無奈只得領一百軍士又坐不得馬伏鞍而行不多日到了紫剛關入府見母親哭告一番霞然道行兵未久失了糧草不吉之兆哥哥你須見機而行白文龍點頭稱是遂收拾十萬糧草即便起程不表且説定山羅英得了徐美祖錦囊按日拆看不勝奇異即令李廣領兵下山伏在松林等了半日看見糧草車來李廣領兵沖出大聲喝道快快留下糧草放你過去白文龍棒瘡正痛一見便走李廣劫了糧草回定山去了文龍走了數裏見無追兵料糧草已失放聲大哭想道這番回去決定是死不如這裏尋死罷便走入林中正然上吊忽見一行人走入林來把文龍救下飛馬奔回文龍問是何人救我軍士道是燕郡王羅英正説間羅英返回文龍叩謝羅英扶住道非幹我事救兄者另是一人文龍道那人是誰羅英就把徐美祖算定事情細説一通文龍跌足道他如此相待要我降我便降只是我父不肯奈何羅英道仁兄若是肯降軍師已定下一計在此求仁兄假寫一封書只説令尊降了九焰山差你回去接取家眷上山此計何如不知文龍如何答應且聽下回分解
