body:
  text: 第四十六回李承業奉旨和番紫陽仙有意送寶再説三齊王李承業因則天皇帝有旨召回即將兵符交與李信著他退守臨江不可出戰自回長安朝見則天皇帝計議吐番人寇之事承業奏道吐番兵強將勇若與相拒恐為不美況李旦竊據漢陽實為心腹之患若不早為戰滅後日必為大害乞陛下降旨待臣前往幽州割地連和陛下先無北顧之憂再下漢陽戰滅李旦則天允奏草詔一道割幽燕十州之地以和吐番承業領旨往幽州而來到了幽州見吐番天慶王述大周則天皇帝連和之意吐番王允和是以幽燕十州盡屬吐番天慶王建都幽州北方諸國盡供奉於吐番不進貢於中國矣承業和了吐番回京復命路過九龍山聞得山上有一紫陽道人能呼風喚雨知過去未來之事承業即親自上山來至茅庵見紫陽道人白髮童顔身披鶴氅手執拂塵打坐蒲團之上不敢怠慢恭身下拜口稱仙師弟子李承業奉旨和番今回長安即下漢陽剿除李旦但恨馬周智勇雙全力不能破求仙師指示如何拿得叛臣馬周妖人李旦道人聞言心中暗笑承業姦臣背主反助武氏篡位久後是唐終於興復他今反要去拿真主真乃可笑又想我今不以寶貝與他如何使真主夫妻相會便叫童子把那一面萬箭火輪牌取來童子應聲入內將牌取出卻是半尺長一面銅牌道人付與承業道此牌出在西番國將牌打上三下要風風至要火火來要兵兵有要箭箭到隨心所欲定獲全勝承業接牌大喜拜別下山回長安來到了長安入朝復旨武則天道吐番既和漢陽李旦卿當用心剿滅承業道臣今再提兵十萬以下漢陽包取馬周李旦首級獻與陛下則天大喜承業別駕起行領兵十萬來征漢陽路過通州縱容士卒殺人放火占人妻女劫掠百姓怨聲載道消息傳入漢陽唐王李旦聞知不覺驚惶紛紛淚下馬周奏道常言説兵來將擋水來土掩李承業來犯漢陽自有臣等禦敵何懼之有主公何必驚惶淚下唐王道孤非懼李承業兵來只因通州近日遭了兵火但不知胡氏母女如何以此淚下馬周道主公不必憂愁臣即差人到通州迎接國母娘娘到來唐王遂修書一封馬周叫過曹彪分忖道你當日尋訪主公那胡家是你認得的今你持書火速到通州迎接國太國母前來與主公完聚唐王道須要小心悄地接他母女前來切不可使人知覺又生他變曹彪應聲得令遂扮做差官星夜趕到通州城內果然家家逃難人人奔走來至胡家門首見大門半開絶無人影合家俱已逃避左右鄰舍亦俱逃散並沒處尋人問信等了半日忽見一個雙目不明年老之人手執竹枝而來正要進門曹彪一聲喝道你是什麼人那老人道這是我主人的宅房難道我住不得你問我做麼曹彪道我們遠方來的所以不知道請問你家員外那裏去了老人道只因三齊王兵下漢陽在此經過縱兵搶掠城中人都往四鄉躲難我家員外一家亦往鄉間避難去了我為雙目不明行走不得無奈住在此間可憐我三日並沒有吃飯哩曹彪道原來如此想你家大院君小姐亦同員外避難去了老人道説起那大院君與小姐好不苦哩都是進興天殺的害得他母女不淺進興逃走了丟下他娘兒在此又被馬姑爺強逼成親早已逃往陵州去了曹彪暗想如今不見娘娘怎好回去復旨這老人説話有些來歷不如帶了他去回復千歲主意已定未知老人肯去否再看下回分解
