body:
  text: 第九回夫人護子親面聖薛剛仗義救冤人話説張天右聽了樊夫人之言遂近前道夫人此言一發奇了難道説令郎該打我四十根嗎樊夫人道該打的你是文官又非武職如何去操練禁兵其中就有可打之道天右道我就該打自有千歲王爺令郎如何私自打我元老樊夫人道亂臣賊子人人得而誅之況我兒乃功臣之子打你何妨你不知情還要上本就去上本何能害我程千歲你也年紀老了虧你説陪罪的話叫我兒陪何人的罪咬金道這是老夫見不到處失言了天左天右道既然如此明早奏知聖上自有公論遂忿忿出府而去丁山道夫人你今護此逆子他若啓奏我卻不管樊夫人道你既不管待我上朝去分説西涼若沒有我只怕此時還不能平哩如今太平無事就用不著我了我就不得朝見天子嗎咬金道老夫明天也要上朝在朝專候夫人了説畢也自回府去了次日五更五點樊梨花備轎上朝咬金及文武朝臣紛紛齊至不多時高宗臨朝文武山呼已畢高宗看見程咬金樊梨花便問道老功勳與鎮國夫人親臨朝內有何事情二人奏道因右丞相有事故來朝見高宗便問張天右有何事情天右俯伏奏道臣因思陛下久未巡狩恐一旦乘輿出幸禦林軍日久不演恐難保駕因此昨日在教場中操演被兩遼王三子薛剛搶上演武廳將臣綁了道臣私演禁兵竟欲加誅幸得越王羅章同衆功勳再三解勸將臣捆打四十痛臣身居右相為陛下股肱薛剛何得目無國法毒打大臣兩遼王縱子行凶有幹典律只求陛下與臣作主樊梨花道陛下明並日月張天右身居文臣之首統領百僚舉賢佐理輔治仁政乃他分內之事又非祖蔭生又非元戎武職又不奉陛下明旨私行操演心懷謀逆臣子薛剛秉性忠直難容姦過將他捆打正為陛下禁戒亂臣之心只求陛下詳察高宗沈吟半晌叫一聲張天右道禦林軍乃朕禁兵自有衆功勳演操與你文官何涉私演禁兵其意可知四十之責代朕警戒可為不差可為忠直鎮國夫人及程老功勳以後凡有不奉朕旨私演軍兵者即行誅之以警亂心樊梨花謝恩張天右恨恨而退高宗退朝衆皆回府且説薛剛聞知天子之言心中大喜過了半個月這一日又帶領家將在外遊玩從府尹衙門經過只見有幾百人圍著個二十來歲的婦人那婦人肩背上背著一張哀單流淚求化遂分付家將叫那婦人過來那婦人來至馬前不住的啼哭薛剛道你是何方人氏為何在此流淚求化那婦人叩了一個頭道爺爺小婦人楊氏丈夫薛義乃山西絳州人帶妾至京投親不遇回鄉不得賣身于張太師府得他身價銀三十兩到手用完張太師見我年少心起不良我誓死不從即將我丈夫發與府太爺立追身價銀五十兩可憐我丈夫在獄三六九追比看看打死小婦人無奈只得在街上哀求爺們求助分釐完納身價以救丈夫薛剛道你丈夫姓薛我也姓薛又同是絳州人五百年前同是一家你不必啼哭待我救你丈夫出來説罷遂進了衙門見了府尹餘太古道太守公因有一敝同宗受屈公庭特來奉懇釋放余大古道貴宗何人所為何事請道其詳下官即當釋放薛剛道敝同宗名喚薛義被張天右所害發在台下追比身價只求太守公釋放所追銀兩弟當奉納餘太古驚道薛義乃張太師家人如何是三爵主的貴同宗薛剛道先祖乃絳州人此人亦絳州人論起來原是一家弟方才在途中見其妻楊氏哭泣哀求因張天右欲淫彼不遂其心故將薛義發到台下追此身份銀五十兩弟心不忍無非救困救危之意請太守公即行釋放身價銀弟即完納太古道原來如此身價銀下官也不敢要情願捐俸繳完張府薛義爵主領去就是了遂吩咐衙役把薛義帶進來不多時薛義進來跪下太古道你好造化此位是兩遼王第三位爵主因見你妻在街啼哭問其根由來與本府説知替你還了身價救你性命這就是你的大恩人還不磕頭謝恩薛義聞言連忙膝行上前叫道恩主爺爺薛剛起身一把扯住道不必如此此乃小事你且同我去自有好處薛剛遂作別府尹上馬出了衙門一出頭門楊氏看見丈夫已放出來了不勝大喜忙忙跪在馬前磕頭薛剛叫他起來遂吩咐家將喚一乘轎子擡了楊氏薛義步隨了轎子竟向兩遼王府而來到了門首吩咐家將左近出兩間房子與他夫妻住下又取白銀百兩與薛義道你且拿去盤置幾日待我弄一個官兒與你去做薛義忙叩頭道目今蒙恩主救全蟻命已屬萬幸如何還敢望與小人謀幹前程此思此德何日能報薛剛道乃小節之事何必挂齒你須在外等待幾日説畢遂進內去了未知如何再聽下回分解
