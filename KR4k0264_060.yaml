body:
  text: 第六十回文氏見壻愈傷心申妃接駕露真情當下鸞嬌叫道妹夫你好負心當初原説下一到邊庭即來接取他母女那知你一去負心竟忘了結髮之妻害得他母女好不苦楚聞謠言説你死在牢中他母女到觀音庵問簽中了馬迪之計強逼成親幸虧胡完救出送到陵州崔家居住後聞我表妹為你守節投江身死今日你方到此正説時忽見王文龍曹文虎在廳外站立忙問此二人是誰唐王道這二人是我的仁侄陳進忙請二人見禮便分付備酒就問唐王在邊庭何地令叔是誰唐王道家叔名馬周現為掌兵大元帥目今保唐王親征大兵屯扎在淮州避暑小弟瞞了家叔私來相訪不料遇見馬迪幸虧吾兄相救感德不淺陳進説如此看來兄已得了官了但令正沒福做夫人了唐王道我妻雖死嶽母尚存得見嶽母我也甘心陳進道令嶽母現在陵州吾兄欲去小弟明日自當備舟同往唐王道小弟私來不能久待求兄刻下同往方妙陳進一面叫人去雇船一面備酒款待三人酒畢四人即刻一同上船次日到了陵州來至崔宅著門公稟知文氏與崔文德文德忙忙出迎一齊進廳陳進上前拜見舅母唐王拜見嶽母文氏一見唐王流淚道賢壻如今你來的遲了可惜我女兒為你守節投江死了唐王道小壻當日見了家叔即欲差人來接因軍中多事故而遲至今日説罷方回身與文德見禮文德分付備酒文氏道你在邊庭一向何如陳進接道襟兄令叔為唐王元帥襟兄官職料也不小文氏道賢壻你做了官是我女兒沒福早早死了説罷淚如雨下文德擺出酒飯款待唐王衆人到晚俱在崔宅安歇不表且説淮州唐營到了端陽請唐王賞節尋遍滿宮不見唐王查點衆將不見了文龍文虎馬周與衆將大驚孝德按指一算道不妨主公私下陵州訪親不必害怕馬周分付曹彪你即赴淩州迎請聖駕申妃道主公既在彼處待我前去接駕遂帶了三千人馬火速奔陵州而來且説陵州崔文德這日正與唐王陳進請人前廳飲酒忽聞炮響連天軍聲大震唐王大驚忙今文龍文虎快去打探二人出來一看入內稟道外邊是申娘娘領兵前來接駕唐王大喜陳進文德聞言全然不解拉過文龍問道申娘娘為何到此文龍道實不相瞞並非進興馬隱乃高宗正宮太子唐王便是陳進大驚忙拜伏在地口稱臣該萬死唐王親手扶起再説崔文德唬的忙奔入內亂喊不好了崔母文氏大驚忙問何故文德道姨母表妹投江非我逼他那知妹夫不是別人就是唐王如今兵馬都到了一家個個吃刀活不成了只求姨母作主饒我母親罷我情願一死文氏道你們不必害怕有我在此決不害及你們説罷即刻走到外廳欲知文氏如何請再看下回分解
