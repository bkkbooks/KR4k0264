body:
  text: 第四十四回馬迪倚勢強求親胡完挺身救主母話説文氏與女兒到了次日雇了兩乘轎母女坐下轎夫擡到觀音庵門首下轎入庵二尼忙忙出迎母女二人到了大殿點起香燭深深禮拜鳳嬌默視道大悲觀音菩薩弟子胡氏鳳嬌幼年喪父與寡母文氏托身胞叔胡發家中受盡千般苦楚因神人分付比合朱砂記母親將弟子許與馬隱為妻即名進興自從有五人前來接他往邊庭叔父處去幾月杳無音信紛紛謠言為盜死在牢中托親陳進查訪已知其詐但不知丈夫在邊庭平安否日後還有相逢之日否求大士賜一靈簽以辨吉凶祝畢起身抽出一簽將簽經一看上寫道因龍伏爪在深潭時未來時名未揚直待春雷一聲響騰空飛上九重天文氏便問李師傅這簽問行人在外可平安否李尼道小尼不會詳解簽語當家張師兄詳得最準説一句應一句人都稱他張半仙只是今早施主人家請去吃齋尚未回來少坐片時他就回來鳳嬌道簽語我自會解不用等他文氏道若不詳解明白豈不枉來一次李尼道安人説得是不必性急少不得還要待茶吃齋母女來至後殿等至日午李尼擺出素齋款待文氏道怎好又在此吃齋李尼道無可孝敬只是有慢文氏道説那裏話三人遂坐下同吃了齋李尼引娘兒兩個觀看佛堂又等多時仍不見張尼回來鳳嬌道母親回去罷李尼道小姐休忙他也就來了文氏道我兒且再等一等卻説馬迪悄悄出庵取幾錢銀子打發兩乘轎子回去日夕張尼方回李尼道胡大安人與小姐在此等你詳解簽語哩張尼稽首道小尼躲避了不知簽語是那四句文氏道是困龍伏爪在深潭這四句問行人在外平安否張尼雙眉一皺道不好不好頭一個是困字分明這人坐在牢內了伏爪在深潭這人手足帶了刑具囚在牢中後面這兩句一發不好飛上九重天分明已死上天有何好處這是不祥之簽文氏聽了此言不覺淚下鳳嬌道母親不必悲傷據女兒看來到是吉簽頭一句系賜經困龍在田君王之象未得行其大志時未來還不曾揚名天下直待春雷一聲響要至明春便得志飛騰乃大吉之簽天色將晚回去罷文氏起身作別二尼相送出庵卻不見了轎子母女驚訝道轎夫那裏去了二尼道想是等不得回去了請到裏邊少坐待小尼著徒弟叫兩乘轎子來送安人小姐去母女無奈只得又進庵來張尼把母女引到落末一間淨房坐下擺齋相待母女那有心吃齋看看日已沈西並無轎子來張尼道奇怪我徒弟怎麼也不回來安人小姐請坐待我再去看看他來不曾張尼走至外面把前後庵門關好馬迪于婆闖入房來文氏鳳嬌一見大驚馬迪道伯婆我善求你立意不允今日我看你飛上天去快順從我自有好處若強一強我就動粗了也不怕你叫喊起來母女二人唬得魂不附體淚如雨下於婆道鳳姐你看公子何等風流何等富貴強如進興萬萬倍允從了好若不允從大爺一怒只怕你的性命也在頃刻之間鳳嬌知身已落局叫天不應心生一計強收珠淚叫聲于媽你的言語極是但要依我三件方與成親馬迪道你若允從休説三件就萬件也依你鳳嬌説第一件要在大殿上設立花燭待奴沐浴更衣交拜天地馬迪道這是自然鳳嬌道第二我不願為妾須另尋房屋居住馬迪道原説送你西莊另住鳳嬌道我母年老要你養老送終馬迪道你嫁了我那養老送終之事何須説得此時馬迪喜不可言叫于婆在房伏侍新人沐浴更衣自出大殿分付供花燭鋪紅氈好拜堂成親于婆取浴盆並湯至房請新人沐浴鳳嬌道媽媽你在此叫我羞答答怎好沐浴你且外邊去有我母親作伴於婆聽了也出外邊去了鳳嬌哄幹婆出去同文氏把房門閉上母女二人嗚嗚咽咽低聲哭了一場遞解下帶子雙雙要尋自盡忽來了一個救星你道是誰乃是胡登的家人名叫胡完自胡登死後文氏打發出去他在鄉間度日時常送些瓜菜到胡發家中與主母文氏這日胡完又來送菜趁了小船來至胡家門首灣船上岸擔菜入內來至廚下不見文氏鳳嬌問時方知早間往觀音庵問簽未回胡完便在廚下洗菜等候忽聽得家人們交頭接耳笑道此時不回必是中了姑爺之計順從還好若不從只怕活不成了胡完吃了一驚想道是呀此去觀音庵又不甚遠問簽無甚延遲為何這時候還不見回定中姦人之計如何是好急忙出離胡宅下了船用力搖至觀音庵後停了船上岸見庵中前後門俱已關閉不得進去心中一發著急忽見靠牆有株大樹將身扒上樹去跨身坐在牆頭對面便是房屋低頭一聽隱隱聽見房中安人小姐哭聲胡完低聲叫道安人小姐快出來老奴胡完在此母女二人正要上吊一聞胡完聲音忙開門出來果見胡完坐在牆上母女走至牆邊道胡完你如何救得我二人出來胡完道安人小姐你伸手來待我扯你上牆便了看官要知一朝皇后福分非輕暗中百神保護不知不覺竟把鳳嬌提上牆頭放下去又將安人提上牆也放下去胡完仍從樹上扒下來扶安人小姐上了船急急開船而去文氏道胡完你來救我兩人性命此恩此德何日可報且是二員外家待我母女如同奴婢今日又有馬迪作對難回他家去的了今往何處去好要知後來事且看下回分解
