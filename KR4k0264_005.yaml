body:
  text: 第五回高宗誤信報女仇杜回忠心救小主話説高宗自拿問王守一之後竟不到王后宮中去了一日王后親往西富來候天子適高宗卻遊禦園不在宮內武氏正抱一歲小公主在宮間坐忽報王皇后駕至武氏眉頭一皺計上心生即將公主放在龍床吩咐宮女如此如此自閃人側室去了王后一到西宮衆宮女跪迎王后問道萬歲爺在宮否宮女道在禦園想必就回來王后聽了下輦入宮至龍床邊見公主啼哭王后把公主抱起撫弄一回等久不見駕回依舊將公主放下自回本宮去了武氏見王后已去急忙來至龍床狠了狠心腸將公主登時扼死把被蓋好自己仍舊往側室去了少時高宗駕回西宮問貴妃何在宮女道在偏院不多時武氏亦回高宗道朕女呢武氏道方才吃了乳睡去此時好醒了走至床邊揭開龍帳假做失聲道不好了為何公主悶死了高宗大驚抱起死尸放聲大哭武氏問何人至此大膽悶死公主宮女道無人入宮方才止有娘娘入宮不許奴婢們通報獨自進宮好一回功夫就去了武氏流淚道王后你好狠心不能害我即謀害了公主高宗大怒道賤人如此悍惡殺朕之女今次必定廢之即時草詔諭親王文武大臣擇次日告把天地貶王后為庶人册立武氏為後詔旨一下文武皆驚次日高宗不坐大殿禦太乙殿武氏垂簾於後召文武會議大司徒趙國公長孫無忌大司空褚遂良等人議褚選良道司徒元老司空大臣身命雖重今日之事當以死諫一同進殿山呼已畢高宗宣諭王后失德謀死公主不堪以母儀天下今與衆卿共議廢王后為庶人册立武氏為後昭告天地祖宗山川社稷速選儀文卿等毋得再議褚進良俯伏在地奏道臣蒙先帝托孤之重今日願以死報陛下王后賢明無罪中外鹹知先帝臨終之時執陛下之手對臣道朕佳兒佳婦今已效卿若無大故不可廢也先帝雖崩言猶在耳今陛下無故一旦廢嫡有傷先帝之靈臣死亦不敢奏詔高宗道王后殺朕女焉得無罪朕心已定册立武氏無得再諫遂良叩首流涕道陛下即欲廢後另立公卿大夫之女盡可選立為後何必册立武氏且武氏曾經侍過先帝若立為後臣恐千秋之後難逃直筆將以陛下為何如主陛下必欲立武氏為後還陛下笏乞放歸田裏高宗羞怒交集無言可答武氏在簾內大聲道如此無禮何不殺之長孫無忌道不可遂良乃先帝托孤之老臣豈可誅辱因命左右扶遂良出高宗遂下詔廢王皇后為庶人貶入冷宮有詩為證詩曰賢哉元後著芳名執掌昭陽無改更豈知武氏無情算暗謀生女陷昭陽雖有忠臣多諫語那能轉意聽直良狐媚尚能偏惑主至今提起實堪傷高宗既廢了王后遂立武氏為皇后詔告天下貶褚遂良為崖州刺史長孫無忌解司徒職升張天左為左丞相張天右為右丞相許敬宗為大司徒武氏自為皇后權歸掌握因高宗病目每坐朝武氏坐於側垂簾禦政時人號為二聖臨朝於是武氏之侄武承嗣武三思等俱居顯職橫行朝野政事悉決于武氏高宗惟拱手聽之而已武氏又差心腹內侍常至冷宮打聽王后生産欲行謀害又發矯旨一道前往崖州著褚進良自盡可憐褚送良一個忠直老臣亦死于武氏之手再説王后貶入冷宮終日哭泣欲尋一死又想腹中有妊不知是男是女倘或生一太子也好留傳一點骨血與母報仇若尋一死豈不傷了腹中兒命自解自歎在冷宮過了數月這一日到了半夜腹中忽覺疼痛兩個宮女撫背扶胸道娘娘想要生産及至五更王后更加疼痛不多一時生下一個太子來了宮女急忙燒湯沐浴又取件舊衣包裹太子王后抱在懷中看了看止不住流淚叫聲苦命兒阿為母的若不貶下冷官此時生下你來文武進表稱賀何等風光如今在此冷宮生下你來還有何人來看視便比到百姓人家也不能及他一二説罷不住傷悲早有武氏賄囑宮人報知武氏武氏道王後生太子休使萬歲知道我想斬草不除根萌芽又發生不如將他母子一齊殺了便斷後患主意一定就叫宮女悄悄去喚掌宮太監杜國進來宮女去不多時杜回來到叩頭便問喚奴婢進宮有何分付武氏叱退左右叫聲杜回我有一件大事托你去做若除得我心腹之患我當賞你一個大大的美差杜回道娘娘只要吩咐奴婢就去做武氏道王后今生下一個太子恐萬歲知道復立王氏並立其子為東宮此我心腹大患不可不除我與你短刀一把今晚到冷宮將他母子殺害回來我賞你兩江巡按之職杜回聞言大驚不敢不允便道娘娘吩咐怎敢有違武氏大喜遂給與短刀杜回接刀出宮暗道武氏你好心狠既奪了正宮又要殺他母子我想怎生救得太子出宮才好想了一回自道必須如此如此方能求得太子等至黃昏悄悄來到冷宮門首宮女一見問道杜公公要見娘娘麼杜回道正是宮女即與他傳報王后道可叫他進來杜回入宮走至床前跪下叫聲娘娘奴婢杜回叩頭王后道夤夜至此有何話説杜回道娘娘不好了看見兩邊宮女又住了口王后道這宮女是我心腹有話但説不妨杜回道可恨武氏聞知娘娘生下太子將奴婢喚進宮去給奴婢短刀一把叫我殺害娘娘並太子性命王后一聞此言嚇得魂不附體便道賤妃我與你何仇既占我正宮之位又要害我母子性命哭了一聲兒阿可憐你方出娘胎就做無頭之鬼罷罷杜回你既奉武氏之命速速收我母子的首級去罷杜回聞言嚇得汗流如雨哭道奴婢是娘娘舊日手下之人豈忍加刃于娘娘小主我杜回此來是要救太子出宮日後長大好與娘娘報仇王后道你果有忠心麼杜回道若有別心也不對娘娘明説了王后道你果如此便是我母子的大恩人了忙下床便拜唬的杜回不住的叩頭説娘娘不要折殺了奴婢王后起來向床坐下又問道你今救太子出宮要逃那裏去杜回道奴婢想來別處卻不能容身惟有抱太子往江夏府中去老王爺孝恭已死有殿下李開芳襲職又系宗室更有忠心奴婢抱太子前去自然收藏但娘娘方産病體如何出得宮去王后道止要你救出太子我死亦無所恨但宮中四下俱是武氏之人你如何救得太子出去杜回道娘娘此時趁夜靜無人知覺請娘娘來寫下哀詔一道拜託江夏王撫養太子娘娘再與太子起了名日後可以報仇奴婢抱太子從後宰門出去便了請娘娘以速為妙王後途咬破指尖寫下血書一道又想了一想因天明生下此子就取名李旦將書封好付與杜回又將床中抱起太子兩眼淚如雨下叫聲我那苦命的兒才出母胎就要離別你的命不該死杜回抱你出宮不可啼哭日後成人見此血書如見母面叮嚀了一番只見太子面有笑容並不啼哭杜回再三催促王后無奈心如刀割將太子付與杜回杜回接了太子別了娘娘竟出冷宮而去要知端末再聽下回分解
