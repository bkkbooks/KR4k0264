body:
  text: 第五十六回玉鼎仙遣徒下山徐孝德法收四將且説玉泉山金霞洞主玉鼎真人打坐忽然心血來潮覺而有感叫童兒去丹房中喚你師兄來童兒領命來至丹房叫師兄師傅喚你徐孝德來至方丈稽首道師傅喚弟子有何分付真人道賢徒可知你父母是誰孝德道弟子自五歲蒙師傅帶上山來隱隱還記得父親姓李真人道非也你祖姓徐名責力字茂公保大唐太宗皇帝為掌國軍師掃平天下有功賜姓李爵進英王你伯父名敬業你父名敬猷自你上山學法於今十二年了我傳你的法可都學精熟否孝德道弟子蒙師傅傳授算陰陽察天地並五雷天罡法及移山倒海件件都精熟了真人道這也夠你用的了今喚你來因為當初你伯父在揚州保高宗正宮太子李旦舉義兵與你父在金陵為人所害軍兵潰散目今馬周保太子起手漢陽武則天差李承業征戰漢陽他又調四路總兵俱是旁門左道有大同鎮黃景亮用陰陽二旗按方安插令唐王以及滿城人等俱患頭痛煙火皆絶今日發你下山去救唐王以及百姓保唐王中興天下待武則天二十一年一完廬陵王即位三年一滿則保唐王正位復興皇唐天下也不枉我收你一番孝德道謹依師命真人又將一口太乙劍付與孝德道此劍經丹爐鍛煉配合陰陽五行能誅妖斬怪取人首級千里頃刻孝德拜受起行真人送出洞外又囑道你到漢陽見時而進後會有期火速去罷孝德雙足一登跳在雲頭竟往漢陽而來走了半路想道肚內飢餓且化一齋吃了再行把雲光一按落在一座高山上忽聽得山下鑼鼓大震望山下一看見有三千多僂愣演陳為首四個人一個面如赤金一個頭生三角一個藍面紅須一個面分五色在那裏監陳卻被小卒看見叫聲大王山頂上有一少年道人在上面偷看走陳哩那四個為首的擡頭一看果見有人在上那頭生三角的叫聲大哥這賊道在上偷看我們演陳待我上去拿他來挖心飲酒説罷把馬一提跑上山來大聲喝道好賊道敢在此看爺們演陳徐孝德道看看有何妨你這般形狀意欲何為那人聞言大怒舉起狼牙棒照預門就打徐孝德拔出太乙劍急架忙迎戰了三五合孝德暗道一員好勇將此去漢陽也用得著遂虛閃一劍回身便走那人拍馬趕來孝德念念有詞把劍在山土上一畫畫了大大一個圈兒回身把劍一指喝聲走那人一馬進了這圈兒滴溜而轉如牽磨一般不住這人盡力收馬馬只是走要下馬身子如釘在馬上的一般那人大叫你這道人弄什麼法把我弄的盡轉孝德笑道因你火性太大我叫你轉幾日去去你的那火性話説跟來的樓愣飛報下山説不好了二大王在那裏如牽磨一般的轉哩那個藍臉的大怒提刀飛馬上山果見二大王還在那裏轉哩送大喝一聲道賊道弄什麼法令人如此快快止住若説半個不字這刀就是你的對頭孝德笑道恕罪未知孝德如何答應再看下回分解
