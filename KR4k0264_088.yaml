body:
  text: 第八十八回秦文勢急反周朝趙武大戰殷楚鴉當下衆人見趙武丟下元嗣如飛去了一齊上前來看元嗣不想元嗣雖未至於死已不能言語了衆官忙令他家人擡回府去按下不表且説趙武行了一日看見前面來了一隊人馬為首一人差官打扮飛馬而來趙武一看見是秦文大叫哥哥趙武在此秦文一見趙武忙跳下馬來道賢弟自你出府之後就有大名急信故此愚兄親身而來與武元嗣講話賢弟你從大名來其事如何趙武就把昨日之事細細説了一遍秦文道兄弟你打死了武全忠挾壞了武元嗣妹夫雖然出獄只怕如今又拿在獄中了且是這事非小二武皆系皇上之孫侄長安一知定然不肯與你我幹休你如此一打其禍不小這事卻怎處趙武道我想鄭知府既誣方姐夫為九焰山叛黨細思九焰山廬陵王實系皇唐嫡孫哥哥何不乘此反周為唐秦文想道也罷目今河東節度使魯國公程明宜春節度使鄂國公尉遲勃二處都有文書來會不日起兵扶助大唐今事至此説不得了遂喚家人秦順秦橫二人速齎兵牌趕回金墉令弟秦方速發大兵三萬星夜前來接應不可有誤二人得令飛馬回了秦文趙武就在林中披挂殺進大名來不想城中這日武元嗣死了城中沒有主帥秦文趙武乘勢殺入城中無人敢擋打入府內擒了鄭伯義又遣人去捉夏去矜花蜜蜂秦文據了武府大堂收籍戶口百姓歡呼軍心田順秦文今扯起大唐旗號點了兵馬與妹丈方表相見此時夏去矜花蜜蜂俱已捉到方表令剝去衣服叫軍土剖腹剜心報了大仇過了數日金墉人馬到了卻是兄弟秦方同小妹秦擺花領兵來接應秦文擇日將鄭知府開刀祭旗即差官往九焰山進表請駕中興命案方取劍門關秦擺花取龍地關趙武取玉津關各領大兵一萬克期興兵且説趙武領兵殺至玉津關把關守將乃成國公殷開山之後叫做殷友生一男一女一男尚幼一女一十八歲面分五色闊嘴金睛力能拔山名叫楚鴉他要自擇匹偶必要與他一般有力一般形狀方肯許配終身此時殷友聞知趙武兵到關下即時領兵殺出關來看見趙武十分醜陋面分五色與女兒一般模樣暗想吾欲反周為唐正合天意此人又可與女兒作配矣拍馬上前便問來將何名趙武道咱乃金墉趙武是也説罷一錘打來殷友用槍一架折為兩段連忙退走入關對楚鴉道我兒今來金墉虎將趙武臨關我擋他一錘槍桿折為兩段幸走得快險些兒沒了性命我兒出去會他須要小心楚鴉聽了立刻領兵出關趙武一見楚鴉唬一大驚暗想天下竟有像我一樣的醜陋女子這邊殷楚鴉見了趙武也吃一驚想道世是原有像奴家一般的容貌但不知他本事如何遂問道來將可是趙武麼趙武道然也二人遂各放開坐馬各舞雙錘一場大戰戰了百十餘合不分勝敗天色將晚各自收兵楚鴉進關對殷友道孩兒與趙友交鋒果是英雄算為敵手殷友道唐家舊日臣僚皆順九焰山共建中興我意欲反周為唐今觀趙武相貌武藝正可與我兒匹配也完我一件心事但不知我兒意中若何楚鴉道反周為唐事大孩兒姻親事小任憑爹爹作主殷友大喜分付關上挂了免戰牌修書一封差官星夜趕至大名投胡國公秦爺案下求他主婚差官奉令行到大名府投下文書秦文拆開文書一看上寫道興唐成國公殷友致書胡國公秦麾下切友蒙先王之恩承祖宗之蔭錦衣世祿每思報效無由而入今令義弟趙武兵至玉津關與小女楚鴉交鋒百十餘合不分勝負實系天生一對英雄夫妻心竊慕之恐令義弟行軍守法不肯允諾故書奉案下請駕幸臨速至玉津主婚成親仆即率衆迎接共建中興之業專此上達秦文看了大喜即日起馬竟至玉津關趙武聞報迎接入營秦文笑道聞知賢弟與殷小姐交鋒未分勝負可有之乎趙武道有之愚弟次日正要見個高低不想關上免戰牌挂出已經九日秦文道愚兄此來實來賀喜趙武道喜從何來秦文道殷友歸唐賢弟之功也目今城內殷小姐與賢弟有姻親之喜愚兄已經專主議定即日就與賢弟成親故此親身而來叫差官你進城去回覆主帥説本鎮已至軍中叫他速備喜筵成其姻事差官領兵出營叫開關進城將秦文分付的話一一稟明殷友大喜令扯起大唐旗號大開關門迎接秦文趙武與殷楚鴉即日成親不提欲知後事請再看下回分解
