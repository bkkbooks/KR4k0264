body:
  text: 第七十九回紫剛關父子提兵九焰山兄弟敗陳再説長安武則天聞報武承嗣並十個節度使俱被九焰山人殺了武氏大怒歎道可惜承嗣少年智勇今日沒于王事朕心怎舍途問群臣誰與朕領兵剿滅九焰山張天右奏道臣保紫剛關總兵白雲前去剿賊他年紀雖老卻勇力無雙又有長子文龍次子文虎兩個武藝固精猶不足道惟有第三子文豹武藝高強力能拔山從來沒有人與他對手陛下若使他父子征討必能平復武氏大喜就下旨令白雲父子領本部人馬進攻九焰山差官齎旨來到紫剛官軍士報入白雲迎接天使入關讀了詔書設筵款待席散天使回去白雲退入後堂夫人金氏小姐霞然接著問道相公今日為何面有憂色白雲歎道夫人有所不知當今朝中二張用事諸武專權天下不安干戈四起今日有旨下來命我率三子領兵征九焰山明日就要起行夫人道既然如此快備酒與老爺餞行霞然道爹爹孩兒想廬陵王是太宗嫡孫高宗長子武後目下雖然得勢究竟是篡逆之人不久復歸唐室依孩兒愚見莫若假借興兵征九焰山暗暗領了家眷率領人馬降廬陵王為是白雲喝道小小女流曉得什麼不要胡言夫人道女兒之言倒也有理白雲喝道住口女人家知道什麼當下擺齊筵席夫妻兒女團團坐下霞然小姐起身斟一杯酒雙手來敬白雲口中才待要説話白雲知他又是那話劈手奪過酒杯擲於地下氣衝衝走回書房中去了三個兒子也不敢飲各去安息到了次日白雲也不與夫人小姐分別竟把關防交于偏將馬齊把守點兵二十萬同了三個兒子離了紫剛關望九焰山而來離山五裏安下營寨次日白文豹領兵抵山討戰徐美祖差烏黑虎迎敵烏黑虎提槍上馬領兵沖下山來白文豹一見喝道你這逆賊快來受死烏黑虎大怒舉槍劈面就刺白文豹把錘向上一迎當的一聲響亮槍折兩段烏黑虎回身拍馬便走白文豹喝道這樣無力的東西也要做將官饒你去罷烏黑虎敗上山來細告此事烏黑龍聞言不服提钅堂上馬沖下山來一見白文豹暗想這樣小孩子如何厲害遂大喝一聲招钅黨白文豹舉錘一架早把他的流金钅黨擔彎了白文豹伸手將烏黑龍抓過馬來道拿你去到汙了我的手饒你去罷往地下一拋但不知烏黑龍的性命如何且聽下回分解
