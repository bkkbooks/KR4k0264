body:
  text: 第八十四回月姑出陳行妖法薛蛟交戰逢野合當下敗兵飛報入營説羅昌改名黃明假投我營破了火魚殺了何昌同薛剛上山去了武三思聽了怒氣塞胸正愁營中無有能將難以剿滅九焰山忽見軍士來報説夫人奉旨領兵前來助陳已到營前三思大喜遂迎接入營分付備酒接風武三思與花月姑對飲把交戰之事一一告知飲罷二人同入羅帷共會舊情次日花夫人領兵至山前討戰山上聞知放炮下山閃出大隊人馬那花夫人一馬上前道今日天兵到此速速就縛免吾動手不然即殺絶爾等不留寸根那唐陳內烏黑龍一馬沖出大罵淫賤人體走吃我一刀花夫人即與交戰戰無三合花月姑回馬便走烏黑龍隨後趕來被花夫人回身把口一張噴出一口白氣烏黑龍一連幾個寒噤手腳酥麻跌下馬來被周兵搶去綁了周成急急出馬也救不及花夫人復又交戰戰不三合花夫人把口一張沖出一口白氣周成眼黑身麻毛骨竦然也跌下馬來被周兵捉去烏黑豹大怒舉钅黨打來花夫人用刀敵住戰不三合一口白氣吹來烏黑豹兩足登空落馬亦被周兵捉去李定出馬亦被捉去薛剛大怒正欲出馬忽見周營鳴金收兵薛剛要殺入周營徐美祖道勝敗兵家常事何必性急且待明日再設計破他薛剛恨恨而回到次日徐美祖領衆將下山擺開陳勢花月姑亦領兵出來衝殺過陳唐陳上雄壩伍榮一齊殺至花月姑見雄壩鐵方槊打來甚凶連連吹出兩口冷氣把雄壩伍榮吹得昏迷不醒被周兵捉去鄭寶急忙出馬殺來與花月姑大戰十余合鄭寶正要設計拿他不想被他一口冷氣吹來跌于馬下活捉而去薛剛一見大怒正要出馬忽見薛蛟躍馬挺槍沖出陳來花月姑一見薛蛟生得面白唇紅眉清目秀十分風流不覺淫心頓起想要引他到無人之處漏他元陽就對薛蛟吹一口溫和氣薛蛟一個寒噤著了風魔花月姑回馬落荒而走薛蛟隨後趕來看看有十餘裏見一所古廟花月姑照薛蛟面上吹一口冷氣薛蛟跌下馬來花月姑下馬把薛蛟抱入廟內到無人之處代他解開衣甲露出下身薛蛟年紀雖小那件東西卻大宛如鐵棒槌一般粗硬花月姑看了欲火難禁渾身發癢忙忙解開自己的裙褲露出那件寶貝來把薛蛟緊緊抱住嘴對嘴腮對腮十分親熱口中只叫我的親親我的乖乖不斷聲此時薛蛟已醒開眼一看見一個絶色的女子樓在懷中一陳渾身酥麻不覺按捺不住那一點元陽竟直冒出一時走盡四肢綿軟口內吁吁看看將死花月姑收了元陽立起身來説道本該取你首級我因與你情分一場總是一死饒你一刀罷遂穿了裙褲上馬而去見了武三思假言被他走了三思再不想妻子被人淫去按下不退再説薛剛見侄兒追下去要發將去幫助徐美祖道不必幫助且回山去料然不致有損衆將回山不表且説薛蛟倒在地上不能動身停了一會忽見一個道人走至面前叫聲公子我特來救你快快開口薛蛟開口道人取出一粒紅丸放在他口內不時只聽得肚中一聲響就説得話了立起身來便問道老師何名李靖道吾乃香山李靖是也薛蛟道原來是藥師老爺連忙跪下磕頭口稱願拜老師為師救救弟子李靖在袖中又取出一粒金丹付與薛蛟道你明日再與他交戰引他到此同他交情把此金丹暗含在舌下你看他四肢不動口內吐出一物其形如玉你竟吞在肚內他是多年狐狸精迷人精血結成的若吃了後來可以長生不老切記不可傷他性命等他回營自死到三更時分叫令叔點齊人馬劫他營寨可以成功説罷飄然而去薛蛟也就上馬回山見廬陵王把李靖之言一一奏明次日下山直到周營指名要花夫人出戰花夫人聞知沖到陳前一見薛蛟吃了一驚暗想昨日取盡精血今日又能至陳前真乃天仙了忙笑道郎君我竟看你不出有些本事薛蛟微笑即與交戰不上三合花夫人丟個眼色落荒而走薛蛟緊緊追來到了原處花夫人跳下馬來把馬拴好薛蛟也跳下馬來二人同進廟中相抱親嘴解下小衣雲雨起來薛蛟暗把金丹含在口內極力奉承花夫人四肢不動口中吐出一物其白如玉被薛蛟一口吞入肚中花夫人驚醒只叫郎君妾身此寶非一日工夫曾經過一百人有二百年的工夫今日被郎君吞了妾命休矣薛蛟道本該取你首級念你昨日不殺我之情也饒你一刀罷遂上馬而去花夫人坐到日夕方能起身勉強上馬回營不知對武三思説出甚話欲知端底再看下回分解
