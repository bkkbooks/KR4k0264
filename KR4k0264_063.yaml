body:
  text: 第六十三回四神祠二星收怪廬陵王彩樓招親再説湖廣房州黑龍村紀鸞英自從臥龍山抱侄兒薛蛟與薛剛失散荒郊路生下薛葵逃至黑龍村母舅丁一守家居住不覺一十三年是年薛蛟長成一十五歲生得面如傅粉唇若塗朱力能舉鼎拔山原按上界喪門星官臨凡這薛葵長成十三歲生得面如鍋底肉如黑漆與薛剛一般模樣力舉萬鈞聲似巨雷原按上界鐵石星官臨凡弟兄二人終日舞槍弄刀紀鸞英因他是將門之子孫也不去禁止他間時將薛氏三代並被害始末一一説知他弟兄二人聽了也不勝悲怒一日丁一守取出幾百銀子來叫人去買童男童女二人便問舅公買來何用丁一守道你兩個不知這村東有座花豹山山上有座四神祠內有四位神道一名白龍大王一名大頭大王一名銀靈將軍一名烏顯將軍十分靈驗年年本月十三日用童男二個童女二個前去祭他他若吃了這村中一年平安田禾豐收如不去祭他便家家生病田禾不收所以年年去祭他今年該我值年數日前合村交齊分資叫人去買童男童女到十三日好去祭他薛蛟道豈有此理若是正神如何吃人分明是四個妖怪待我去捉他來除此一害也免得年年傷四條性命薛葵道真真不是正神舅公不必浪費這些銀子我倒有個主意叫哥哥扮作童女我就扮作童男到十三日擡我兩個去花豹山捉他叫哥哥捉兩個來我捉兩個來有何不妙丁一守道胡説神道豈是要的分付家人速去買童男童女來薛葵與薛蛟暗地商議道你我到十三日晚間先上花豹山到祠內藏著等妖怪出來那時下手拿住顯顯手段薛蛟道有理連嬸娘也須瞞著二人計議停當到了十三日薛蛟薛葵悄悄出了後門竟至花豹山四神祠中二人躲身藏在神像背後到了初更時分丁一守為首與村中人等扛擡童男童女豬羊入廟供於桌上點起香燭丁一守與衆人禮拜拜畢匆匆出廟回去薛蛟薛葵轉將下來看見桌上有供的酒肉二人遂吃了一回薛葵道你我站在這裏妖怪如何敢來不如還躲在神後看勢行事薛蛟道正是二人遂又藏在神後直等到有三更時候忽聽怪風從空而起刮的滿山樹木亂響二人望廟外一看只見來了四個妖怪一個尖頭細身高一丈二尺一個身長三尺生兩頭頭大如鬥一個白麵有毛一個黑如煙煤四個一齊搶進廟來弟兄二個從神後轉出跳將下來大喝一聲妖怪那走四個妖怪一見二人認得是主人都現了原形伏於地上薛蛟左手捉住白龍大王右手按定銀靈將軍薛葵左手拿定大頭大王右手扯住烏顯將軍一齊舉腳亂踢踢了一會端然不動二人定睛一看薛蛟左手捉的白龍大王卻是一條滾銀槍右手按的卻是一匹白銀獬豸薛葵左手拿的大頭大王卻是兩柄烏金錘右手扯的卻是一匹黑麒麟二人大喜遂各自解下腰帶拴了坐騎牽出廟門拴在樹上放下槍錘復身入廟把四個童男童女抱出廟外二人又入廟把神象推倒後把廟柱用力一推只聽一聲響廟宇立時跌倒薛葵笑道昨是四神祠今為扯坍廟我們回去罷薛蛟抱了兩個童男薛葵抱了兩上童女帶了槍錘一齊上騎下山回來且説紀鸞英清早起來不見他弟兄兩個正在著急來問丁一守丁一守説不知忽見他弟兄兩個走進門來一齊下騎放下童男童女鷹英道你兩個昨晚哪里去來這兵器坐騎哪裏來的薛葵舉雙錘笑道舅公你認得他麼這便是大頭大王哥哥手中槍便是白龍大王銀靈將軍是他的坐騎烏顯將軍的我的坐騎四個神靈都被我二人收伏來了丁一守道四位大王如何就是這四件東西你細細説來薛蛟道實不相瞞就把昨夜之事細細説明丁一守聽了且驚且喜道甥女此二子能收伏此四怪決非等間之人日後必能重整薛氏門風鸞英亦大喜弟兄二人自得兵器之後終日演習武藝一日弟兄二人在村中聽得往來人傳説房州廬陵王長女安陽公主于本月二十五日在教場中彩樓拋球招駙馬薛葵道哥哥此去房州不遠我們何不去看看薛故道我亦有此意可回家稟知嬸娘明日便去二人回到家中見鸞英道嬸娘房州廬陵王長女安陽公主于本月二十五日彩樓拋球招親我與兄弟同到房州去看看鸞英道你們想做駙馬麼人千人萬那繡球如何就打中你就是打中你誰不知你家當日大鬧花燈踢死廬陵王的禦弟唬殺他的父親造下大罪永不赦有你二人是薛氏子孫豈肯招為駙馬拿去殺了卻是穩的薛葵道若打中了就是他的女壻他若殺了難道叫他的女兒守了寡不成況且姓薛的盡多他如何就知道我是兩遼王的子孫薛蛟道嬸娘我們不是想做駙馬因去房州不遠如此盛舉前去看看即便回來鸞英道你們既要去須就去就回不可妄動氣性闖出事來兩個連連應諾到了次日弟兄兩個起早竟往房州而去未知此去如何且聽下回分解
