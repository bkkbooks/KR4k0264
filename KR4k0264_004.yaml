body:
  text: 第四回征西將回朝受爵武昭儀暗害正宮不説高宗寵幸武則天且説薛丁山大兵奏凱回朝在路行程非止一日到了長安高宗命文武出郭迎接次日早朝禦玄武樓受西域貢禮降表衆將卸甲入朝徐茂公進朝褚遂良拱手迎道老千歲聖上寵幸武氏若是見駕以社稷為重茂公應諾遂上樓見駕高宗賜坐茂公把征西將士勞苦之事説了一遍高宗安慰了一番即命光祿司於是日設宴大宴功臣擇日加封宴畢群臣謝恩辭朝而出褚遂良忙問茂公武氏若何茂公道此系天意難以挽回遂良頓足歎道徐責力只可為將不可為相只此一言把唐家江山將屬他人矣説畢氣恨出朝回府去了再説次日薛丁山在長安城外立起魂幡招仁貴薛王及母柳太夫人魂魄開喪挂孝後日高宗大封功臣以薛丁山為上柱國西京留守兩遼王子孫世襲妻樊梨花為鎮國一品夫人高瓊英為定國夫人高蘭英為安國夫人程金定為護國夫人申媚花為寧國夫人榮封三代以程咬金為開國長壽魯王賜安車駟馬宮女三十六人加九錫入朝不趨劍屆上殿贊拜不名榮封三代間居養老不必入朝以程萬牛襲魯王之職以徐茂公為開國英王平章重事賜田萬頃以子敬業世襲英國公之職其餘征西將及西涼將降將俱各論功升賞一一加封並無遺漏次年武則天生太子高宗更加寵幸自此高宗稱天帝武氏稱天後一日徐責力身故享年九十三歲高宗聞之不勝悲傷賜禦祭禦墓此時武則天謀奪正宮之心愈急凡武氏兄弟子侄和張昌宗張易之俱認勳戚盡居顯爵勢傾朝野內宮恃寵王親大臣半歸武氏都為心腹凡正宮王后一舉一動無不盡知時常在高宗面前譖言王后的過失高宗亦大有廢王后立武氏之心因王后系元配又無大過一時難於廢出是年卻值王後身懷六甲後見王守一在府積甘露水書符拜鬥禱告天地求王後生一太子早有侍臣報知武氏武氏想道王后不生子萬歲定立吾子為東宮著王后一生太子立嫡不立庶這東宮之位就到不了吾子了左思右想急差心腹內侍悄悄召郎侍許敬宗及樞密府使張天左張天右三人入宮計議其事許以廢得王后册上我為正宮左右二相當分張氏二人平章之職當與許敬宗三人道此事不難侍臣三人明日見主先上一本説後兄王守一有弒主之心每夜於府上積天露書符拜鬥咒咀天子娘娘一面速買囑王后宮女如此如此包管廢卻正宮立娘娘為後武氏大喜三人辭出武氏即悄悄買囑王后宮女照依如此辦理不可泄露事成定有重賞王后宮女回宮即照武氏所囑辦妥至晚高宗駕幸西宮武氏迎駕入宮叫一聲萬歲今日為始臣妾不敢留駕在此請駕到正宮中去歇罷免得害了萬歲的性命高宗驚道這是怎説何以見朕在貴妃宮中便害了性命即速奏明以釋朕疑武氏泣道妾若奏明王后聞知妾即死矣高宗道有朕作主王后何能害卿不妨直奏武氏道王后恨妾迷惑聖上不但有殺妾之心竟有謀害萬歲之意妾聞官中造一木人寫上聖上年庚八字釘了手足埋于龍榻之下與國舅王守一咀咒萬歲欲謀天位訪聞此事是真求萬歲作主高宗聞言大怒道有這等事一發反了忿恨而起來至後宮王后接駕高宗喝道你幹得好事焉敢謀咒朕躬王后不知何故只嚇得目定口呆不能回答衆內侍齊至龍榻下把土掘開不上二尺果有一木人取將起來上邊寫禦諱八字又有五個大針釘了手足中心高宗怒極手指王后罵道賤人朕與你何仇造此木人咒朕朕豈不能廢你麼王后泣道此木人不知是那一個埋在此地連我一些也不知也不知是何人害我我與陛下結髮之情焉有此心陛下休聽讒言屈害於我高宗道朕若不聽讒言天子之位不久付于王守一了説畢忿恨而出往西宮而來次日駕臨早朝有許敬宗張天左張天右三人上本參國舅王守一心懷謀逆於府中積天露書符拜鬥咒咀聖上有篡位之心高宗道不消三卿彈奏朕早已知之遂下旨把王守一全家拿下押赴市曹斬首並諭文武百官欲廢王后旨一下群臣皆驚閃過司徒趙國公長孫無忌西台禦史褚遂良同衆老臣奏道王后賢惠素著中外皆知王守一赤心為國誰人不曉今陛下一旦聽信匪言以莫須有三字即將國舅誅戮而廢王后恐中外聞之有傷陛下之明臣等死亦不敢奉詔高宗道王后私造木人書朕八字埋釘宮中王守一在家咀咒朕躬欲謀大逆理應正法卿等何得諫阻長孫無忌道王后與陛下結髮元配豈一旦有此反心其中寧無姦謀暗算陛下明見萬里何得即誅國舅而廢王後實為有傷仁政高宗見群臣苦諫無可奈何下旨將王守一收入天牢發樞密院張天左張天右嚴訊具奏忿怒退朝駕至西宮武氏接入問事若何高宗道王守一發張天左二人查審朕欲廢後立汝怎奈母舅長孫無忌與一班托孤老臣再三苦諫權且忍下然朕心已定昭陽之印繹當付與汝矣武氏暗喜悄悄差心腹囑託張天左二人務必將王守一嚴審咒聖之惡二人依旨將王守一極刑拷訊王守一寧死不招可憐負屈含冤死於獄內未知王后後來如何且聽下回分解
