body:
  text: 第四十二回馬迪借宿想佳人於婆做媒遭毒罵再説通州胡家文氏自從進興會後三月有餘全無音信心中憂問一日胡發夫妻二人往南莊遊春文氏與鳳嬌道今日你叔嬸俱不在家我且同你去後門首看看街上光景亦可解解悶母女二人遂來至後門首開門張望不料馬迪從胡家門首經過望見文氏鳳嬌在外母女躲不及火速回身往內便走馬迪跟將進來雙目射定鳳嬌鳳嬌三腳兩步飛走進去閉上中門馬迪見了文氏施禮問道伯婆方才進去的可是令愛麼文氏道正是小女馬迪道伯婆你衣衫破損甚為苦切可恨你侄女從未題起以此侄壻未申孝敬忙叫安童取一兩銀子送與文氏文氏按銀道老身怎好收受馬迪道説那裏話叨在至親輕意休怪不然要親眷何用文氏十分感激只得收了馬迪道嶽父母都不在家麼文氏道都往南莊去了明日才回了馬迪道今日我遊春身倦就在此間住下候嶽父母回來並有話説文氏道只是在此怠慢如何是好馬迪道伯婆説那裏話文氏忙進內將馬迪所送之銀取出二錢置辦酒飯與馬迪吃馬迪見天色已晚因對他家人説今日看見鳳嬌小姐十分美貌我心中十分羡慕你們若有計策能使我進去與小姐一會重重有賞家人道大爺休要癡想中門至廚下共有五重門如何得進去當初進興在此大安人認他為子他能穿房入戶並無禁止又聞小姐許了進興為妻進興在此還可開門進去如今進興走了有誰人開得這五重門馬迪道老花婆沒正經把這小姐許與進興豈不是一塊好肥肉到送與狗吃了歎息一回在書房安歇一夜思想不能合眼次日胡發夫妻南莊已回馬迪見禮道小壻東郊遊春回來困倦在此歇了胡發道我們不在家卻不怠慢了賢壻馬迪道至親之間怎説這話胡發夫婦即時備酒在廳款待女壻飲酒之間馬迪看見文氏立在屏風後偶生一計叫聲嶽父那進興被五個人拐去做了強盜如今拿來打死在牢內了嶽父你知道否胡發道幸喜不在我家真真造化文氏聞言大驚奔回廚下叫女兒不好了你丈夫被那五人拐去做了強盜打死在牢中了鳳嬌失驚道此話那裏來的文氏道馬公子在廳對你叔叔説的鳳嬌道母親休要信他我看那人鼠頭狼面乃是一個不良之人定然捏造此言決非真事文氏道我兒你休錯説了好人昨日他憐我孤苦送我銀子一兩如何你説他是不良之人鳳嬌道他與你銀子你道是好心麼乃是他的姦計其中必有緣故我今後只宜遠他再説外廳馬迪暗想若要小姐到手須在此慢慢緩圖自然必得便叫嶽父小壻在家人多吵鬧不能靜養攻書此間清雅小壻欲在此攻書不知可否胡發道妙遂即分付打掃書房好好服侍不可怠慢馬迪大喜遂在此住了半月有餘朝思暮想連面也不能見茶飯不吃害起相思病來了馬迪之父聞知差管婆于媽來看一於婆一至胡家書房見馬迪面皮黃瘦不住歎氣於婆道大爺你為何病的這般光景馬迪道我的心病難治就把想鳳嬌小姐害起相思之病説了一遍於婆道這有何難待我去做媒心然事成馬迪道你若説得成時真真是我的大恩人先與你白銀五兩事成還要重謝你哩於婆接了銀子滿心歡喜來至廚下見了文氏連叫安人恭喜了文氏道我喜從何來於婆道我特來與小姐説媒我家公於十分愛慕小姐使老身前來説合安人一允擇吉成親送小姐到西莊居住與英娘無分大小安人也不在此受苦了豈不是大喜文氏聞言驚呆半晌方説道我女兒已許人了於婆問是那家文氏就把神入託夢比合朱砂記已許了進興之事説了一遍於婆道安人好沒主意怎麼把一個標致小姐到許了進興那進興乃胡宅奴才如今逃走我家大爺乃宦門人家其富巨萬安人不可錯了主意許了我家大爺勝於進興萬倍不止文氏未及回答鳳嬌發怒喝道老賤人你不過是馬家家人媳婦敢如此無禮他家富貴由他我的貧窮曾受老賤人言三語四你看我是何等之人還不快走如是不走難免我一頓巴掌遂伸手要打於婆滿面通紅忙忙走出未知如何且聽下回分解
