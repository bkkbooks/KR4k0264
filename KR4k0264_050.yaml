body:
  text: 第五十回崔文德痛哭鳳嬌李承業戰勝馬周話説鳳嬌跳在江中早有巡江水神托住頃刻間不知去了多少路途遇了一隻榮歸的官船水神把船托住那船一步也不能行水手把火往江中一照呐喊江中一個女子早驚動了船內夫人披衣起來分付快快打撈救得上船賞銀五兩衆水手忙救起上船此時船中男女盡皆起來夫人叫丫環與他換了濕衣服夫人一看好一個絶色女子問道何方人氏姓甚名誰為何尋此短見鳳嬌流淚道賤妾姓胡名鳳嬌通州人氏父親早亡同母文氏過活自幼許進興不料他去邊庭尋親杳無音信叔父胡發貪圖財帛又受他人之聘逼奴改嫁奴守節不從因此投江自盡卻蒙夫人撈救恩德如山夫人道原來是一個節女可敬可敬我欲差人送你回去又恐你叔叔通你我對你説我家相公陶仁湘州人氏現為潯陽知府我生一男一女男名陶泰現為山海關總兵我家相公告老回鄉先打發家眷回家在此救你我女兒正少一人服侍你不若在此伴我女兒同往湘州再打聽你丈夫的消息不知你意下如何鳳嬌聞言下拜道妾願從命陶夫人道既如此你就改名鳳奴罷遂指一人道這就是小姐鳳奴便拜了小姐又指一人道這是小姐的乳母徐媽媽你可拜他為母到家去也好照管你鳳奴又拜徐媽媽為母隨夫人往湘州去了不表且説文氏睡醒不見了女兒吃了一驚忙披衣起來見艙門已經開了送大聲哭道不好了我女兒不見了文德驚醒忙起來叫家人取火滿船照看那有影兒只見船頭有繡鞋一隻分明是投江死了文氏哭倒在船文德放聲大哭急叫數十隻船打撈尸首江水滔滔那裏去撈文德選分付家人把帶來的祭禮排在船頭文德哭拜船頭道賢妹你身死江中靈魂隨愚兄回去姨母在我身上養老送終文氏望江哭叫兒呀為娘的被你哄了叫我苦命的娘親依靠何人哭了一回燒化紙錢祭畢開船回家崔母聞知也大哭一場文德遂勸姨母入內房文氏哭叫女兒你去時還把箱子鎖好就拿定主意不回來了一頭哭一頭開鎖忽見書一封文德拆開一看哭得發暈賢妹原來你未出門就存了死心難道我強通你不成哭哭啼啼送出去走到書房倒在床上日夜啼哭崔母來至書房勸道你鳳妹已經死去不能復生何必如此啼哭自我看來只要你孝敬你姨母就是了你出外去尋些朋友散散心悶待我分付媒婆給你另尋一個如花似玉的妻子文德道我今娶親不論容貌只要個無父母的女子為人賢惠將來拜姨母為母奉養送終以代表妹以表我心崔母道我就依你快起來出去走走文德起身出外延請僧人立招魂幡做道場超度鳳嬌不題且説陶夫人並家眷船至湘州俱下船坐轎進城來到府中有徐媽媽之子徐英見鳳嬌美貌忙問母親這人是誰徐媽媽道是夫人江中撈救來的拜我為母就是你的妹子你二人見了禮二人各各施禮後來徐英悄地對他母親説道幹妹子生的標致孩兒又無有妻子母親何不做主配了孩兒徐媽媽道胡説他因為守節投江豈肯配你休得胡想徐英諾諾而退然此心終不放下自此鳳嬌在陶府中夫人小姐見他精巧伶俐亦甚愛他徐媽媽又十分照管他頗不吃苦按下不表且説三齊王李承業到臨江府與李信合兵共集大兵十八萬殺奔漢陽一到漢陽城外安下營寨次日承業率兵抵城討戰城內馬周聞報率兵出城迎敵唐王與參軍袁城李貴上城觀陳馬周出馬大呼李承業你是本帥手中敗將焉敢又來討死承業大怒出馬掄刀直奔馬周馬周挺槍相迎戰了十餘合承業招架不住回馬便走馬周揮兵追殺李承業懷中取出火輪牌回身對著唐兵連打三下火光透出烈焰騰空燒得唐兵焦頭爛耳大敗而退火尚未熄箭如雨發承業催兵追殺馬周大敗入城閉門死守承業得勝回營欲知如何破敵再聽下回分解
