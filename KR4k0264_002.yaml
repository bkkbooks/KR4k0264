body:
  text: 第二回李淳風課識天機武媚娘初沾雨露不説狄仁傑在路行程單説太宗丁酉年點選宮娥其時有荊州刺史蓋文達點得美女一名叫做武媚娘刺史想道媚娘二字叫得不好明日禦前豈有稱之理進改名武囗取日月當空萬方照臨之意差官送入京中太宗一見大喜留在宮中宿了一夜次日拜武囗為才人左右不離又封武氏一門官職升蓋文達為弘文館學士武囗之父武士囗為都督一時榮耀寵幸非常有詩為證荊州美女出自貧月貌花容似洛神淫蕩千秋作話柄專權二九作明君深宮日日笙歌詠梨院朝朝舞衫雲高宗二百山河重留得丹書汙汗青其時司天監李淳風知唐室有殺戮親王之驚女主專權帝位因此密奏太宗太宗笑道豈有婦人能居大寶之理這定是男子或名中帶著武字如有犯忌即便殺了此時華州刺史李君羡因他貌美人都稱他為李五娘太宗聞之忌而生疑齎詔召至半路殺之又傳旨各處搜求凡有姓武或縣名武名字涉於婦人類盡行誅戮李淳風知屈殺多人連忙奏道陛下勿殺害衆人臣前日所奏上達天意不敢有誤武氏乃宮中武氏也望陛下去之此時太宗正當錦帳歡娛鴛枕取樂怎肯將武氏貶殺便道卿既能知未來天意可曉得今科狀元是誰李淳風道陛下暫停一日臣當魂遊天府便知分曉太宗準奏是日李淳風沐浴齋戒焚香望天祝告祝畢遂臥於殿前直至黃昏方才醒來即俯伏奏道陛下在宮與武氏淫樂上帝怒極必須殺之可挽天意若問今科狀元臣見天榜名姓乃火犬二人之傑有彩旗一對上有詩一首詩曰美色人間至樂春我淫人婦婦淫人若將美色思亡婦遍體蛆鑽滅色心太宗聽了命李淳風書其姓氏詩句藏於盒中加上皇封置於金匾候揭榜之日取出一對如果不差即廢才人武氏説罷退朝入宮是夜有疾臥病在床次日罷朝有東宮太子乃是高宗入宮問安武氏故意裝出許多風流小心勾引高宗高宗一看武氏但見玉叉斜插鬢雲松不似雀微鏡裏容頻蹙遠山增媚態盼登秋水轉情濃高宗看見武氏這一般的風流俊俏因想道怪不得父王愛這妃子有了病有這等豔色自然夜夜不空了便留心欲私之彼此以目送情未得其便偶爾高宗出外小解武氏忙取金盆取水跪捧於地進與高宗淨手高宗見他嬌媚遂戲將清水灑其面上低低念雲昨憶巫山夢裏魂陽臺路隔奈無門武氏即便輕輕答雲未曾錦帳風雲會先沐君王雨露恩高宗大喜道觀汝才色兼美深得我心遂攜他手而起竟入便宮無人之處著武氏去了小衣遂成雲雨之歡這不叫做君王只愛新人樂忘卻綱常天子尊不一時二人雲收雨散武氏泣道妾侍至尊感承垂念今蒙殿下之恩遂犯私通之律倘日後位登九五則置妾于何地高宗聞言發誓道俟宮車晏駕朕即册汝為後有違此言天厭絶之武氏道口説無憑須留表記高宗即解所佩九龍羊脂玉環為贈武氏叩首而謝自此以後宮中出入並無阻擋太宗漸漸龍體無恙至放榜日期首名狀元姓狄名仁傑二名楊炯三名盧照鄰傳臚王勃太宗看罷吃了一驚心中想道我只道李淳風是狂言誰知連一字也不差豈非天意即召李淳風進便殿問道卿説狀元名姓不對何也李淳風奏道臣一時不敢泄露天機將狄仁傑三字分開所以説火犬二人之傑乃是狄仁傑也臣該萬死求殺武氏太宗道武氏在朕宮中服侍一場並無過犯豈可賜死朕自有主意將他遣發便了不知武氏如何下落且聽下回分解
