body:
  text: 第一百回冤仇報新君禦極功名就薛氏團圓再說李旦同薛強並將士人等分作一百隊行到八月十五日已到長安各隊將士陸續進城四處埋伏停當準備夜間號炮一響即出行事那武三思這日弑君之法既已妥當走入宮來適遇中宗在禦苑遊玩未回遂悄悄告韋後道今夜行弑之事可保無虞吾已決矣韋後忙問如何行弑三思道今夜宿衛將士皆吾心腹無敢違逆吾已安排妥當況今夕又是中秋佳節正好與陛下暢飲賞月俟陛下微醉暗將藥酒毒死只說是醉後中風而崩衆臣自然無話明早便可登帝位得行所欲了縱有不測現有宿衛將士禦止不足畏也韋後道此謀甚善當速行之又至日暮中宗回宮韋後奏道今夕是中秋佳節當與陛下登樓玩月消遣中宗道正合朕意遂喚嬪妃宮娥及武三思隨駕上青雲樓果見月色無塵明月皎潔遂排宴樓上飲酒作樂飲至半夜中宗微醉三思暗將毒藥放在酒內進上勸飲中宗吃了一杯不多時帝容大變跳起身來大叫一聲就嗚呼哀哉了嬪妃宮娥見帝駕崩不覺大驚喧嘩起來平時太子重俊知武三思有不良之意是夜聞父王與三思樓上飲酒心甚不安暗點數百禦林軍在樓前樓後聽其動靜忽聞得樓上喧嘩又見天星落下如雨知是有變遂喝軍士殺入誰知三思亦暗伏軍士在樓下忽見太子殺入兩軍交戰起來喊聲大震外面李旦薛強等聞得宮中喊聲震地遂放起號炮四面伏兵俱到午門一併殺入武三思一聞外面殺入大驚失色要從禦苑後門逃出手執寶劍才欲下樓適太子上樓方到樓門不提防三思出來竟被三思一劍砍死忙忙跳出禦苑後門逃走走到城門天色微明城門已開只見軍士相爭拿人三思雜在軍中亦大呼拿人暗暗逃出南門走了十裏竟被樊梨花薛剛一行拿住解進城來城內薛強馬周衆將人等殺入午門逢人便拿時武後年七十餘歲睡覺起來忽聽的呐喊之聲動地震天吃了一驚不覺跌倒竟嗚呼哀哉韋後正欲脫逃忽被薛強拿住不多時天明日出軍馬稍定各拿奸人獻功李旦逐一查問不見了一個武三思心甚不快忽見南門走進一人乃是薛剛手拿一個奸犯竟是武三思李旦亦不暇細問就令衆將萬刃砍碎其身只要留一個首級懸在午門外以儆奸黨徐孝德同衆將皆請唐王早即大位以安人心李旦再三謙遜衆將固請然後登金鑾殿即皇帝位是爲睿宗受群臣山呼朝賀畢令禦林軍將韋後綁到法場萬碎其屍又將武則天屍首扛出斬首以報母親王娘娘之仇韋武兩家不論老幼盡行剿滅凡爲武三思羽翼者亦皆梟首其餘百官一概不問各居原職追贈王后爲皇太后立胡後爲正宮皇后申妃爲偏宮貴妃立子隆基爲皇太子封徐孝德爲太尉護國軍師兼武甯王封薛強爲上將軍兼中書令定唐王封馬周爲大元帥漢陽王加封雙孝王薛剛太保兼中書令封王飲曹彪殷國泰賈清柳德李奇皆爲興國公薛琪薛瓊薛瑤薛璜薛瑛薛璟薛王喜薛魁張籍常建高郢馬暢皆爲中興侯袁成李貴皆爲中興伯李湘君爲鎮國夫人孟九環爲奉國夫人薛金花薛銀花爲中興賢女大赦天下免一年賦稅凡前日陣亡功臣及前日被殺功臣俱備加封賜溢子孫襲職及前朝所貶功臣及削去兵權在家閑住功臣俱備還原職入京調用群臣受封皆叩頭謝恩睿宗就令以王禮收殮中宗著禮部擇日安葬朝罷群臣退出薛剛薛強及九環公主並八子二女皆回至薛府參拜樊太夫人參畢樊梨花起身要回山去薛剛再三苦留樊梨花道我災難將滿豈可又戀紅塵更加罪過今日此來是要再扶薛氏立功使薛氏一門團圓今已功成願遂我複何求當速去修道汝不必留我也遂駕雲而去再過幾日薛剛子侄及家眷俱到大家相見行禮畢薛剛薛強就令大排筵席一家歡喜暢飲又殺牛宰馬犒賞隨征軍士文武百官皆來慶賀足足鬧了一月方才安靜正是骨肉團圓一門歡喜富貴之盛言語難盡有詩爲證詩曰大鬧花燈不可當全家遭累奔他鄉多少忠臣懷國恨請人義士爲君亡房州保駕扶王室滅韋除奸姓氏香仇報可雪先人恨複整山河興李唐
