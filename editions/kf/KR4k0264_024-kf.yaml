body:
  text: 第二十四回揚州城英王舉義金陵地兩軍對敵今且不表薛剛在黃草山落草再說江淮侯敬猷到了揚州朝見了小主李旦又見了哥哥英王他兵馬早已整集駱賓王做下一道討武氏械文刊刻刷印千萬張差人四處張挂擇日祭旗哭告太宗皇帝神靈立舉義旗即克興師留大將軍朱克虎與英王三個兒子李美祖李嗣先李成孝保小主守揚州英王帶敬猷駱賓王馬周王欽曹彪興兵十萬殺奔金陵而來各州關隘先見了檄文知英王爲國勤王中興天下保高宗元配正宮的太子李旦舉義所到之處俱是開城迎接直抵金陵離城三裏安營金陵守將武天寶忙點軍將把守城池又寫下告急本章並檄文一道差官星夜上長安求救英王親督軍兵攻打城池奈金陵城十分堅固一時不能攻破且說差官趕到長安樞密院投下本章張天右忙入宮啓奏道淮揚道節度使英王李敬業起兵造反詐稱廢後王氏冷宮所生太子李旦爲主所過無拒直抵金陵攻城甚急武天寶有本並敬業參謀駱賓王所作檄文奏上請太后定奪武氏大驚把本章看罷又把檄文一看上寫道僞臨朝武氏者性非和順地實寒微昔充太宗下陳曾以更衣入傳淚乎晚節穢亂春宮潛隱先帝之私隱圖後日之嬖入門見嫉峨眉不肯讓人掩袖工讒狐媚偏能惑主踐元後於暈翟陷吾君子聚鹿囗加以虺蠍爲心豺狼成性近狎邪僻殘害忠良殺姊屠兄弑君鴆母人神之所同疾天地之所不容猶複包藏禍心窺竊神器君之愛子幽之於別宮賤之宗盟委之以重任嗚呼霍子孟之不作朱虛侯之已亡燕啄皇孫知漢祚之將盡龍囗帝後識夏庭之速衰敬業皇唐舊臣公侯家子奉先君之成業荷本朝之厚恩宋徽子之興悲良有以也袁君山之流涕豈徒然哉是用氣憤風雲志安社稷因天下之失望順宇內之推心愛舉義旗以清妖孽南連百越北盡三河鐵騎成群玉軸相接海陵紅粟倉儲之積靡窮江浦黃旗匡複之功何遠班聲動而北風起劍氣沖而南斗平喑鳴則山嶽崩頹叱吒則風雲變色以此制敵何敵不摧以此圖功何功不克公等或居漢地或葉周親或膺重寄於話言或受顧命於宣室言猶在耳忠豈忘心一抔之土未於六尺之孤何訁乇倘能轉禍爲福送往事居共立勤王之勳無廢大君之命凡諸爵賞同指山河若其眷戀窮城徘徊歧路坐昧先幾之兆必貽後至之誅請看今日之域中竟是誰家之天下武氏看罷歎道真乃奇才人有如此之才不宣居朝內爲皇家所用而使之流落不遇失身從賊實爲可惜敬業乃開國元勳世受國恩不思報效一旦舉兵造反詐以妖人李旦詭充太子爲名意在顛覆社稷自圖天位若不早行剿滅必爲大害命兵部侍郎李承業爲大元帥武三思武承嗣爲左右監軍領兵二十萬征討敬業又差許敬宗往太白山開掘興唐開國公英威武王茂公墳墓暴其屍骸李承業和武三思武承嗣領兵出了長安直奔金陵而來且說衆功臣得報英王保太子李旦興兵揚州討武氏之亂已至金陵武氏著李承業等興兵征討俱各驚喜相半只望敬業得成大事早入長安大家仰望兵至不表且說許敬宗到了太白山正待開掘茂公墳墓忽然陰雲四合狂風大作一聲霹雷大雨如注許敬宗及從人避在深林躲雨只見茂公墳上火光直透雲霄泥土四下崩裂穴中竄出一條十余丈的金龍直上半空張牙舞爪乘著風雨之勢竟飛向西北而去後來應在敬業三子李成孝身上爲西徐國王稱爲西徐威武皇帝當時雨止雲收許敬宗至墳前一看墳已沈滅只有一個萬丈深潭即將此事回奏不表再說李承業等兵至金陵離城三裏下令安營英王得報李承業領兵二十萬來救金陵忙令各營小心防守到了次日李承業率子克龍克虎克豹克麒克麟克彪克熊克風武三思武承嗣大小衆將大開營門列陣討戰英王亦開營門人馬八字排開敬業立馬于中左有敬猷馬周右有王欽曹彪李承業道老功勳你乃開國元勳之後皇唐大臣當盡臣職爲何以妖人李旦假充太子舉兵造反玷辱先人駡名萬代英王喝道太宗皇帝櫛風沐雨親冒矢石定有天下傳于萬世武氏狐媚惑主先帝聽其讒言廢正宮王娘娘貶入冷宮幸生太子武氏頓生不良之心暗命杜回行刺杜回懷忠救出太子撫養民間今已長成若新君在位我等無說怎奈武氏兇暴將新君貶去遂棄宗室大臣寵用奸邪若皇長子既廢理宜先帝嫡子小主名旦登龍武氏何人擅敢臨朝專政淫亂內宮我乃皇唐大臣豈可坐視不救故此舉義兵以討武氏爾等好好拜伏迎降免今之死倘如執迷只怕這城下即是你埋屍之所矣承業大怒掄刀直奔英王英王舉刀來迎三思承嗣雙馬奔出馬周敬猷縱馬敵住李氏八子一齊殺出王欽曹彪分擋八將兩下交兵鼓聲大振喊殺連天承業與英王戰了五十餘合承業抵擋不住回馬便走三思承嗣見承業敗走亦各回馬八子抛了王欽曹彪走回本陣英王催兵一擁殺上承業大敗入營堅守不出英王得勝收兵回營未知承業敗後如何且聽下回分解
