body:
  text: 第二十七回謝映登指示咬金衆功臣避難出鎮話說魯王程咬金在府正與程萬牛歎息道從古至今未見有女人做皇帝男子反做了皇后的可憐皇唐江山倒被陰人占去坐了更可惜唐室宗枝殺戮殆盡這四百家共一萬三千余口之仇我老人家若得親見報復那時含笑而死亦無遺恨話說未完只見門官稟道外邊有一道人名叫謝映登要求見千歲咬金道原來是我舊日拜盟兄弟到了快請進來二人相見禮畢坐下咬金道謝老弟當日在瓦崗寨時我進五關開兵之際爲何不見了你後來聞你成仙愚兄十分歡喜今日相逢喜出望外分付擺席映登道世事如同春夢我想昔日同盟諸友俱已作古只存兄與弟兩人耳老哥福壽俱全子孫衍慶小弟今日無以爲壽有瑤池棗數枚與兄爲壽咬金道多謝老弟但愚兄風中之燭光景無多若賢弟不棄我情願同歸林下以盡天年映登道老哥壽元甚長不必多慮但目下唐家大變興廢有時不可強爲小弟今日到此正恐你們急欲中興皇唐天下我想武氏而今殺戮太重甚忌二十四家功臣恐有內患早晚必然分封出鎮老哥可著衆功臣速速打點赴任待時而動斷不可效英王敬業之所爲切記切記取酒過來待弟立飲三杯就此告別咬金不敢強留送出大門映登拂袖而去不知所之咬金即知會各功臣速速打點起身只候旨下不題再說武氏對武三思說道朕想這些在京功臣之後今日反一個明天反一個大爲不便若不使他遠鎮封疆實爲內患三思奏道萬歲所慮甚是必須封爲藩鎮慢慢削他們的兵權除之則易萬歲此意不差武氏大喜即召禮部入宮冊造兵符印信開載封疆汛地到次日盡宣二十四家王公侯伯齊集金鑾殿著禮部宣讀聖旨詔雲奉天承運皇帝詔曰朕今即位以來天下晏然冒矢衝鋒用人於擾攘之際錫爵班祿當報于太平之時茲朕拜告太廟分金符玉印撥付各道授土封茅爾等衆功勳各宜出鎮即日起程務使宗社奠安邊烽永息宜體朕意爾其欽哉宣罷衆功臣叩頭謝恩退出朝門各領金符玉印赴任是那職處濟南節度使魯王襲職程統金墉節度使胡王秦文宜陰節度使鄭王尉遲青山燕山節度使越王羅章潭州節度使褒國公段吉節幽政節度使順國公馬政銅台節度使武平王裴弘濟相州節度使紹國公唐丕汁梁節度使永興公盛大恭陳州節度使護國公劉英河間節度使鄭國公魏千金寰州節度使成國公童升河南節度使鄆國公殷幹國青州節度使樵國公柴武河東節度使趙國公長孫肖萊州節度使萊國公薛謄金陵節度使蔣國公屈突生壽州節度使鄖國公張堂潞州節度使薛國公梁東欽廣陵節度使楚國公侯憲寧夏節度使單化國公史成中山節度使昌國公齊光廣昌節度使成昌國公白謹漁陽節度使燕國公李耀衆功臣得了任所俱來魯王府辭行咬金道不必辭行即速快走遲則恐其有變衆功臣遂拜別各赴任所而去此時國公長孫順德年已老髦不受封疆倚著皇親之勢募集勇士欲要恢復中興反周爲唐被門下稗將施勝泄漏武氏令三思領兵三千圍住長孫順德府門不分老幼盡行斬首可憐三百餘人都做無頭之鬼不知後事如何且看下回分解
