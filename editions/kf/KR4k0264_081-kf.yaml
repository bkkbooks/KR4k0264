body:
  text: 第八十一回識天命誘母舊唐見人事勸父降服話表文龍一聽羅英之言心中大喜道小將感恩不淺回去即送家眷到山便了說罷二人分手而去羅英到九焰山奏知廬陵王廬陵王大喜徐美祖令衆將不許下山交戰只等白文龍消息不表且說白文龍在路上寫一封假書回到紫剛關入府見了母親妹子夫人問道我兒你解糧草去你父近日勝負如何文龍道母親爹爹當初甚是驍勇一心要戰後來遇見了山上軍師名叫徐美祖被他三言兩語勸轉了爹爹如今已降九焰山了特遣孩兒回來迎接母親妹子同上九焰山有書一封母親請看夫人道當初起兵之時你妹妹說了幾句知己的話他十分大怒連我也怪起來到今日反降了大唐豈不是老顛倒了夫人拆書看了說道事已至此須要掩人耳目怎樣出關才好小姐道這有何難明日母親傳集衆將假言爹爹有令說賊人難制特遣公子回關調我母女赴九焰山助陣爾等俱要小心守關那時我們點起家將出關而去便了文龍道此計甚妙次日夫人出堂分付衆將畢退堂點齊家將夫人小姐文龍一齊上馬出關而去夫人道文龍你可先去通知你爹爹說我們隨後就到文龍應聲飛馬先去到了半路遇見羅英羅英道將軍來了麽文龍道來了家母舍妹已在後面來了羅英道千歲命小將在此迎接令堂往後山上轉到前殿與千歲相見二人等了片時看見夫人小姐同家將一齊到來二人上前迎接文龍道母親這是羅將軍他奉令前來迎接母親夫人道有勞將軍羅英道不敢遂一同往九焰山後來不日到了山後羅英先上山通報徐美祖領衆將下來迎接夫人便問相公何在美祖道老將軍與千歲在前殿議事請夫人到前殿相見遂引夫人行到前殿夫人擡頭一看只見廬陵王坐在上面只得上前朝見廬陵王道王嫂請起夫人道臣妾奉命來歸不知拙夫何在廬陵王道孤家思慕王兄如井中望月誰知王兄不肯今請王嫂到此勸勸王兄夫人聞言大驚失色廬陵王分付打掃宮殿請王嫂安歇夫人退出來到後面已收拾一所宮院文龍已將妹子送入將前事對妹子說明夫人進內一見文龍大怒正要發揮小姐忙接說道母親不必發怒雖是哥哥不是這也是合理廬陵王是太宗嫡派武氏淫賤又是篡位理當歸順母親不該動怒夫人方才息怒不表卻說白雲見山上幾日並不交戰不知何故一日命次子文虎領兵討戰徐美祖今薛葵下山務要生擒文虎上山薛葵奉令下山美祖請夫人到殿將其事告知夫人已被小姐勸轉便道千歲放心臣妾既已至此包管他父子來降廬陵王大喜不一時薛葵將白文虎擒上山來文虎一見母親吃一大驚忙問母親爲何在此夫人道畜生你何不思廬陵王是何人武氏是何人奈何聽了你懵懂父親的話全不省悟今日我已順大唐你還不降順麽文虎見母親如此分付只得投降參見廬陵王夫人道臣妾三兒即刻必來討戰可令一位將軍引他到山前待臣妾叫他來降廬陵王大喜不一時果然來報白文豹前來討戰徐美祖今薛雲下山接戰許敗不許勝引至山前待白夫人勸他來降薛雲奉命下山去了夫人伺小姐文龍文虎齊到山頭觀望見薛雲在前文豹在後緊緊追到山前夫人道我兒快來見我文豹擡頭看見夫人小姐哥哥都在山上不覺大驚拍馬上山叫聲母親姐姐爲何在此夫人將前話說了一遍道我兒可跟我去朝見廬陵王文龍文虎並霞然再三攛掇文豹應允就同去朝見廬陵王廬陵王道文豹一降朕無慮美只是老將軍尚不肯來降如之奈何文豹道千歲放心只消小將回營與臣父說明連夜來降廬陵王大喜文豹下山回營見了父親將母親姐姐並兩個哥哥已投降在山之事說了一遍白雲聽了歎道罷了罷了真是天意分付兵將改了大唐旗號起身投降山上徐美祖同衆將迎接上山廬陵王登時召見加封官職白雲謝恩退出父子夫妻一齊相會各訴其事不表再聽下回分解
