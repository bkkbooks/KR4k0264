body:
  text: 第三十五回廬陵王恩赦薛剛五方將大戰兩雄話說廬陵王正與魯仲馬登在銀安殿議事忽見屈浮魯奏道今有黃草山薛剛率領吳奇馬贊來此打擂臺臣已問明帶來見駕現在端門外候旨廬陵王即宣入見主人來至銀安殿俯伏山呼薛剛道罪臣薛剛萬斬猶輕乞吾主開恩赦宥廬陵王孤赦卿無罪當年長安大鬧花燈踏死禦弟也是誤傷並非卿有心踢死至於驚崩聖駕也是父皇的年災命運與卿何罪不想母后昏亂廢孤於此竟將卿一門殺盡造下鐵丘墳孤心甚是不忍如何還來罪你今赦卿無罪平身吳奇馬贊大叫好皇帝還有什麽話說薛剛山呼謝恩平身然後與魯仲馬登相見禮畢廬陵王道薛王兄我母后譖稱皇帝改唐爲周寵用佞臣殺唐宗室孤身在此如坐針氈倘然加害唐祚亡矣若得王兄在外暗地糾集義兵與孤中興天下足感王兄之情也薛剛欠身道臣有滔天不赦之罪蒙恩開赦臣敢不盡心竭力以圖中興但此事只宜徐圖方能有濟臣回黃草山慢慢糾集人馬預先尋一興龍之地屯紮只等兵多糧足即行起手先拿諸武保千歲複坐長安中興天下屈浮魯道此言正合某意廬陵王親書赦詔付與薛剛道若得中興定開鐵丘墳伸你薛門之冤薛剛謝恩廬陵王備宴款待到了次日三人辭了廬陵王拜別屈浮魯馬登魯仲起身吳奇回至店中取了行李還了店錢出了房州往黃草山而行一日在半路之中走錯路徑往來並無行迹薛剛道休走等個人來問問路再走三人坐在亂山之中四下張望只見正東上一座高山直聳半空山石如火一派紅光左邊四個山頭右邊也是四個山頭好似九座金寶塔馬贊道三哥你看好一座山呀我們住的黃草山萬不及此若得此山起寨便是興龍之地薛剛道果然好一座險峻山但不曉得山名忽耳邊聽得喊殺聲薛剛道奇怪這喊殺之聲從何而來吳奇道到山上去望一望便知明白三人遂奔至亂山頂上望下一看只見那座險峻山下有人在那裏相殺左邊有四五百人扛著五方旗號爲首的五個豪傑分青黃赤白黑打扮右邊也有四五百人打著花綠旗號爲首兩個英雄一個穿綠一個穿花那五個人戰著這兩個人吳奇馬贊大怒道三哥那五個人戰著那兩個人以多欺少無理之至我們何不去助他兩人一陣薛剛道有理三人各執兵器奔來來至跟前那綠險與花臉的正在拼命與那五個人大戰薛剛大聲喝道以多欺寡我們不平咱來也那綠臉花臉的聞言大喜那青臉黃臉白臉黑臉的聞言大驚一齊回馬轉來黃臉的戰住吳奇青臉的戰住馬贊紅臉的戰住薛剛那紅臉的與薛剛戰不上三四回合就有些力怯那白臉與黑臉的見了各執兵器齊來夾攻薛剛那綠臉花臉的見兩個來夾攻忙舉兵器便來幫助薛剛薛剛道你二人去那邊等著不必助我你看我一個個都打翻他下馬綠臉與花臉的聞言帶馬立過一邊觀看那黃臉青臉的見他三人戰不過薛剛怕抛了吳奇馬贊亦去夾攻吳奇馬贊大叫道薛三哥快放出你的本事來把他個個都打下馬來叫他知道咱的手段那五人正在死戰忽聽見叫薛三哥不覺驚訝各停兵器叫黑大漢站住欲知後事再看下回
