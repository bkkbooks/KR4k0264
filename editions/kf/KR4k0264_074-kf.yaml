body:
  text: 第七十四回武則天遣三路將周總兵歸九焰山卻說廬陵王到九焰山徐美祖下山接駕駕上九焰山把山寨改爲王殿四下造起房屋薛剛等俱移居左右正中聖眷居住大排筵席慶賀房州聖眷二位宮主及桓柏馬登屈浮魯等俱各迎接上山居住次日廬陵王以徐美祖爲軍師賜姓李薛剛爲保駕元帥吳奇爲討逆將軍馬贊爲東騎將軍鄭寶爲飛龍將軍烏氏五人爲五虎將軍南建爲飛虎將軍北齊爲擋寇將軍屈浮魯爲鎮國大將軍敬暉桓柏爲左右禦衛馬登爲安國將軍大小三軍一齊重賞皆叩頭謝恩山上立時扯旗招賢聚衆以圖恢復按下不表再說長安武則天聞報徐美祖與薛剛等奉廬陵王爲主占據九焰山其勢甚盛武氏大怒便問諸臣誰敢領兵前去捉拿叛賊武三思奏道薛剛兇惡若非四路突擊拿他不住陛下可發旨調盡山關總兵周成山海關總兵齊豹陝州定唐王李孝業三路進攻九焰山必獲叛黨武氏九奏隨即發旨那三將得了旨意各自起兵殺奔九焰山而來那山上將兵飛報入寨說長安調了三路人馬來打九焰山第一路是盡山關總兵周成領兵十萬已到山下東路安營第二路是山海關總兵齊豹領兵十萬已到山下西路安營只有第三路李孝業兵馬未到廬陵王聞報大驚徐美祖道主公放心待臣設計使周成齊豹互相交並來歸主公待李孝業一到管叫他片甲無存廬陵王大喜徐美祖即喚南建分忖道你可領兵一千往西路與齊豹交戰須要敗他一陣切不可傷他性命如見周成來接應必須假敗上山不可有違南建道得令遂領兵上馬下山沖出西路齊豹聞報即忙上馬出營南建一見喝道你可是齊豹麽齊豹道然也你是何人南建道俺乃南建將軍你這廝快快下馬投降免你一死齊豹大怒舉槍便刺南建持钅黨相迎一連七八钅黨打得齊豹盔斜甲散回馬便走南建拍馬追殺直追得齊豹走投無路入地無門正在慌急周成領兵前來接應南建看見周成遂丟了齊豹與周成大戰戰無三合遂假敗佯輸回馬便走上山去了齊豹接著周成再三謝他相救之恩周成笑道將軍如此一個毛賊爲何就輸與他齊豹滿面羞愧周成喜氣洋洋收兵回營差官上長安報捷次日周成領兵抵山討戰徐美祖分付衆將輪流下山交戰個個要敗不要勝當下衆將下山迎敵一日之間連敗大將一十七員天色已晚周成領兵回營差官二上長安報捷到了次日周成又來討戰徐美祖下令不許出戰周成見了令三軍趕上山去見山上抛下擂木炮石周成無奈只得收兵回營一連十日山上並不出戰一日周成聞有天使下來急領衆將出營迎接此時齊豹也同衆將來接請天使入營天使進營笑容道周將軍皇上一日之間連接將軍十封捷表龍顔大悅特差下官齎詔前來踢蟒袍玉帶說罷開讀了詔書周成設筵款待天使天使筵間說道想齊將軍目今該胖了齊豹道欽差體來取笑天使道此系皇上的話只因將軍到此未出一戰料將軍必然養胖了周成聞言止不住大笑此時齊豹羞的滿面通紅低頭不語及酒筵罷天使辭去齊豹回至營中不勝忿怒與心腹將官孫安計議道可恨周成恃功欺我若不殺他怎出我這口氣你若有計能以害他重重賞你孫安道若要害他必須如此如此齊豹聽了大喜便叫孫安去行事不表且說周成營中無糧只望盡山關運糧來接濟忽見探子飛報人營說盡山來的糧草運到龍川被九焰山響馬劫去了周成大驚喝令把運糧軍綁進來左右答應即將運軍綁進周成罵道你這該死的狗頭爾等何怠忽至此把糧草被賊人劫去運軍道糧草不是九焰山劫去那一班劫糧的人小的們雖不能全認得內中有一個爲首的小的們認得是齊總兵帳下偏將孫安劫了糧草竟往西營而去周成大怒道這廝劫我糧草若不殺他怎消吾恨喝聲備馬周成兒子周平忙叫爹爹不可造次兒有一計爹爹止做不知差人去請他只說商議要事兩邊埋伏下刀斧手設筵款待候吃到酒酣之際以擲杯爲令大家動手殺之甚易周成道我兒此計甚妙即差人往西營去請齊豹齊豹因劫周成糧草回說不去孫安道若不去他更動疑齊豹道此去倘有不測如何是好孫安道不妨將軍若去可將兵符印信權交小將萬一有失小將以大兵圍住他營問他敢也不敢齊豹大喜即把兵符印信交與孫安自帶四個家將往東營而去孫安得了印信兵符傳集衆將放聲大哭衆將忙問何故孫安道太宗親臨戰陣血戰數年方得天下只望傳之子孫誰料武氏將唐宗室殺滅殆盡今止有廬陵王一人若有差失則大唐天下絕矣我等皆大唐臣子食唐厚祿怎忍反叛今齊豹背主助逆我心不伏爲此設計將他遣開但不知衆位肯念唐室保廬陵王中興否衆將聞言齊說願從保廬陵王中興孫安大喜令十萬軍盡改了九焰山旗號拔營齊起直至上山歸順徐美祖聞知大喜下令開關迎接上山那齊豹到了周成營中忽聽得一聲炮響齊豹大驚起身便走周成喝到那走手起一劍砍爲兩段割了首級衆將齊說道將軍殺了齊豹怨恨已消但恐武氏見罪若何小將想將軍乃大唐臣子何不歸順九焰山保廬陵王中興名正言順豈不甚美周成道此言有理遂令十萬軍改了旗號抵山歸順徐美祖令軍士開關迎接上山周成朝見廬陵王獻上齊豹的首級廬陵王大喜封周成爲順義將軍孫安爲忠武將軍二人再拜謝恩未知後來若何再看下回分解
