body:
  text: 第四十七回訪國母聞信哭泣馬將軍直言苦諫話說曹彪要帶這老人去複旨就叫老人家你在此又沒得吃又沒得穿你不如同我們去老人道你們那邊平靜麽曹彪道包管餓不著你你同我去就是了老人道但不知貴處離此有多少路曹彪道你體問我到了那邊自然明白遂帶了這老人星夜趕到漢陽把老人帶在端門曹彪先入內奏知通州大亂滿城百姓俱各逃散不知國太國母下落只帶得一個胡家家人在外聽候我主詢問便知端的唐王分付喚進來軍士扶進老人唐王看時認得是胡發的老家人王老爲甚雙目不明便叫王公公你可認得我麽王老側耳細聽說道聽你的聲音好似進興的口氣唐王道正是我問你大安人小姐哪里去了王老把牙一咬將足一頓道原來果是進興你這沒良心喪天理的人害得他娘兒兩個好苦進興我且問你你可記得當初在胡家爲奴之時全虧大安人把衣服與你穿待你好似親生兒子又將小姐私下許你因你東郊比箭得罪馬姑爺員外打你三十板睡在柴房若不是他娘兒調養你好你早已死去多時了那知調養你好你卻忘了他母女之恩一溜煙逃走說起你這負心人令人怒髮衝冠可惜我雙目不明不然趕上你咬你兩口肉也替他娘兒兩個消氣兩邊衆將見王老出言無狀俱備提刀在手喝道好大膽要殺王老唐王搖手道不可王老道朋友你們不知道不必生氣這話進興肚內是明白的唐王道你休管他們我且問你如今大安人小姐卻在何處王老道自你逃走之後員外院君只說是他母女兩個通伺放走了你足足罵了千千萬萬後來馬迪看見鳳姐一心要想鳳姐成親叫於婆說合那小姐一心要守著你這負心人立志不從大罵於婆又因人人傳說你做了強盜被官府打死牢中母女二人一聞此言幾乎哭死陳解元四下打聽並無此事母女放心不下到觀音庵問簽卻中了馬迪之計與張李二尼設局款留母女到了天晚強逼成親母子二人只說沐浴更衣方出來拜堂成親悄悄逃走去了雖然全了名節只是性命無著落也不知跳了深井也不知投了大河唐王聞言大放悲聲哭暈數次王老聽了點點頭想他還有良心便叫進興不要哭我對你說他娘兒不曾真死多虧了家人胡完相救出庵往陵州姨母崔宅去了所以還不曾真死唐王咬牙切齒大罵馬迪將來必要碎屍萬段方出我氣叫王老且在此居住差人送他館驛去好生服養內侍領旨扶王老而出王老道朋友我問你這進興做了甚麽官如此呼喝內侍道該死的狗頭這是大唐高宗皇帝的太子小主唐王你數胡言亂語少不得要割你這驢頭下來王老聞言唬得魂飛魄散叫聲不不好了我眼瞎了看不見竟是這等大膽該該死了內侍道不必害怕幸喜千歲寬洪大度不計較你以後須要小心不可如此胡說送王老到館驛撥人服侍王老好不快活唐王含淚退朝入宮申妃接駕問千歲何故面有淚痕唐王告知其事申妃道千歲娘娘既避難陵州少不得自有相逢之日我主須念天下爲重善保龍體以安衆心克服江山乃是大事豈可因想念娘娘以失衆望唐王那裏能忍直哭了一夜哭到天明含淚臨朝馬周奏道目下李承業兵馬將到主公正該計議迎敵以天下大事爲重豈可終日哭泣駕下衆將抛妻棄子在此保護主公誰不記念妻子請主公善保龍體以天下大事爲重才是唐王聞言收淚謝曰孤聞將軍金石之言今知過矣卿當整頓人馬以便迎敵馬周見唐王英明納諫心中大喜鼓勵士卒預備迎敵欲知後事且看下回分解
