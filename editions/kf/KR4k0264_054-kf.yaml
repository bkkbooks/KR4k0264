body:
  text: 第五十四回王將軍漢陽報信馬元帥湘州救駕卻說王欽當日出了陶府三日三夜趕到漢陽其時馬周自從曹彪回來得了女媧鏡破了火輪牌大敗周兵李承業退守臨江以圖再舉這日馬周正與衆將計議一個暗渡陳倉之計去湘州接取唐王夫婦忽見王欽飛馬回來面目改色齊吃了一驚王欽下馬把唐王說出真情我恐有禍故星夜趕來報知馬周聞言大驚道這一露真情定被陶仁拿住解往長安遂即親帶王欽曹彪並三百勇壯兵丁火速飛奔湘州一日行到一個要路口料解往長安必由此路即令人馬紮營等候不移時卻好陶府兩個家人飛馬而來王欽曹彪認得是陶家家人知會馬周馬周上前阻住喝道你兩個是什麽人二人道我們是湘州陶府家將送本往長安去的馬周喝叫左右拿下王欽曹彪一齊上前把兩個捉下馬來搜出本章馬周看了扯得粉碎手指二人喝道你兩個還是要死要活二人磕頭只求饒命馬周道我如今不殺你只跟我前去湖州詐稱奉旨差禁兵來拿唐王誘開城門饒你狗命二人應允馬周領兵趕到湘州陶仁家將在前叫開城門馬周催兵入城炮響連天這湘州城中能有多少兵先走了一個乾淨誰來抵擋打開監門救出唐王胡後把陶府團團圍住唐王率衆入內分付不分男女盡行拿下單放徐英並徐媽媽軍士得令把陶仁夫婦及小姐並衆家人俱拿下押至王前跪下唐王大怒分付先將賤人推出斬首左右答應一聲把小姐斬了呈上首級唐王又分付把陶仁夫婦推出砍了閃過徐媽媽跪下道千歲這件事老爺夫人卻無有害主之心皆是小姐不允以致千歲受此苦楚如今小姐已死只求千歲念夫人當日在江中救過娘娘免他夫婦一死罷唐王光奏赦放陶仁夫婦其餘家丁盡行斬訖分付整備鑾車請胡後上車馬周率衆保駕起行到了半途忽見前面一支人馬飛奔而來及至一望卻是申妃領兵前來接駕一見唐王滾鞍下馬拜伏塵埃迎接唐王娘娘等候胡後車駕過去起身上馬隨駕而行將近漢陽又來了馬周夫人李湘君接駕人馬入城申妃同胡後入宮唐王坐殿衆臣朝賀唐王命袁成擇日成親袁成擇定本月十六日合巹及至十六日殿上結彩張燈唐王頭戴盤龍冠身穿杏黃金龍袍腰束羊脂白玉帶端坐大殿胡後頭戴朝陽冠身穿日月八卦襖腰束盤龍白玉帶下系山河地理裙申妃也打扮端整四十二個宮娥扶擁出宮至大殿先行君臣禮拜了唐王然後唐王下座成夫婦禮交拜天地成親胡後與唐王並坐殿上申妃朝拜禮畢一派笙蕭送入內宮大排禦宴賜宴群臣唐王先在正宮與胡後合巹次晚方宿于申妃宮內按下不表欲知後事請再看下回分解
