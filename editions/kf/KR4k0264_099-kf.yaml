body:
  text: 第九十九回山後薛強遇舊友漢陽李旦暗興師話說先朝有一個功臣姓李名靖號藥師晚年學道雲遊四方一日屈指一算說道今皇上氣數將終另有一個新君即位該是薛強夫妻子女十二人輔佐吾當往山後去指點他遂駕雲來至山後把雲頭一按落在演武場前時薛強正在演武場中教子演習武藝李靖上前一揖道駙馬別來無恙薛強一看見是李靖忙下堂還禮道前蒙老師指點之恩尚未報答未知老師今日要往何處去李靖道我今日特來指點汝但此處非說話之所須到尊府方可告明薛強即引李靖同到帥府重新施禮薛強又喚出八子二女亦上前施禮禮畢坐下薛強問道老師此來有何教訓李靖道方今大唐皇帝八月中秋有殺身之禍大位該是高宗正宮王娘娘所生太子名旦的如今住在漢陽汝當去輔佐他方能重整李氏江山復興皇唐社稷薛強道氣數如此愚徒即日興師前去李靖道奚用干戈取勝依我愚見汝今八子俱皆英勇二女又精韜略況又有九環公主之才如此威風何戰不克但此事當用暗奇之法方妙如今可率公主並八男二女軍士不用太多只用五百暗過雁門關悄悄到漢陽告知李旦分付李旦發兵之時亦只好用五百兵合一千軍分作一百隊一隊只許一將統領皆要扮作商賈模樣或先或後接迹而進到長安時只好五十隊進城伏在皇宮左右俟中秋半夜之時宮內喧嚷喊殺起來即時放起號炮會集軍士一齊殺入宮中鎖拿奸人餘五十隊分作四門緝獲叛黨自然成功汝當毋忽吾言吾要去也遂起身告別薛強再三留之不住無奈送出府門只見一道紫雲李靖跳在雲中作別而去薛強即時進入府中把李靖之言一一對九環公主說了一遍孟九環道李老師仙人也往往有先見之明不可不從明早薛強同九環公主一齊到大宛國將情由奏知國王國王准奏薛強遂同九環公主領八子二女點起五百軍陸續起程暗渡雁門關而進再說李旦自與武後講和之後雖偏安漢陽每每以江山爲念終日訓練兵將積聚糧草以待天時一日升殿與徐孝德共議軍事徐孝德道臣昨夜觀天象帝星不明後來不久必有大患主公一星明曜天下不久必屬主公又兼列宿拱向主公星將來必有勇將來助主公正說話之間忽見黃門官來報說山後虎頭寨武山王薛強合家來投現在午門外候旨唐王令宣進來黃門官傳出旨意薛強遂同九環公主八子二女相率上殿行了君臣之禮唐王離座道王兄今日到寒國有何話說薛強道臣因前朝李靖識破天運下界指點愚臣臣故合家來助主公共興大唐江山遂將李靖教用暗奇之法細細說了一遍旁邊徐孝德道真神人妙法主公不可不依李旦大喜大排筵席款待薛強父子令後宮胡後亦排筵款待孟九環母女到了次日乃是八月初一日李旦挑選五百名壯軍令李貴袁成守城自同徐孝德馬周衆將人等偕薛強夫婦八子二女共一千軍皆打扮作商人模樣分作一百隊陸續向長安而來按下不表且說梨山老母在離島山屈指一算知中宗氣數已終該薛強輔佐李旦即位其中奸黨未必能盡獲又該薛剛在長安城外緝獲方無漏網但薛剛乃是凡胎安能先知其事必須天魔女下山去指點他方能有濟遂喚樊梨花出來問道汝知大唐天子之事乎樊梨花道弟子已知當今皇上氣數已盡應該薛強輔佐李旦即位但慮薛剛未知共成其事耳老母道然也你今當下山去指點薛剛成事待事成之日速速回山不可留戀紅塵以加罪過樊梨花道弟子曉得遂駕起雲頭來到會稽在薛剛門首落下一此時薛剛已削其兵權安頓在會稽門庭寥落只有一個老家人看守大門忽見樊太君來到忙入內報知薛剛即忙出來迎接樊太君到後堂就喚妻子與子侄並媳婦出來拜見合家參拜畢樊梨花道我兒我算皇上氣數該有殺身之禍例該你弟薛強輔佐李旦爲君你當領十個家丁悄悄到長安城外共執奸党幫助成功當速速前去不可遲緩吾當指引你成事薛剛領命即時領了家丁扮作賣藥算命模樣同樊梨花向長安而來到八月十五日離長安城只有十裏樊梨花分付駐紮等候不知後來如何且看下回分解
