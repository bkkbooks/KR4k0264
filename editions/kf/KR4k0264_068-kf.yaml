body:
  text: 第六十八回兩義弟告友衷情雙孝王爲君起義當下薛剛四人行至鎖陽城來到帥府入內拜見就把新唐國招爲駙馬許後即發兵十萬來九焰山會齊一說知竇必虎道此位是誰薛剛道是侄兒新結義的兄弟名叫鄭寶精於神彈竇必虎道你義師一入潼關我即發兵相助同入長安說畢排宴款待四人次早四人拜別竇必虎起行一路無詞那日到了九焰山探軍報上山去徐美祖率衆下山迎接薛剛一行禮齊問此人是誰薛剛就把路遇神彈鄭寶結爲兄弟之事說明衆人齊道妙妙今又添一位兄弟衆人一齊上山來至大寨各各坐下齊問借兵若何薛剛把新唐國王招爲駙馬然後發兵始末細細說知吳奇馬贊道三哥令正嫂嫂現在你的兒子已長成了爲何又允這頭親事薛剛道此言你二人在那裏聽來的吳奇二人道聽的不足信我二人是眼見的就把上房州去飯店中被打並廬陵王招薛蛟薛葵爲駙馬及面見紀鸞英後日舉義都來九焰山相會的話細細說了一遍薛剛聞言大喜道原來如此我是不知就是新唐招親也是出於不得已若不允從又恐他不肯借兵有誤大事況披霞公主武藝高強今統兵前來亦可以相助一臂之力今不必說了分付備酒衆人按次坐下飲宴個個歡呼暢飲過了半月披霞公主領兵到了九焰山探軍飛報上山薛剛即同衆將下山相迎一同上山大寨中備筵與披霞公主接風衆人道今西兵已至便好興師三哥還是扯何人的旗號薛剛道今事在必行然未知成敗只好扯我的旗號遂下令三關之上扯起雙孝王薛剛的旗號山上一立反旗附近州縣星夜報上長安武則天聞報大驚回顧三思道王侄朕曾對你說這薛剛是朕心腹之患早早拿獲不可使他成了氣候如今果在九焰山反了三思道薛剛猛勇異常屢次拿他不住今又造反臣當提兵征剿須得一個有本事的先鋒方能拿獲張天左奏道臣保一人可爲先鋒這人是臣族弟名叫張天輝身有九口飛刀能于百步取人首級陛下若用此人包拿薛剛則天下旨宣來一看見他身高一丈貌若靈宮心中大喜就封爲先鋒天輝謝恩領印三思下教場點了大兵二十萬即日出京殺奔九焰山來一日到了山下下令安營未知後來若何再看下回分解
