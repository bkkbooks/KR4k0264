body:
  text: 第六回江夏王救護真龍通城虎打奸闖禍話說王后見太子去了只哭得死而復蘇遂自縊於冷宮兩個宮女見王后已死一同自縊而亡再說杜回抱了太子心驚膽戰悄悄出了後宰門直奔江夏王的府中來此時已有四更時分江夏王李開芳尚在宴客未散你道請的是何人一位是英王李敬業此時茂公已亡敬業襲了父職本姓徐當初太宗賜茂公姓李至今不改一位是左都禦史姓馬名周乃淮西蔡州人氏文高北斗武勝孫吳十五歲中瞭解元十六歲中了會元殿了第一甲第一名狀元娶有兩位夫人長林氏次李氏名喚湘君勇冠三軍萬人莫敵其時馬周年方十九爲人忠直昔年出征吐番有功升了西台禦史江夏王此晚請人吃酒尚未散席外邊杜回來至府門拾起石頭照鼓上打去鼓聲大振原來親王的鼓不是亂打的非駕崩國變概不傳鼓當下江夏王正與馬周敬業吃酒一聞鼓聲忙問何人傳鼓家將回稟是掌宮太監杜回江夏王分付喚進來杜回抱了太子慌慌張張走到殿上叫了一聲千歲看見了英王及馬周便住了口開芳道所抱之子是誰爲何暮夜至此傳鼓杜回道奴婢因抱此子不便叩頭求千歲屏去人衆奴婢好講開芳喝退人衆殿上只有敬業馬周開芳道英王乃開國元勳馬爺又忠直義士縱有機密事皆可與聞不妨有何大事你快說來杜回道有正宮王娘娘哀書在此請千歲一看便知明白開芳接書一看與敬業馬周一齊大驚且喜救出了太子開芳接過太子仔細一看不覺淚下敬業馬周皆淚流叫一聲千歲當今聖上聽信奸佞將王后貶入冷宮又遭武氏謀害幸虧杜太監一片忠心救出小主投奔千歲千歲當撫養府中待聖上萬歲後當扶小主正位我二人願與千歲共之開芳道日後天子登天嫡庶之分理應此子正位孤當與二位仁兄共佐之上不負先帝之恩下不負王后之托就叫杜回你今宮中也回去不得且藏在孤府中撫養太子只說孤大世子李琪所生待他日後成人將這血書與他觀看便可與他母親報仇杜回叩謝開芳叫乳母抱太子進去到次日假言生下一孫杳無一人知覺按下不表且說武氏到次日天明不見杜回回報心中甚疑忽見有一宮女來報說冷宮王娘娘並兩個宮女俱自吊死宮中武氏聞言又驚又喜驚的是杜回太子不知去向喜的是王後一死拔去眼中之釘一面分付將王后以庶民禮收殮一面發旨訪拿逃監杜回自王后一死武氏心中無所忌憚高宗一舉一動反爲武氏所制英王與江夏王馬周有匡扶唐室之志上本求爲外藩高宗允奏下旨令英王徐敬業節度淮陽出鎮揚州令江夏王李開芳留守西京西台禦史馬周爲輔聖旨一下敬業即日起程住鎮揚州李開芳留守長安與馬周參贊軍務私圖恢復唐室江山按下不表再說兩遼王薛丁山生有四子一名薛猛乃高蘭英所生一名薛勇乃高瓊英所生一名薛剛乃樊梨花所生一名薛強乃程金定所生這四位爵主惟有薛剛性躁時年十八生得面如黑漆體如煙熏力大無究專好抱不平替人出力長安城中人人怕他故此人給他起了一個渾名叫做通城虎他結交的是越王羅章胡國公秦海並程統程飛虎尉遲青山尉遲高嶺這一般好動的人終日飲酒射獵半夜三更或出或入無所禁忌兩遼王並管他不下這一日薛剛約了衆友出城遊玩到晚入城又在酒店飲酒呼三喝六直飲到三更時分俱已大醉分付家將算還酒錢一同出了店門見月色如同白日都不騎馬步行玩月回府也是合當有事遠遠望見大轎一乘前呼後擁喝道而來薛剛早已看見燈籠上寫著左相府張就知道是奸臣張天左叫一聲衆位兄弟我看張天左這廝眼大無人不免乘此給他一個大沒體面如何衆英雄俱有酒興皆說道好一齊上前攔阻大轎喝道什麽人擅敢大膽犯夜張天左見是這班功勳連忙下轎說道是老夫在中州侯武三思府中飲酒不覺夜深了些薛剛道放屁此時不在府內黑夜行走大膽極矣你今犯夜律應杖責衆兄弟們還不快打只打他犯夜不管他是不是丞相此時張天左有口難分躲閃不及被薛剛揪翻在地程統程飛虎就抽出他的轎杠來盡力便打張天左雖有從人見是這班功勳俱各早已躲藏了衆人一齊打了六七十轎杠只打得張天左扒身不動只是叫饒衆人方才大笑而去不知張天左如何回府再聽下回分解
