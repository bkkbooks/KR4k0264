body:
  text: 第六十六回薛剛鎖陽會親人必虎修書遣內侄話說鸞英見吳奇馬贊盛稱他兩個英勇當下也就謙遜了一回然後就問丈夫消息吳奇二人道當初武三思打破了臥龍山三哥即往泗水關去投奔薛義誰知那廝忘了昔日大恩用酒灌醉三哥將三哥拿下解上長安那時我二人蒙李靖師傅分付在黃草山劫下囚車拿了薛義救三哥上山後因廬陵王遺教師屈浮魯在房州打擂臺我二人與三哥至房州打擂台得見廬陵王蒙赦三哥大罪只要與廬陵王招集義兵滅武興唐保他重定三哥得了恩赦要回黃草山迷了路徑誤入荒山收了南北二將及烏氏五人就屯紮九焰山數年招有義兵五萬因兵馬不足三哥往鎖陽城見平西侯去借西涼人馬一回九焰山即行起兵故先差我二人來知會廬陵王在面店中遇見二位老侄賞了一頓肥拳到了房州兩侄俱招爲駙馬說及方知嫂嫂在此特來一望鸞英大喜道如此說我丈夫到西涼借兵回山起義我這裏自然得知即當前去相會送備酒款待吳奇二人到了次日二人辭別回九焰山去不表且說薛剛與南建北齊到了鎖陽城來至平西侯府家將稟報薛剛叫南北二人且在外邊少待自己入內拜見薛金蓮一見薛剛不覺淚下道忤逆的畜生你全不想父兄一門三百八十余口之仇何是能報今日到此有何面目見我竇必虎道夫人這些話也不用說了只問他如今還在那裏薛剛就把那房州打擂臺蒙廬陵王赦他大罪叫他招軍興兵中興天下以及收伏南北二將並烏氏五人現在九焰山屯紮至今招有五萬人馬因此與南北二將前來懇求借西涼人馬即回九焰山迎駕起手殺上長安以拿武氏開鐵丘墳保廬陵王重定的話細細說了一遍必虎道這就是了我的人馬一動便露風聲卻了不得那新唐國王納羅乃西涼王馬日哈之子當初你母親樊夫人來下西涼准其歸降有恩于彼我今修書一封與你前去見他借兵定然見允等你九焰山起手一入潼關我即發兵來助你以上長安你二哥之子薛鬥今已十四歲了頗有膂力叫他來見你分付家人去喚兩位公子來原來薛金蓮生一子名竇希玠年十六歲二人正在花園玩耍一聞呼喚即忙出來薛金蓮道薛鬥這是你叔父薛剛過來拜見薛剛把薛鬥一看見他生得黃臉黃眉金睛巨口真是將門之子薛鬥拜了四拜薛剛想起他二哥無辜受戮遺下此子不覺傷心淚下金蓮又叫己子竇希玠拜見了表兄竇必虎分付速備酒筵叫家人請南建北齊入內相見二人進內拜見已畢大擺筵席款待衆人酒罷安歇竇必虎連夜修書一封次日交與薛剛薛剛即拜辭起身與南北二人出了帥府奔新唐國而來一路饑食渴飲過了青龍關寒江關興唐府朱雀關無武關不覺到了白虎關薛剛備下祭禮上白虎山哭祭兩遼忠武王薛仁貴墓祭畢起身過了接天關九江關不覺到了新唐國鍋底城投店住下來未知次日何如且聽下回分解
