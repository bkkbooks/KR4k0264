body:
  text: 第三回武才人出宮爲尼褚遂良入朝直諫當下太宗聽了李淳風遂追了武士囗都督之職便宣武氏出宮不一時武氏出宮俯伏在地涕泣流淚太宗道朕念汝深宮服侍一場赦汝一死宮中房內寶玩物件一概賜汝以尼庵一所贈汝以終天年永不收用各官亦不許再譖武氏謝恩出宮爲尼去了太宗即選狀元狄仁傑進殿問其有詩之故命取李淳風寫的詩句與狄仁傑觀看仁傑看了大驚奏道此臣於路上旅店之中有一少婦苦欲私臣臣被他三番調戲欲火三發臣恐累德唯唯不敢後遂不能禁止作此絕欲之詩才得保全不損陰鴛太宗大喜道此乃朕有福得此良臣真真仁厚長者回顧高宗道我兒有福當受此仁德之臣即欽授爲直諫禦史仁傑謝恩出朝太宗回宮舊病復發日重一日醫藥不痊進駕崩于宮內傳位於高宗改元永徽元年以王妃爲皇后勤修國政用賢去奸心中只想武氏暗使內監打聽武氏爲尼之處卻在興龍庵內分付武氏留發俟後來召及至太宗崩後次年高宗傳旨托言往興龍庵燒香令群臣排駕向興龍庵而來再說武氏自從太宗發出爲尼受不過淒涼寂寞老尼志明做腳勾引了白馬寺小和尚懷義私通已非一日這日高宗駕臨于路但見行官迢遞接仙台郭外驂驥羽倚來出護皇輿回回合天臨展極五雲間春留翠柳供行客香到桃花囗囗杯獨愧周南留滯者侍臣遙望柏梁材當日興龍庵衆尼聞聽聖駕來臨同武氏忙忙迎接高宗入庵衆尼三呼萬歲俯伏在地高宗看見武氏禦手挽扶遂同到佛前燒了香就攜武氏同入雲房武氏泣道陛下位至九重忘了九龍玉環之約乎高宗道朕豈能忘恐人談論故爾遲遲今特駕臨正謂三載不見如隔天壤思卿之心何嘗一日無之說畢二人送在雲房交歡正是發結尼姑百媚生君王一見使淫蒸高宗二百山河主貽臭千年汙汗青不多時內侍奏道左仆射譜遂良在外催促聖駕回宮高宗分付武氏明日朕著內使來召切不可令人知覺武氏謝恩當時高宗回宮到了次日暗著內侍裴中清用車載武氏入宮立爲則天昭儀褚遂良聞知此事吃一大驚忙入朝來方進午門遇見裴中清出朝中清問道褚老大人何往遂良道聞知聖上招納先帝才人武氏爲則天昭儀特來諫阻裴中清笑道納也納了諫之何益不如請回府去罷遂良聞言大聲喝道都是你們這等逢君逆賊誰要你管還不快走裴中清笑道我讓你是先朝老臣我且回去說畢竟出午門而去褚遂良歎道狄仁傑不在征西諸將未回徐茂公等不知幾時才到心中忿恨親身鳴鍾擊鼓請駕臨朝高宗在宮聞知說是了褚遂良又來多事了武則天道何不殺之高宗道他乃先帝顧命之臣須緩緩圖之分付內侍回復左仆射說朕知道了叫他回府去罷內侍傳旨出外褚遂良道我非多事因受先帝托孤之恩不得不言等了半日不見出宮只得歎息回府去了高宗自納武則天之後把一個正宮皇后抛在一邊每日耽于酒色不理朝政武氏百般巧媚挑唆高宗聽信巧言遂有廢貶正宮皇后之意畢竟後事如何且聽下回分解
