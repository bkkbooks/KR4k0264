body:
  text: 第四十八回胡鳳嬌怨命輕生崔文德送還庚貼再說陵州崔文德一心要想表妹爲妻百般孝敬文氏欲央媒說合又恐文氏回絕自己想道目今海棠盛開不苦借賞花爲名親自相求姨母或者不好卻我也未可知遂叫安童把文氏請至書房文氏道賢侄請我來此卻有何事文德指道院中海棠盛開愚侄特備茶果在此請姨母出來賞花說罷請文氏上坐自己旁坐相陪吃茶看花閒話一回令安童出去來至文氏面前跪下道愚侄有一句話不知姨母肯允否文氏失驚扶起道你何必如此我母女在此多承你照應有話只管說來我無不依從文德道表妹今年十六歲愚侄今年十七歲年紀相當欲求表妹結姻訂百年之好不知姨母尊意若何文氏聞言驚呆半晌方說道這事不是我不肯只因當初許過進興了如今難以再許你文德道姨母不妨雖然曾許進興又非明煤說合且是來歷不明逃去無蹤又聞他做了強盜打死牢中豈可誤了表妹終身大事今日姨母許允我即下聘文氏左思右想並無法回他忽然想起通州近日遭了兵火胡發定然避兵不在家中只將胡發推辭便了叫聲賢侄我想婚煙大事非女流所做主必要我家二叔胡發做主要他應諾才好文德道這不難待我往通州親見胡二叔求親便了文氏暗暗點頭文德忙將這話入告母親崔母道爲娘久有此心只因你姨母說已許人了故爾終止今姨母既有此話爾須速去求親只要你胡二叔出一庚貼便下了聘來文德忙收拾財禮帶八個家丁叫了船竟往通州而來此時周兵已過去了那胡發也回在家中聞知嫂嫂侄女得胡完送在陵州崔宅居住他樂得省飯也不以爲念那崔文德來到通州下船入城就寫一個柬貼來拜胡發胡發知他十分富貴忙迎接入廳禮畢坐下胡發假意謝他收留嫂嫂侄女之情文德連稱失禮就把求婚已蒙文氏應允要他主婚出庚貼即當以千金相聘的話說了一遍那胡發聞聽有千金聘禮連忙應允並說不消擇日明早下聘就好文德見允喜不可言作別起身次早料理十二架食盒三起吹手八個家人文德坐轎親自下聘至胡家禮物排了一廳胡發如掘了一樁橫財其樂無比收下聘禮送了庚貼文德如同接了至寶胡發擺筵款待酒罷文德告辭胡發相送出門而別文德即時下船回到陵州上岸歸家卻好文氏正在崔母房中文德深深一揖道姨母多承二叔美意一說即允收了幹金聘禮表妹庚貼已有了只等擇日完婚崔母大喜文氏唬的目定口呆心中暗道我只道胡發避兵不在家那料想庚貼都出了此事如何是好又不敢對女兒說出恐怕他覓死覓活只是暗暗納悶過了數日崔母來文氏房中看鳳嬌繡花忽然文德走來把表妹繡的花一看叫聲表妹繡得好鴛鴦做得枕頭不久吉期一定好與賢妹合巹鳳嬌滿面通紅叫三哥休無禮說此戲言也崔母笑道我兒你還不知你三哥親到通州見你二叔求親你二叔允了收下聘禮出了庚貼你今是我家媳婦了鳳嬌聞言急得肝腸寸斷淚下如雨叫聲三哥我丈夫雖無下落但小妹之身既許與他永無更改三哥決還我庚貼速去通州追回聘禮莫做輕財速命之人文德道賢妹我大禮已行永無更改你既不肯他嫁我誓不肯他娶大家就守節便了鳳嬌心如刀刺忙身上脫下穿的崔家的衣服來依舊穿了自己的日衣服倒在床上痛哭不了文德慌了手腳求姨母母親解勸且自去了崔母文氏苦勸半日鳳嬌那裏肯聽一連五日茶飯皆絕滴水不下急得崔母文氏都沒法了文德入房一看紛紛淚下道賢妹愚兄雖不才也不爲辱沒了你你爲何輕生餓到如此光景也罷總是我與你無緣我取庚貼來送還你便了遂到書房取了庚貼來至床邊叫聲賢妹庚貼在此送還了你不要自己苦了請吃些湯水罷文氏道我兒你三哥送還了庚貼不要心焦你可吃些飯罷鳳嬌只是閉口不吃怨恨自己命苦立志要死文氏止不住流淚文德道姨母且收了表妹庚貼慢慢勸他吃些東西我且出去文氏再三苦功那知他口也不開一連七日水米不沾看看目定唇青文氏只是痛哭也沒法相救鳳嬌將死怨氣直沖鬥牛玉帝聞知即差太白金星帶一粒仙丹下來是夜投入鳳嬌腹中立時神清氣爽吃飯如前文氏大喜文德喜到萬分只要他大命不妨慢慢守候他回心轉意成親文德自此再不提起親事在族中親眷面前只說已定下了表妹胡氏親親眷眷無一個不知畢竟後來如何再看下回分解
