body:
  text: 第九十四回樊梨花施法除怪竇必虎率衆勤王話說次日薛剛把騾頭太子的兇惡稟知了樊梨花樊梨花道不妨有我在此自當破他正言之間軍士來報騾頭太子在外罵戰樊梨花聞報上馬出營騾頭太子一見大喝道老婆娘留下名來樊梨花道我乃兩遼王薛丁山夫人樊梨花便是騾頭太子那裏曉得樊梨花是何等人竟認作等閒之人舉棍打來樊梨花掄兩口寶劍敵住戰有五六合騾頭太子回身便走樊梨花拍馬追來騾頭太子把腰邊金筒蓋揭開吱吱一聲響一口黑刀飛入半空樊梨花擡頭一看笑道這妖物如何傷得我把手往上一指其刀落地此刀一沾了泥就成無用之物騾頭太子大驚拿起金筒往上一撒八口刀盡行飛入空中樊梨花把手往上一放喝聲疾一連幾個大霹靂把八口刀盡擊落地騾頭太子大驚把手亂招再也不能收回急得兩隻騾耳直豎回身舉棍打來樊梨花笑道你的刀不能傷我我叫你看我的刀傷你遂伸手向背上拔出一劍抛入空中騾頭太子叫聲不好急借土遁走了樊梨花笑道今日他還未該絕命收回寶劍拍馬回營那騾頭太子逃到營中忽見武三思奉武則天之命領兵十萬前來接應聞九口黑刀俱被樊梨花所破大驚失色遂叫太子這樊梨花是薛丁山之妻能呼風喚雨移山倒海當年法場之上被他走脫他今到此非同小可須得有大法除了此人其餘不足懼也騾頭太子道我想樊梨花法術甚高非我師傅不能破他如今將大營交與千歲看守待我去請我師傅來破他武三思允諾騾頭太子駕起土遁奔到六安山入洞拜見鐵板真人說弟子奉命到長安相助母皇以退薛剛不料來了一個樊梨花十分厲害弟子九口黑刀盡被他所破反拔出寶劍來殺弟子弟子幸逃得性命因此前來請師傅下山去捉樊梨花鐵板真人聞言大怒即同騾頭太子出洞駕起遁光來至霸林川落下軍士報人武三思忙出營迎接入帳禮畢坐下大排筵席款待過了一夜次早鐵板真人仗劍出營來至唐營前大聲高叫樊梨花出來會會貧道軍士報人樊梨花聞言即仗劍上馬沖出營來擡頭一看見是鐵板真人用手一指道你今日何苦自來討死只怕你多年的工夫未免要喪於此地矣如今聽我言語速速回避你若不聽性命難保海之晚矣鐵板真人聞言大怒將蒲扇手把樊梨花一指喝聲女婆娘你知我的本來面目放下了臉皮與你拚個死活把劍迎面就砍樊梨花掄雙劍相迎戰了五六合樊梨花念動捆仙咒捆住了鐵板真人那鐵板真人罵聲老婆娘這咒如何捆得住我遂在地一滾其捆自解現出原形一道黑光護住伸頸開口把那煉成的毒氣吹來樊梨花說不好雙足高了踏鐙縱雲起在空中往下看時坐馬被他這口毒氣一吹化成飛灰只存一堆馬骨在地鐵板真人擡頭一口氣望上吹來樊梨花縱雲走了鐵板真人收了原形又抵營討戰樊梨花至營落雲下來薛剛便問母親交戰如何樊梨花道那騾頭又請他師傅龜精來了這龜精竟壞了修行之心把毒氣吹來幸我走得快坐馬早化爲飛灰如今他必再來討戰且挂出免戰牌待我回山去另借寶貝方可除他薛剛就把免戰牌挂出鐵板真人看見免戰牌回營去了且說樊梨花駕雲來到西南洞離島山落雲入洞拜見梨山老母老母早已曉得樊梨花的來意便說道你要收此龜精須到鸞鳳山借九天玄女娘娘的八卦陰陽鍾方可除了此怪樊梨花領命縱雲來到鸞鳳山落雲下來看見唐萬仞正在洞門口樊梨花煩他傳稟入洞拜見玄女娘娘玄女娘娘道天魔女你此來是要借我的八卦陰陽鍾去收那龜精到長安開了鐵丘墳須速速回山修道待你難滿之日脫了凡胎我當送你上瑤池服侍金母叫女童把陰陽鍾取來不多時女童取到玄女道你將此鍾帶去會那龜精可如此如此待你到長安開了鐵丘墳即將此鍾送來還我你去罷樊梨花拜受寶鍾唐萬仞送他出洞樊梨花駕起雲光來到唐營落雲下來薛剛一見便問母親借了什麽寶貝來樊梨花道借得九天玄女娘娘八卦陰陽鍾在此分付收了免戰牌樊梨花上馬直抵周營索戰鐵板真人聞報仗劍出營大叫老婆娘你還不知我的厲害今日要來送命了樊梨花大怒掄劍便砍鐵板真人把劍相迎戰不上三四合樊梨花又念動捆仙咒鐵板真人撲身在地一滾現出真形張口正要吹氣樊梨花早取出八卦陰陽鍾一抛將鐵板真人罩入鍾內令軍士取幾擔烈炭來將鍾四面架起炭放火團團燒起鐵板真人在內急急借土遁要走那知此鍾變化無窮地土變成鋼鐵再也遁不去了速速火燒鍾紅熱氣逼人那龜精在內哀求道樊夫人老太太可憐我不是一日工夫修到此地位只因一念之差原不該來望太夫人以慈悲爲本饒了我我再不敢作怪了樊梨花只當不聽見指示軍士加添炭火到了一晝夜把他原身煉出到了兩晝夜已燒成焦黑到了三晝夜便成了灰燼樊梨花叫軍士撥開炭火輕輕揭起取土埋了灰燼收了寶鍾回至營內薛剛衆將皆大喜忽見軍士來報說平西侯竇必虎與姑太夫人統兵十萬前來相助離營不遠了薛剛大喜與母親及二妻媳婦衆將出營迎接竇必虎令人馬紮住與薛金蓮一齊下馬衆人相見敘了寒溫就請入營樊梨花先上前見禮薛雲夫婦亦上前拜見父母及內侄孫內侄孫婦各各上前拜見未知說出何話再看下回分解
