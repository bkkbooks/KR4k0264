body:
  text: 第三十六回九焰山群雄聚義通州城李旦落難當下薛剛住了手那五人問道你可是兩遼王三爵主薛剛麽薛剛道然也五人聞言俱下馬便拜那綠臉花臉的也下馬來拜薛剛扶其七人問其姓名爲何廝殺那綠臉的道小可姓南名建那花臉的是我義弟姓北名齊在此九焰山落草這青臉的名烏黑龍這黃臉的名烏黑虎紅臉的名烏黑彪黑臉的名烏黑豹白臉的名烏黑蛟是同胞兄弟在前邊二龍山落草他五人見我這九焰山風水好十分險峻四面環繞九個山頭合抱上邊又有平坦之地四百餘裏他五人來要奪我的山寨我二人不肯所以在此廝殺不料爵主來到助我二人他五人見是爵主所以拜服如今只求公斷薛剛道依我愚見四海之內皆兄弟何必爭鬥五兄既愛此山就同住一處何等不妙既如我蒙這吳奇馬贊二弟留住在黃草山居住才是英雄氣象若要爭奪焉得爲之豪傑南建北齊齊道爵主之言極是敢不允從且請爵主與吳馬二兄烏氏五位同到山寨中一敘衆人各各上馬竟上九焰山來這山前有三座石關進了三關方到大寨衆人下馬入聚義廳見過了禮南建問道爵主何往薛剛把上房州見廬陵王得蒙思赦複回黃草山要擇險峻之地召集義兵保廬陵王中興之事一告訴南北二人道我們原是良民因武氏亂政天下儘是貪官受不過汙氣故在此落草今爵主既有恢復皇唐之心集衆起手我等願從麾下請爵主即在此處相聚大義何如烏氏五人齊道此言甚妙我等亦願相從薛剛大喜南建北齊分付點起香炷十人祝告天地結爲生死之交讓薛剛爲九焰山寨主大排筵席慶賀吃酒次日薛剛叫烏氏五人去二龍山搬取積貯錢糧來九焰山屯紮又打發吳奇馬贊回黃草山接徐美祖攜山寨錢糧到九焰山居住合三處的人馬共有二萬又暗暗糾集義兵以圖大事按下不表且說太子李旦與英王長子李美祖三子李成孝在揚州三人失散李成孝逃出西涼遇異人傳法後來搶了西餘國霸佔一方稱爲威武皇帝國號大英不提單說太子李旦逃難一路幸喜無人認得他逃到通州沒了盤費只得沿街求乞古廟棲身那通州城內有一富戶姓胡名發系胡經次子長子胡登飽學秀才有一女嫁在趙宅他家積祖爲商胡發習父生業只因父親身故胡登胡發便析居分住胡登取妻文氏無生男止生一女名鳳嬌胡髮妻刁氏也生一女名英嬌趙家胡氏生女鸞嬌鸞嬌七歲上父母雙亡胡登收養在家鸞嬌長鳳嬌五歲鳳嬌小英嬌兩歲姑舅姐妹到了八九歲上胡登就請繡娘楊氏教習二人女工亦把侄女英嬌接來一同學習胡登親自教些書文這鳳嬌天性聰慧善習詩書琴棋字畫不學自能胡登因讀書坐食家產漸漸消敗胡發能于生意家業漸漸興旺後鸞嬌長成嫁與新解元陳進爲妻胡登得病身亡胡發把繡娘楊氏請回自己家去教女兒英嬌又與女定親許與馬總兵之子馬迪爲妻其年鳳嬌已十四歲生得千嬌百媚絕世無雙他原是上界太陰星臨凡自胡登亡後與母文氏孤苦相依坐食山空不得已將住宅賣了又吃了數月看看又盡文氏對女兒道兒呵自你父亡後物件變盡房銀又將吃盡如今只存有十兩銀子若再吃盡如何是好我想你叔叔家富足我意欲將這十兩銀子交與你叔叔生息你我一同到他家去過活我兒以爲何如鳳嬌道母親之言有理叔叔乃骨肉至親自然照管況又有這十兩銀子與他自然收養母女計議停當次日來至胡發家中把這十兩銀子交與胡發要依他一同過活胡發道我也不是富足之家如何養得閒人嫂嫂既要在此也須幫家過活才好文氏道這個自然願聽憑使喚未知胡發如何再看下回分解
