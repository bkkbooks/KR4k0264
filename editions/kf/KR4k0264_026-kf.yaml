body:
  text: 第二十六回馬周失勢權居山武氏篡位移唐祚話說馬周率領兵五萬來救揚州離揚州尚有百余裏馬周忽見他二夫人李湘君率領十餘騎保著車輛飛奔而來吃了一驚來到面前看車子上是他大夫人林氏並王欽曹彪二人妻小忙問小主李旦若何湘君道不好了武三思領兵來攻揚州城內兵微將寡不能把守英王二殿下李嗣先戰死疆場被武賊攻破城池大殿下李美祖三殿下李成孝與小主李旦逃出揚州不知去向英王家下盡被武賊所害幸虧我與兄弟李奇保著家小從亂軍中殺出來正要往金陵去不料此間相遇可惜你的救兵來遲了馬周頓足道如今小主已逃師出無名大事去矣李湘君道小主與大殿下三殿下一定逃往金陵到英王營中去了你我不若且回金陵合兵一處再議進取何必在此躊躇馬周道言之有理遂令三軍轉回金陵來至半路遇著逃下來的義兵稟知英王被刺之事馬周大叫一聲暈墜馬下王欽曹彪忙來扶住蘇醒半日方才長歎一聲道千歲呵當初若聽吾言河至喪於小人之手今英王兄弟已死大兵已散小主又不知去向好叫我進退兩難如何是好王欽道將爺不必心焦此處過東三十裏有一翠雲山十分險峻且屯兵此山權且安身待找著小主再圖中興馬周依言即領人馬來至翠雲山就在山上斬木爲城塔連寨房將兵馬紮下就差王欽曹彪各帶幾名精細軍士不拘天下州縣各處尋訪小主二人領命下山而去再說武三思兵破了揚州殺了英王家小走了太子李旦並李美祖李成孝及馬周家小四下尋拿不知去向三思收兵回金陵與李承業合兵一處奏凱班師回朝那一班功臣早先得報知英王兄弟被刺攻破揚州小主逃避個個驚呆在府只好閉門長歎而已江夏王李開芳聞知英王之事又恐隱藏太子事發竟帶家小逃往直北沙陀而去再說李承業武三思等回朝將行刺英王兄弟攻破揚州逃走太子李旦等一奏了一遍武氏大悅封李承業三齊王兵部尚書加封三思爲忠州王承嗣爲青州王姚鐵頭爲都總管仍傳諭天下緝拿在逃反臣馬周等並妖人李旦拿獲者封萬戶侯隱藏者夷族自此以後武氏大有篡位稱帝之意又令李承業抄殺皇唐宗室四百家共一萬三千余口唐室宗枝誅殺殆盡當下武氏竟擇吉日頭戴平天冠身穿五爪龍袍登金鑾殿即皇帝位張天左張天右諸武大臣皆吉服朝賀山呼萬歲就是那班功臣在長安者無奈何也只得朝參武氏自號爲天冊金輪智明文武神聖則天皇帝改元垂拱元年建國號曰大周移皇唐七廟神主於太廟追封武氏之父祖曾高七代皆爲皇帝妣皆爲皇后冊立三宮六院點集秀男爲宮娥張昌宗爲正宮皇后張易之爲偏宮貴妃後妃宮娥俱塗脂抹粉並穿女人服色這也是天意故陰陽如此顛倒諸武盡皆加封王爵就是乳哺之兒也封爲公侯一面發喜詔頒行天下大赦罪囚只有李旦馬周薛剛不在赦內又將這班功臣乃是開國之人一加封爵位各賜金帛但不令他們掌握兵權又封白馬寺僧懷義和尚爲護國大禪師賜蟒袍並龍頭禪杖這和尚就是在興龍庵與武氏有奸的王懷義其餘寵倖之臣盡加顯職榮封三代正是一子受王恩全家食天祿欲知後來如何再看下回分解
