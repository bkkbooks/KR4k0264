body:
  text: 第三十三回銀安殿共議中興房州城設立擂臺當下魯仲道馬登現在房州保廬陵王足下果是何人薛剛道且再少待便知遂設席款待魯仲魯仲心中猜疑半日忽然一觸擎杯問道足下莫非兩遼王之子是三爵主薛剛麽徐美祖道大夫猜著了魯仲道原來果是三爵主失敬了薛剛道大夫今日至此乃是天緣我有一言相告大夫到太原回房州時見廬陵王爲我呈一事如廬陵王肯赦我萬斬之罪我願糾集人馬保他中興天下魯仲道若說廬陵王乃仁德之君那裏要追究你的罪他卻常常歎傷你家受戮心欲你保他中興爵主今既有此心包在魯仲身上回去奏知主公定即差人來召你薛剛道大夫回奏只要放我的罪我自到房州朝見若來召我萬一武後知道不但薛剛性命難保而且累及廬陵王魯仲點頭道所見極是魯伸到了次日拜別起身薛剛把禮車令人先送下山去又取白金二百兩相送親送下山方才拜別魯伸直奔太原而來一日來到太原府問到屈浮魯家投了名帖屈浮魯迎至廳堂行了禮從人把禮物送上屈浮魯忙問道魯尼從何至此此禮因何而設魯仲道在下是房州廬陵王駕下上大夫小主聞先生之名特備禮物差在下來聘請大駕前往以圖大事有詔在此浮魯分付排香案俯伏山呼開讀了詔書謝了恩收了禮物備酒款待魯仲到了次日浮魯收拾行李同魯仲起身望房州而來一日來到房州魯仲先入內奏知廬陵王即下旨召浮魯進見浮魯入銀安殿山呼朝見廬陵王答以半禮賜坐問道孤久仰先生大才今蒙不棄惠然而來孤之大事望托先生幸勿見卻浮魯道小野之人有何才德蒙千歲以重任委臣臣敢不盡心竭力有何大事乞賜明言廬陵王屏退左右只留魯仲馬登說道唐家不幸母后專權移唐七廟殺戮宗室大權悉歸諸武國家亡於別姓孤欲中興天下重整社稷乞先生爲孤謀之浮魯道千歲被貶此地實爲孤立欲圖中興誠爲費力但臣只能爲主坐謀至於交鋒對敵須得這一個人方能成其大事但此人有萬斬不赦之罪未敢出頭保駕廬陵王道天下爲重總有大罪亦當赦免你所薦者是何人浮魯道就是兩遼王第三子薛剛廬陵王道先生不言孤也難以開口薛剛當日踢死皇子也是人擠倒了不知誤踏死的他敢踢死太子麽就是兩遼王第三子薛剛廬陵王道先生不言孤也難以開口薛剛當日踢死皇子也是人擠倒了不知誤踏死的他敢踢死太子麽就是父皇驚崩也是年數該盡母后無端將他一門殺盡孤心甚爲不忍久有赦他之心但不知他的下落他焉知孤有赦他之心魯仲道那薛剛在那黃草山同吳奇馬贊落草廬陵王道大夫何以知之魯仲就把奉聘被劫自始至末一說明廬陵王道他既說不叫召他他何由知孤赦他他怎敢來朝見浮魯道這卻不難千歲在教場中搭一座擂臺待臣打一百日擂傳諭湖廣十五府人等有人打擂得勝者賞千金封爲禦營都教師此旨一傳包管薛剛決來臣趁此可以通知千歲赦他之意又可以挑選武將保駕中興此爲一舉兩得再令薛剛回山糾集人馬以圖舉義廬陵王允奏即封浮魯爲都教師一面傳諭湖廣十五府一面傳旨教場搭擂臺這旨一傳出去都要來打擂臺不知後事若何再看下回分解
