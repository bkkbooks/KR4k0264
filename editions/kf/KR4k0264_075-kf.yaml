body:
  text: 第七十五回李孝業設連環馬羅家將教鈎鐮槍再說定唐王李孝業乃承業之弟在陝州得旨即起兵二十萬有兩個先鋒叫做仰必興仰必大又有四員偏將叫做韋雲毛進喬路唐英都有萬夫無敵之勇挑選了三千兵馬分爲一百隊又挑五千步軍隨後接應每馬三十匹一連卻把鐵環鎖連人與馬俱按鐵甲名爲連環拐子馬十分厲害竟往九焰山而來一日離山十裹紮營下寨次日李孝業領兵抵山討戰徐美祖對衆將道李孝業乃能征宿將必須先用力敵後用智擒當撥爲十隊下山交戰以挫其銳氣便點南建北齊吳奇馬贊烏黑龍烏黑虎烏黑彪烏黑豹紀鸞英披霞公主十將分爲十隊戰陣薛剛合後衆將得令一齊率兵沖下山來排開陣勢頭一隊南建一馬當先與仰必興戰在一處未分勝負仰必大拍開坐馬上前助戰紀鸞英出陣戰住必大四人鬥了十餘合鸞英虛閃一刀回馬便走必大縱馬趕來鸞英按下手中刀取出紅絨套索等必大馬來得近把套索望空一抛竟把必大套下馬來軍士上前把他捉了李孝業看見大怒上前殺來薛剛接住交鋒兩邊衆將一齊沖出各尋對頭交戰自辰時殺至未時不分勝負李孝業忙放出連環馬奔來兩邊又有強弓硬箭射來中間又是長槍刺來薛剛一見大驚那裏擋得住前面五隊住腳不定四下亂竄後面五隊阻擋不住各自逃生兵馬大敗幸得屈浮魯鄭寶馬登敬暉搶下山救了衆將那連環馬直抵三關因山路崎嶇退了回去李孝業大勝捉了烏黑彪收兵回營不提薛剛回山計點衆將不見了烏黑彪著傷的吳奇南建烏黑龍烏黑虎軍士受傷不計其數折了八千人馬廬陵王甚是憂慮徐美祖道千歲不必憂慮待臣再生良策以破連環馬屈浮魯道要破此馬須得羅家槍改爲鈎鐮槍徐美祖道莫非山後羅章的槍麽屈浮魯道然也我聞羅章已故生有兩子羅英羅昌不知在哪里敬暉道太保羅英因武後不容他遣將代守郃陽羅英大怒殺了天使反出部陽屯兵定山他有一員驍將名叫李廣面如醬色善使鋼鞭徐美祖道定山在潮州地方待小弟下山去請他來即時辭別廬陵王竟往定山而去一日行到定山忽聽一聲鑼響出來了十余個嘍羅爲首一人面如紫茄手執銅鞭喝道來者留下買路錢放你過去徐美祖問道你是李廣麽那人見問遂笑道正是徐美祖道煩你上山對太保說我徐美祖要見李廣上山報知羅英羅英邀請上山入寨見禮坐下羅英道小弟近日聞得仁兄與薛剛占住九焰山保廬陵王中興小弟十分歡喜仁兄焉得有工夫到此徐美祖道小弟此來是因李孝業攻打九焰山排下連環甲馬被他戰敗有屈浮魯說仁兄祖傳的槍法變成鈎鐮槍可以立破此陣廬陵王特著小弟來請仁兄助他滅武興唐羅英道仁兄既來小弟焉敢不往美祖道救兵如救火必須即刻起身才好羅英道小弟收拾人馬即便同行美祖道人馬一個也不要只要仁兄一人同小弟往九焰山去破了連環馬那時仁兄仍回此山小弟有一個錦囊付你成就了姻緣再立了功績豈非美事羅英大喜分付李廣看守山寨遂同徐美祖下山星夜趕到九焰山徐美祖領他見了廬陵王到了次日羅英挑選精壯軍士五千習學鈎鐮槍不上半月工夫教成了五千名花槍手欲知後事再看下回
