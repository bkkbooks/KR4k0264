body:
  text: 第十六回棄親子薛蛟脫禍廢中宗武氏專權話說李承業在盜馬關拿了薛勇夫婦解至長安與薛丁山一同囚入天牢此時魯王程咬金與一班功臣誰不欲救薛氏一門怎奈這罪在不赦誰敢多言只好納悶於心指望中宗恩赦在中宗亦有赦他之意奈武後甚怒不息又兼張天左張天右等在武後面前唆奏這且不提且說江淮侯李敬猷知中宗實有欲赦薛氏一門之心怎奈武後必要殺盡薛氏一門又有一班權臣唆奏武後武後竟有廢帝之意若帝一廢薛氏一門焉能得赦薛剛雖造此大罪一門被戮怎忍他世代忠義功臣竟做了覆宗絕嗣我如今如何設法救了薛猛三歲之子薛蛟出牢日後也好與他薛氏傳宗接代左思右想無法可救只是歎息想了半日忽然把桌一拍道要存薛氏之孤須得一個三歲的小兒到天牢暗行換出薛蛟方妙況我又無多子只得兩個孩兒長子孝德五歲上在花園中被妖攝去至今並無下落次子孝思今方三歲雖與薛蛟同歲但是獨子如何可去換他出牢不絕了我自己的後代想了半日忽然歎道罷罷若惜吾子焉得救出薛氏之後況我哥哥敬業現有三子盡可傳宗何用孝思主意一定抽身入內分付乳娘道我晚上要抱公子出去頑耍乳娘應諾原來敬猷夫人生下孝思產後身亡孝思就交付乳娘撫養到了天晚敬猷叫了幾個心腹家人跟隨分付備馬取了一個竹籠敬猷抱孝思紛紛淚下不得已放在箱內那孝思也不啼哭昏昏睡去外人竟看不出來家人背了竹籠敬猷上馬出府往天牢而來到了初更已至牢門敬猷下馬家人到牢門口道江淮王來查監哩獄卒忙報獄官獄官火速開門跪迎敬猷入內分付獄官欽犯在牢不是當要速閉牢門爾等小心看住牢門不必伺候待本爵入內挨次查點獄官連聲答應敬猷同家人掌燈故意查點牢犯原來薛丁山一門共有三百八十五口卻不做一處拘禁分爲四牢四牢之中又分開四下監禁敬猷知薛猛夫妻囚在星字型大小監房查將進去到了星字型大小監房門首只見外面都是木柵柵門上加三道封皮當中只留一方洞傳送飲食故此敬猷進去不得來至洞口連呼大爵主數聲薛猛與妻抱著薛蛟正在啼哭忽聽有人低喚便問是誰敬猷道我江淮侯在此快來有話商議薛猛忙至洞口一看便叫大人黑夜至此有何見教敬猷道尊府一門被囚我等衆功臣皆欲保奏奈武後怒氣不消無門可救倘有不測何人傳接薛氏宗嗣所以下官悄地來救令郎出去薛猛道大人牢中緊急如何救得小兒出去即使救出明日武三思來查不見小兒追問起來豈不累及大人敬猷道實不相瞞小兒孝思與今郎同是三歲無人認得我特將小兒至此換令郎出去著小兒替其一死快把令郎送出洞來換去薛猛道大人此言差矣大人若有多子仗義存孤來換小兒也還使得今大人只此一子來換小兒難道薛氏宗嗣不可絕大人倒可以無後麽敬猷道我年紀尚未老還可再生爵主不可延遲快快換出來若被人知覺反爲不美薛猛道如此說大人之恩天高地厚我薛猛生生世世願作犬馬圖報大人請上先受我夫婦一拜言罷夫婦在內跪拜敬猷道休拜休拜以速爲妙恭猛夫婦拜罷將薛蛟從洞內遞出敬猷抱了家人啓竹籠抱出孝思薛猛接抱入洞敬猷將薛蛟放入籠中帶了家人便走走到外邊分付獄官小心看守獄官跪送出牢敬猷上馬回到府中抱出薛蛟令乳娘好生撫養按下不表且說張天左張天右見中宗無殺薛氏一門之心便暗奏武後道新君昏懦忘先帝之遺恨容留叛臣家口且日與群小荒淫不理國政不可君臨天下乞太后以社稷生民爲重早定大計庶天下太平國家幸甚武氏見奏遂定了主意下旨廢中宗爲廬陵王貶往湖廣房州安置如無命召不許擅至長安中宗泣涕受命與娘娘韋氏即日起駕往湖廣而去武後遂臨朝執政改爲垂拱元年朝內大政悉歸張天左張天右禁軍兵馬番命武三思掌理一時武党盡居顯爵大權盡歸武後未行後來如何且看下回分解
