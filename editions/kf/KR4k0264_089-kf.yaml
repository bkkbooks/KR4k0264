body:
  text: 第八十九回文豹元公雙對敵薛蛟薛鬥各建功再說九焰山廬陵王一連得了數報金墉胡國公秦文奪了大名府反周爲唐河東魯國公程明宜興尉遲勃皆起兵勤王其餘聞喜公裴行儉之後裴洪濟約齊十六公侯節度使陸續歸降先獻順表廬陵王大喜下旨封徐美祖興唐兵馬都元帥行兵調將護國軍師封薛剛爲兵馬大元帥擇日興師徐美祖聚集衆將合齊人馬屯紮在宣武城下請廬陵王禦駕親征徐美祖升帳問誰敢挂先鋒印只聽得數人答應閃出白文豹薛蛟薛葵薛鬥薛雲一齊上前徐美祖道先鋒印只有一顆就再設一個副先鋒也只用二人如今你五人齊應卻哪一個挂印呢白文豹道我年長先鋒印該我挂薛鬥道胡說做先鋒那論的年長不長昔日越王羅通十三歲做了元帥我今年十四豈做不得先鋒麽薛葵道不要爭如今我們比一比武藝誰勝誰就挂先鋒印齊應聲道有理徐美祖道不可出兵尚未得寸土豈可先自相吞併我有主意前面有五座城池我寫五個鬮兒你五人各取一個拈著那一城便去攻打那一城先得者先鋒印即與他挂五人一齊應允徐美祖暗暗寫下折好各人自取白文豹拈著攻打陵江關薛蛟拈著攻打梅州關薛葵拈著攻打黃關薛鬥拈著攻打新州城薛雲拈著攻打當陽關徐美祖道你們自己說要多少人馬五人齊道止要五百名校刀手徐美祖便點齊軍士各人領了五百分頭而去先說白文豹領了人馬到了陵江討戰守將羅元公即領兵出城大喝道來將何名白文豹道我乃天保大將軍白文豹羅元公聞言大驚想到吾聞白文豹十分兇狠怎能敵他又不好退去沒奈何大著膽拍馬向前白文豹迎面一錘把羅元公即打死于馬下白文豹乘勢領兵殺入城內就下令安民次日回宣武報功去了再說薛蛟領了五百校刀手到了梅州關抵關討戰這關中守將何鳳聞報即時領兵出關各通姓名交手就戰殺了半日不分勝敗薛蛟心生一計回馬便走何鳳拍馬追來薛蛟見他追近伸手取弓搭箭回身射去正中何鳳前心翻身落馬軍士取了首級薛蛟飛騎進關收了版圖出榜安民在城擔擱一日然後起身回宣武報功去了再說薛鬥領兵到了新州守將錢貴聞報領兵殺出城來兩邊名通姓名搭上手就戰戰了八十餘合不分勝敗薛鬥暗想何苦與他死戰戰到幾時遂把一支朝更換刀路錢貴抵敵不住送回馬落荒而走直奔黃關蘇黑虎處去了薛鬥也不追趕領軍殺入新州安民已畢次日回宣武報功去了欲知後事且看下回分解
