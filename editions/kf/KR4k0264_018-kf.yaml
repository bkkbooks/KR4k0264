body:
  text: 第十八回武氏削奪唐宗室馬周挺身當大任話說武氏廢了中宗殺了薛族自專國政臨朝稱制有改唐爲周之意但懼唐宗室親王及衆功臣之後爲患悄與諸權臣議這班功臣不掌兵權住在長安必無禍患最可慮者宗室親王現掌兵權爲害不淺必須陸續削奪方保無患武氏聽了遂罷江夏王李開芳西京留守之職乃以武三思爲之留守副使馬周也罷職閒居在長安凡宗室在官者悉令罷職所有要職盡以諸武爲之那一班功臣見斬了薛丁山一門家口又造鐵丘墳人人歎息個個寒心魯王程咬金在府中不住長歎流淚程統程飛虎侍於左右見咬金流淚忙叫公公爲何不悅咬金道我有甚不悅只可憐那兩遼王忠武公薛仁貴保太宗跨海征東十二年功高日月太宗恩赦多條甚至掘皇陵殺皇親亦皆恩赦今薛剛造此大逆亦當遵太宗遺旨只好罪在薛剛一人奈何把他一門三百八十餘口盡皆殺絕埋造鐵丘墳想起來豈不寒心程飛虎道公公不必傷悲你道他家殺得乾淨麽那薛剛逃循在外怎肯幹休這是斬草不除根萌芽依舊發況法場上走了樊梨花攝去了薛蛟根苗不斷少不得在外起手如何得能乾淨咬金道但願薛剛在外能成大事報此三百余口之仇萬千之幸你只看武後臨朝遂棄功臣罷各親王兵權諸武盡掌大兵只怕唐室江山歸於別姓矣不言魯王歎息再說江夏王李開芳自退西京留守之職閑居在府見武氏臨朝寵用諸武淫亂內庭漸剪皇唐天下暗想武氏有篡位之意使喚杜回入內殿說道你當年冷宮之中救出王后所生太子李旦投我府中假做孤家世子李琪之子今年已十四歲了如今皇家鄉故高宗駕崩新君被廢武氏臨朝退棄親王元勳重用諸武觀其作爲將有移唐社稷之意孤本意欲舉太子登龍奈兵權已解無力可爲我今欲將始末之事對小主說明托與馬周同你前往揚州去投英王敬業他現統兵十萬盡可以保小主興兵奔入長安抄滅武氏保小主登位重興唐天下你道如何杜回道千歲所見不差開芳就叫家人去請了太子來太子見了江夏王問道祖父喚孫兒有何分付開芳道殿下我非你祖乃你之叔祖高宗皇帝便是你父休認差了李旦聞言不解便叫祖父這話孫兒一字不解開芳手指杜國道你要明白可問他他是你的恩人李旦問杜回道老千歲這話是何意杜回跪下道小主實非老千歲之孫乃高皇帝元配正宮王娘娘之子便將十四年前武氏暗害王後被貶冷宮生産相救之事一說知開芳取出王后的血書並一暗龍白玉裹肚道這是你母的血詔所留的寶貝李旦看了血招大叫一聲哭暈在地開芳與杜回連忙扶住攸攸哭醒只哭母后負屈含冤死在冷宮又罵武氏謀害正宮竊居昭陽今又廢皇兄臨朝稱制怎能拿住碎屍萬段方消我恨開芳道不須哭我今欲托參謀馬周送你往揚州投英王敬業他們乃開國元勳之後素有忠心前去投他自然保主興兵與母后報仇接此大位重興皇唐天下李旦道叔祖恩王十四年養育之恩高如日月若有日拿了武氏興我唐家定當圖報大德開芳即差人去請馬周議事馬周自罷職閒居日與妻林氏李氏談些今古或與義弟王欽曹彪論些兵法忽聽江夏王來請即起身來到王府參見了開芳並小主李旦當時開芳屏退侍人只有李旦杜回在殿將小主已知始末及托他送往揚州見英王以圖大事一說知馬周道周願保小主明日起行開芳大喜備筵與小主餞行開芳滿斟一杯奉也馬周道參謀孤今將皇唐江山之主交付與你須要小心保護務成大事請飲此杯鳥周接杯一飲而盡道千歲放心我馬周今日奉小主往揚州若不重興皇唐天下保小主登龍也無顔再見千歲之面開芳道若得如此國家幸甚回身叫道小主請上待老臣拜送李旦道叔祖恩王李旦怎敢當就對拜了四拜馬周請小主並杜回起身開芳送出王府灑淚而別要知此去如何再看下回分解
