body:
  text: 第二十五回承業定計襲揚州鐵頭乘夜刺英王話說李承業敗回營中謂三思道我想敬業難以力勝當以智取今有一計可取敬業之首而拿妖人李旦三思忙問何計承業道敬業領兵在此揚州定然空虛縱使有兵保李旦居守不過老弱之卒二位監軍領兵五萬悄地從長江而渡直抵揚州破其巢穴再用一人詐降敬業營中倘彼聽信收用乘便將敬業刺死賊兵無主不戰自潰但此計少此詐降之人耳三思聞言稱妙就問帳下誰敢前去詐降行刺事成之後奏上太后官封極品帳下一人應道小將願往三思看時乃是大將姚鐵頭能飛檐走壁作事甚密承業大喜道汝若前去須如此如此包成大功鐵頭允諾武三思武承嗣就領精兵五萬悄悄暗渡長江往揚州而去次日姚鐵頭領百余兵往英王營來英王軍士一見就要放箭鐵頭等一齊搖手大叫不可放箭我們是來投誠的軍士聞言即便傳報英王令他進來鐵頭率衆入營跪下口稱千歲小人姚鐵頭現爲李承業帳下隊長聞千歲保太子中興天下小人們俱是皇唐兵卒怎肯反助武氏抗拒義師今日洗心與同隊人投誠帳下乞千歲收留馬周道這姚鐵頭滿臉都是詐氣又且百餘人逃來無兵追趕其詐是實千歲不可聽信收用英王道此一小卒焉敢詐降姚鐵頭你既真心來降孤亦真心待你你原爲隊長孤亦收你爲隊長俟後有功再加升賞姚鐵頭叩頭謝恩其餘軍士令歸義兵隊內到了次日英王遣將挑戰承業堅閉營門不出一連十餘日並不交兵一日忽見報馬飛報入營啓千歲爺武三思領兵五萬暗渡長江攻打揚州而去英王聞報大驚道小主在揚州萬一有失如何是好遂命馬周王鐵曹彪分兵五萬火速去救揚州英王自馬周去後不知何故神思恍惚坐立不安與敬猷飲酒散悶至晚兄弟二人于帳中安寢這夜是姚鐵頭值夜守至三更聽各營梆鑼漸漸欲絕潛至中營放出那飛檐走壁的手段來直入帳中拔出利刀將敬業敬猷刺死割了二人首級悄悄逃出大營竟歸本營見了李承業稟知其事呈上首級承業大喜道此功不小候奏聞封賞即時點齊人馬高挑二人首級殺奔而來這英王營中那百餘個降兵放起一把火來大聲喊道英王兄弟已被姚鐵頭刺死大兵又殺來了各營義兵見外攻內應一時沒了主帥遂紛紛大亂駱賓王火速叫家人削去頭髮逃出營後竟至杭州靈隱寺做了和尚後來雲遊他處竟不知所終再說金陵城中武天寶也殺出城來接應可憐英王一片忠心大事未成死於小人之手義兵四散奔逃承業大勝欲知端底再看下文分解
