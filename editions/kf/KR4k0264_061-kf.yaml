body:
  text: 第六十一回唐王班師回漢陽胡後勸赦親叔嫂當下文氏來到前廳跪下叫聲千歲寧可殺了老身求饒崔家一門老少申妃道此位是誰唐王道是孤岳母申妃忙下來雙手扶起道國太有話請講千歲無有不依何須如此文氏道千歲我女兒是自己死的與文德毫不相干只求開恩赦宥崔氏一門唐王道岳母何出此言孤並無此心分付快請禦舅來見只見文德赤身自己綁著自己跪在廳前叫道千歲崔文德情願自受萬刀之罪唐王道這是什麽意思忙忙親自下來解去其綁叫請穿了衣巾來見文德急忙穿了衣巾山呼朝見禮畢唐王分付備鑾車請國太同行文氏流淚道女兒已死老身前去無益申妃笑道國太娘娘現在漢陽國太此去便可以見娘娘矣文氏道我兒已死江中如何還在唐王便把投江遇救因取寶鏡假冒東床陶府得遇胡後之事一說知喜殺了文氏樂殺了陳進文德唐王分付文德收拾家小到淮州大營相會今文龍文虎領兵一千與陳進往通州拿馬迪胡發兩門老少家口以及觀音庵張李二尼並接取繡娘楊氏陳進家眷並胡完俱到淮州相會下旨即刻起駕回淮州不日到了淮州徐孝德馬周率衆將迎駕入營過了兩日崔文德領家眷來至文龍文虎拿到胡發馬迪並兩門滿家口及張李二尼俱用囚車解到陳進的家眷並胡完一一接至唐王令李湘君領兵三千護送國太崔陳兩家家眷到漢陽並押解馬迪等一班人犯送漢陽監中候駕回之日再行分處李湘君領旨去訖再說唐王今孝德進兵不數日下了通州陵州大兵直抵漢江屯紮不表且說長安武則天一日聞報李承業被擒身死大驚問群臣道李旦如此猖獗將何以禦之丞相張柬之奏道李旦起兵漢陽中外盡知是先帝正宮太子更有徐孝德爲輔深曉陰陽馬周爲帥萬將莫敵今若與之相拒恐終不能取勝依臣愚見不若且與連和以漢江爲界兩家永不許相犯庶爲萬全之策則天允奏即草詔一道尊李旦爲大唐天皇取黃金萬兩彩緞千匹禦酒豬羊差大理寺正卿來欽前去連和來欽奉詔來到漢江報入唐王唐王道武囗見孤兵威大振料難力敵故差人來連和王兄當何以處之孝德道臣已有言在先天命難違不若且允其所請回兵漢陽待時而動唐王下旨令來使進見來欽入營參見呈上和書唐王看了笑道大唐天皇孤自爲之焉用他尊孤今權且班師漸回叫武望速宜避位還孤天下不然有日殺上長安悔之晚矣來欽諾諾而退唐王分兵鎮守各地方擇日班師回漢陽來一路無詞到了漢陽袁成李貴率文官迎駕入城唐王升殿受文武朝賀畢退朝入宮胡後接駕唐王見胡後面有憂容問道禦妻爲何面有憂色胡後奏道千歲因爲叔叔胡發夫妻與英嬌此乃小人何足介懷至於馬迪與李張二尼諸犯理應不有還望千歲仁慈赦免胡氏三人感恩不淺唐王允奏胡後大喜其時國太與繡娘楊氏留養王宮次日唐王早朝封崔文德爲禮部侍郎妻韓氏封二品夫人陳進爲侍讀學士妻封一品夫人崔母封爲一品賢德夫人繡娘楊氏封爲逍遙郡君伊子楊文廣封爲都指揮胡完不願做官將抄沒馬迪家私二十余萬賜于胡完將馬迪及伊父母並張李二尼俱淩遲處死自此唐王住紮漢陽以待天時按下不題再看下回
