body:
  text: 第八回張天右教場受辱樊梨花堂上生嗔卻說薛剛這班人聞聽張天左並不上本俱備大喜依舊日日在外遊玩過了一月這一日薛剛帶了家將騎馬往教場中來射箭行到教場門首只見許多人役擠擁不開薛剛問道何人在此操演家將道是張右丞相操演禦林軍薛剛聞言大怒道又不奉旨爲何私自操演禁兵不是造反意欲何爲遂縱馬飛奔演武廳來張天右在廳上見薛剛來料是來看演操只見薛剛到了廳前下馬飛奔上廳來張天右忙站起身才叫一聲三爵主早被薛剛將張天右一把扯住往下一撩喝令家將綁了家將一聲答應把張天右綁住禦林軍不知何故齊吃一驚嚇得張天右魂不附體忙問道爲甚麽綁我薛剛道反賊我且問你你是文官並不統屬武事如何私自操演禁兵明有謀反之心喝令左右綁去砍了正在吵鬧之間忽見羅章秦海程統程飛虎尉遲青山尉遲高嶺走上廳來忙問何故薛剛即將他私演禁兵明有造反之心故殺之以與朝廷除惡羅章道不要殺他只將他綁打四十罰他擅自操兵之罪禁他下次便了薛剛道如此便宜了他分付家將用大棍將他重打四十家將答應一聲將張天右揪翻在地用力打了四十打完衆英雄一哄下廳上馬俱往郊外遊玩去了張天右疼痛無比誓不于薛剛幹休從人扶他上轎也不回他自己府去竟到張天左府中來天左一見大驚道賢弟如何這等光景天右道我與薛丁山勢不兩立縱子行兇也沒有縱到這步田地的遂把操演禁兵被薛剛毆辱一事一一說了一遍我明日定要入朝上本天左聞言大怒道有這等事我和你先去告訴魯王明日再入朝上本說罷二人上轎竟往魯王府中來見程咬金程咬金一見便問天右公爲何遵足有些不便天右見問不覺淚下就將操演禁兵被薛剛淩辱之事細細說了一遍又道我明早啓奏兩遼王傳功倚勢縱子行兇毒打元老該得何罪如今還求老千歲公論程咬金聞言想了一想道這件事不是老夫護著兩遼王與薛剛似天右公也有些不是天右公你乃右丞相樞密院自有你文官應辦的政事你又非武職又不是功勳將代如何去操演禁兵且足下又不奉旨私演禁兵是何意思恐其中也不能無不是張天左道天右即有不是或是老千歲或是別的王爺打了天右也還氣得過這薛剛仗著祖父之力得了一個爵主黃毛未退乳臭未乾如何敢私下毒打大臣程咬金道這話說得也是老夫勸你不須上本我同你去到兩遼王府中叫薛剛陪你一個罪出了此氣何如若必要上本足也當自想私演禁兵之罪怎好奏知天子張天右道老千歲說得不差他果肯給我陪罪也就罷了程咬金道既如此老夫即同行三人遂起身上轎來到兩遼王府見了薛丁山禮畢坐下丁山道老千歲同二位賢相降臨有何見教咬金道老夫因令三公今早打了右丞相四十棍二相要奏知聖上老夫于中解和特同來見賢王三令公可在府麽丁山大驚道逆子出去尚未回來如何打了右丞相天左道王爺你還不知三爵主在外橫行哩昨前晚間途中遇見三爵主說我犯了夜把我打了一頓轎杠彼時我欲奏聞被程老千歲攔住今舍弟操演禁兵令郎說舍弟私演人馬意在造反要將舍弟取斬幸虧一班衆功勳來到解勸遂將舍弟打了四十大根請問王爺世上有這等事麽勢必奏知天子因程老千歲再三勸解特來求王爺一言而決咬金說不必說了只叫令郎出來陪一個罪便完了這事丁山當下驚訝不已遂罵逆子不服父訓如此橫行我那裏知道不料樊梨花站在屏風後聽見這些話心中大怒選出來見了衆人行禮已畢對丁山道虧你做了一家王子如何反說吾兒的不是吾兒爲人正直無私有甚麽不是你且說來與我聽丁山道夫人你休來問我你只問張右丞相就知道了不知張天右如何回答且聽下回分解
