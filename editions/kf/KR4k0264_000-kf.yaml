body:
  text: 薛剛反唐清如蓮居士著目錄第一回兩遼王安葬白虎山狄仁傑拒色臨清店第二回李淳風課識天機武媚娘初沾雨露第三回武才人出宮爲尼褚遂良入朝直諫第四回征西將回朝受爵武昭儀暗害正宮第五回高宗誤信報女仇杜回忠心救小主第六回江夏王救護真龍通城虎打奸闖禍第七回程咬金朝房辯論張天左忍氣吃虧第八回張天右教場受辱樊梨花堂上生嗔第九回夫人護子親面聖薛剛仗義救冤人第十回貧漢受恩得武職官民奉旨放花燈第十一回彩燈下踢死皇子禦樓上驚崩聖駕第十二回武後下旨拿薛族薛勇修書托孤兒第十三回小神廟薛強遇師大宛國公主招夫第十四回教場中神傷良緣金鑾殿夫妻交拜第十五回臥龍山兩雄交鬥聚義廳雙人配合第十六回棄親子薛蛟脫禍廢中宗武氏專權第十七回薛丁山全家遭刑樊梨花法場脫難第十八回武氏削奪唐宗室馬周挺身當大任第十九回江淮侯訴出原由通城虎知情痛哭第二十回薛剛一掃鐵丘墳馬登力救通城虎第二十一回三思領旨剿薛剛鸞英荒郊産男兒第二十二回鸞英避難黑龍村薛義忘恩貪爵位第二十三回通城虎酒醉遭擒兩英雄截途搶劫第二十四回揚州城英王舉義金陵地兩軍對敵第二十五回承業定計襲揚州鐵頭乘夜刺英王第二十六回馬周失勢權居山武氏篡位移唐祚第二十七回謝映登指示咬金衆功臣避難出鎮第二十八回武三思進如意君魏思泉放徐美祖第二十九回女媧主傳授天書狄梁公捉拿便嬖第三十回薛剛二掃鐵丘墳仁傑隱藏通城虎第三十一回王懷義善蔔瓦笤安金藏剖腹屠腸第三十二回月姑迷惑武三思魯仲會遇通城虎第三十三回銀安殿共議中興房州城設立擂臺第三十四回吳奇馬贊打擂臺浮魯薛剛同見駕第三十五回廬陵王恩赦薛剛五方將大戰兩雄第三十六回九焰山群雄聚義通州城李旦落難第三十七回七弦琴憂愁萬種朱砂記天神托夢第三十八回楊繡娘爲媒說合陳解元暗結英雄第三十九回射飛鴉太子受辱買雨具得遇東宮第四十回痛離別母女傷心喜相逢君臣議事第四十一回獻漢陽國泰接駕備吐番承業回朝第四十二回馬迪借宿想佳人於婆做媒遭毒罵第四十三回躲雞籠嬌婿受打貪財利奸尼設計第四十四回馬迪倚勢強求親胡完挺身救主母第四十五回文氏窮途逢襟侄崔母感悟接娘兒第四十六回李承業奉旨和番紫陽仙有意送寶第四十七回訪國母聞信哭泣馬將軍直言苦諫第四十八回胡鳳嬌怨命輕生崔文德送還庚貼第四十九回俏書生思諧佳偶貞烈女投江全節第五十回崔文德痛哭鳳嬌李承業戰勝馬周第五十一回李貴設計謀寶鏡唐王守義卻新婚第五十二回入繡房夫妻重會得寶鏡曹彪回營第五十三回鳳嬌失落玉裹肚陶仁監內困真龍第五十四回王將軍漢陽報信馬元帥湘州救駕第五十五回三齊王長安請救四總兵會剿漢陽第五十六回玉鼎仙遣徒下山徐孝德法收四將第五十七回漢陽城災病立除仙丹藥救活王曹第五十八回徐孝德誅斬四將李承業中計被擒第五十九回唐王碎剮李承業陳進捐金贖進興第六十回文氏見婿愈傷心申妃接駕露真情第六十一回唐王班師回漢陽胡後勸赦親叔嫂第六十二回薛剛三祭鐵丘墳元培私放通城虎第六十三回四神祠二星收怪廬陵王彩樓招親第六十四回兩兄弟彩球各半廬陵王駙馬得雙第六十五回薛剛奏章聞子侄兄弟回訴紀鸞英第六十六回薛剛鎖陽會親人必虎修書遣內侄第六十七回新唐國薛剛成親路旁亭鄭寶結義第六十八回兩義弟告友衷情雙孝王爲君起義第六十九回三思一打九焰山天輝連擒四好漢第七十回張先鋒被傷陣亡四好漢路遇救星第七十一回父子不認相交戰夫妻會面破周兵第七十二回武三思花園逢怪廬陵王長安被難第七十三回敬暉保駕出長安關仁大戰衆英雄第七十四回武則天遣三路將周總兵歸九焰山第七十五回李孝業設連環馬羅家將教鈎鐮槍第七十六回屈浮魯中箭喪身徐美祖報仇雪恨第七十七回武承嗣巧排十陣徐美祖料敵如神第七十八回馬將軍赴敵陣亡武承嗣誤認替死第七十九回紫剛關父子提兵九焰山兄弟敗陣第八十回文豹交戰逢薛葵羅英奉計救文龍第八十一回識天命誘母舊唐見人事勸父降服第八十二回唐魏公命將救將謝映登以法破法第八十三回群臣大戰破周兵羅昌投軍暗助唐第八十四回月姑出陣行妖法薛蛟交戰逢野合第八十五回三思大怒斬狐精秦文出獵遇奇人第八十六回武全忠偶遇佳麗夏去矜設計害人第八十七回方彪入牢見家主趙武大怒鬧武衙第八十八回秦文勢急反周朝趙武大戰殷楚鴉第八十九回文豹元公雙對敵薛蛟薛鬥各建功第九十回薛雲用計取當陽薛葵獨踹連營將第九十一回徐美祖義釋好漢武丹池順女歸唐第九十二回蘇黑虎集衆拒唐徐美祖遣將破陣第九十三回騾頭太子受元戎梨山老母遺徒弟第九十四回樊梨花施法除怪竇必虎率衆勤王第九十五回反周臣洗清宮殿中興將賜爵分疆第九十六回雙孝王大開鐵墳樊梨花回山修道第九十七回下南唐諸奸受縛上長安武後還宮第九十八回武三思複弄權柄雙孝王出居外藩第九十九回山後薛強遇舊友漢陽李旦暗興師第一百回冤仇報新君禦極功名就薛氏團圓
