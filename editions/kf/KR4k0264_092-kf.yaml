body:
  text: 第九十二回蘇黑虎集衆拒唐徐美祖遣將破陣當下武丹池改了皇唐旗號大開關門迎接薛雲入城擺酒接風差人往牢口關迎接大兵廬陵王一到武丹池出關迎接俯伏於地廬陵王親手相扶叫王兄向受大恩尚未報答今又蒙來助朕躬感激不盡武丹池再拜謝恩接駕入城次日徐美祖今薛雲與飛鏡公主薛鬥與秦擺花成親衆將來賀共飲喜宴按下不提再說蘇黑虎戰敗渡過漢江逃往長安見駕武則天念他忠勇命他戴罪立功一日早朝聞報後兵渡過漢江破了洛陽襲了牢口關武丹池又把潼關獻了如今唐兵已屯紮在潼關武氏大驚忙忙下旨會集各路諸侯命蘇黑虎爲十八路興周滅都招討兵馬大元帥以尚元培爲兵馬副元帥白馬寺主王懷義爲先鋒不一日各路諸侯雲集合兵一處共兵九十三萬蘇黑虎帶領衆將引了大軍一齊出長安前來征剿廬陵王聞報即與徐美祖商議迎敵徐美祖就令衆將安營城外以待對敵及蘇黑虎統兵到了看見唐兵在城外安營遂下令屯紮營寨到了次日招集衆將排下八門金鎖陣令大將崔元日韋把守傷門蘇天保把守生門尚元培把守景門女將尚姣英把守死門王懷義把守杜門武飛龍把守休門裴道元把守開門武飛虎把守驚門八將得令各領兵把守一門以待沖鋒打陣其餘衆將隨蘇黑虎鎮守中營往來接應唐營徐美祖聞知周營排下此陣即令薛葵打傷門白文豹打生門羅英打景門薛蛟打死門秦文打杜門薛鬥打休門薛雲打開門薛剛打驚門其餘衆將各各準備候號炮一響一齊殺至衆將得令各去攻打先說薛葵槍開雙錘殺進傷門竟是虎人羊群無人敢擋崔元日韋見薛葵兇惡異常也不交鋒忙領本部人馬投降唐營去了再說白文豹來打生門也是雙錘沖入陣中遇著蘇天保來戰被白文豹手起一錘打死馬下這邊羅英殺進景門正遇尚元培兩人交鋒約有二十餘合被羅英生擒過馬要割首級尚元培道末將願降羅英道你是何人尚元培道我乃尚司徒之後秦湖之子名喚尚元培曾爲潼關總兵羅英道原來是老伯父得罪得罪放了一同殺散周兵再說打死門的乃是薛蛟一馬沖入死門遇著女將尚姣英薛蛟擡頭一看見他面如桃花眉似柳葉心中十分愛慕尚姣英也看上了薛蛟二人且不交戰只是眼角偷情先是尚姣英問道來將通名薛蛟道姐姐聽了兩遼王薛仁貴是我曾祖征西元帥薛丁山是我公公雙孝王薛剛是我叔父我乃廬陵王駙馬薛蛟便是姐姐你是何人尚姣英道我乃尚司徒之後總兵尚元培之女名喚尚姣英你有本事放馬過來薛蛟聞言把槍迎面刺來尚姣英提起畫戟相迎二人戰了五六合尚姣英回馬就走薛蛟拍馬追來尚姣英隨身有兩件寶貝一件是紅白陰陽石一件是如意鈎皆是素珠老母付與他的當下見薛蛟追來他把如意鈎望薛蛟頭上丟來萬道紫光罩住通身捆住動不得尚姣英道你若從我我就與你同歸大唐你若不從叫你碎屍萬段薛蛟道姐姐叫我從什麽尚姣英紅了臉低頭說道要你入贅我家薛蛟道這事甚妙有何不從只是要稟明叔父奏過天子方好與姐姐成親又道已有了公主怎好尚姣英道不妨三妻四妾自古有之我今和你破陣歸唐便了說完把手一招取回如意鈎二人同殺進陣卻遇秦文打入杜門正遇王懷義尚姣英取出陰陽石照王懷義打來把這個和尚竟打死于馬下當下薛鬥踹入休門正與武飛龍廝殺忽然尚元培白文豹羅英薛葵秦文薛蛟尚姣英一時俱入休門周兵大亂武飛龍被薛鬥殺死八將一齊殺入開門那開門陣主裴道元看見薛雲殺入陣來正要交鋒忽見八將齊到不敢交戰走入陣後羅英一馬趕上活捉過馬此時薛剛已打入驚門陣內把武飛虎刺死忽聽得號炮連響四下衆將一齊殺入陣內如狼似虎亂砍亂殺殺得蘇黑虎抱頭鼠竄但見九十三萬人馬單單剩得蘇黑虎同十餘個親隨落荒而走走有五十餘裏天色已是二更看見一所大院蘇黑虎令人敲門討飯衆人一齊打門早驚動裏面的主人你道是誰卻是武國公馬登之子馬成當初幼小馬登救薛剛之時托與程咬金撫養後來金國公牛健偶到程咬金家看見馬成是他外孫就領馬成到他家撫養過了幾年牛健身故其子牛寄亦亡有孫牛誠因武氏篡逆不欲出仕守此田園這日馬成在內觀看兵書尚未睡去忽聽叩門聲急就出來開門接了蘇黑虎進來坐下蘇黑虎對馬成道本帥不是別人乃是都招討蘇黑虎也今日與薛剛交戰失利到此一時肚饑要飯吃你們快快備辦出來馬成應允進內與牛誠商議牛誠道目今廬陵王兵進潼關蘇黑虎違逆天命大敗到此正該拿他遂喚起家衆一齊動手把蘇黑虎拿下到了天明將蘇黑虎解進唐營廬陵王大喜把蘇黑虎斬首號令以儆抗軍之罪封牛誠金國公之職馬成武國公之職此時軍威大振遠近聞風來降再看下回便知端底
