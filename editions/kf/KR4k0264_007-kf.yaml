body:
  text: 第七回程咬金朝房辯論張天左忍氣吃虧話說張天左被打叫苦連天從人們見衆功勳去遠方才走出來扶他上轎回府且說薛剛與衆人打了張天左一路同行薛剛道衆位我們一時高興打便打了須防他明日上本羅章秦海二人道怕他怎的那怕他吃了老虎心豹子膽也不敢上本意我薛剛道他欺軟怕硬不去尋你定來找我程統道不妨我弟兄回府稟知家父聳出我祖明日上朝與他歪纏包管無事薛剛大喜各自回府單說程統弟兄二人回至府中程萬牛程鐵牛老弟兄兩個尚在未睡一見他二人回來便問道爲何這時候才回來程統道兒早已回來因路上闖了一場大禍所以來遲只怕這禍有些開交不得萬牛道闖出甚麽大禍程統道是張天左在武三思府中吃酒回來孩兒與羅秦薛剛吃酒方出酒店遇見張天左坐在轎內裝腔反道我們犯夜要鎖打孩兒我們一時不忿將他拉出轎來打了他一頓轎杠只怕他明日上本尋我們程鐵牛道他半夜三更在外吃酒如何反說別人犯夜你們正該打他程萬牛道我想這廝懼羅章是聖上禦戚秦海是天子外甥他決不敢去惹他定然要奏兩遼王與我們縱子行兇辱打元宰到要提防他不如我同你去對爹爹說知聳出他老人來自然無事鐵牛道哥哥說得有理二人來至內宅見了程咬金稟道爹爹兩個孫兒與羅秦薛剛一班聚飲回來半路遇見張天左在武三思府中吃酒回家自己不避人反說孫兒們犯夜要鎖打孫兒們誰料這些後生們正在血氣方剛之時竟拉他下轎打了他一頓轎杠張天左焉肯幹休明日必定上本倘然輸與他豈不沒了我們功臣的體面爲此孩兒稟知爹爹怎生設法不輸與他才好程咬金道文官不巡夜張天左不思自己的不是反來鎖打別人犯夜況吾孫與羅秦薛剛皆系功臣之子武將之兒理當巡夜查視皇城就被後生們打一頓何妨你們放心明早我親自入朝包管無事萬牛鐵牛程統程飛虎聞此言俱各大喜退出各自去睡了到了五更文武百官齊集朝房張天右見張天左行走不便便問哥哥之足爲何不便張天左把夜來之事一告訴如今只等天子臨朝當面哭奏以報此仇張天右驚訝道哥哥可曉得羅章秦海是天子至親如何與他做得對頭張天左道我已有主意竟把薛剛爲首話猶未了只見左右報道老魯王爺臨朝衆文武一齊出朝房迎接衆施禮畢張天左道老千歲今早上朝卻爲何事程咬金道老夫特爲夜來之事你今日來是上本不上本張天左道下官正要告訴老千歲你想身爲大臣誰無相知請酒如何說下官是犯夜兩遼王之子薛剛及二位令孫在途以轎杠毒打如何忍得老千歲當如何處分程咬金道足下既爲宰輔豈不知大唐律例王子犯法與民同罪半夜三更在外吃酒夜行該當何罪況且中州侯的酒也是私宴如何奏得聖上再這一班人皆是武將功臣之子理應巡夜以防不虞你今違旨飲酒夜行又自恃丞相藐視衆人豈不是你自己尋了一場打來與衆功臣之子何涉老夫勸你忍耐了罷你若是定要奏聞老夫亦當面聖即以此公論言之只怕聖上還要罰你一個不是請自思之張天左默默無言張天右道哥哥我想吃虧是小法令事大老千歲說的這話也不差不如忍耐了罷老千歲也不必面聖請回府罷程咬金道願從遵命遂起身回府不知薛剛這班人後來又做出何事欲知端底再聽下回分解
