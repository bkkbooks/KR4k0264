body:
  text: 第二十八回武三思進如意君魏思泉放徐美祖再說武氏自篡位之後淫心日熾每夜要人行事少不稱心即令絞死一夜之中死者甚多淫心終不能止驚動太白金星奏達天庭玉帝下旨發西方白叫驢下來一時投胎不及欲附人身不想長安城中有一個浪蕩子弟姓薛名敖曹少年標致終日與一班光棍僧遭盜賊往來故後庭日夜被人聳弄竟把一個陽物聳得極長極大能挂斗粟而不垂因有兩個光棍爭風用酒將他灌醉活活束死棄在郊外那西方白叫驢一道靈魂便附在敖曹身上活將轉來已是黃昏時候闖來闖去偏偏撞著武三思巡夜三思喝令軍士拿下此賊內有一軍士道稟千歲此人是小的左鄰名叫薛敖曹不是做賊的人小人敢保三思又把敖曹看了一看見他生得白淨遂說道既不是歹人本藩帶你回府去做親隨你可願去麽敖曹允諾遂帶他回府是夜三思就叫他同睡弄他後庭十分中意又見他的陽物足有一尺多長心中大喜到五更朝罷隨駕入宮奏知武後將敖曹送進內宮武後即刻試之果然如意大喜遂封爲如意君許三思承立東宮次日禦殿又改元爲如意元年按下不題且說徐美祖乃是英王長子他本姓徐因太宗賜姓李故稱姓李今在患難之時仍稱姓徐當日在揚州與小主李旦及三弟李成孝逃出了亂軍之中三人失散徐美祖孤身逃走雖則外面訪拿甚嚴因無人認得幸一年有餘到也平安一日行到晉寧遇著舊日同窗王潮他父親是顯宦兩下相會王潮就請他入府用酒灌醉留宿內書房密囑家將馮鬥文魏思泉將徐美祖拿下解上長安就有一個前程了二人領命來在外邊思泉道天色尚早我們且吃一壺酒然後拿他何如鬥文道使得思泉有心作事三言兩語把鬥文灌得大醉思泉忙走到內書房搖醒美祖說不好了快走不然就有殺身之禍美祖道你是何人前來救我思泉道我是老千歲的舊家將魏思泉今王潮要捉你解上長安獻于武後我特來救你前門不便我和你從後門逃走罷遂挽美祖之手開後門而走走不多遠只見王潮騎著馬並馮鬥文帶領家丁手執火把後面如飛趕來魏思泉一見情急前面一帶土牆遂跳入牆內躲閃徐美祖急急轉過土牆見一座破廟用手推開廟門入內把門閉上四下一望並無處可以躲藏只得爬上供桌鑽入神帳裏邊伏在神座背後王潮趕到廟前四下一照叫道我明明看見他轉過牆來如何不見必定在此廟內叫人進廟去找衆人打開廟門一齊擁入七八支火把俱立于殿下望內照看無人上殿王潮道爲何不進殿去找衆人道此廟是女媧廟雖無香火只是人不敢犯十分厲害王潮道不怕他有我在此遂下馬領衆上殿東張西望並沒有影鬥文道莫非藏在神帳內麽王潮道你去照照看鬥文走到神座前左手舉火把右手便來揭神帳唬得徐美祖心驚膽戰鬥文不想一扯隨手扯落許多灰塵落在眼內連忙丟下火把兩手捧了雙眼不住的揉擦口中叫道不見沒有走得下殿被柱一撞撞破鼻子鮮血直流又忽然神座下卷起一陣風把火把盡行吹滅震得破廟嘎嘎的響如要坍下來的一般地上又飛起石子照人面打來衆人俱叫不好了一齊跑出廟來背後狂風大起石子似雨點打來衆人亂跑跑過土牆方才住腳皆說此神真是厲害不可惹他忽然想起道家主那裏去了忙將火把晃了幾晃各處去尋王潮忽聽得牆角下有人叫喊救人衆人去看卻是王潮跌落在糞坑內連忙打撈救起王潮滿身污穢頭上都是糞蛆急忙走到河邊洗淨穿了家人的衣服馬又不見了找了半日不知去向無奈何只得同馮鬥文並衆家丁走回家去正是捉虎無捉住幾被狼口傷王潮敗兵回家不題不知魏思泉與徐美祖後來如何再看下回分解
