body:
  text: 第六十九回三思一打九焰山天輝連擒四好漢卻說武三思到了次日令張天輝領兵一支直抵山下討戰軍士飛報上山薛剛聞報就問那位賢弟下山拿此周將吳奇道小弟願往遂提槊上馬領兵下山大聲喝道來將何名天輝道吾乃武元帥麾下前部先鋒張天輝你是何人吳奇道我乃雙孝王義弟吳奇是也你這狗將好好歸降便罷若說半個不字叫你死在目前張天輝大怒舉棒就打吳奇把槊來迎戰了六七合張天輝回身便走吳奇拍馬趕來張天輝一見吳奇趕來伸手從背後扯出一把飛刀回身所來正中吳奇坐馬那馬亂跳把吳奇掀于馬下周兵一擁上前撓鈎搭住一索捆縛張天輝分付押回營去又抵山索戰敗兵飛報上山薛剛聞報大驚披霞公主道他不過吃一虛驚不至傷命馬贊道待我去報仇薛剛道你去不得馬贊道三哥若不叫我去我就拔刀自刎他拿了吳奇哥哥去我如何容的徐美祖道你留他怎的他去也不過是受一虛驚鄭寶道三哥放心我同他去便了馬贊提刀上馬鄭寶帶了彈弓步行相隨一齊沖下山來馬贊一見張天輝心頭火起掄刀便砍張天輝急架相迎戰不幾合天輝忙忙退走馬贊即便追趕鄭寶大叫不可追趕馬贊不聽飛馬趕來天輝伸手背上取了一口飛刀回身發來馬贊急把坐馬一提一刀正中馬足馬贊跌落下馬周兵擁上綁了鄭寶一彈打去正中天輝顴角大叫一聲也不知是那裏打來只打得立時血出押馬贊收兵回營武三思見天輝連拿二將大喜張天輝道小將還未收兵不知那裏一彈飛來打傷了顴角因此回營主帥且把這兩個賊將一同監下待拿了薛剛一同解上長安三思就把二將囚入後營取金槍藥與張天輝敷了顴角備酒賀功且說鄭寶回山說馬贊不聽吾言被他擒去我一彈打中他的顴角敗回營去薛剛道他二人萬一有失如何是好徐美祖道包管不致傷命放心便了薛剛納悶退帳南建北齊私相議道張天輝不過會用飛刀只好傷一人如何一刀能砍兩個我們明日起早瞞了衆人殺了這廝頭一功豈不是我們的了計議停當次日天明二人悄悄提刀上馬下山直抵周營討張天輝交手天輝得報領兵出營南建北齊看見一齊上前兵器並舉張天輝提棒急架戰不幾合回身便走南建北齊縱馬齊趕張天輝抛了棒雙手扯了兩口飛馬回身一齊發來正中二人的馬首那馬齊齊的立起把二人跌落下馬俱被周兵捉入營去張天輝又抵山討戰未知如何迎敵且聽下回分解
