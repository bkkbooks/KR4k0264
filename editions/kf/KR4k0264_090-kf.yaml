body:
  text: 第九十回薛雲用計取當陽薛葵獨踹連營將再說薛雲領兵到了當陽關抵門討戰關中守將嚴成芳偶得目疾聞報即挂出免戰牌薛雲一見大怒罵了一頓回營到次日又去索戰免戰牌仍挂在上只得又回營一連七八日關中總不出戰薛雲心中好生著急說不好了一顆先鋒印白白被人搶去了弄得薛雲有心沒給欲待扒城城上灰瓶石子厲害也甚沒法一日嚴成芳眼疾愈凶城下攻打甚急只得修書一封差家丁往黃關蘇黑虎處求救家丁接書出城不料被唐兵捉住拿來見薛雲薛雲令軍士把他身上一搜搜出一封書來薛雲拆開一看大喜叫左右將這人押出斬了到了次日薛去悄悄換了眼色領了人馬從後營出來轉往當陽關而來來至關下高叫關上的軍士傳稟主將說黃關蘇爺差來的護關人馬到了關上軍士聞言忙忙報入帥府嚴成芳聞報大喜遂分付開關軍士開了關門薛雲當先搶入城中飛馬進了帥府大叫嚴成芳我特來助你嚴成芳不及提防被薛雲一刀砍死出堂即出榜安民歇了一日起身往宣武報功去了再說薛葵領兵到了黃關抵關索戰關中守將名叫蘇黑虎這一日正遇著新州總兵錢貴逃到要借兵去複新州二人正在帥府商議忽報關外有九焰山人馬抵關討戰蘇黑虎聞言大怒即要上馬迎敵忽見錢貴道小弟今日初來待小弟擒來以爲進見之功蘇黑虎大喜錢貴即時上馬出關一見薛葵舉刀就砍薛葵將左手一錘攔開刀右手一錘打在錢貴頭上連頭都打不見了敗軍報入帥府蘇黑虎大怒令大小三軍一齊出戰尚未出府誰知薛葵早已殺入城內了軍士忙報進帥府說不好了薛葵殺進城來了蘇黑虎大驚急忙上馬出府正遇薛葵薛葵上前一錘打來蘇黑虎舉狼牙棒一架叫聲呵呀虎口震開雙手流血回馬就走不敢進府只得出城逃走薛葵分付軍士住紮城中自己拍馬出城如飛追來追得蘇黑虎抛盔棄甲捨命前奔薛葵追到一城城中守將一聞薛葵來到即時棄城而走追至一關那守將一聞薛葵之名棄關而逃凡是薛葵所到之處這些將帥聞得薛葵二字只恨爹娘少生了兩隻腳連連逃走被薛葵穿關過城並無攔阻追至漢江蘇黑虎之子蘇天保接應渡過漢江逃往長安去了薛葵奪了漢江城心中想道我兩日一夜連得五十三處關隘城池功勞不爲小矣不怕先鋒不是我的今且在此等候軍師大兵到來再作商議卻說廬陵王與薛剛見白文豹薛雲薛蛟薛鬥四人俱來報功單單不見薛葵回來十分記念徐美祖道主公放心薛葵此時必到漢江城了衆皆不信美祖即刻下令以薛雲爲宣武留守其餘衆將三軍俱皆隨行起兵動身路中連得八十余報皆報薛葵兩日一夜踹破連營一十七座州城府縣五十三處已到漢江城了廬陵王大喜道真真不亞于昔日趙王李元霸矣薛剛忙下馬謝恩廬陵王道王見謝恩怎的薛剛道主公封臣子爲趙王臣如何不謝恩廬陵王道孤說王兄之子不亞於昔日趙王李元霸並未封他徐美祖道君無戲言不亞于趙王即是趙王況今薛葵立此奇功封之正當廬陵王允奏即差人先往漢江授薛葵爲趙王並挂先鋒印大兵行到漢江薛葵易王服出城接駕駕到城中駐紮一夜次日望長安進發兵馬行到接天嶺見一彪人馬俱打大唐旗號原來是魯國公程咬金領了二子十三孫並尉遲勃一班前來接駕廬陵王忙下鑾安慰了一番合兵一處兵馬行近洛陽前軍報道洛陽守將邱齊會集軍兵六十萬城外紮營請令定奪徐美祖下令就此安營啓奏廬陵王道邱齊屯兵城外意欲阻住秦文消息須得一將踹營殺往大名約他兩下會兵夾攻才好拿住邱齊矣正奏之時只見薛葵奏道小將願去約他徐美祖就令他去薛葵提錘上馬竟往周營而來周軍一見萬駕齊發薛葵掄開雙錘那些箭俱紛紛落地叫聲寶騎進去罷那坐騎大吼一聲踹進周營那周營中即刻成了屍山血海那周將王守義金守仁雙馬並至與薛葵大戰薛葵提起雙錘亂打不一時把王守義金守仁打爲肉泥遂左沖右突如入無人之境打得周兵人仰馬翻屍橫遍地那邱齊聞報勃然大怒提起狼牙鐵槊飛身上馬火速迎來大聲喝道來將通個名來好待爺爺上功勞簿不然你這小廝死也不明白未知薛葵如何回答且聽下回分解
