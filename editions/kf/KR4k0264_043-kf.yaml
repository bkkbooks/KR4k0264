body:
  text: 第四十三回躲雞籠嬌婿受打貪財利奸尼設計當下於婆回至書房氣得半晌方說道我做了千萬的媒從來沒見過這樣的惡丫頭安人倒有允意他一頓肥罵還要打巴掌哩馬迪道你不要生氣只當我得罪你你怎設一妙計使我到手出你的氣才好於婆道我今有一計在此待至晚上大爺先藏在廚房左右僻處等到人靜之時悄悄走到他房中看機會或者弄得到手不然與他幹肉麻也好叫他落個臭名也出了我的氣馬迪道妙極到了晚間悄地入內閃在廚下見旁邊有一大空雞籠將身鑽入籠中如烏龜一般少時文氏與鳳嬌來廚下收拾傢夥鳳嬌一眼看見雞籠內有人也不做聲暗暗與文氏打個照會先將竈內鍋煤扒些出來灑進雞籠又將油水往上淋漓下去淋得馬迪滿面都是鍋煤油水忍著不敢作聲鳳嬌又暗與繡娘說知叫他如此這般收拾完文氏與鳳嬌入房去了繡娘故意對胡發說廚下甚麽響動想必有賊胡發聞言走至廚下只見雞籠裏面有人大叫一聲果然有賊家中大小人等一齊動手不管三七二十一照頭亂打馬迪受打不過大叫道岳父不要打我是馬迪衆人方才住手上前一看果是馬迪胡發問道爲何在此馬迪滿面羞慚假妝風顛的模樣胡發不好意思只說是好好的人爲何就風顛了扶到書房各人安歇胡發叫於婆好生看守馬迪自去睡了到了次日將馬迪風顛報知馬府英嬌坐轎回家來看馬迪見了妻子就同眼中釘看了半日只是歎氣英嬌道果真風顛了叫乘暖轎來先送他回馬府會罷馬迪到家心中氣忿叫過幾個家丁每人賞銀五錢要大街小巷遍處謠言說胡家逃奴進興做了強盜拿來打死牢中衆家丁奉命而去果然一人傳兩兩人傳四不消三日滿城遍知繡娘聞知大驚急忙來見文氏鳳嬌道不好了街上人人都說進興做了強盜活活打死牢中了文氏聞言淚如雨下鳳嬌道母親不要驚慌我看他決不做此不良之事繡母可到陳姐夫家央他各衙門打聽消息便見明白繡娘聽了即時出了後門來到陳進家見了鸞嬌把謠言進興之事說了一遍他娘兒兩個十分驚慌特叫我來求解元往各衙門打聽一個實信鸞嬌大驚忙催丈夫往各衙門去打聽陳進果到各衙門細細打聽並無此事回至家中告知繡娘鸞嬌道我大舅母與鳳妹若不放心那觀音庵大士的簽十分靈驗叫他二人去求問一簽便知吉凶我有錢五百文繡母拿去與他做轎錢香金又取了兩件半舊衣衫裙子與他穿了好去繡娘接了回至胡府來到廚下叫聲安人鳳姐不要驚慌就將陳進打聽的話並鸞姐叫他求簽的話一一說出把兩件衣服並五百文錢交與文氏母女二人十分感激擬定次日到觀音庵問簽不料于婆尚在胡宅未回一聞此信心中大喜對英嬌說我去看看公子即回馬府見了馬迪就把謠言進興之事他母女央陳進衙門打聽並無此事他母女二人放心不下明日觀音庵問簽老身聞知特來報與大爺快去庵中叫張李二尼來等他母女二人到庵問簽須要設局款留到晚與大爺成其好事馬迪大喜即叫家人去庵中叫張李二尼來說道我有一件事托於你二人因爲胡家鳳嬌生得俊俏我千恩萬想不能到手聞知他母女明日到你庵中問簽怎生設法留他到晚使我成其好事先送你二人白銀一百兩事成之後再找一百兩二尼見了銀子滿心歡喜眉頭一皺計上心來叫聲大爺這有何難他母女明日到庵只須如此如此其事必成倘若不允再動起蠻來不怕他不從況且小庵前後又無人家都是河路就喊叫也無人救應一到了手不怕他不嫁大爺此計如何馬迪道此計甚妙請先收下這一百兩銀子事成再找那一百兩二尼拿了銀子辭別回庵而去到了次早馬迪帶了家丁與於婆先躲在庵中單等他母女前來中計未知如何且聽下回分解
