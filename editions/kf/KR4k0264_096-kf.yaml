body:
  text: 第九十六回雙孝王大開鐵墳樊梨花回山修道當下中宗封畢諸臣就擇本月十二日開鐵丘墳用禮遷葬追諡兩遼王爲哀三薛猛爲忠誠王薛勇爲孝誠王薛剛謝恩出朝在鐵丘墳上搭起天棚預備金銀櫃具到了十二日薛家男女俱披麻帶孝程咬金同衆官員俱來等到巳牌時候中宗禦駕親來上祭薛氏男女俯伏謝恩中宗下旨開鐵丘墳衆人役掘開了三皮生鐵三皮石板看見下邊一片白骨無分貴賤薛剛流淚道儘是白骨叫我那裏去認我父兄的骨骸樊梨花道且把骨殖搬起再作計議衆人役將骨殖一堆一堆搬上穴來搬至中間衆人役齊道有八個僵屍在此遂將八個僵屍擡上穴來衆人一看衣服雖然成灰面色如生卻是薛丁山高瓊英高蘭英程金定及薛猛夫妻薛勇夫妻共八個樊梨花抱住薛丁山屍首大聲痛哭薛剛薛強以頭撞地悲哭薛氏男女老幼一齊大哭一片哭泣之聲震聞數裏中宗龍目也紛紛落淚當時以王禮收殮八人屍首其餘白骨俱入骨匣中宗又親自奠了三杯禦酒然後衆公卿大小官員祭奠程咬金也上祭奠酒叫一聲樊太夫人老拙想起來爲人在世真真如一場春夢想我少年之時在山東班鳩鎮賣私鹽打死了鹽捕問成大辟囚於獄中適隋煬帝殺父即位大赦天下得放出獄賣柴過活因鬧酒店遇牛俊達結交起手在長葉嶺劫皇杠後在賈柳店共結兄弟四人爲生死之交黃土崗再劫皇杠被楊林拿回天牢幸單二哥仗義疏財聚衆劫獄出牢大反山東小孤山聚義興師取金堤據瓦崗探地穴稱爲混世魔王爲首攪亂隋朝天下讓位李密取五關打八門陣會天下反王征戰宇文化及挂一十八邦都元帥印三聲叫開天長關直抵江都李密敗亡歸保吾主大宗皇帝東蕩西除南征北戰于千刀萬刃之中矢石交攻之際匹馬縱橫如入無人之境掃除一十八邦反王戰服六十四路煙塵開皇明萬里江山跨海平遼征東征西看了千千萬萬怪事奇人就是雙孝王元夜造下大逆一門被戮埋此鐵丘墳內老拙只道今生不能見開此鐵丘墳那知小主今日重興天下開了鐵丘墳又見這薛氏許多子孫想起來老拙活了一百二十八歲真如做了一百二十八歲的春夢說罷哈哈大笑不覺倒於椅上端然而逝衆人一見齊上前叫道老千歲保重中宗也叫老元勳蘇醒由你叫時再叫也叫不醒程鐵牛程萬牛等兄弟九人並十三孫環繞魯王放聲大哭樊梨花道程氏子孫不必如此悲傷魯王千歲福壽雙全子孫滿堂又無疾病一笑而亡自古及今誰人能以及他此乃喜喪何須悲哭中宗道樊太夫人說得不差遂下旨以天子之禮減一等收殮魯王中宗起駕回宮程鐵牛就於鐵丘墳左邊停了魯王之柩右邊停了薛門各位之柩挂孝開喪百官皆來上吊過了三七二十一日程鐵牛扶柩回山東濟南府班鳩鎮擇地安葬不提再說薛剛擇日將父親並各庶母及二兄夫婦的棺柩擡到太白山卜穴安葬畢到了次日樊梨花見事功已成也要回西南洞離島山去薛剛扯住衣服哭拜於地再三苦留不肯放去樊梨花道今事功俱完當急急回山你不必苦留後會自有日期薛剛見留不住沒奈何設齋餞別起行衆人俱要運送樊梨花道不必遠送即駕起雲光先到鸞鳳山送還九天玄女的八卦陰陽鍾然後駕雲回西南澗離島山矣再說薛強見樊太夫人去了也就告辭要回山後去竇必虎也相辭耍回去薛剛俱留不住只得備酒餞行到了次日禾明薛剛合家人等齊送竇必虎薛強等出城各人分別竇必虎夫婦領兵回鎖陽城去薛強夫婦同八子二女領兵回山後去薛剛衆人回府不知後來如何請再看下回
