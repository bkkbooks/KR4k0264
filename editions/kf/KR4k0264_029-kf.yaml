body:
  text: 第二十九回女媧主傳授天書狄梁公捉拿便嬖卻說徐美祖在神座背後見衆人出了廟門正欲出來忽聽有人叫道徐星主娘娘有旨請你相見美祖看時卻是一青衣童子便道我是徐美祖不是星主青衣道就是你娘娘專等美祖下了神座跟了童子轉入廟後卻又是一天世界兩邊盡都是松柏正中一條石路走不多時忽又現出一座宮殿來來至門前童子道星主少待等我通報去不多時又見兩個侍女出來道娘娘有請美祖隨侍女上殿看見上面坐著一位娘娘頭戴龍鳳冠身披九宮八卦袍下面是山河地理裙手執白圭端然上坐徐美祖忙俯伏在地娘娘道你且平身坐下我今授你天書一卷教你行兵布陣之法你今先到黃草山會過薛剛後佐廬陵王中興天下又見女童捧一盞送至美祖雙手接來異香撲鼻一吸而盡不一時侍女捧一黃綾包送與美祖美祖拜受納入袖中娘娘分付送星主出去美祖拜辭出來見殿前匾額替補天宮三字一下宮殿被童子在背後一椎撲的一聲響跌下殿來呵呀一聲卻是從神座內跌將出來似夢非夢好生疑惑把袖一摸卻有天書在內此時天時微明看座上神像竟與夢中所見無二又見上面匾額是女媧祠三字美祖連忙拜謝忽見背後一人把美祖唬了一跳仔細一看卻是魏思泉美祖問他躲於何處思泉道我被他趕的急了跳過牆來不料就是這廟後園故此走出來恰好相遇我們快走罷美祖問道你可知道黃草山在哪里思泉道離此有八百之遙聞聽山寨中是薛剛爲首還有兩個是吳奇馬贊同在此山美祖道薛剛是我的好友我正要去投他思泉道我也同去說畢二人出了廟門看見一匹馬思泉認得是王潮的忙牽與美祖騎上二人竟往黃草山而來不數日到了黃草山下叫嘍羅通報上名姓薛剛聞知大喜遂請上山寨來個個俱見了禮分付大排筵宴飲酒之間大家說出起義中興之事徐美祖有觸於心不覺下淚薛剛忙問何故下淚美祖道方才言及起義之事因想起先父先叔被害不知骨骸在於何處因此感傷下淚薛剛道原來爲此不覺又打動我的一片苦心我薛門受令尊令叔兩大人莫大之恩不能報其萬一前日聞令尊令叔之變小弟密差小校往長安打聽消息小校回報說武氏深恨令尊令叔將兩大人之首級放在法雲寺內塔頂上每月射他三次名爲比箭會與我家鐵丘墳一樣的傷慘美祖聞言大叫一聲哭倒在地思泉連忙喚醒吳奇馬贊道二位不必傷悲我二人日後願幫薛兄開鐵丘墳今日徐老千歲兄弟二位的首級我二人上長安去取來與徐世子安葬又可順便到鐵丘墳上去磕個頭薛剛道你二位既要去我明日也再去祭掃鐵丘墳一回徐美祖魏思泉道你三位既要我去我二人亦願同行倘有不測亦可相助脫畢俱開懷暢飲直至半夜方才安歇次日薛剛起來分付唆羅小心看守山寨五人皆扮做差官各帶兵器銀兩一齊下山而去按下不表且說武氏欲念難遏寵用三人薛敖曹爲正宮張易之爲東宮張昌宗爲西宮又以王懷義爲駙馬日夜在宮輪流淫汙醜態不可勝述自此薛敖曹與二張在宮則男扮女裝出外又橫行無忌強佔民妻欺奸幼女無所不爲風聲傳入狄仁傑耳內仁傑暗想這些寵臣一齊橫行全無忌憚有日撞在我手決不輕放過他去不期一日張宗昌遊獵回來竟從端武門闖入這端武門乃太宗所置非台閣名臣不許走此門今昌宗走此門偏偏遇著仁傑仁傑大怒叫武士拿下武士上前把昌宗扯下馬來從行內使見仁傑拿了昌宗飛報入宮去了仁傑至端武門坐下武士把昌宗推至面前立而不跪仁傑怒道無恥奴才你何等出身焉敢不跪左右與我打這奴才武士一聲答應把昌宗孤拐上打了二十棍昌宗無奈只得跪下仁傑道這端武門怎許你獻媚小人走得麽昌宗道皇宮內院由我出入何況這座中門仁傑喝道胡說掌嘴兩邊一齊答應把昌宗雪白的臉打了五十個嘴巴打得鮮血直流仁傑道我想這廝橫行朝野全無忌憚國法難容左右與我綁去斬了武士答應一聲把昌宗綁了正欲行刑只見武承嗣飛馬跑來手捧聖旨大叫刀下留人仁傑起身接旨承嗣下馬道老相國神皇有旨張昌宗有罪當誅看朕面上暫饒一死仁傑道老夫知道了將軍請回復旨承嗣知道仁傑性子執板只得先回複旨去了仁傑分付把張昌宗推回來喝道你這奴才死罪饒你活罪難饒喝聲扯下去打武士把昌宗扯下去打了四十大棍打得皮開肉綻內使得背他入宮昌宗一見武後便倒在他懷中痛哭萬狀武後忙取妙藥與他擦了棒瘡昌宗道這老賊決要殺我幾乎不能與陛下相見武後道那狄仁傑朕尚懼他三分你如何衝撞他以後須要小心回避他些若再犯他朕也再難與你討饒了正言間內侍啓奏狄國老見駕候旨武後命宣進宮來未知仁傑見駕說出甚麽話來看下文便知端的
