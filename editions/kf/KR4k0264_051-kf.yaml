body:
  text: 第五十一回李貴設計謀寶鏡唐王守義卻新婚當時唐王在城上看了大驚失色下城入朝查點軍士幸喜不折一人唐王道李承業什麽妖牌如此厲害李貴奏道臣知此牌出在西番國名如意火輪牌臨陣用此要風風至要火火來要兵兵有要箭箭發最是厲害今日雖敗不折一人此乃吾主洪福所庇耳唐王道此牌用何破之李貴道欲破此牌須得女娟鏡照之其牌立碎唐王道又是難事如今那裏有女媧鏡李貴道一個所在卻有此寶乃臣同窗好友姓陶名仁湘州人氏祖代相傳家中有此寶鏡唐王說陶仁之子現保武氏爲山海關總兵他家雖有此寶焉能取來李貴道臣有一計可取此鏡只是冒犯主公不敢啓奏唐王道如今危難之際還說什麽冒犯有計快說孤不罪你李貴道臣亡兄李富遺下一子名國柞自小微臣爲媒聘定陶仁之女爲妻只因國家多事多年不曾往來後在長安臣侄已死陶仁尚未知臣今在此保公主陶仁也不知依臣愚見不若主公充作臣侄同臣前往湘州就親陶仁又未曾見過臣侄陶仁決不疑心定將其女與主公完婚成親之後主公乘機取了寶鏡來破周兵何難之有馬周連稱妙計即令王飲曹彪扮作家丁唐王依計扮作秀士君臣四人守至黃昏悄悄出城繞過周營奔湘州而來一日到了湘州陶府門前王欽投進名帖門公接帖入內呈上陶仁見帖上寫著姻眷弟李貴率侄子婿國祥頓首拜遂忙忙出迎迎人大廳李貴唐王與陶仁行過禮坐下陶仁見女婿相貌不凡心中大喜遂道自與仁兄別後十有餘年兩下音信隔絕無從問候正思小女年已及笄萬難遲緩今幸駕臨親事可完李貴道此事小弟時刻在心親爲名利所牽所以延遲今送舍侄前來就親外具白銀二百兩少助喜筵之費乞兄笑納陶仁道又勞費心既蒙厚賜權且收下擇日完婚也完一件心事遂備席款待席罷陶仁送李貴叔侄到書房中安歇自進去與夫人商議擇日完婚定了吉日張燈結綵鼓樂喧天唐王與小姐二位新人出廳拜了天地又拜了陶仁夫婦然後夫婦交拜送入洞房此時李貴因君臣之分不便行禮假推腹痛睡在書房唐王小姐洞房中飲過花筵徐媽媽道夜深了姑爺小姐請安置罷唐王道媽媽請便徐媽媽服侍小姐解衣就寢又請唐王就寢唐王道媽媽自便不消在此徐媽媽並衆丫環關門出房去了唐王脫了衣巾上下小衣穿著另自一頭睡了陶小姐一日新婚情趣未領又不好去拉他到了次日唐王起身來至外廳李貴先要回漢陽暗暗囑咐唐王在此體戀新婚當留心得便取了寶鏡速回漢陽以免衆心憂慮唐王允諾李貴出來作別要行陶仁道三朝未過爲何便要起身李貴道小弟與一友約定在泗州相會所以急於要行陶仁芳留不住只得備酒餞行酒罷李貴又暗囑咐王欽曹彪小心保著主公得了寶鏡即便同主公速回二人應允李貴自回漢陽去了唐王自與小姐成親後夜夜和衣而睡並不近身全無半分歡情一日小姐對鏡梳妝暗想丈夫容貌真真可愛只恨他夜夜衣不解帶全無一點夫妻之情想到沒興之處不覺淚下徐媽媽在旁看見就叫小姐嫁了這樣好姑爺正該歡喜爲何反生不悅小姐道他夜夜和衣而睡如同死屍有甚歡喜徐媽媽聞言全然不信守至晚間姑爺小姐都上床睡了遂悄地入房來至床邊揭開帳子伸手向被中一摸不覺驚訝叫聲姑爺你好癡呀少年夫婦正是如魚得水爲何穿著衣褲而睡唐王道你有所不知我當初同叔父在邊庭忽得一病幾乎身死曾許下太行山香願未還叔父臨行之時分付我等他泗州回來即同我去還願還了香願方可脫衣所以和衣而睡徐媽媽道原來爲此姑爺如此老成這也難得歎息而去欲知後事再看下回
