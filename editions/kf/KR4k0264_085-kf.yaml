body:
  text: 第八十五回三思大怒斬狐精秦文出獵遇奇人當下花夫人回到營中如同大病的模樣見了武三思道妾身追趕唐將路走得多受了風寒身上十分不快要去睡了三思聞言就攙夫人到後帳來命三軍看守大營自己在後營陪伴夫人坐在燈下觀看兵書坐了一會鼻邊只覺陣陣臭氣想道有什麽死的牲口在此拿燈四下照看並無一物行到床前愈覺臭氣將燈向床上一照忽然被底下拖出一根狐狸尾來用手去抓又不見了把被輕輕揭起一看唬得魂飛魄散原來是一個狐狸精心中大怒拔出寶劍斬爲兩段鮮血滿床三思想道當初不知誤收在房今日還好不然性命難保就在帳後叫人埋了三思坐在帳中正愁難以剿滅九焰山忽然聽得一聲炮響唐營人馬殺入營來推開鹿角砍斷柵欄逢人就殺遇將便砍可憐周營這些將士個個不曾準備盡在夢中一聞唐兵殺入早已慌亂無一個可以對敵武三思大驚急急逃走薛剛揮動衆將一齊追殺追得武三思上天無路入地無門只得領了殘兵逃回長安去了唐將救了烏黑龍烏黑豹周成李定雄壩伍榮鄭寶等人鳴金收兵上山見廬陵王衆將皆來獻功所得糧草馬匹盔甲兵器不計其數廬陵王大喜次日薛剛勸廬陵王領兵殺上長安滅武興唐正在此時廬陵王道孤豈無心且待秋高馬肥來遲自此薛剛日日操演人馬待時而動按下不表再表一員勳爵叫做秦文乃是秦懷玉之孫秦漢之子現爲金墉節度使一日傳令三軍次日黎明郊外興圍打獵衆將得令次日五鼓秦文帶領人馬出城而來行到龍潭嶺擺下一個圍場飛鷹駕犬各各搜尋野獸忽見山坡中跳出一只猛虎張牙舞爪十分兇惡衆軍見了一齊呐喊秦文忙取弓搭箭望虎射去正中那虎脅下遂低頭而走秦文拍馬趕來追到一條澗邊那虎踴身跳過澗去見對岸有一群羊在草中那羊一見猛虎各各亂竄奔走一羊被虎咬住秦文見虎食羊有一人臥在石上恐虎去傷他急令軍士喊時那人驚醒跳起來把眼揉了一揉見虎正在吃羊那人遂跳下石來打那虎那虎一見人來打他他棄了羊對人撲來那人一閃虎卻撲了個空那人回身抓住虎頸那虎因箭著傷被那人向左脅下著實幾腳又複幾拳那虎就死了那人正要回身忽聽山嘴上大吼一聲又是一隻猛虎向那人對面撲來那人抖擻精神掄拳又打打了幾拳挽起虎尾向石上摔將下來對岸軍士唬得呆了秦文道此乃天生好漢令軍士過澗喚他來問道你姓甚名誰爲何在此牧羊那人跪下道小人叫趙武金墉人氏今年十九歲父母雙亡無處棲身蒙正南陳太公收留度日代他牧羊秦文道我看你管力過人不知曉得武藝否趙武道小人曾遇九宮山真人傳授六甲兵書十八般武藝秦文大喜道陳太公處我自著人去說你今就隨我到府與你結爲兄弟趙武叩頭道小人願跟隨千歲秦文下馬扶起二人對拜了八拜結爲兄弟秦文長趙武二歲稱爲哥哥分付軍士取銀五十兩送到陳太公莊上去二人遂上馬入城回府趙武拜見夫人竇氏就在府中住下未知後來如何再看下回分解
