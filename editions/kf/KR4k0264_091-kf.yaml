body:
  text: 第九十一回徐美祖義釋好漢武丹池順女歸唐當下薛葵見邱齊問他便喝道逆賊你可曉得踹破連營十七座兩日連奪城池五十三處的前部先鋒趙王薛爺爺麽邱齊冷笑道你卻是個小孩子麽遂舉槊便打薛葵使錘來迎二人大戰約有二十余合薛葵想道我要往大名通信爲何與他死戰遂喝道爺爺有事要往大名去我不與你戰了把馬一縱沖出營來飛奔大名而去邱齊追趕不及大吼一聲竟往唐營踹軍士飛報大帳徐美祖令衆將擒拿鄭寶提刀來戰被邱齊一連七八槊鄭寶招架不住回馬便走邱齊在唐營中左沖右突連敗吳奇馬贊南建北齊薛氏三雄烏家五虎白氏兄弟二人適白文豹解糧方到一見邱齊橫行無敵勃然大怒掄起雙錘縱馬殺來邱齊挺槊使戰兩匹腳力往來馳騁四條臂膊縱橫亂舞周營大小衆將前來接應薛剛一班好漢敵住交鋒殺了多時周兵勢怯俱退回營邱齊望見抛了白文豹沖出重圍便走白文豹追趕將近邱齊大怒回身又與白文豹大戰戰至天晚邱齊喝道住著白文豹收住雙錘邱齊道你我戰了一日肚中饑了你我回營飽餐一頓再戰何如白文豹道也罷饒你去吃飽好做一個飽鬼二人各回營飽餐了複上馬出來二人各舉兵器大戰不休戰至五更忽聽喊聲大起火光沖天遮天蓋地的人馬殺入周營周兵大亂當先是趙武殷楚鴉秦文秦方秦擺花殺入周營殺得周兵東奔西逃邱齊大驚撇了白文豹回身便走徐美祖揮動人馬兩下夾攻邱齊不敢入城使開狼牙槊突圍而走走不上百步又遇著薛葵攔住廝殺這邱齊與白文豹戰了一日一夜力已倦了況且薛葵勇力無雙如何戰得過不上十合早被薛葵生擒過馬薛剛攻破洛陽徐美祖鳴金收兵薛葵押過邱齊來見徐美祖徐美祖一見忙起身親解其縛邱齊感激無地忙跪下道敗軍之將何勞軍師如此相待如有用某之處雖赴湯蹈火亦不敢辭徐美祖大喜道將軍若肯共扶唐室自有蟒袍玉帶加身如今兵貴神速如今將軍可帶百余軍士如此如此詐開牢口關當爲唐室中興第一功邱齊道謹遵軍令徐美祖大悅就把捉的周兵號衣剝下來與自己百余軍穿了打周營旗號與邱齊領了先奔牢口關去後面徐美祖統領大兵陸續而來且說邱齊領兵裝做大敗光景來到牢口關前大叫關上軍士報你主帥說我是洛陽守將邱齊被陳美祖暗約大名秦文兩下夾攻大敗逃奔至此快快開關放我進去軍士聽了急忙報與主將蔡璋蔡璋上關一看見果是邱齊忙令開關親身出關迎接不料邱齊手起一槊打死蔡璋即引軍殺入關中關中軍士見主將被殺個個願降邱齊令扯起大唐旗號不多時徐美祖與廬陵王衆將俱到就在關中駐紮一夜次日徐美祖今薛雲領一支人馬去取潼關其餘衆將俱屯牢口關專等薛雲消息薛雲領兵來至潼關即抵關討戰關中守將乃是武則天堂兄名叫武丹池武則天封他爲秦王鎮守此關他有一個女兒名喚飛鏡公主年方十六歲生得千嬌百媚勇冠三軍有二十四面寶鏡十分厲害是他師傅元妙仙姑與他的武後要爲他擇婿他堅執不肯必要才貌武藝與自己一樣的方肯許配這日武丹池聞報唐將抵關討戰問誰敢去出戰有大將崔扶國道小將願往遂提刀上馬領兵出關二人一見彼此問了姓名舉兵就戰薛雲手起一戟挑崔扶國下馬軍士上前割了首級敗兵退走入關飛報主府武丹池大驚道爲何殺得這般快可知那來將叫甚名字軍士道他說他是薛雲武丹池道原來是薛家將毋怪乎殺人這般省力我想別員將官非他對手必須女兒方可對敵分付速請公主出來不時飛鏡公主出堂相見就問爹爹呼兒有何分付武丹池道我兒今有唐營來了一名小將名叫薛雲一刻之間就殺了崔扶國十分厲害特叫我女兒前去拿他公主笑道原來如此待孩兒就去擒來說罷披挂起來帶領五百女兵放炮開關沖至陣前薛雲看見一員女將出陣生得形容窈窕體態嬌媚心中十分愛慕飛鏡公主也把薛雲一看但見他生得粉面朱唇龍眉鳳目心中想道人雖好卻不知他的手段如何便問道小將軍可就是薛雲麽薛雲道然也你是何人公主道我是秦王女兒名喚飛鏡公主你今日好好退去免我傷你性命薛雲大怒舉戟刺來公主把月鏟相迎戰至三十合公主暗暗喝彩把鏟一舉架住畫戟道住著薛雲道有何話說公主微笑道沒有話說只是你若肯時我便叫爹爹降唐薛雲故意說叫我肯什麽公主欲言又止嬌羞不語薛雲暗想道我想他人物也好手段也高若得娶他爲妻亦是一番奇遇便笑道我允你便了只等廬陵王大兵一到待我叔叔主張即便成親公主大喜遂收兵入關從頭至尾細細說與父親知道原來武丹池最愛惜此女又懼怕此女便答道兒呀親事我也允了唐朝我也降了但是廬陵王深恨的是武姓不可不慮倘若不容奈何公主道不妨爹爹向來爲人忠直廬陵王必知當日廬陵王鎮守房州各王親俱要害他獨有爹爹保救他他豈不知道自然知恩報思那有不容之理還有一件爹爹的王號卻犯了太宗皇帝可把秦王印綬燒毀削去王號降順唐家便了武丹池隨即燒毀印緩削去王號令三軍改立唐家旗號欲知後事再看下回分解
