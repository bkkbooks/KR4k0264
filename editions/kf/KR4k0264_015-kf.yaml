body:
  text: 第十五回臥龍山兩雄交鬥聚義廳雙人配合話說通城虎薛剛自正月十五夜大鬧花燈踢死皇子從人叢中打出長安過了潼關望河南一路奔逃走到徐州地方忽見一座山嶺十分險峻只聽得一聲鑼鳴出來了百余嘍羅齊聲喝道留下買路錢方許過山若說半個不字立刻叫你喪了性命薛剛道銀子盡有只怕你們沒福得我的遂把雙腿一縱把一個嘍羅劈面一拳那嘍羅叫一聲不好便仰面後倒薛剛遂拾起那嘍羅的哨棒身子一進不論前後左右一齊亂打打的些嘍羅叫苦連天內有一個嘍羅奔上山來報于女大王道山下來了一個黑臉少年十分兇惡打死多少嘍羅還說要上山拿大王哩女大王聞聽大怒遂提刀上馬跑下山來薛剛舉目一看只見來了一員女將生得玉貌花容蛾眉杏眼宛如西子再世心中想道不信世上有這樣美女做強盜頭兒女大王把薛剛一看只見他面如鍋底環眼豹頭恍若文壇臨凡暗暗喝采道此人非王侯之位不足以處他但觀其氣色目下欠利原來這大王精于風鑒當下見了薛剛早有三分喜意薛剛喝道來的女子可是賊頭麽女大王道黑漢那裏人氏通下名來薛剛道女子若通名與你也辱沒了我舉棍便打女大王把刀來迎兩下一來一往鬥了有六十回合不分勝負各人暗暗喝采薛剛喝道且住殺了半日不曾問你你是何方人氏可有父母兄弟在此落草麽女大王笑道方才問你名姓不肯通說如今倒來問我我卻對你說我姓紀名鸞英乃湖廣房州黑龍村人父親紀德自幼在此山中落草不生男子單生我一人三年前父母俱亡我便做了寨主你是何方人氏也須說來薛剛便道若我通出名來只怕你唬掉下馬來坐穩些聽我道來我祖居山西絳州龍門縣人官居開國天保大將軍平東安西兩遼王薛仁貴是我的祖征西大元帥薛丁山是我的父一品鎮國夫人是我的母我乃三爵主薛剛渾名通城虎便是鸞英道原來是三爵主嗎遂滾鞍下馬說請爵主上山薛剛想到我就上山怕他怎麽遂上馬同鸞英上山進了木城寨到了聚義廳一齊下馬二人見了禮分付大排筵席左右二桌左一桌請薛剛坐下右一桌鸞英相陪飲酒之間問道三爵主尊庚多少曾有妻否爲何至此今欲何往薛剛道我今年十八歲尚未定親因正月十五夜酒後大鬧花燈踢死皇子逃出長安獨行至此鸞英道爵主既造下此罪朝廷定然四下捉拿就有去處路上亦甚難走我有一個愚見但不知爵主肯否薛剛道有何見教無不從命鸞英欲言又止滿面通紅說道且住更了衣再來奉告遂起身閃入寨後便叫了一個嘍羅頭進去分付道我今年已十七歲尚無配合不爲了局今看薛剛出身大族武藝非凡若再錯過從何而擇你去外邊與他說知他若應允山寨中又有了主了若說成了重重有賞頭目領命而出叫聲爵主爺恭喜恭喜薛剛道喜從何來頭目道大王喚小人進去非爲別事欲與薛爺共偕白髮小人看薛爺英雄非大王不可以匹配正所爲宿世良緣今日之事不可錯過只須薛爺一允即便成親奉爲山寨之主薛剛聞言想道此女武藝高強又姿容美麗況我無棲身之地不如允其親事且在此住下再作計議便道既承寨主美意豈敢推辭請傳言寨主願結婚姻頭目入內稟知鸞英大喜分付寨中張燈結綵大排喜筵二人同拜了天地結成夫婦當下合山嘍羅共有三百餘人都來參見新寨主俱賞喜筵他夫妻二人合巹於寨中被底歡娛不須細述過了十余日薛剛差了一個精細頭目上長安打聽父母的消息一面把山寨修築設立關隘以防不虞未知後來如何欲明端的再看下回分解
