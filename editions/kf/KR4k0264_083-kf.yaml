body:
  text: 第八十三回群臣大戰破周兵羅昌投軍暗助唐話說武則天聞報李定降唐去了送大怒傳旨要拿李定家小盡行殺戮不料李定全家逃盡武氏愈怒遂問誰與朕再興兵剿滅反賊武三思奏道臣願再領兵前去武氏准奏命領十萬人馬偏將一百二十員副將不計其數但願此去成功武三思領旨即日點將起行在日非止一日來到九焰山離山五裏安下營寨次日武三思帶領衆將排成陣勢探馬飛報上山廬陵王聞報對徐美祖道王兄有何良策與武三思決一大戰將他斬盡殺絕徐美祖道此來兵馬甚多必須用大小衆將排開兵馬與他決一大戰然後用計擒他遂分付衆將俱各上馬三聲炮響廬陵王君臣領兵沖下山來排開陣勢雙旗展開廬陵王立於中央對陣大旗下武三思立馬中央廬陵王道衆卿誰先出馬白文豹道小將願往一馬跑開大叫周營內誰先出來受死三思大怒命副將黃仲出馬黃仲提刀迎敵二人戰了十余回合文豹將左手錘架開了刀右手一錘打去把黃仲打於馬下小軍取了首級唐陣中周成舉刀出馬也往周營沖來周營中武德仁縱馬提鞭來迎二人戰有三十余合周成拖刀就走武德仁隨後趕來被周成回身一箭射來正中武德仁左眼翻身下馬軍士取了首級武三思見了大怒掄刀殺來薛剛舉槍交陣唐陣衆將一齊殺出周陣衆將一齊敵住兵對兵將對將一場惡戰殺得武三思與衆將大敗受傷棄甲曳兵而走唐兵追入周營搶了盔甲槍刀奪了糧草馬匹遂打得勝鼓回營各各上山獻功不表且說武三思敗走下來忽見一隊人馬遠遠而來乃是大將何昌奉武則天命令特來相助武三思大喜合兵一處次日何昌領兵至山下討戰薛劇沖下山來兩馬相交戰了數合何昌回馬便走薛剛領兵趕來何昌回身把肩上葫蘆蓋揭開口念咒語見一道紅光直沖雲漢飛出一條金魚在空中一滾變成一條火龍角中眼中爪裏鱗內盡放出火來燒得唐兵大敗而走俱往山上跑來何昌得勝收了火魚回營三思道孤在營前觀看將軍之法天下少有當初何人傳授此法何昌道昔日遇一道人名曰真玄祖師傳授此法三思遂備酒賀功且說廬陵王問徐美祖道此妖法火魚如何破之徐美祖道臣夜觀天文東方有將星照著我營三日外必有一功臣到來破此邪法如今不可出戰因此何昌每日前來討戰所以不令將出馬交戰按下不表且說香山唐魏公李靖下山來至山東地方見一位俊秀少年坐在馬上後跟著幾個小使李靖問道馬上貴客尊姓那少年道我是越國公燕郡王曾孫羅昌你是何人李靖道吾乃香山李靖是也羅昌即忙下馬口稱仙師來此有何貴幹李靖道爲周營屢用邪法傷害唐將沒人去破他故雲遊至此羅昌道家父被武後廢黜身亡我欲前去保主未知聖意若何所以不敢前去李靖道廬陵王現在九焰山招兵正是用軍之際豈有他意況公子又是他家功臣之後正該前去建功扶主只是周營近有何昌仗依邪法人魚燒敗唐兵無人破他公子不如改名易姓假投周營暗助唐朝只須早晚近著此人暗用犬血塗抹在他法物上此魚即破羅昌應允即拜李靖爲師傅李靖道前途有難再來救你遂辭別回山而去羅昌別了母親帶了家將來至周營軍士查問羅昌道我是東昌府人聞千歲招賢特來投軍軍士報入三思令喚進來羅昌聞喚走上帳來三思問道你叫何名有甚本事來此投軍羅昌道小將叫做黃明若說本事件件皆能三思大喜遂留在帳前聽用俟得功即便封官次日羅昌稟道小將願領兵出馬三思許之上馬搖槍至山前討戰小軍報上山去說有一周將生得眉清目秀前來討戰徐美祖道前日說將星照著我營定應此人身上就令白文虎迎敵許敗不許勝文虎得令下山來戰羅昌三合詐敗羅昌追趕下來低低說道小將羅昌暫投他營得功上山便了文虎上山細言其事徐美祖道此必是越國公羅章之子又令周成下山交戰不三合亦敗羅昌假意趕到山腳方打得勝鼓回營三思大喜備酒賀功何昌見羅昌人物出衆武藝精強年紀又小十分歡喜道黃將軍如此英雄只是左右無一親人若肯依我一言倒有兩全之美羅昌道老將軍有何分付說出不妨何昌笑道某年近半百未有子息意欲屈將軍拜我爲義父日後我把火魚之寶傳授與你你意如何羅昌便道既然老將軍不嫌愚賤願爲義子就倒身下拜自此二人早晚不離左右羅昌暗取犬血悄地用一點抹在葫蘆口上何昌全然不知一日武三思今何昌出馬父子二人同去何昌帶了葫蘆在前羅昌在後領兵到山下討戰小軍報上山來廬陵王一聞何昌討戰早有三分懼怕徐美祖道不妨今日管叫一戰成功就令薛剛下山薛剛一馬沖下山來並不答話竟與何昌交戰戰了三十余合何昌回馬便走薛剛拍馬追趕何昌急把葫蘆蓋揭開念動咒語魚在葫蘆內往上一跳沾著犬血在內亂跳一陣死了一聲響亮葫蘆粉碎何昌大驚失色後面羅昌叫聲老賊你道我是何人吾乃大唐越國公羅成曾孫羅昌是也不過入你賊穴破爾火魚取爾首級你當我是何人何昌聞言大怒舉刀便砍羅昌架開刀照前心把槍刺來正刺何昌于馬下薛剛上前取了首級殺散周兵打得勝鼓一同上山薛剛與羅昌上殿羅昌朝見廬陵王細述暗投用管破火魚之事廬陵王聞王大喜即封羅昌蔭襲越國公之職不知武三思後來又作何狀且看下回分解
