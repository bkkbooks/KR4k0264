body:
  text: 第七十回張先鋒被傷陣亡四好漢路遇救星卻說薛剛天明不見南建北齊正要查問忽見軍士報說南北二位將軍往周營討戰被張天輝飛刀擒去薛剛聞報大怒喝聲備馬我不把周兵殺一個人仰馬翻救回四人不爲好漢徐美祖道雙孝王你今做了一山之主大小三軍盡看你的約束倘有差池如何是好薛剛那裏肯聽即時披挂鄭寶道待我同三哥去薛剛提槍上馬鄭寶步隨大開三關沖下山來張天輝一見喝道來的可是薛剛麽薛剛道然也你這廝可是張天輝麽天輝道正是薛剛大怒挺槍便刺天輝舉棒相迎戰無幾回天輝招架不住回身便走薛剛拍馬追趕鄭寶見張天輝把頭一低伸手在背後扯了一口飛刀才待轉身早被鄭寶一彈弓打中山根叫聲呵唷手中一慢被薛剛分心一槍刺于馬下周兵呐喊退走入營薛剛一馬竟殺入周營敗兵飛報入營說元帥不好了先鋒被薛剛一槍刺死如今薛剛殺入營來了武三思聞報急令衆將一齊上馬一聲令下各營衆將人如山倒馬似潮來把薛剛團團圍住薛剛怒聲如雷把一條槍直沖橫撞鄭寶山下望見周營喊殺大震急急跑上山來衆將齊問三哥呢鄭寶道張天輝被我一彈打中山根三哥把他一槍刺死三哥他又單身獨騎殺入周營要想救他四人回來目今在周營內正殺哩衆位快去助他一助徐美祖道不妨他不過是一時氣發傷他些人馬等他殺得氣竭自然回來那薛剛殺到下午也有些力乏挺槍躍馬衝開一條血路踹出重圍遂一馬回山衆將接著迎入大寨齊叫雙孝王你的身體非同小可一門三百八十餘口之靈皆含淚九泉望你伸冤廬陵王望你保他中興豈可不自愛身體今後斷斷不可輕身出戰薛剛道這吳奇等四人皆是結義兄弟豈可坐視不救所以輕身殺入周營只望救回四人那知周兵甚衆無處找尋徐美祖道他四人不妨我算定等喪門鐵石二星一至包管四人回山那時方可破武三思矣薛剛聞言半信半疑分付緊守三關再說周營武三思查點人馬折了三千餘人又喪了張天輝心中大惱即忙修本一道叫五營總管周黑煞帶三千人馬押解吳奇馬贊南建北齊四人上長安見則天皇帝請旨發落再差幾員大將來征九焰山周黑煞領令把四人上了囚車即領兵起行行不上百里前邊來了救星你道是誰就是湖廣房州黑龍村紀鸞英聞知丈夫在九焰山起兵稱爲雙孝王便收拾莊丁三百餘人帶薛蛟薛葵起身望九焰山而來到此路上正與周黑煞人馬相遇看見旗號卻是武三思的薛蛟叫道嬸娘這武三思賊子他殺我一門家口乃不世之仇今日狹路相逢豈可輕輕放過我去拿他來先祭祭我這槍薛葵道哥哥讓我先發利市祭祭我這錘拍開坐下烏麒麟手提兩柄鬥大的烏金錘迎上前來大喝道武三思出來受死前隊報入中軍隊內周黑煞分付三軍住行押管囚車把馬跑上來一看見是一個黑臉小孩子便問道你這孩子是什麽人薛葵道我是兩遼王之孫雙孝王之子名叫薛葵你是武三思麽周黑煞道非也吾乃忠州武三思麾下都總管周黑煞是也奉忠州王之令押解九焰山反賊上長安去薛葵道你好好把九焰山的好漢放了饒你狗命若說半個不字叫你死在目前周黑煞大怒把刀斫去薛葵舉錘打來正中刀上那刀折爲兩段周黑煞雙手的虎口盡裂大叫一聲呵晴又一錘打中前胸死于馬下薛蛟一馬趕來兄弟兩個把三千周兵亂殺如斬瓜切菜一般周兵丟下囚車四散逃走囚車內吳奇馬贊看見薛蛟薛葵喜得大叫二位賢侄殺得妙妙妙薛蛟薛葵翻身下馬打開囚車放出吳奇馬贊南建北齊紀鸞英趕到叫聲叔叔們爲何被他拿住吳奇四人見了禮就把被擒緣故說明紀鸞英道我聞知九焰山立旗起手故此收拾莊丁前來相會不料這裏救了四位叔叔請問我丈夫在西涼借了多少兵來吳奇二人道借了西兵二十萬只有一說三哥在西涼又娶了披霞公主現在九焰山鸞英道這也怪不得他自臥龍山分散至今十三年他不知我存亡應該再娶四人俱道好賢德的嫂嫂如今武三思人馬尚在九焰山下嫂嫂與二位賢侄火速前去正好共破周兵薛蛟道速速趕去好殺他一個熱鬧未知如何再看下回
