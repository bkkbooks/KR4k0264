body:
  text: 第七十八回馬將軍赴敵陣亡武承嗣誤認替死卻說廬陵王到了次日同徐美祖薛網統衆放炮下山武承嗣也領著五營四哨沖出陣來武承嗣見廬陵王高聲喝道李顯你大逆不孝謀反無情今日天兵至此還不就縛尚敢抗拒聖旨麽廬陵王罵道你們這些奸賊橫行無忌不把你們碎骨分屍何以謝天下言還未盡只見薛剛一馬沖出高叫主公體與這廝對口褻了聖體遂舉槍對武承嗣刺來武承嗣用刀招架二人大戰起來忽見周營內龍虎真人手使兩口寶刀沖至陣前這邊馬登躍馬挺槍接住廝殺戰不三合龍虎真人虛晃一刀落荒而走馬登拍馬追趕看看將近龍虎真人祭起飛刀馬登躲閃不及被飛刀砍死馬下薛葵看見砍死馬登連忙追來廬陵王一見忙說道窮寇莫追分付鳴金收軍此時武承嗣敵不過薛剛已敗走回營衆將收了馬登屍首竟上九焰山廬陵王十分傷感追贈馬登爲靖南侯設立馬登神位哭祭一番徐美祖分付挑出免戰牌按下不表且說武承嗣敗回營中龍虎真人安尉道大王勝敗兵家之常事今日雖敗小道已斬他一員上將也不算大敗待明日大王出陣引薛剛人陣小道伏於陣內用飛刀砍了薛剛其餘不足慮也武承嗣大喜到了次日就令五營齊出殺上山來看見山上高挂免戰牌分付軍士百般辱駡罵至日西方收兵回營那徐美祖在山上一連三日按兵不動到第四日暗傳衆將今夜三更都集大寨聽點衆將得令到了三更衆將齊集大寨站立兩旁聽點徐美祖令鄭寶領兵到三關等候炮響出兵交戰差薛蛟薛葵隨後接應又令吳奇馬贊領五百兵偷過周營各帶柴草一束內藏硫黃焰硝火具等物要燒透第十陣周營又差烏黑龍烏黑虎領五百兵放火燒造他第八陣又差南建北齊領兵燒他第六陣又差烏黑蛟烏黑豹領兵燒他第四陣又差周成孫安領兵燒他第二陣又差張天任王莫仁焦紅須湯鐵頭領兵從龍口殺出取彼糧草馬匹軍器等物又差桓柏敬暉烏黑彪屈廷龍董千里楊應彪余光馬成領兵往來接應又差錢蒙李進領兵燒第九陣鄭英龐義領兵燒第七陣狄彪濮元領兵燒第五陣薛雲薛鬥領兵燒第三陣薛剛紀鸞英領兵燒第一陣徐美祖分撥已定衆將俱各領令而去再說承嗣連日見薛剛按兵不出到了這日下令準備攻城器械去攻三關遂與龍虎真人領兵來至三關之下命三軍布起雲梯要打上關去關上灰瓶擂木炮石紛紛打下衆將不敢扒上武承嗣命三軍百般叫駡罵到日西忽聞關中炮響鄭寶領兵沖出大聲罵道武承嗣你這奸賊還不速走死在目前你還不知麽武承嗣並不答言舉刀便砍鄭寶把刀相迎戰有二十余合龍虎真人見承嗣贏不了鄭寶連忙祭起飛刀來斬鄭寶那知鄭寶眼尖看見他曉得那飛刀的厲害忙跳下馬來急急跑開武承嗣誤認鄭寶中了飛刀來割首級低頭往下一看不料那飛刀落下照武承嗣紫金冠劈下鄭寶在側暗取銅彈對龍虎真人打來正中面頰龍虎真人負痛逃走關上炮響連天薛蛟薛葵沖出亂殺亂砍又見前面各營火起各營大亂衆英雄逢人就殺見人便砍元化和尚龍虎真人俱各逃走十個節度使一見武承嗣被斬俱無鬥志都欲要回兵那裏走得脫俱被衆英雄盡情砍殺又一場大火把十個營寨燒得乾乾淨淨當下廬陵王坐在寨中等候衆將獻功不一時一個個或獻首級或捉活將或搶盔甲兵器或奪糧草馬匹各獻功勞又報焦紅須董千里錢蒙三將陣亡廬陵王下令將武承嗣等首級號令山前示衆不知後來如何再聽下回分解
