body:
  text: 第四十九回俏書生思諧佳偶貞烈女投江全節話說崔文德自送還庚貼之後一心專望鳳嬌回心轉意成親那知鳳嬌立志不改過了一月將近崔母六旬壽誕鳳嬌買了一幅白綾繡起一幅王母蟠桃圖央人拿去裱了預前三日送上崔母以慶大壽文德見了壽圖如同活寶拿來挂在正廳到了壽日親戚朋友都來拜夀衆人看見壽圖人人喝采繡得竟似活的一般文德道不瞞列位這幅壽圖是我妻房胡氏繡的衆人皆稱讚好妙手真是世間少有文德揚揚得意及親朋拜過了壽出門回去其餘至親人等就請出崔母來到正廳上大家拜夀文氏鳳嬌也出來到正廳上與崔母拜祝閃出族長崔洪慶說道今日是侄婦六十大壽凡事俱要成雙作對才好大侄孫夫妻一對同拜二侄孫夫妻一對同拜三任孫與胡姑娘一對同拜鳳嬌滿面通紅暗罵族長老烏龜我怎好與三哥出拜低頭立著不動文德暗喜叔祖知趣便笑嘻嘻的先立在紅氈上等著崔母笑道襟侄女老身行禮了文氏道阿呀姨母先行禮了快與三哥同拜不妨鳳嬌恨著母親沒奈何只得與文德一同拜祝衆親齊道真真一對好夫妻郎才女貌絕世無雙文德喜不可言鳳嬌氣得了不得拜罷竟回房去止不住淚下暗叫天呵今日衆人面前出此大醜怎好還在崔家吃他的飯莫如尋個自盡完了一生名節我想若死在崔家三哥定然作主帶孝開喪魂牌上邊定寫著亡妻胡氏我死在九泉之下亦不瞑目必須設一計策離了崔家尋死方好就是母親也要瞞他方能成事想定主意不覺傷心淚下只見外面丫環幾次來請入席鳳嬌假說肚痛不肯出去自此崔家請了幾日酒方才得閑一日文德進房來望姨母適文氏不在房中鳳嬌笑容滿面起身相迎連叫三哥文德想道奇怪往日見我即時躲避今日爲何如此光景有些好意思了便叫賢妹莫非有見憐愚冕之意了鳳嬌笑道三哥呀難得你一片好心仔細思想過意不去非小妹不欲與兄共成連理只因進興臨別之時山誓海盟許下大咒自他去後古無音信想已不在人世了小妹意欲祭奠一番然後與你成親文德大喜道賢妹何不早說既在祭奠有何難事待我請了僧人明日就家中超度以盡妹子之心鳳嬌道人家屋內有門神戶尉異姓鬼魂不敢進門超度無益須在城外僻靜處只消小妹奠祭一番他便實受也不須請僧人浪費銀錢文德道說得有理此去城外二十裏便是大江江口有座壽星橋十分高聳待我差人叫大船備下祭禮明日與姨母賢妹前去還心願回來即議成親休要哄我鳳嬌道決不食言但我母親面前且休題起文德許允歡喜而去分付家人去叫大船買辦祭禮到了黃昏時候文氏先去睡了鳳嬌暗暗傷心流淚想明日去江口祭奠丈夫即便投入江中以全名節須留下一劄致謝姨母三哥之恩並將母親拜託于他即取花箋提筆寫道胡氏鳳嬌拜上姨母三哥尊前念鳳嬌命途多舛嚴君早逝母女孤苦相依叔父敦知叔父與嬸母重富欺窮淩虐孤苦全無骨肉之情相待如同奴婢只因神人分付比合朱砂手記繡娘爲媒母親做主許與進興一言永定萬載無更可恨馬迪假造談言以致母女同到觀音庵問簽中了奸計幸得胡完相救得脫大難又蒙三哥大悲庵相逢留我母女到家看待如同骨肉感恩非淺可限叔父貪財將奴又許配三哥又蒙三哥恩德送還庚帖並不強逼只因慶祝姨母大壽衆親胡說非禮羞斷難忍非是小妹無情不肯結姻實因已許進興名節爲重身投江中屍埋魚腹以全名節小妹亡後老母無依全望姨母三哥念及至親養活終身不惟生者感恩而死者亦戴德矣鳳嬌寫完封好放在箱內滅燈就寢天明起來叫聲母親夜來女兒夢見進興與我討祭文氏道那得銀錢去祭他忽見文德進來道姨母說甚麽那得銀錢去祭他文氏道是因你表妹夜來夢見進興與他討祭所以說無有錢去祭他文德道待我去備祭禮與姨母表妹同到壽星橋上去望空遙祭便了說罷遂出外叫家人治備祭禮雇下船隻叫兩乘轎子擡了姨母表妹上船文德也上了船開船搖出大港便是長江到了壽星橋岸泊船家憧排下酒肴開了船窗文德請姨母表妹共賞江景文德樂極開懷暢飲不覺吃的大醉文德道大家早些睡到五更好起來祭奠說罷文德就往前艙去睡了文氏鳳嬌睡在中艙家憧都睡在後梢鳳嬌和衣假睡等到二更悄悄起來開了艙門輕輕摸出來見文德沈睡如雷悠悠摸過把前艙門開了將身摸至船頭舉目一看只見汪汪一片江水不覺淚如雨下忽聽船中有聲遂踴身一躍跳在江心要知鳳嬌性命如何且看下回分解
