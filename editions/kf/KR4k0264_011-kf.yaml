body:
  text: 第十一回彩燈下踢死皇子禦樓上驚崩聖駕話說薛剛性急未到日落即出王府帶領家將沿街看燈燈棚尚未點燈薛剛見沒甚好看竟上酒樓上吃酒自己遂開懷暢飲直吃到月上東山方才叫家將算還酒錢出得店門早已燈火滿街換了一番世界烘烘烈烈把一座長安城竟變就了一個燈市男男女女老老幼幼若村若俏或行或止紛紛嚷嚷挨挨擠擠都出來步月觀燈且說那魯王門前的燈是八仙上壽王母幡桃越王門前的燈是八蠻進貢兩遼王門前的燈百獸燈中挂麒麟燈江夏王門首是百鳥鳳凰燈胡國公門首是八仙過海燈其餘各親王大臣門首俱是希奇故事燈皇城內花燈尤其更盛五鳳樓前搭起一座彩山燈高有六丈俱用五色彩緞紮成頂上用黃金瓦四面俱以珍珠白玉砌成中間挂一金龍燈以金錢紮成龍鱗周圍張挂外邦所貢奇珍寶玩珠燈何止幾千盞正面黃金匾上用明珠穿就四個大字萬國同春一副對聯也是珍珠穿的左是四海咸甯萬邦俱載皇家曆右是山河水固兆民盡享太平春高宗與武後幸五鳳樓上觀燈太子李顯及二三四五六七幾位皇子都在五鳳樓下坐著觀燈左右內侍手執紅棍因與民同樂不禁百姓行走觀看只不許喧嘩到了三更時分看燈的男男女女公子王孫比前愈多挨擠不動話說薛剛在外城看了又到酒肆中暢飲大醉入內城來五鳳樓街上人都擠塞滿了此時人山人海燈影下誰認的是薛三爵主任他喊叫並無人讓路給他他乘著酒興掄起兩拳向人叢中亂撞亂打拳頭如同石頭被打的人不是頭破血流就是筋斷骨折看燈的男男女女大喊起來四下亂跑人多得緊一時如何跑得及前邊一個跌倒後邊便壓倒許多人也不管有人倒在地上那人就在人身上亂踏過去也不知踏死了多少人叫苦連天喊聲大震高宗大驚傳旨何等人行兇打路速拿正法下邊就有第七皇子李昭領衆內侍穿過彩山燈來查問人擁如潮哪里去查七殿下大怒喝令內侍用棍打開衆人喝了一聲苦了這些看燈的衆人全無躲閃死者其多只見薛剛掄開兩拳亂打那些百姓一齊喊道兩遼王家三爵主通城虎打死人了衆內侍掄棍齊奔薛剛薛剛大喊一聲一把抓住了一個內侍提過來抓住兩腿一分兩半一手提著一支死腿亂打亂舞衆內侍一齊驚喊倒退不料把七殿下擠翻在地薛剛此時紅了眼也不管是誰提腳便踢偏踢中了七殿下腎囊登時氣絕衆內侍大喊道不好了薛剛打死七殿下了高宗在樓上聽見這話唬得魂飛魄散往下一看誰知衆宮女靠在欄杆上勢重欄杆脫了衆宮女與高宗一齊跌下樓來未知性命如何且聽下回分解
