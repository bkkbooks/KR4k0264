body:
  text: 第七十三回敬暉保駕出長安關仁大戰衆英雄再說薛剛紀鸞英扮做莊村夫婦早入長安城中走來走去看見吳奇馬贊南建北齊四人扮作乞丐薛剛把眼一丟四人會意來至僻靜之處薛剛悄悄分付他們三更時分鐵丘墳相會四人允諾而去及至天色一晚城中燈火齊明如同白日敬暉身披暗甲帶百餘兵丁只在大通橋左近巡查武承嗣發令十門緊閉暗叫軍士準備乾柴引火之物只等二更時分就要動手到了二更武承嗣令軍士放起火來大喊震天高叫廬陵王府中失火快些救火只見一片火光燒將起來百姓來救見有人馬誰敢近前軍士假裝東跑西跑往來救火廬陵王夫妻家眷看見火起即從地道走出在大通橋下冒水而出敬暉清廬陵王一行人上了車提刀上馬保駕來至和化門殺了門軍斬開城門保駕出長安而走軍士飛報武清武承嗣聞報大驚道廬陵王走了大勢去矣忙點人馬追出和化門前去那薛剛這一班人早買了祭物往鐵丘墳而來那守墳軍士一見薛剛這些人大聲喝道什麽人從那裏走衆英雄齊舉兵器亂殺將來那軍士抵擋不住大喊一聲四散逃走飛報武承嗣誰知武承嗣不在府中了薛剛紀鸞英吳奇馬贊南建北齊擺下祭物點起香燭拜罷燒化紙錢一連放了三個百子西瓜炮炮聲響動各處埋伏聽見炮響四下放火一時長安城中五六十處火起四面喊聲大震薛剛一班人齊到廬陵王府邊看見近城一片火光就知道有人救出去了衆好漢橫行直撞逢人便殺可憐長安城中即刻成了肉山血海矣武則天聞報又驚又怒發出禁軍衝殺來拿怎當得衆好漢殺開血路直出和化門而走且說敬暉保了廬陵王先走被武承嗣趕到敬暉一見承嗣舉刀便砍承嗣掄斧交戰不幾合敬暉抵擋不住回身便走承嗣緊緊追趕廬陵王驚倒車中正在危急之際忽見深草中出來兩員虎將乃是烏黑龍烏黑虎大叫武承嗣體走飛馬前來與武承嗣交戰不三合承嗣大敗二人追殺一陣遂回馬保駕而走廬陵王問道你二人何處來的前來救孤二人一路遂細細奏明廬陵王大喜遂一同往潼關而去那武承嗣敗回正遇薛剛一班人殺出和化門而來一見武承嗣正是冤家相遇亂殺過來承嗣掄斧迎敵被吳奇一箭正中馬眼那馬一跳把承嗣跌落馬下周兵急上前扶起承嗣逃走了薛剛一班人齊奔潼關而去且說烏黑龍烏黑虎敬暉等保駕奔到潼關見有許多守關軍士衆好漢一齊亂殺殺死無數守關軍士斬開關門保駕出關而走逃軍飛報入府總兵關仁得報即領兵追出關來烏黑龍一見回身搖槍便刺關仁舉兵相迎戰不十合烏黑龍抵擋不住回馬便走關仁緊緊追趕追至龍川忽一聲炮響伏兵沖出鄭寶當先搶斧砍來關仁舉兵相迎正交戰間忽周兵來報說關內有賊人放火關仁大驚回馬便走鄭寶也不追趕接住廬陵王就在龍川埋鍋造飯那關仁兵馬回到關下正遇薛剛放過火殺出關來關仁催兵截住衆好漢大戰不下紀鸞英暗發一箭正中關仁額上大吼一聲敗入關去緊閉關門不敢出來了薛剛一班人到了龍川見了廬陵王合兵一處發駕向九焰山而來再說長安城中燒去民房五萬餘間屍橫血流一連三報報入朝中第一報廬陵王反出長安殺敗武承嗣二報沿途強盜橫行殺搶三報火燒潼關大敗了關仁武氏大怒下旨捉拿廬陵王又大開皇倉賑濟被火百姓按下不表欲知後來再聽下回
