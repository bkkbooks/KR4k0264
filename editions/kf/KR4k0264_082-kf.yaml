body:
  text: 第八十二回唐魏公命將救將謝映登以法破法再說武氏聞報白雲父子投降九焰山了武氏大怒即命殿前驍騎大將軍李定領兵五萬剿滅九焰山李定奉旨領兵起程在路非止一日來到九焰山安營下寨次日李定出營在山下討戰徐美祖聞知正要遣將迎敵忽見白文龍道小將願往遂領兵下山迎敵李定一見大罵反賊皇上有何虧負你父子今日本帥拿你碎屍萬段文龍大怒舉刀砍來李定把槍架住戰不幾合李定回馬就走文龍縱馬追趕李定暗取一盒揭開盒蓋只見盒內飛出六個紙人一見了風變成六個金剛大漢上前來捉文龍文龍大驚欲待要走被他一把拖下馬來軍士上前拿住李定口念收字六個紙人依然寸餘飛入盒中掌得勝鼓回營李定回到營中分付把白文龍用囚車回了待我再拿幾個賊將一同解上長安當時廬陵王聞報文龍被李定用妖術拿去不覺大驚道文龍被擒如何救他回來徐美祖道李定必把辦囚在營中決不號令慢慢救他便了次日李定又來討戰薛剛大怒道待我率子侄們下山交戰立拿此人遂帶領薛蛟薛葵薛雲薛鬥等沖下山來大罵李定這廝焉敢用此邪法拿我大唐功臣言罷把馬一拍來戰李定兩下戰了二十合被薛剛一刀砍到頂上來李定急忙躲閃把盔上鳳翅削去半邊李定慌忙奔走欲放六個紙人薛剛一想追去必受邪法故此不趕收兵回山李定回營暗想不如且把白文龍解京獻功次日點起兵馬差副將劉義押解囚車往長安去行到天晚見前面一羅漢寺就在寺內宿歇到了三更時分忽聽見喊殺連天衆僧大驚扒上牆上一看見內中兩個好漢一個有丈余高虎頭豹眼連鬢鬍鬚此人是先朝手托千斤閘板雄闊海之孫名喚雄壩一個生得粉紅臉三綹鬍鬚龍眉鳳眼此人是南陽總兵伍雲韶之後名喚伍榮二人在天雄山落草因有香山道人唐魏公李靖算就陰陽知白文龍有難因此到天雄山叫他今夜統衆圍寺速救此人作進身歸唐之階二人尊命來圍寺門要拿解官火速開門如遲就放火燒寺衆僧喊道不要放火我等就叫他出來忙忙報知劉義說外面有響馬要會老爺如遲就要放火燒寺了劉義大怒即時提刀出馬開門殺出雄壩舉起鐵方槊來戰劉義未三合早被雄壩打落下馬取了首級殺散官兵進寺打開囚車救出白文龍同到天雄山來備酒慶賀勸衆嘍羅同歸唐室放火燒了山寨一同下山往九焰山來殺到周營後寨李定聞知上馬出營李定一見白文龍心內明白遂拍馬挺槍來戰戰了片時諒不是他三人的敵手回馬就走文龍高喊道不可追他他有邪法雄壩不聽只是追趕被李定放出那六個紙人隨風變成六個金剛大漢來拿雄壩雄壩把方槊打去這六個大漢反把方槊奪去雄壩慌忙就走六個大漢大踏步起來只見樹下一個道人手提寶劍高叫雄將軍不必驚慌貧道乃青峰山謝映登在此雄壩聽了便叫老師方槊被他奪去了映登道不妨見六個大漢追趕切近忙在袖中取出葫蘆傾出六粒紅豆就地一滾變成了六個火球就將六個紙人燒了李定大怒道你這野道焉敢破俺的寶貝把槍刺來被謝映登用手一指名曰定身法定住了人馬皆不能動三將上前捉住謝映登道李將軍貧道是謝映登目今武則天氣數將盡廬陵王該興你速歸降日後富貴長久不可自誤李定聽了遂叫聲老師弟子願降李定就請四人回營分付三軍改換大唐旗號同謝映登白文龍雄壩武榮到九焰山來投降白文龍先上山細細奏知廬陵王然後四人上山朝見禮畢廬陵王封李定爲歸順侯雄壩伍榮爲都總管大排筵宴賀喜宴畢謝映登道此時用臣不著若再有事不呼自至竟留不住回山去了欲知如何再看下回
