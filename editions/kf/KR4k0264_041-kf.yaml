body:
  text: 第四十一回獻漢陽國泰接駕備吐番承業回朝再說漢陽守將姓殷名國泰乃是殷開山之後善用雙戟力敵萬人手下有兩員偏將乃是賈清柳德十分雄勇他三人名雖主將下僚實勝同胞皆心存忠義痛恨武氏久欲叛周複唐恨未有主今一聞馬周保太子李旦兵臨城下心中大喜即同賈清柳德商議道二位賢弟今馬周兵臨城下聞他保正宮王后之子李旦復興唐基你意如何二人齊道我想當初太宗親冒矢石得有天下不料今日被淫賊武氏傾覆實爲可恨況我等皆世受唐家爵祿豈可背主忘恩依弟愚見大哥明日傾兵出城會一會馬周如果真是保的小主李旦即便迎請入城共扶小主以誅淫賊國泰聞言大喜次日國泰同賈清柳德領兵三千出城直抵唐營馬周聞報即領王欽曹彪上馬出營來至陣前國泰大呼道來者莫非馬元帥麽馬周道然也我聞將軍乃開山公之孫世代簪纓忠良舊臣足下又英雄素著勇冠三軍爲何屈膝婦人頓忘日主今本帥奉正宮王后之子李旦恢復江山將軍若肯歸保皇唐小主自當加職就是令先祖亦必含笑於九泉國泰聽了此言道末將豈肯歸服武氏每欲起兵恨未有主今既有小主降臨末將焉敢不遵馬周大喜道既如此請速回城整備鸞輿恭迎小主便了國泰應諾領兵進城去了馬周回營速差王欽回山接駕太子聞知大喜即同王欽下山來至營中馬周奏知其事說殷國泰忠心報主千歲可重封官職以安其心今日初次出兵不費張弓一矢得此漢陽城池足見中興吉兆矣太子大喜忽見軍士來報說殷將軍統領多人備輿迎接聖駕入城太子進同馬周衆將一齊出營只見殷國泰同賈清柳德俯伏在地太子上前扶起安撫一番遂入城進了帥府升了公座殷國泰率領賈清柳德並衆將上前朝見又獻上漢陽輿圖版籍並軍糧馬冊太子大喜就封殷國泰爲歸命侯賈清柳德爲瞟騎將軍三人謝恩大排筵席相議要攻取臨江那臨江城總兵李信聞報心中大驚連忙草下本章差官連夜上長安啓奏武後武後看了本章大怒即下旨封李承業爲興周滅李大元帥領兵十萬刻日興兵下漢陽捉拿妖人李旦剿滅逆賊馬周李承業領旨即點精兵十萬帶了八個兒子出了長安直奔漢陽而來不日到了臨江李信迎接入城備酒與承業接風次日李承業同八子並李信大小衆將領兵殺奔漢陽而來探馬報知馬周馬周即點起兵馬出城列陣以待周兵不多時李承業兵馬亦到即排開陣勢兩軍主帥齊出陣前承業大喝道逆賊馬周今日天兵到此還不納降更待何時馬周大罵道叛國奸臣你世受恩爵不想忠於王室反助淫賊武氏篡位殺良你今總死亦有何面目見先帝於九泉之下乎當日英王若聽吾言豈中你之奸計今日又敢大膽前來拿住之時碎屍萬段方消吾恨承業大怒問何人出馬以擒此賊李克麟拍馬掄刀而出曹彪飛馬挺槍接住相殺戰了十餘合被曹彪刺落馬下承業見他五子身亡勃然大怒拍馬舉刀竟奔曹彪王欽便來助戰李信一馬迎住李克龍李克虎李克彪李克豹李克風五馬齊出馬周殷國泰李奇三馬飛出兩下金鼓齊鳴喊聲大振馬周大逞威風一槍刺翻李克虎王欽一刀斬了李克鳳漢兵一湧殺上李承業與李信大敗退走二十裏方住馬周鳴金收軍入城李承業折了三子納悶在營與李信計議要調各處人馬以打漢陽忽有則天皇帝旨到說吐番國王造反召李承業火速回朝計議李承業道吐番人寇爲患不小即須回京奏上天子與吐番連和然後再舉兵下漢陽遂將兵將交與李信退兵臨江城休與交戰遂起身回京而去欲知後事且看下回分解
