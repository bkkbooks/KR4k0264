body:
  text: 第五十五回三齊王長安請救四總兵會剿漢陽再說三齊王李承業當日敗至臨江寫本上長安請調玉門關總兵萬飛龍大同府總兵黃景充安海關總兵鄧十豹九江關總兵金天海提師下臨江兵剿漢陽武則天看了本章即下旨調四鎮人馬下臨江這四路總兵接旨即領人馬奔臨江而來與李承業合兵共有三十余萬殺奔漢陽而來及至漢陽離城三裏安營次日萬飛龍請先出陣承業許之這萬飛龍生得紅臉紅須渾名叫做賽靈官提兵來至漢陽城下討戰守城軍士報入王殿唐王才要點將迎敵只見老將王揮奏道此賊待末將擒來以獻主公唐王允奏王揮途上馬領兵沖至陣前高叫紅臉賊留下名來飛龍道吾乃玉門關總兵萬飛龍是也你敢是反賊馬周麽王揮道吾乃大將軍王揮是也飛龍道你這老賊非吾敵手饒你去罷快叫馬周來受死王揮大怒掄刀便砍飛龍舉刀迎敵戰了六七合萬飛龍虛閃一刀回馬便走王揮拍馬趕來飛龍按下手中刀懷中取出一件寶貝名曰黑煞石往上一抛現有磨盤大照王揮頭上打來王揮一見說不好招架不住照背後一下打下馬來飛龍上前一刀斬爲兩段打得勝鼓收兵回營再說敗兵報及唐王說賊將回馬發出一件寶貝起在空中有磨盤大把王揮打下馬來一刀斬爲兩段唐王聞言大驚曹彪閃過奏道待臣出馬殺賊以與王揮報仇唐王允奏曹彪提槍上馬領兵出城直抵周營討戰周兵飛報入營李承業道那位將軍出馬鄧十豹道末將願往遂提溜金鏟上馬出營曹彪大叫來的可是萬飛龍麽十豹道非也吾乃安海關總兵鄧十豹是也曹彪道你且回去叫那萬飛龍來爺爺要拿他報仇鄧十豹大怒掄鏟便打曹彪提槍相迎不三合十豹按下金鏟解下豹皮口袋開了袋口望地下一抖抖出一件東西其形似松鼠就地連打三個滾立時變成水牛大名曰神嗷張開血盆大口來咬曹彪曹彪一見說不好招架不及被他照左肩上咬了一大口大叫了一聲幾乎墜馬回馬便走鄧十豹把手一招神嗷就地一滾仍如松鼠鑽入豹皮袋內打得勝鼓收兵回營曹彪敗入城中倒翻在地人事不省唐王與馬周衆將大驚叫從軍問時回道鄧十豹放出一件東西形如松鼠就地幾滾變成水牛大曹將軍肩上被他咬了一日所以如此唐王道這又是旁門左道之人了將何以救曹彪袁成道此神嗷也臣幼遊于西域聞此物咬人一口止活十日過十日必死唐王聞言正在躊櫥忽報賊將又來討戰馬周道待臣出去殺他一陣王欽道元帥且住小將代元帥之勞王欽提刀上馬領兵出城來到陣前看見一員周將高有二丈腰大十圍金面金須相貌堂堂就問來將何名金天海道吾乃九江關金天海是也你是何人王欽道吾乃大唐飛虎將軍王欽是也金天海道你非我對手速回去叫馬周出來王欽大怒拿刀便殺金天海舉槊相迎戰未三合金天海回馬便走王欽拍馬趕來金天海按下金槊把肩上一條混元神鞭發入空中照王欽頂門打下來王欽一見叫聲不好急忙躲閃早把後背打了一下回馬便走金天海收回神鞭拍馬趕來王欽已入城中一到王殿翻身跌倒昏迷不醒唐王大驚道也是被神嗷咬了麽軍士道是金天海用神鞭打的唐王馬周俱皆驚慌又報金天海討戰馬周分付且挂出免戰牌金天海一見大笑收兵回營見三齊王說道賊將王欽被我打了一鞭敗走入城城上挂出免戰牌因此收兵李承業大喜道三位將軍連勝三陣定喪李旦馬周之膽本帥當盡驅大兵攻之其城可立破矣黃景亮道元帥不用攻城待小將今夜小術略施管教漢陽城中上自李旦下及兵民不消三日盡成瞎子那時整兵進城可垂手而平賊矣承業聽了便問將軍有何神木能如此妙景亮道小將自幼遇一方外人贈兩面寶旗名日陰陽日月喪門二旗有三寸長傳我秘咒只消今夜到漢陽城邊作法按方向插下此旗城中人等盡行頭痛止須三日二目便行突出承業大喜到了黃昏景亮沐浴更衣技發仗劍步出營門駕一道士遁到漢陽城念動咒語拘到本城土地付與陰陽二旗令其按方插立不得有違土地遵法安放端正景亮回營單等三日後整兵入城是夜到了三更唐王與胡後申妃並滿宮宮女內使以及外邊馬周衆將並大小三軍合城百姓盡患頭痛第一日還勉強可以行走到了第二日都疼的雙目突出盡行疼倒滿城煙火俱絕城頭上旗搶不整但聞哭泣之聲欲知後來解救且看下回分解
