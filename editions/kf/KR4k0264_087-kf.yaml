body:
  text: 第八十七回方彪入牢見家主趙武大怒鬧武衙再說夏去矜原是他買囑王強扳害方表又叫全忠囑託鄭知府屈打收監把方表誣爲叛黨要害他的性命希圖謀占秦氏所以設此毒計當下秦氏分付方彪到牢中見了相公通知此事是武全忠設計陷害叫相公安心在牢只等金塔信到便可救出又將金銀交與方彪叫他買囑禁卒獄官上下使用方彪領命來到牢中見了禁卒薑元將金銀托他上下使用薑元引他見了主人備說這事是武全忠設計陷害圖占大娘並寄信報知金墉秦爺細細說明方表點頭會意分付方彪回去方彪遵命回家到了門首只見一個大漢面分五色武軍打扮手下有十餘人各背包袱方彪問道你們在此是做什麽的那人道我們是奉金墉秦爺之命到方府祝壽的方彪道請裏面坐下急急進內稟知主母秦氏即走出外廳趙武呈上書劄秦氏拆開看了對趙武道原來賢弟是哥哥結義兄弟目今你姐夫遭了一場冤枉官司被人陷害在獄十分苦極我差方龍到金睛去送信不知到否趙武道不知方姐夫受何屈事請道其詳秦氏就把大慈庵遇著武全忠被他設計買通知府著王強扳入叛黨囚在牢內又遭媒婆前來引誘細細說了一遍趙武聽了大怒叫聲姐姐你明日等那老虔婆再來許他去見武公子待我假作姐姐坐了轎子到他府中要他放了姐夫便罷若不肯時待我捉他到金睛去等哥哥發落秦氏道賢弟且忍耐些到明日再處不一時酒筵齊備趙武送上禮物自在前廳坐下吃酒不提且說花蜜蜂到了次日來見夏去矜與武全忠將秦氏的話說了一遍全忠賞了他些銀子叫他來見秦氏討回信秦氏一見媒婆道奴家只爲要救丈夫性急就是今日奴親身去見武公子求他救我丈夫出獄恩當重報花蜜蜂道娘子且等一等老身叫擡轎子來接你娘子只說往監中去看方相公便了就罷急急走到武府見武全忠說出來意武全忠大喜即叫家人擡轎子到方家去只說方娘子要往監中去看方相公速去速來家人領命引轎子竟到方府歇在庭上裏面丫環出來說大娘分付把轎子擡進內宅家人叫擡轎進內丫環叫家人並轎夫且出去在外廳等候家人轎夫領兵出外這趙武結束停當外罩青衣走入轎中坐下將轎簾緊緊遮蓋停當然後丫環出來叫轎夫進內擡出外廳竟出大門一直擡到武府內宅歇下轎夫往外去了花蜜蜂同兩個婦人來到轎邊伸手揭開轎簾一看唬得兩個婦人仰面跌倒花蜜蜂欲走不及早被趙武搶出轎來一把抓住喝道老虔婆武全忠在那裏快快說來饒你狗命花蜜蜂見趙武猶如鬼王一般先唬慌了便道那那那那腰門口站站站著的不不不是公公公公子麽趙武聞言趕上前去見一個穿得十分華麗的一把抓住道你好好說出來爲何擡我到此衆家人一見各執棍棒打來趙武大喝一聲猶如雷響一般衆人大驚不敢近前有幾個大膽的上前來打趙武卻被趙武將武全忠左手抓住衣領右手抓住腰胯望衆人迎擋武全忠連忙喊叫衆人不可動手那些家人一窩風亂打亂叫那裏聽得真早被趙武把武全忠東撞西擋早已嗚呼哀哉死了衆人見公子死了大喊一聲一齊來打趙武在腰間取出雙錘兩手搶開亂打亂殺打得屍橫遍地血流滿庭有幾個要命的四下跑開分頭去報各衙門知道早有幾處即刻到了先來救應圍住大門不敢進去趙武聽得外面喊殺連天索性把兩扇大門上了拴然後尋了引火之物四下放起火來外面節度使武元嗣亦領兵到來看見一個大漢手執雙錘從火裏打出大門來打得衆人東倒西歪如入無人之境殺了半日不能獲住武元嗣分付布下絆馬索扯開地網趙武雖勇這就叫虎落平陽被犬欺早被衆人拿住繩穿索綁解到節度使衙門來一邊救滅大火計點打死軍人五百有餘元嗣回衙坐在堂上兩邊將趙武推至堂下趙武立而不跪武元嗣喝道你這廝是何處強徒在此行兇從直說來免受苦楚趙武罵道我因一時不識路徑被你這狗官拿住要殺就殺問我怎的元嗣道這賊不打不招叫取夾棍夾起來趙氏大怒大吼一聲繩索俱斷走上前來隔著案桌把元嗣一提平空提過案桌橫在手中衆人一齊來救此時各官俱到止住衆人便道好漢不可如此有話好說趙武道有甚好說要叫我放他實是不能話是有得說那方表好好在家爲何囑盜扳害收他在獄今日你們要我放他必須還我一個方表我便放他衆官道監中快快放出方表來不一時方表取來衆官問方表道你可認得這人麽方表把趙武一看回說小人不認得這人此時趙武與衆官說話就把武元嗣夾在脅下大喝道你們既要無事把方表放他回家去取錘來還我衆官聽了就分付快送方表回家去取錘奉還請好漢放手趙武道我今若放他他必然害我必須送我出城萬事全休衆官道好漢要出那一門趙武道我要到金墉州秦爺那邊去的衆官分付讓開一條路憑趙武走趙武一隻手取了一錘插在腰內又取一錘走出大門衆人要搶又恐像武全忠的故事恐難爲武元嗣只得引趙武出城到了城外趙武將元嗣向地上一丟早跌得無氣了趙武向前走了欲知如何再看下回
