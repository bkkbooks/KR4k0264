body:
  text: 第七十六回屈浮魯中箭喪身徐美祖報仇雪恨再說李孝業捉了烏黑彪因在後營每日來山前討戰見挂出免戰牌無奈只得收兵回營這日忽見山上收去免戰牌李孝業亦自端正連環馬準備廝殺不表且說徐美祖今南建北齊打東寨吳奇馬贊打西寨薛剛紀鸞英打中寨羅英屈浮魯領花槍手破連環馬薛蛟薛葵往來救應其餘衆將四下埋伏分付已定放炮下山李孝業令仰必興打頭陣韋雲毛進喬路唐英驅連環馬衝殺前來羅英屈浮魯俱是步兵見連環馬沖來一齊動手那些甲馬被鈎鐮槍鈎到馬腿一馬倒了九馬都不能行便咆哮起來亂滾亂跳都倒在地仰必興與四將都被捉去李孝業見連環馬被鈎鐮槍破了心中大怒要衝殺來怎奈滿地都是甲馬倒著難以前進只得領兵逃走又遇南建北齊混殺一陣吳奇馬贊殺入後營救了烏黑彪李孝業戰不過南建北齊落荒敗走又遇著屈浮魯攔路殺來李孝業無心戀戰拍馬便走屈浮魯追來李孝業暗發一箭射中屈浮魯面門翻身落馬幸得羅英趕到救了上山周兵俱備投降單單走脫了李孝業薛剛大勝上山獻功只有屈浮魯中箭那箭是用毒藥煮的過了三日便嗚呼哀哉了再說那李孝業帶領殘兵望西逃走又遇著一支人馬爲首兩個小將攔路問道來將是誰李孝業道我乃定唐王李孝業是也兩個小將道好好好遇的巧一齊來捉李孝業見勢頭不好正要跑走卻被一個小將生擒過馬竟望九焰山而來看官你道這二位小將是誰原來是鎖陽城竇必虎遣來人馬一個是薛鬥一個是竇希玠竇必虎不忘薛氏之恩改名爲薛雲他聞知薛剛在九焰山保廬陵王中興天下故差他二人領兵來助遇著李孝業被薛雲生擒來到九焰山薛剛領他二人朝見廬陵王奏知其事廬陵王大喜徐美祖奏道臣父死于李孝業兄弟之手今日正好報仇求千歲爲臣作主廬陵王道任憑禦弟處分徐美祖便令殿上設立英王徐敬業徐敬猷屈浮魯靈位將李孝業綁在靈前徐美祖哭祭了一番將李孝業淩遲處死又將所擒諸將一併斬首止放了仰必興回去通信仰必興得了性命飛奔長安一日到了長安就把九焰山人馬兇惡難以對敵並周成孫安齊豹之事及李孝業被殺情由一一奏知武氏武氏聽了大怒遂問群臣道朕欲掃平九焰山殺盡叛逆誰敢領兵前去武承嗣奏道臣兒願往武氏大喜道王兒肯行國家幸甚天下兵馬委卿執掌生殺由你封你爲鎮周除害天下兵馬大元帥威武南王各鎮王侯節度任你調遣承嗣奏道臣兒此行還要一路招賢納士共議破敵武氏允奏退朝欲知後事且聽下回分解
