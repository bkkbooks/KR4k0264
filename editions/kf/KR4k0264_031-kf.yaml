body:
  text: 第三十一回王懷義善蔔瓦笤安金藏剖腹屠腸再說諸武人馬直鬧了一夜並無拿著一個人影及查點軍土反被殺了三千余人三思只得收兵武後一問是薛剛又來祭掃鐵丘墳殺了半夜並無拿著一個心中大怒下旨緊閉城門不論皇戚官民人家一概挨門搜查務必擒獲正法即狄仁傑張柬之家也去搜檢一番這狄仁傑性子古怪只不過應名搜檢而已誰敢十分細搜惹他一連三天滿城搜遍並不見影武後又聞法雲寺不見了徐敬業徐敬猷首級殺了兩個寺僧武後益發大怒聞白馬寺主王懷義善蔔瓦笤即宣入宮叫他蔔笤看薛剛躲在何處懷義取瓦一塊伏劍在手踏罡步鬥念念有詞手起一劍把瓦斬開看了一番奏道看起笤來這一行五人猶如天上星宿似在面前又似不在人世又似藏在空處總是不曾出城依臣愚見這賊人定要出城不如把城門開了多添軍兵把守凡人出入細細搜檢斷無不獲之理武後允奏依議而行再說仁傑到了七日後開了地窖放出五人道大難已過我送你們去罷分付家將預備輕弓短箭獵犬黃鷹今日出城遊獵又令薛剛五人扮作家將雜在衆家將中一齊上馬出城到了城門首見那裏搜檢行人仁傑喝問何故門官跑稟奉旨查拿薛剛賊黨仁傑笑道原來如此今日老夫倒帶了薛剛衆人出城遊獵你們何不搜檢搜檢門官叩頭道相爺家將中那有薛剛怎敢搜檢仁傑又笑道既不搜檢老夫就帶薛剛衆人出去了說罷一齊縱轡而行出了城門來到僻靜之處薛剛等五人下馬拜謝仁傑下馬回禮道你們回去休忘了忠孝二字又將平章府令箭一支付與薛剛道此去如有關隘查問只說老夫差往魏國公幹便無人敢阻薛剛接令箭在手五人一齊拜別上馬而去料前日跟來的小校已先回山去了一行五人遂星夜奔回黃草山而去話說狄仁傑打了一日獵至晚入城回府不題且說武後自納了張昌宗諸事盡托昌宗武三思武承嗣俱圖謀爲太子賄賂昌宗欲害廬陵王因仁傑在朝不能下手其年恰好仁傑安撫回鶻未回諸武買出兩個軍士出首廬陵王在房州傳檄諸侯意欲謀反武後疑惑未定昌宗從旁聳嘴武後尚疑不決著六部議奏滿朝是武黨俱議廬陵王有謀反之意惟有工人安金藏大哭於太廟道親子尚聽奸讒疑其謀反天下休矣願剖吾腹以明廬陵王之不反進大呼自剖其腹現出肚腸武氏聞知大驚道朕親子尚不能信而疑其謀反令工人如此忠諫朕之過也下旨有再言廬陵王反者定夷三族不日仁傑回京一聞此事入朝正色奏道陛下如何聽讒言而疑廬陵王反豈親子而再不能容耶武後道朕已知過國老不在無人計議國老如有賢能之士保舉一人朕即用爲右相倘國者再有公事不在朕可與議政治仁傑道張柬之老練明決處事忠直足堪爲相陛下宜急用之武後點首即拜張柬之爲右相並同平章事未知武三思武承嗣謀求爲太子之心又做出何事來欲知端的再看下回分解
