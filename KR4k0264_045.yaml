body:
  text: 第四十五回文氏窮途逢襟侄崔母感悟接娘兒當下文氏與胡完在船中思想往何處去好文氏忽然想起説好了我有一親姐嫁在陵州崔宅家中甚富只因你家主亡後才斷了往來你今送我母女到陵州去相投我姐必然收留湖完道老奴就送安人小姐前去便了遂搖船往陵州而去不表卻説馬迪在大殿上點燭鋪氈踱來踱去專等新人出來拜堂成親到了三更時分並不見出來叫於婆進去催一聲於婆進去到房中一看母女二人都不見了急出來説知馬迪領家人忙進來一看果然不見了母女馬迪大驚失色庵內四下尋找並無蹤影拿燈一照看見牆上的草壓倒了於婆道不料新人竟會飛簷走壁扒牆走了馬迪頓足道都是你這蠢才於婆不去看守被他走了遂令衆家人出庵四下追尋並無蹤迹天明著人去問胡家也不曾回去胡發忙著人各親戚家尋訪並無影響鸞嬌聞知深恨馬迪狼心狗肺遂催丈夫陳進率領家人到觀音庵拿住張李二尼盤問他母女下落二尼道這是馬公子強逼小姐成親那知道小姐竟會越牆而逃其實不關小尼之事陳進喝道倘若他母女有投河奔井之事我定然將你二人送官究治決不饒你又痛罵一回回到家中差人四下打聽他母女二人消息再説胡完搖船載著文氏鳳嬌行了百餘裏到了陵州叫聲安人小姐且在船中坐一坐老奴先去崔宅通報自然來請言訖跳身上岸來至崔宅但見門牆高大密豎旗竿胡完上前對管門的説道今有通州胡院君與你家院君是嫡親姊妹今日特來相投現在河口船中相煩通報們公將此言入稟崔母崔母聽了躊躇半晌方起身出外廳叫胡完進來胡完見了崔母叩頭道安人我家主母小姐在通州困苦異常又被姦人所害因此特來相投現在河口船中先叫小人來説一聲崔母道呵呵我家大官人新中舉人二官人初登進士三官人又新入簧門往來親眷非富即貴那有窮親上門況我兩房媳婦皆是富貴人家我亦要存些體面今你主母若到我家衆人看見窮狀定是嘲笑我今撥白米五十銀五錢你拿去與你主母叫他不必上來請回去罷分付家人取出米五鬥銀五錢即時進去胡完心中火發敢怒而不敢言銀米也不拿奔出大門來至河口上船文氏一見胡完就問若何胡完氣道今非昔比那崔院君也變了便將其言一一説知文氏鳳嬌聞言止不住傷心淚下再欲商議安身去處忽然陰雲四合落下大雨來了小船上又無好篷蓋母女二人與胡完淋得渾身是水胡完忙忙攏船到一株大樹底下避雨臨河岸上有一座大悲院有一個女尼在門首看見他母女二人淋得渾身是水便叫道二位女菩薩快上岸來到小庵坐坐住了雨去胡完忙扶安人小姐上岸拖泥帶水進了大悲院女尼請他母女坐下煽起火來與他母女烘衣女尼道請問二位還是母女麼要往那裏去文氏見問不覺淚下道師父你不問時還好忍耐如今問我好不苦切老身胡文氏住居通州這是小女我丈夫亡故多年一貧如洗有個親姐嫁在此間崔府老身特來相投可笑我姐姐嫌我貧窮不容上門正要回去忽逢大雨多蒙師父相招感激非淺女尼道誰家沒有窮親眷如何一個親妹反如此相待他家只有三官人崔文德十分厚道小時拜寄小庵大士神前是常來頑耍他若見安人小姐如此著切決然相留回去但今日下雨未知來否正説間只見文德從外進來避雨女尼道三官人來得正好你認得這位安人否文德把安人細看道面貌到與家母相似女尼道差也不多便將母女前來相投院君不容上門之事細細説知文德失驚道原來是姨母表妹忙上前行禮道姨母不料我母重富輕貧得罪姨母休要見怪我回去即喚轎來請文氏道襟侄你母不肯相容你回去説了反為不美文德道不妨我母最聽我的話我去説自然依我女尼道何如虧了這陳雨天遣相逢文德見雨已止別了安人小姐奔回家中見了崔母叫聲母親我胡姨母窮苦來投理應留他為何打發他去崔母道我本意要留他但恐你兩個嫂嫂相笑一時打發他去心中正在此不忍文德道母親誰家沒有窮親戚兩個嫂嫂焉敢笑人母親快取些衣服首飾叫兩乘轎子去接姨母表妹才是正理崔母見文德説得有理即取出衣服首飾著四個丫頭兩乘轎子來大悲院相接母女二人打扮齊整謝了女尼上轎來至崔府崔氏文德相迎文氏鳳嬌走出轎來文德把表妹細看好一位絶色佳人暗暗喝采崔氏與文氏鳳嬌見禮文德從新拜見姨母又與表妹見禮長男次男並兩個兒媳亦出來見禮備酒款待又叫胡完廚下吃飯崔氏請母女二人入席共飲就問妹丈亡後未知賢妹如何到此景況幸喜侄女長成一貌不凡可曾許人家否文氏道姐姐説也可憐就把丈夫亡後直至胡完相救到此相投細細説出説罷淚下如雨崔氏也不住流淚酒畢崔氏送他母女入內房安歇文德思想鳳嬌為妻暗道若是姻緣真好造化方才姨母説甚麼比合朱砂記許了進興又説做強盜死在牢中若姨母肯許了我便十分之幸了我想若要表妹為妻必須孝順姨母慢慢説合成就次日胡完要回家去文氏道胡完多謝你救我母女在此你可到陳進家説知我母女在此叫他夫妻不必記念胡完允諾而去要知端的再看下回分解
