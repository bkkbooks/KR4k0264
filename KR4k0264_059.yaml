body:
  text: 第五十九回唐王碎剮李承業陳進捐金贖進興話説張籍四人拿住李承業上了囚車後邊馬周趕至見拿下李承業忙問四人為誰張籍道我們是孝德徐老師在紅花山收的人馬奉命今日在此捉拿李承業將軍是誰馬周道吾乃漢陽大元帥馬周是也徐老師現在漢陽為軍師四人聞言下馬參見馬周亦下馬接禮請四人同往漢陽四人允諾押著囚車同馬周而行到了漢陽馬周先入見唐王即將張籍四人獲拿李承業孝德算定預先埋伏俱是軍師之功奏知唐王唐王回顧孝德道王兄何以妙算如此不錯孝德道臣下山之時在紅花山收此四將算定陰陽知他敗走九方山故令他四人在彼埋伏以拿李承業成功唐王大喜下旨宣四人進見四人來至殿下俯伏山呼唐王即封為四營都總管四人謝恩唐王下旨分付把李承業綁在剮樁上請出高祖皇帝太宗皇帝高宗皇帝神位供于上左右設立四百家親王神位唐王下拜畢議唐王道先皇分付把李承業萬剮淩遲唐王報了大仇心中少暢與孝德計議興師殺上長安孝德奏道武氏大數尚未應絶主公亦未應即登大寶先取臨江以團根本待武氏求和允其所請還該廬陵王重定三年韋後亂政那時主公方應登龍唐王允奏下旨令馬周率將去取臨江一帶地方點兵二十八萬禦駕親征以申妃李湘君為保駕都總管留袁成李貴把守漢陽大兵起行殺奔臨江而來臨江總兵朱日虎出城迎降兵不血刃得了臨江一路進兵不過一月連下大周三十餘城大兵直抵淮州時值五月初旬下令屯兵淮州界口賞了端陽再議進兵唐王暗想此去通州不遠何不私去拜訪陳進浼伊引見嶽母相請到來有何不妙便瞞了軍師衆將換了衣服扮作書生單叫王欽之子王文龍曹彪之子曹文虎扮作家人君臣三人暗暗從後營走出直往通州而來到了通州入城迎面正遇馬迪馬迪一見喝道進興你那走遂叫家人快拿他回府文龍文虎一見就要動手唐王忙把頭亂搖二人只得忍著由衆人扯住他君臣三人拖拖拽拽到了府中馬迪分付把他三人綁在柱子上每人先打一百鞭子以出我當日東郊比箭之氣文龍文虎又要動手唐王又丟眼色只是搖頭二人只得忍著由他綁在柱子上鞭打並不出聲把他三人打了一回又分付把他三人鎖在後園百花亭上待我明日送去州中處死他再説繡娘楊氏此時正在馬府一聞拿住進興吊打了一回鎖在後園亭上明日還要送官治死他吃一大驚俟至大晚等馬迪夫婦睡了取些酒食點了燈就悄悄來至後園亭上果見進興鎖在正中兩邊鎮的兩人卻不認得楊氏道你如何被他拿住受此吊打唐王並不做聲只是冷笑楊氏連問幾次見他不語大驚道呵呀官人你莫非瘋癡了麼我取得酒飯在此你三個且充充飢唐王與文龍文虎吃了酒飯楊氏又問仍是不語依舊冷笑楊氏道官人你好命苦倘或明日送官將你治死那可怎處常言道救人一命勝造七級浮屠待我去陳解元家叫他來救你便了遂把碗盞收過一邊提了燈籠來到大門上對門公説有事要回去開了大門楊氏緊緊走到陳家適值陳進夫婦尚未安寢楊氏就把那進興被馬迪拿住如何酷打如何還要送官治死他並自己見他三人如何光景説了一遍又道老身暗暗跑來求解元小姐如何救救他才好陳進夫婦聞言大驚道馬迪這廝十分貪財要救他須得五十兩銀子方能喚他回來鸞嬌忙即取出銀子五十兩天色微明陳進帶了銀子來至馬府見了馬迪道昨聞吾兄拿了進興三人回府小弟敬備白銀五十兩前來贖他乞兄收銀準贖足叨盛情馬迪道老兄既來敢不從命但三條性命難道止值五十兩麼過日再找五十兩罷陳進道承情馬迪收了銀子分付把三人放出三人出廳也不與陳進見禮也不説話往外便走陳進作別火速來趕叫也不應也不回頭竟一直來到陳家廳上唐王叫聲仁兄若非慷慨相救幾乎死于馬迪之手陳進見他不系瘋癡忙忙見禮楊氏道官人昨夜為何我叫你不應唐王道繡娘有所不知一露口風就難脫身所以裝成癡呆之人鸞嬌在屏後轉將出來唐王上前見禮未知鸞嬌説出何話欲知端底再看下回分解
