body:
  text: 第四十回痛離別母女傷心喜相逢君臣議事文氏道賢壻你前往邊庭須速速來接我苦命的母女二人切不可到了富貴之時忘記了小女另娶紅妝叫我母女終身無倚太子道小壻這一點微忱皇天可表怎敢負嶽母小姐深思小壻若喪良心定死於刀劍之下繡娘道官人你到邊庭但看你手上朱砂記就如見小姐一般那員外夫婦待他母女二人十分刻薄是你知道的須要早些來接他為妙太子道不須叮囑但我嶽母小姐在此早晚還求照管若得身榮決不忘大德如今差人想已來了待我叫他進來相見出廚房後便是後門太子開了門果然曹彪軍士共五人在外等候太子招呼入內指道這二位就是我嶽母與小姐五人聽得跪下磕頭太子道起來五人方才起來不敢擡頭垂手而立文氏道賢壻你實系甚麼人為何此人如此行禮太子道軍伍衙門禮數極重不須細問久而自明説畢五人催促起身太子又道嶽母請上小壻就此拜別文氏還以半禮大家紛紛下淚太子出門道此去襟女陳家不遠前去一別小壻就此分離了文氏鳳嬌繡娘齊送出後門好不難捨難分兩下只得含淚而別話説太子同曹彪五人來至陳家門首著門公入內通報陳進夫婦聞知火速出來鸞嬌閃在屏風後陳進相見太子禮畢太子道弟因家叔差人來接暫往邊庭圖一出身即刻起行特來相別嶽母處還求襟兄念骨肉至親不時照管一二異日小弟自當圖報大德陳進道不消分付決不負托請問令叔在邊庭作何官職曹彪在下答道軍機重情不須細問日後便知請公子速行太子與陳進兩下對拜四拜灑淚而別太子上馬五人相隨挨出城門奔翠雲山而來話説馬周屯兵翠雲山自從打發王欽曹彪尋訪太子並無回信過了月余王欽回來道四處尋遍並無太子蹤迹馬周聞言流涕道君乃國之主沒了太子師出無名何以建中興之業李湘君道王欽雖未尋來將來曹彪尋著太子也未可知你若驚惶軍兵散去將何處置嗎周道夫人言之有理遂強作歡容未免心中納悶又過月餘忽見曹彪來至説太子已到山下馬周聞言大喜率領大小三軍下山跪接太了親手扶起馬周率衆隨駕上山到了寨中下馬太子入寨坐下馬周率衆山呼朝見畢君臣細談往事衆將盡皆嗟歎馬周分付大排筵席君臣共飲盡歡而止馬周道臣有一事啓奏未知千歲肯許否太子道卿有何事奏明孤無不依馬周道臣有一妹嫁與申家止生了一女名喚婉蘭人才出衆武藝超群有萬夫不當之勇不幸父母俱亡來依於臣臣想千歲目今正用人之際願將甥女隨侍千歲左右可以保駕中興未知千歲以為如何太子道卿有甥女如此猛勇孤當納為正宮但孤避難通州之時受胡家大姆許多恩惠又將女兒許孤為妻孤焉忍別納以負胡家馬周道臣豈敢望納正宮只求納為嬪妃之列足矣太子道既如此孤何不依馬周大喜就喚婉蘭出來見駕朝拜畢太子將他一看果然容貌秀美遂納之左右稱為申妃自此太子日日與馬周衆將談論軍機議圖大事操演士卒過了一月馬周見太子道臣啓千歲我想此翠雲山雖然險固終非久守之地必須趁此兵糧齊備攻取一城以為安身之地不知千歲意下如何太子道孤正有此想但不知那一郡好馬周道臣觀漢陽最大錢糧又廣若得此城何懼武氏兵臨千歲且安居此山待臣統兵取了漢陽再來恭請聖駕進城便了太子大喜馬周即日興師殺奔漢陽城來到了漢陽離城三裏安下營寨未知後事如何且看下回分解
