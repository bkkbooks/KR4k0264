body:
  text: 第十二回武後下旨拿薛族薛勇修書托孤兒話説高宗一跌下樓來衆臣救駕入宮武後即發旨速拿薛剛此時薛剛酒醒方知踢死皇子心中著急兩手提著兩根人腿往人叢中打開一條血路料難回府也不顧父母兄弟便一溜煙就逃走了此時各衙門都得了報俱差人擒拿凶手魯王府中那些功臣正在飲酒一聞此報個個大驚這是抄家族之禍誰敢來管金吾等衙門一面發令速閉城門不許放走薛剛城門上正待要閉怎得那人幹人萬人山人海一齊俱要出城逃命十分擁擠門軍取棍亂打如何打得開薛剛來至城門首見城門未關遂奪了一根大棍打開血路奪門而走逃命去了再説高宗因驚破了膽又跌壞了身救治不痊崩於內庭在位三十二年武後悲怒交集命中州侯武三思點兵三千圍住兩遼王府捉拿叛臣一門家口這件事關係叛逆誰敢保救武三思統兵來至兩遼王府四面圍住此時丁山在府已經聞知此事正在驚慌樊梨花正回想當初在西涼白虎關執意要斬楊凡今日抄家滅門由此而起大限已定豈能逃避此時大爵主薛猛的夫人張氏生有一子取名薛蛟都在府內唯二爺薛勇在盜馬關做總兵四爺薛強正月初往太行山進香俱不在府內當下武三思統兵入內逢人便捆自丁山夫婦拿起直至家丁女婢而止盡行捆拿解到午門三思入宮啓奏武後道逆臣薛丁山一門家口共有三百八十五人盡皆拿到午門所有家財已經封貯其薛剛薛強逃走薛勇現做盜馬關總兵可差官去拿武後道把薛丁山一門囚入天牢候拿到薛剛薛勇薛強一同正法一面發旨傳示天下畫影圖形捉拿薛剛薛強拿獲者賞千金封萬戶侯隱藏者一經發覺與反叛同罪一面大殮高宗一面差兵部侍郎李承業前往盜馬關拿薛勇家口一面著文武大臣持太子李顯即位改元鹹亨號為中宗發哀喜二詔頒行天下然後於柩前舉哀尊母武後為皇太后立妃韋氏為皇后擇日將高宗葬于平陵一日中宗臨朝張天左張天右奏道薛丁山縱子行凶踢死七殿下驚崩先帝罪同叛逆伊父薛仁貴夫婦之棺葬于白虎關白虎山合行發其墳墓挫其尸骨以正大逆之典乞陛下發旨越王羅章忙出班奏道兩遼王父忠武王薛仁貴功高山嶽保先主太宗跨海征東十二年建立奇功百餘件休説別的只説太宗被蓋蘇文困在海濡之中太宗有言有人救得唐天子者情願讓他做君我做臣萬里江山平半分其時仁貴單騎救駕力退遼兵六十四萬跪於海岸求太宗赦罪彼時太宗那一件不赦甚至掘皇陵殺皇親這等罪也都開赦如今薛剛做此大逆固當赤族之誅但與忠武王之墳何涉臣聞仁者加刑不及枯骨求陛下赦之況伊壻竇必虎封平西侯現掌大兵四十萬鎮鎖陽城若下旨去開忠武王之墳彼妻薛金蓮乃忠武王之女萬一激變為患不淺乞陛下思之羅章這話激切細述仁貴大功正該罪在薛剛一人隱隱保救丁山一門之意就是中宗心內也欲赦丁山一門卻被武後做主沒法只得説道當初仁貴之大功朕豈不知今日焉有掘墳之理羅章道此乃陛下洪恩忠武王九泉之下亦感恩不盡矣張天左二人入宮暗奏武後道新君柔弱太后付以天下大任恐不能守乞太后早為定議武後道國遭新喪難以即廢爾等從容待之自此二人常在武後面前言中宗的過失卻説武後有一件毛病一夜也少不得風月歡娛自高宗崩後日召大臣宿于內庭這且不表單説盜馬關總兵薛勇一日得報知薛剛踢死皇子驚崩聖駕自行逃走父母兄嫂一門盡行拿住囚入天牢又差李承業來拿自己離關只得八十裏了見報大驚火速退堂入內夫人抱著一歲幼子薛鬥見薛勇面目失色便問何故薛勇道不好了全家性命不保了遂把薛剛之事説了一遍今又差兵部侍郎來拿我我想到長安豈能保全説罷夫婦相對而哭閃過家人薛虎泣道三爺造此大罪老千歲闔府囚入天牢老爺又舉家備拿此去長安倘有不測豈不絶了薛氏宗嗣老爺可將公子交與小人先行逃遁日後已可以傳宗接代薛勇道此言有理姑大竇必虎鎮鎖陽城待我修書一封抱公子前去投他邵氏道這事情罪大如山律除三族倘朝庭也要拿他卻怎處呢薛勇道不妨我姑丈為平西侯掌四十萬兵權管轄西域一百余國通貢大都朝庭如何敢去惹他邵氏道即如此速修書薛勇收淚修了書付與薛虎邵氏抱著薛鬥泣道母子今日分離想難再見專望你日後重整薛氏門媚我死在地下也得放心二人哭哭啼啼難分難離又恐天使一至不能脫逃不得已將薛鬥抱與薛虎道存孤恩大我死在地下亦感汝之恩薛虎接了公子拜別出府往鎖陽城去了再看下回分解
