body:
  text: 第五十八回徐孝德誅斬四將李承業中計被擒當日黃景亮來至城下大喝道叫那破我法的徐孝德出來受死軍士飛報人殿唐王道賊將指名要與你交手王兄可出去否孝德道這廝大命該絶臣當出去唐王道著王欽曹彪同去何如孝德道更妙即時上馬二將相隨開城沖出黃景亮看見唐兵正中馬上一人黃巾道服左有王鐵右有曹彪景亮遂喝道來者就是破我法的徐孝德麼孝德答道然也黃景亮掄刀便砍孝德舉劍相迎王欽曹彪雙馬齊上景亮把馬退了數步拔出寶劍發入空中來傷孝德孝德用手一指其劍落於地下景亮大驚棄了座馬縱團光起在空中要走孝德口念真言舉拳往上一放空中一個霹雷把黃景亮打下地來王欽上前一刀斬為兩段周兵敗走回營孝德率衆直抵周營索戰李承業聞報大驚萬飛龍大怒提刀上馬出營看見孝德大吼一聲賊道吃刀把刀劈面砍來孝德揮劍來迎不三合飛龍回馬便走孝德拍馬趕來飛龍見孝德來趕取出黑煞石發起照孝德頂門打來孝德念起真言用手一指一個大雷把黑煞石擊得粉碎飛龍喝道焉敢壞我寶貝回馬又戰孝德伸手往背上一指那口太乙劍飛在空中只一旋落將下來把萬飛龍斬于馬下王欽上前取了首級孝德把手一招太乙劍自入於鞘周兵飛報入營李承業吃驚不小金天海氣的暴跳如雷提槊上馬領兵出營正遇徐孝德並不答話舉槊便打孝德把劍來迎王欽見金天海正是仇人拍馬揚刀便砍金天海回馬便走孝德隨後趕來金天海取混元鞭往上一拋一聲響亮打將下來孝德伸手向背上一指太乙劍出鞘往上一迎兩下一撞把混元鞭砍折兩段落於地下金天海大驚便走孝德用手一指那寶劍把金天海劈為兩半周兵敗走入營李承業聞報唬得魂不附體鄧十豹咬牙切齒上馬出營看見孝德舉溜金鏟便打曹彪一馬沖上挺槍來迎十豹不戰回馬就走曹彪拍馬便趕十豹解下豹皮袋回身一抖神嗷變得水牛大亂跳而來孝德念念有詞喝聲疾把拳只一放霹雷交加把神嗷擊成肉泥十豹大怒回馬殺來曹彪挺槍迎住戰不幾合曹彪一槍把鄧十豹刺于馬下周兵大敗回營李承業見四將俱亡堅閉不出孝德掌得勝鼓回營唐王下階親迎分付擺宴慶功飲宴之間唐王道王兄四將雖除尚有李承業未退王兄有何法將他拿住與四百家親主報仇方為萬幸孝德道臣已安排下拿他之人不勞主公費心唐王離席作謝君臣暢飲盡歡而散次日孝德分付衆將三日後齊集王府聽點開兵到了第三日馬周率衆將三軍齊集王府伺候三聲炮響唐王升殿孝德賜坐于側申妃也戎裝立于唐王之後馬周率衆將並夫人李湘君參見站立兩旁徐孝德令王欽領兵一萬從東殺入周營曹彪領兵一萬從西殺入李奇領兵一萬從南殺入李湘君領兵一萬從北殺入馬周領兵一萬殺入中營申妃領兵一萬來往應接孝德領兵一萬隨後接應袁成李貴保駕守城放炮開城一湧而出衆將各從軍令踹往周營再説李承業正在中軍與李信及李克龍李克豹李克麒李克彪李克熊五子共議兵事忽報唐兵分五路來攻營李承業即與李信並五子連忙上馬令衆將分頭迎戰唐將奮勇殺入兩下頂頭廝殺馬周踹入中營正與李承業相遇各舉兵器交戰五子齊上馬周戰住承業父子六人喊聲大震申妃領兵殺至一槍把李克龍刺死馬周神槍連挑李克麒李克熊下馬李克彪李克豹保承業穿營而走馬周隨後追趕孝德念動真言借一陳飛砂走石把周兵打的拋盔棄甲而逃李克彪李克豹俱死於亂軍中李承業沖出重圍落荒而走馬周追趕不放衆將四下追殺得的糧草馬匹不計其數降兵十八萬零單有李信逃回長安去孝德鳴金收兵共入城中入殿作賀衆將俱繳令單單不見馬周唐王道馬周不回得無有失誤麼孝德道元帥一回便拿李承業到矣再説李承業被馬周緊緊追趕望臨江府逃奔下來一日一夜馬不停蹄回顧馬周追來少遠略放了心住馬看時見深林內有一支人馬打著臨江總兵旗號承業大喜上前問道爾等可是臨江總爺的人馬麼軍士道正是聞三齊王兵敗在此迎接承業道我就是三齊王軍士聽了入營報知張籍高郢馬暢常建喝彩道徐老師真是神仙了一齊上馬率衆出營喝道逆賊那走承業大驚道不好了又中了他的計了四人上前擒住上了囚車欲知後來如何且看下回分解
