body:
  text: 第九十五回反周臣洗清宮殿中興將賜爵分疆當下薛金蓮與樊梨花各訴離別之情説及當日滿門被害止不住淚下竇必虎叫聲樊夫人道薛剛雖然闖禍纍及一門他兄弟四人薛猛受害幸有子薛蛟薛勇被戮幸有子薛鬥今日薛剛保廬陵王中興指日小主重定開鐵丘墳遷葬報仇甚為可喜那四侄薛強當年大宛國招為駙馬得公主孟九環為妻霸占山後屯兵虎頭寨稱為武山王生有八子二女長子名薛琪次子名薛瓊三子名薛瑤四子名薛璜五子名薛瑛六子名薛璟七子名薛王喜八子名薛魁長女名金花次女名銀花俱孟九環所生個個勇猛人人無敵山後呼為父子十一虎如今薛剛保廬陵王中興他也應該前來相助為何卻不見他到來樊梨花道少不得他們也有助唐的日子另有一番作用説罷竇必虎去朝見廬陵王薛剛排筵與竇必虎夫婦接風到了次日薛剛請樊梨花遣將以破周兵樊梨花令薛蛟攻東營薛葵攻西營竇必虎攻北營薛鬥攻南營紀鸞英率吳奇馬贊攻東北披霞公主領南建北齊攻西北尚姣英率鄭寶孫安攻東南薛金蓮領尚雲培李廣攻西南每一路領兵一萬薛剛亦領兵一萬往來接應樊梨花自領兵取中路拿騾頭太子其餘衆將保廬陵王守營衆將得令一齊殺奔周營而來周營武三思與騾頭太子聞報鐵板真人已死唐兵分八路來踹營一時唬得魂飛魄散忙忙傳令各營衆將盡力迎敵騾頭太子出帳來擋只見唐兵四面八方踹入一刻之間把各營殺得紛紛大亂樊梨花殺入中營正遇騾頭太子兩下廝殺不上三合樊梨花把手一指喝聲站住定住了騾頭太子一劍揮為兩段此時武三思從後營急急逃走走了數十步忽見前面一支人馬殺來旗號上寫虎頭寨武山王薛強八個大字當先一員小將乃是七公子薛王喜殺至武三思舉刀迎敵薛王喜扯起虎尾鞭照武三思迎面打來正中武三思左肩翻身落馬忙跳起來雜在亂軍而逃薛強父子如同狼虎砍殺周兵尸如山積降者大半樊梨花鳴金收軍薛強父子夫妻會合薛剛人馬俱各大喜同回大營與孟九環八子二女拜見樊太夫人一家相逢喜不可言薛剛道四弟當日是我造此大禍纍你逃奔外邦幸喜得了弟婦生下這許多賢侄還算不幸中之大幸如今一入長安請廬陵王重定開鐵丘墳一門復聚共受皇恩此亦家庭中之一大樂也薛強道哥哥愚弟此來一為父母報仇以開鐵丘墳二為相助哥哥以成大事實不願保廬陵王待開了鐵丘墳弟即回山後矣薛剛驚訝道我與你皆唐臣子吾弟不願是何意也薛強道廬陵王乃武氏親生薛氏一門被他害盡怎反保其子為主況高宗尚有正官王皇后所生太子名旦者現在漢陽應登大寶哥哥既保廬陵王弟誓不保他遷葬父母兄嫂之後即回山後永不來朝此吾志也樊梨花道二龍並出一先一後各保其主亦為有理當時大排筵席一門慶賀次日薛剛起兵殺奔長安而來不表且説武三思逃回長安入奏騾頭太子師徒皆死于樊梨花之手臣雜亂軍中逃了性命乞陛下速速定計如遲薛剛一到性命休矣武則天大驚即召張天左張天右商議二人道事急矣長安決不能守請陛下速奔二殿下南唐王李坤處再圖中興則天允奏忙帶薛敖曹張易之張昌宗武三思張天左張天右許敬宗收拾行囊至三更悄悄從地道而出逃往南唐去了城內張柬之袁恕己桓彥範三人商議道我等五人皆蒙狄梁公舉薦位極人臣豈可不思圖報久欲反周為唐未得其便今敬暉崔元日韋俱已歸唐我等若不內應空費梁公特薦之心袁恕己道旨下要清洗宮庭必須先殺諸姦數武後十罪那時大開皇城迎廬陵王重定其功莫大桓彥範道此論是也待我寫出武後十大罪遂議定寫出道實系才人蠱惑禍帝罪一也恃寵肆陰謀殺王后罪二也滅嫡害子天性何有罪三也毀棄先王七代宗廟罪四也女主專權自立為帝罪五也殺戮大臣貶竄侯伯罪六也誅滅宗室立侄為嗣罪七也親近小人廢絶君子罪人也貪淫極樂無法無天罪九也姦僧術士出入禁庭罪十也寫畢將武後十大罪粘於朝上百官看了個個拍掌稱快齊説目下詔媚臣日夜在宮商議有值殿使溫奇心懷忠義可與共謀內宮之事張束之連夜召溫奇議事四人議定約明早行事一面修下表章送出城去一面暗發號令點齊人馬到了次日五鼓之時張束之袁恕己桓彥范溫奇領兵殺入宮中不見武後諸佞臣考問內侍稟稱昨夜三更武後與武三思等從地道中逃奔南唐去了溫奇差兵追拿不及只拿各佞臣家眷下了天牢長安城改換皇唐旗號候廬陵王駕到即便出迎再説薛剛統領大軍飛奔長安而來忽探軍來報説武後與諸佞臣逃往南唐去了長安城上已立大唐旗號薛剛一聞武氏走了急得三神暴跳七竅生煙衆將道雙孝王且到長安保小主重定開了鐵丘墳然後兵下南唐不怕他走上天去薛剛道有理兵馬行到長安張柬之等率文武百官出城迎接拜于道左廬陵王大喜連叫老功勳請起薛剛將人馬屯扎皇城外廬陵王進了皇城入居偏殿衆文武都待罪午門廬陵王概不究問移武氏七廟建立皇唐祖廟擇吉日祭告天地祖宗社稷山川復即皇帝位是為中宗復國號曰唐群臣山呼朝賀畢立妃韋氏為皇后敕封徐美祖為英武王兼太尉平章軍國事加封雙孝王薛剛為天保大將軍兼中書令征南大元帥即命開鐵丘墳祭掃之後即下南唐拿諸佞臣敕封程咬金為仁壽逍遙君加稱魯王履劍上殿入朝不拜出朝不辭封秦文為濟南王羅英為燕郡王尉遲勃為定陽王張柬之為濮陽王袁恕己為南陽王崔元日韋為博陽王敬暉為平陽王桓彥范為東陽王武丹池為武寧王白雲為湘陽王薛葵為東宮駙馬無敵趙王薛蛟為西宮駙馬博浪王竇必虎為平西王薛鬥為定國公薛雲為鎮國公羅昌為越國公秦方為寧國公周成為順國公李定為安國公殷友為昌國公邱齊為成國公桓柏為淮國公牛誠為金國公馬成為武國公鄭寶為保國公白文龍為鄭國公白文虎為梁國公白文豹為齊國公程鐵牛為武城公程統為新寧公程敬思為三十六路都總管溫奇為安遠侯南建北齊吳奇馬贊烏黑龍烏黑虎烏黑豹烏黑彪烏黑蛟皆為中興侯趙武李廣伍榮雄壩孫安皆為興唐大將軍樊梨花為正宵聖母天娥至妙夫人其餘已亡有功諸臣並死難諸臣及陳亡公卿將士俱備褒封賜諡子孫襲職雖在繈褓亦得榮封只有薛強不受誥敕大赦天下免一年賦稅將各佞臣家口著薛剛盡行斬絶衆臣受封皆叩頭謝恩未知後來如何再看下回分解
