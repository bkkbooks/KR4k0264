body:
  text: 第一回兩遼王安葬白虎山狄仁傑拒色臨清店詩曰開卷遺篇演大唐忠良姦佞詐和賢巍巍薛氏留青史幹藝皇家取後綿這部書乃是薛剛大鬧花燈打死皇子驚崩聖駕三祭鐵丘墳保駕廬陵王中興大唐天下全部傳記話説征西元帥兩遼王薛丁山同夫人樊梨花平了西涼擇日班師回朝先一日親唐國王納羅排筵餞行衆功勳皆在席飲酒飲至半酣內有秦漢刁月娥夫妻二人出席走至樊梨花面前稟道師父臨下山之時吩咐道西涼一平叫我夫妻二人仍回雲夢山修真不受紅塵之福今當拜元帥夫人即要回山去了樊梨花道你夫妻二人應享清福與天地同朽既立心要回山去也不敢相強但我們俱是宿債未完不知何日方能脫此勞碌矣又見唐萬仞叫聲元帥夫人道我已死二十九年蒙九天玄女娘娘復救重生則此身已是化外之身今當拜別元帥夫人往鸞鳳山修真學道樊梨花許允座中竇必虎對秦漢道師弟你好造化夫妻回山修真學道就苦了我了秦漢笑道師兄我萬不如你夫妻二人同在皇家做了平西侯大將軍永鎮鎖陽城穿好吃好堂上一呼階下百諾何等威風何等快活且是年年這西域一百余國去長安進貢從你鎖陽城經過那一邦不送你禮物那一國不看你的號令真真威風無比快活無窮怎似我夫妻二人回山去吃的是淡菜黃韭穿的是百衲布衣間時丹房煉丹忙時桃園種菜挑水打柴若此比你差一萬倍了程咬金聽了二人之言不覺笑道我看世上的人如同做夢一般若要比到萬仞兄與秦漢夫婦真真是千萬中不能得有一二萬仞兄他們偏些晚輩都不曉得你我是曉得的只説我們弟兄四人昔年少壯之時在山東濟南府賈柳店刺血會盟起手反山東劫府獄占瓦岡寨稱孤道寡首先倡亂掀翻了大隋天下又弄出十八邦王子六十四路煙塵分據州郡各自稱尊直至先帝太宗晉陽起義西定關中招納我們一班朋友親冒矢石南征北討東蕩西除血戰九年平一六合方成一統江山到今日吾主已亡四十個好朋友都死得乾乾淨淨惟有一個謝戍癸成了仙萬仞兄死而復活得志修真如今止有一個老人徐茂公尚健還有我這老不死活在這裏終不知怎生死法哩回想起來人生於世如同一夢到不如逍遙自在的快活萬仞道知節兄你乃是紅塵中之福將名垂千古就是那一班衆弟兄人雖死了亦流芳百世如同不死一般如何説得似夢衆人聞言無不歎息酒罷秦漢刁月娥唐萬仞拜別起身衆人一齊送出鍋底城灑淚而別次日樊梨花下令班師親唐國王率領文武送出城十裏而回大兵奏凱還朝不想路上柳太夫人得病于接天關醫治不痊死了薛丁山薛金蓮一班舉哀收殮入棺扶柩到白虎關薛丁山要將父母靈柩扶回山西絳州祖塋安葬樊梨花忙道不可絳州土薄殺氣甚重若葬在絳州日後公婆靈柩決難保全此地有一白虎山極好風水若葬於此千古不朽丁山依言擇日將仁貴夫妻之柩葬于白虎關東白虎山山上立廟墳側留人看守樊梨花善曉陰陽他早曉得後來薛剛大鬧花燈踢死皇子武則天有旨凡薛氏墳墓盡行掘開暴尸拋骨仁貴夫妻幸無安葬於此得以全免此是後話不提當下安葬已畢大兵起身一路奏凱回朝再説先王太宗皇帝貞觀十一年大開科舉以孔穎達為主試于志寧為監臨遍行皇榜招集天下士子其時山西太原府河陽縣有一人姓狄名仁傑年方二十三歲生得丰姿俊雅學富五車其年別了雙親帶個小廝上京應試一路而來一日行至臨清天色已晚主仆二人投了歇店這店中屋後只有一間幽雅書房僅容一張床鋪吃了夜飯只得著小廝在外房安歇狄仁傑獨會無聊閉門對燈看書到了二更忽聽房門開響走進一個女人來仁傑擡頭一看見那女人生得身材楚楚容貌妖嬌秋波一轉令人魂銷心內吃了一驚不知是人是鬼只得起身施禮道小娘子黑夜至此有何見教那女人微微笑道賤妾青年失偶長夜無聊今幸郎君光臨使妾不勝幸甚仁傑見他花容月貌不覺動起欲火來即欲上前交感忽又轉想道美色人人所愛但是上天不可欺也遂對那女子道承小娘子美意但想此事有關名節學生斷不敢為那女子走近前道郎君此言是以賤妾為殘花敗柳不堪攀折但妾已出頭露面尋你一場不得如此豈可空回望君憐之道罷雙手把仁傑摟住仁傑此時欲火難禁又欲相就忽又想道不可不可忙把身子掙脫上前去拉那房門一時性急拉不開無計脫身假説小娘子美情我非木石能不動心只有一件不敢侵犯小娘子貴體那女人道郎君正在青春年少卻為那一件不肯沾連賤體仁傑詐説道身患惡瘡爛了三年好生之物已不周全何以取樂于小娘子乎那女子道郎君的疾妾亦不敢相強情願與君共枕同衾半夜妾願足矣説罷雙手搭在仁傑肩上粉臉相親此時正有許多風月仁傑意欲動心又想到上天不可欺之句即道此事不可不可口內雖説而淫心往往轉動幾次三番拒絶不脫心中忽又想道如此美女若一旦於此不肖之事倘此女死後其尸腐爛萬竅蛆鑽臭不可言心中這一想淫念頓息把那女人兩手脫開説道小娘子我有四句詩寫於你看然後同睡那女人見仁傑應允立著不動仁傑途取筆在手題詩四句詩曰美色人間至樂春我淫人婦婦淫人若將美色思亡婦遍體蛆鑽滅色心女子看罷雖然識字不解其意請問其詳仁傑道人人這點好色之心不能禁止雖神仙亦不能免但是上天難欺有壞陰騭我見小娘子杏臉桃腮朱唇玉頸就是鐵人也要銷魂這點欲火那得能滅滅而復發如此者三若有三位美人已敗三人之行矣今只把小娘子作死過之人一七已過萬竅蛆鑽臭氣逼人淫心頓消若小娘子還有慕我之心亦只好把我也比作死過之人想到遍體蛆鑽一堆枯骨任你容貌蓋世此火斷不能生矣那女子聽了這一席話一想忙拜於仁傑前口稱郎君妾要去此邪念亦非一日只是欲火難消如今聽了此言如夢初醒終身記念不忘可為半世節婦矣全賴郎君金言今當拜謝望郎君勿以妾之醜態所泄終身感戴不朽拜畢出房而去仁傑見那女子去了心中大喜又恐那女子轉來聽得金雞三唱急叫小廝進內收拾行李算還店錢到前面人家梳洗吃飯而行正是舉心動念天地皆知再聽下回分解
