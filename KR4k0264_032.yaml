body:
  text: 第三十二回月姑迷惑武三思魯仲會遇通城虎再説武三思武承嗣日夜謀求欲為太子到八月十五中秋佳節是夜月色如銀武後在璣花樓與張易之張昌宗飲灑觀月武後摟著昌宗粉頸道朕自與卿相見寸步不離但願生生世世長如此月圓矣昌宗道陛下萬壽元疆但儲君未立內外保無議論武後道朕萬歲後廬陵王當承大位何議論之有昌宗道陛下差矣請問廬陵王姓甚麼陛下姓甚麼若以廬陵王承大位他姓李決改周為唐而武氏七廟絶矣陛下若立一侄為太子後承大位必尊陛下為大周開基之主武姓立國之君傳于萬世血食無窮奈何以武家既得之天下而復還李氏乎乞陛下思之武後道卿言誠是也朕今如夢初醒但承嗣浮躁惟三思勤謹可承大位即下旨宣武三思入宮議事孰知三思這晚獨自步入花園玩月忽聽牆外有女子哭泣之聲遂即開了花園後門走出來看只見月光之下有一美女年約二八生得如花似玉滿身穿白在井邊啼哭見了三思望井中便跳三思急忙趕上抱住道你這女子為何半夜來尋死那女子收淚道爺爺呵一言難盡奴家姓花名月姑自幼許配韓家為媳不料丈夫夭亡父母逼奴改嫁故此逃出尋死三思見了這般美女嬌聲滴滴早已魂落天外道我非別人乃是趙王武三思你今不必尋死你若肯從孤家當納為正妃如何月姑低頭不語三思便來抱住月姑並不推辭二人遂入花園在假山洞內雲雨起來了外邊聖旨來宣他三次家人內外並尋他不著直鬧了一夜天明張柬之聞知此事報於仁傑仁傑此時臥病在床忽聞此報急急帶病入宮武後一見問道國老有何話説帶病見朕仁傑痛哭奏道臣聞陛下欲立三思為太子所以特來冒死而諫當初太宗皇帝櫛風沐雨親冒矢石以定天下傳至高宗高宗以太子托之陛下而陛下欲以傳之他族無乃非高宗之高耶況侄與子孰親陛下若立廬陵王則千歲萬歲後配食太廟若立三思自古至今未聞侄為天子而肯立姑于廟者乎陛下為何聽信讒言而誤至於此武後大喜道國老若不明言幾為小子所誤朕今決意立廬陵王即下旨召他進京便了仁傑聞言謝恩武後命內侍扶仁傑上車送回府去那三思同月姑在洞內直睡到日高三丈方才醒來遂攜月姑回房中方知昨夜召為太子連忙入宮已立廬陵王矣直氣半死過了幾月仁傑病危忙請柬之到床前坐下叱退左右道我年已七十死不足惜但恨不能日見中興耳我今定下三條大計可保中興遂取出三個錦囊付於柬之道第一個可以保全廬陵王入長安第二個可以制伏諸武第三個可以救駕出京仁兄依計而行定然中興弟雖死在九泉亦含笑矣柬之收了錦囊哭別而去又過幾日狄仁傑薨遺表謝恩武後得報哭暈幾番即下詔贈為梁王賜祭田千畝命其子狄謹扶柩歸葬按下不表且説房州廬陵王駕下文是魯仲武是馬登二人最為廬陵王所重馬登久欲與薛剛上本只是礙著武後要拿他不便開口那廬陵王也念及薛剛就是踢死禦弟不過是人叢中擠倒了誤踏死的他如何敢踢死太子就是驚崩聖駕也是父皇的年數將他一門殺盡其實可哀也有意欲薛剛保他中興天下這話也是廬陵王自己説不出的話魯仲也知道廬陵王的心迹只因他説不出口也不便提及薛剛一日廬陵王忽然歎氣落淚魯仲道千歲為何不樂廬陵王道孤想我祖太宗親冒矢石定有天下子孫世守不料母后廢孤于此今又殺宗室親王四百余家改唐為周稱帝長安移唐宗廟孤念及此不覺傷心大夫何以教我中興天下魯仲道臣一介庸才不堪當此大任千歲要思中興必須聘請山西太原府屈浮魯來為人文武全才與之計議決能中興千歲可備黃金千兩白璧二十四雙明珠二十四粒彩緞百端付臣前去聘請大事可成廬陵王允奏即修下請書備禮裝車點二十名軍校相從魯仲即辭駕起身奔太原而來行到黃草山忽一聲鑼響搶出數百嘍羅把魯仲挑翻下馬一索捆了相從軍校也都捆了將車上禮物也都搶上山去把魯仲推至寨中薛剛問道你是那裏差來的官往那裏去送禮魯仲道要殺便殺何用問我徐美祖道不然我這裏也不肯胡亂殺若與我們沒有仇恨我就放你只要你説明白魯仲道我是奉房州廬陵王的差薛剛徐美祖止聽説廬陵王三字即起身親自下來與魯仲解去捆縛問道足下是廬陵王駕下何人魯仲暗想古怪難道廬陵王名聲如此之大山中草寇都敬重他這也奇了遂應道在下乃廬陵王駕下大夫魯仲奉千歲的旨往太原聘請賢人屈浮魯那車上即是聘禮薛剛聽了分付速把魯大夫的從人放了綁車上禮物不許亂動快備酒筵與大夫壓驚魯仲道好漢尊姓大名何以聞吾主之名而不加誅反如此相待薛剛笑道我也自然有個名姓少待便知請問大夫有一個武國公馬登可在房州麼不知魯仲如何答對請看下回便知端的
