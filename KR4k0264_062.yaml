body:
  text: 第六十二回薛剛三祭鐵丘墳元培私放通城虎再説九焰山薛剛一日對徐美祖道目今又是新春元宵諒長安花燈必然更盛我趁此熱鬧再去鐵丘墳上祭掃一番又可順路到鎖陽城姑丈處借些人馬扯起旗號然後去請廬陵王軍師你道如何徐美祖道你此去還有一樁大喜事逢凶化吉小弟在此守寨便了吳奇馬贊南建北齊道小弟四人陪三哥去美祖道妙極吳馬二位待祭過墳後即回九焰山南北二位同到鎖陽城去便了薛剛大喜次日五人打扮做客商拜辭下山往長安而來一日到了長安把馬匹著小校在十裏亭外藏身等候五人入城已是傍晚遂投入店中叫店主買了些雞魚豬首之類已是初更時分薛剛留起祭祖三牲其餘做下飯五人吃得酒醉飯飽算還了飯錢五人暗拿三牲出門直往鐵丘墳而來到了墳上已是三更守墳軍俱備睡熟五人挖開石碑折門而進摸到墳頭取出火種排下三牲薛剛倒身下拜叫聲父親母親孩兒今同四位義兄前來祭掃已經三次今孩兒要到鎖陽姑丈處借支人馬保廬陵王中興拿獲二張武氏以報三百八十余口之仇今日特來祭掃望乞陰靈保佑一路平安祝畢五人一齊放聲大哭外邊守兵聽見哭聲呐喊起來五人各出短兵一齊動手這幾個守兵那是他們的對手個個逃走薛剛將一帶房屋放起火來叫聲走罷直望光泰門而來守門軍士看見火起一齊跑來救火正遇五人一場亂殺殺死門軍斬開城門逃出來至十裏亭早有小校伺候一齊上馬竟往潼關而來那武三思得報點齊人馬飛奔鐵丘墳來到半路報説薛剛五人斬門而逃三思分付出城追趕此時武承嗣亦領兵趕來再説那潼關總兵尚元培乃尚司徒之孫秦湖之子得報薛剛三祭鐵丘墳而來大驚想道薛剛薛剛你不想報仇只管來祭掃你也不算是好漢忽又想道朝中元老俱已喪亡先輩功臣俱出遠鎮我今若不救你誰人肯救分付開關薛剛五人到了潼關見關門大開並不拉住五人縱馬出了潼關薛剛著吳馬二人回九焰山自同南北二人往西涼鎖陽城而去那武三思追至潼關才知尚元培放了薛剛五人出關他知關外路雜沒處拿獲送回兵長安住武承嗣奏聞武後説尚元培放走薛剛五人大為國患武後聞奏大怒削去尚元培的兵權敕鎮囗陵鎮旨下著五軍都督關仁守此潼關按下不表再看下回
