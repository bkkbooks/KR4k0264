body:
  text: 第二十一回三思領旨剿薛剛鸞英荒郊産男兒卻説潼關總兵尚元培聞報薛剛祭掃鐵丘墳殺出長安一路下來將近潼關暗想今薛剛造下大逆把他一門盡行殺絶甚是可伶今止存薛剛一人我安忍下手拿他使忠武王無後遂分付軍士大開潼關不許阻攔薛剛憑他過去話説薛剛馬登行到潼關見關門大開並無攔阻遂放心出了潼關行過數十裏到一林子下二人下馬少歇薛剛道蒙大人拔刀相助救我出來恩德難報只是大人家中妻小豈不被害馬登道不妨我妻已亡止有小兒馬成已寄在魯王府內請問你鬧花燈之後一向在於何處薛剛就把逃至臥龍山得遇紀鸞英之事説了一遍因前日聞一門被殺五內俱裂所以前來祭掃若非大人相救剛又死于武氏之手矣我日後定要招集義兵殺上長安大報此仇大人如今要往何處去馬登道但願你日後報得此仇也不枉我救你一場我今要往湖廣房州去投小主以圖中興大事薛剛道大人若到房州見小主乘便與我上一本如小主肯赦我之罪我便招集義兵保他中興天下馬登道我自然替你留心二人遂在林下對拜四拜灑淚而別馬登自往房州去了薛剛自回臥龍山而來再説武三思拿不住薛剛止拿了兩小校夾訊時方知薛剛在臥龍招親落草遂入朝啓奏道薛剛勇悍無比臣已將他困在鐵丘墳內正待受縛不料反了馬登來助薛剛並力殺出走了只拿住跟薛剛來的二個小校供稱薛剛在徐州臥龍山與紀鸞英成親落草請娘娘發旨定奪武氏聞奏大怒即下旨拿馬登家屬時已無一人在府武氏發旨天下捉拿叛臣馬登一面封三思領兵大元帥往臥龍山擒拿薛剛且説薛剛回至臥龍山見了鸞英把祭掃鐵丘墳及馬登相救之事一一説知鸞英道只苦了二個小校定沒了性命官人平安而回萬千之幸過了數日嘍羅飛報上山説武三思領兵十萬望臥龍山來了薛剛道這廝欺我他人馬雖多焉能拿我分付衆噗羅小心把守山口木城待兵到日再作計議且説武三思統兵到了臥龍山放起號炮把山四面圍了個水泄不通薛剛與鸞英在山頂上往下一看只見將勇兵壯刀山劍海儘是大兵好生厲害鸞英道官人你我雖不懼怕但四百嘍羅怎能與十萬雄兵迎敵薛剛道你且守住山寨待我單刀匹馬殺下山去先殺他一個下馬威使他知道我的手段説罷頂盔貫甲揮了丈八矛飛身上馬開了木城沖下山來武三思見薛剛匹馬下山忙令三軍奮力齊上刀兵雲集把一個薛剛團團圍住三思遂分一半人馬圍住薛剛廝殺一半人馬乘勢大布雲梯沖上山來那四百嘍羅早已懼怕一齊崩潰鸞英叫一聲忙奔入後寨解開盔甲將薛蛟袱抱懷中把衣甲包好提刀上馬殺下山來橫衝直撞踏入千軍萬馬之中找尋薛剛人多得很那裏去尋且説薛剛正在死命對敵忽見臥龍山上火起恐山寨有失把矛一舉殺出重圍來至山下看見山上木城俱是唐兵占住薛剛大驚知山寨已失只得回馬後又殺來正遇武三思叫喊薛剛大怒挺矛直取三思三思掄刀來迎薛剛左手執矛逼開三思的刀右手舉鞭迎面打來三思叫一聲不好急忙閃開時一鞭正中肩上大叫一聲急急敗下去了薛剛又連挑數將下馬才殺出重圍落荒而走再説鸞英殺得血透重鎧尋不見丈夫奮勇殺出重圍也自落荒走了且説三思雖然打破臥龍山只破得薛剛巢穴那裏拿得他住仍舊被他走了武三思又發文書各處緝拿薛剛自整人馬回長安而去且説紀鸞英一馬落荒走了七十裏不見後面追趕喘息少定看懷中薛蛟且喜無事但身中懷孕戰了一日不覺腹內作疼只得慢慢催馬而行不上十裏腹內如同刀割胞水淋漓想是必要生産看四下又無人家一派都是荒山野地無奈何只得下馬將馬拴在樹上懷中解下薛蛟將甲卸下倚著葵花樹身席地而坐聲聲叫苦連疼幾陳立時生下一子且喜鸞英乃是有力之人住了一會精神少定把小兒看時是一個男子心中大喜但見生得面孔皮肉竟與薛剛無二此子按上界鐵石星官臨凡當時鸞英扯了半領戰袍抹幹了小兒身上之血又將半領戰袍包了不住傷心止不住流下淚來因在葵花之下生的便取名薛葵欲知後事請看下回分解
