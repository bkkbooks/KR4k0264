body:
  text: 第七十七回武承嗣巧排十陳徐美祖料敵如神當下武承嗣出朝歸府即發十道文書差官星夜往各鎮調取十路節度使各帶精兵一萬前往九焰山聽候調用這十路人馬是那十路的山東濟南節度使童京河南衛輝節度使張宏義隴西漢陽節度使龍在保河北漢上節度使馬飛龍汝南臨清節度使龐文太原晉陽節度使殷定文西夏零陵節度使段文龍雲中雁門節度使金光燦京兆弘農節度使尉遲元中山范陽節度使趙能這十路節度使一見文書即點齊人馬起身武承嗣點了十三萬人馬以楊雲從吳定海為先鋒江文龍餘起蜃為左右護衛一齊起身往九焰山來遂路張榜招賢按下不表且説九焰山破了連環馬羅英辭別回去一日細作打聽武氏命武承嗣為帥召集十路諸侯共名二十三萬來打九焰山忙忙報上山來廬陵王聞報即命徐美祖整頓人馬準備交戰徐美祖將英雄花名册上一點卻是薛剛吳奇馬贊南建北齊馬登桓柏鄭寶烏黑龍烏黑虎烏黑蛟烏黑豹烏黑彪薛蛟薛葵薛雲薛鬥周成孫安敬暉又將偏將姓名一點卻是張天任王莫仁屈廷龍焦紅須楊應彪湯鐵頭錢蒙李進鄭英龐義董千里衛廷龍狄彪濮元馬成余光大將偏將共有三十六員外有紀鸞英披霞公主女將二員徐美祖點完就令鄭寶與錢蒙龐義領兵五千到龍川埋伏只等中山趙能兵馬到來當如此如此又令馬登與張天任楊應彪領兵五千離龍川十裏埋伏如見趙能追鄭寶過去可如此如此鄭寶馬登得令領兵而去卻説中山節度使趙能領一萬人馬先奔九焰山來到了龍川忽聽得炮響趙能即縱馬進前看見鄭寶喝道你這反賊如何敢阻天兵去路鄭寶並不答話掄斧即砍趙能背後沖出一將乃都統制朱標舉兵抵住二人戰不幾合鄭寶詐敗趙能令三軍一齊追趕追過龍川約有二十裏忽聽得後面炮響連天早有馬登埋伏人馬從趙能背後殺來鄭寶聽得炮響忙領人馬回身殺來趙能前後受敵馬登把朱標一槍刺落馬下周兵大亂各自逃散唐兵重重圍住趙能亂箭齊發趙能身中數箭落荒而逃鄭寶馬登得勝回山不表且説武承嗣大兵一到聞知趙能兵敗吃了一驚只是安尉趙能道勝敗乃兵家之常事不日掃平九焰山便了不上數天十路諸侯俱到又兼一路上招募了八百餘人內中有七個好漢一個是潞州人姓賈名超有千斤之力善使鐵鞭一個是蘇州人姓陸名雄善用長槍一個是雲南人姓戴名永昌力敵萬夫一個是五台和尚名叫元化善使雙棍一個是中山鐵冠道人名叫龍虎真人使兩口寶劍善能飛起百步傷人又有兩個兄弟姓糜名大龍大虎二人步如飛騎十分凶惡當下武承嗣就與參軍程實商議在九焰山前排下一個十面埋伏陳要捉薛剛即令點齊名將卻是共有二十一員大將武承嗣離九焰山三十裏布下十陳先命山東節度使童京帶餘起蜃領兵一萬為第一陳按乾官方位青旗青馬青甲青袍次命汝南節度使龐文帶賈超領兵一萬為第二陳按坤官方位緑旗青馬翠蓋藍纓又命河南節度使張宏義帶楊雲從領兵一萬為第三陳按離宮方位紅旗赤馬絳甲紅袍又命隴西節度使龍在保帶陸雄領兵一萬為第四陳按震宮方位青旗白馬銀盔紅袍又命河北節度使馬飛龍帶糜大龍領兵一萬為第五陳按賣官方位皂旗黑馬烏甲玄衣又命西夏節度使段文龍同糜大虎領兵一萬為第六陳按艮宮方位花幡黑馬緑鎧紅袍又命太原節度使殷定文同吳定海領兵一萬為第七陳按兌宮方位素旗白馬銀盔白甲又命雲中節度使金光燦同江文龍領兵一萬為第八陳按坎宮方位黃旗盔甲金色袍馬又命京兆節度使尉遲元同戴永昌領兵一萬為第九陳按太極之形皂纛白幡白馬烏衣又命中山節度使趙能同僧人元化領兵一萬為第十陳按九宮之象總八卦之形花旗花馬花甲花袍武承嗣命完十將布下十面埋伏陳連營六十裏早有細作報上九焰山廬陵王聞報大驚徐美祖道主公勿憂那十路節度使人心不一只要破他一陳其餘自然瓦解況陳連營六十裏此乃兵家大忌待臣遣將立破此陳須用火攻包管燒他片甲不留明日先見一陳觀其動靜便了欲知後事再聽下回分解
