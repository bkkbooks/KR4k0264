body:
  text: 第三十九回射飛鴉太子受辱買雨具得遇東宮當下陳進笑道襟兄可知愚蠢不須誇祖德英雄莫論出身低他今日身雖貧困在此服役焉知後日發迹不如弟與兄之今日乎馬迪哈哈大笑及至席終這胡家與東門相近衆親友乘興步出東郊玩景馬迪自誇箭稱神射百發百中衆親友請試射一回觀看馬迪取弓箭在手道看我射那第三株柳樹及開弓射去果中第三株柳樹衆親友齊聲喝采馬迪揚揚得意閃過進興道姑爺射這柳樹乃是死的我能射空中老鴉頸上落下來與衆位大爺發一笑何如胡發道狗才你敢與姑爺比射麼全沒規矩陳進道何妨逢場作戲論甚規矩就取弓箭付與進興進興接搭弓箭嗖的一聲正中老鴉穿頸而落陳進喜極道手段真真高強衆親友一齊喝采道進興手段高於姑爺馬迪滿面羞慚胡發怒視進興一齊回家馬迪忿怒作別而去衆客一齊散去胡發大怒喝罵進興好大膽奴才你與姑爺比箭叫他生氣而去取過板子便打英嬌也罵胡發舉起板子盡力亂打打得皮開肉綻鸞嬌聞知慌忙出來扯住胡發道母舅這比箭之事我聽得説都是我家的廢物惹起來的禍根看我薄面饒恕了他罷胡發喝聲奴才若不是陳家姑娘分上定打死你這奴才可憐把個進興打的一時爬不起來叫人拖往柴房丟在鋪上遍身疼痛身都翻轉不來文氏與鳳嬌聞此知事悄悄來到柴房紛紛淚下叫聲賢壻打是你這般狼狽如何是好我暗地取些粗飯在此你好歹吃些將養將養罷進興道嶽母這也是我命定該受此苦把飯放在此且放心請回我雖打壞卻不至傷命不久就有出頭日子文氏放下飯悄悄回去次日鸞嬌悄地來看文氏鳳嬌叫聲大舅母鳳妹我聽得繡娘説比合朱砂記妹妹許了進興如今被二母舅打壞了睡在柴房須用心看待他將養好了早些離此地在此毒狠人家做麼文氏鳳嬌含淚點頭自此文氏不時常到柴房來看看進興進興在柴房睡了半月有餘也全虧文氏與繡娘私下與他將養好了棒瘡依然在店中料理不提且説曹彪奉馬周之命帶了幾個軍士四下尋訪太子下落尋到通州忽然下雨要買雨具打從胡家門首經過看見太子驚喜交集太子見是曹彪丟個眼色曹彪會意閃在僻靜處等候進興假作出恭來至無人之處曹彪跪下口稱千歲臣奉馬爺將令迎請聖駕馬爺現屯兵翠雲山專候駕到即舉大事請千歲即行太子扶起曹彪道我在胡家已有七月難得胡大姆相待又將女兒許孤為妻受他許多恩惠豈可不別而行你們且退待至晚間可到後門等我曹彪道千歲須要謹慎不可泄漏風聲太子點頭依舊回店到了晚上店中內外人都睡了太子來至廚下恰好繡娘也來太子上前淚如雨下道嶽母我叔父差人來接我我令他晚間等候同去頃刻就要離別了文氏聞言悲喜交集鳳嬌看見丈夫紛紛淚下文氏道賢壻你令叔是誰太子道我叔父現在邊庭為官故此差人前來接我同到邊庭圖一出身若得身榮即差人來迎接嶽母小姐同享榮華不必悲傷安心等待不知文氏如何且聽下回分解
