body:
  text: 第五十三回鳳嬌失落玉裹肚陶仁監內困真龍話説這日是陶仁的壽誕前廳大排筵席請拜夀的親友上邊垂簾卻是女眷在內吃酒看戲此時鳳奴也立在簾內丫環隊裏看戲徐英走來見了鳳奴挨身在後伸手亂捏鳳奴不好聲張急回身至房中關上房門門坐當時唐王在廳暗想此時夫人小姐衆人都在外邊看戲此刻不去會會恩妻更待何時假作更衣起身入內只見房門緊閉急忙叩門鳳奴暗想徐英狗頭心尚未死又來叩門且待我打他幾下出氣開門迎面一掌正中唐王臉上唐王叫聲恩妻為何打我鳳奴見是丈夫忙把徐英之事説了一遍以此錯打你今快快出去恐怕小姐進來唐王道他正在看戲決不進來就把門關上抱住鳳奴親嘴兩人説説笑笑正要相親之時忽聽小姐在外叩門二人大驚急忙放手唐王鑽入床下風奴走來開門小姐罵道好大膽的賤人你與那不羞臉的在此做什麼鳳奴道姑爺並不在此小姐道我在外邊聽了多時分明是你二人在房內説笑你把他藏過了來抵賴麼叫丫環取鞭子來我活活打死這賤人鳳奴距下哀求饒命小姐把他按翻在地用鞭痛打唐王五內崩裂忍不住從床下扒出來扯住小姐道賢妻饒他罷小姐更怒道我打丫頭與你何干只管又打唐王無奈只得覆在鳳奴身上替打小姐氣的手足冰涼外邊夫人聞女兒與女壻爭鬧急忙入內勸解只見女壻覆在丫頭身上代打又氣又好笑只得喝住女兒唐王往外邊去了夫人叫起鳳奴不料身邊吊下來一個玉裹肚夫人拾起一看見上有五爪暗龍不覺大驚便問這東西可是姑爺與你的麼鳳奴道是我母親與我的夫人道胡説遂拿玉裹肚來到自房叫人請老爺進來陶仁入內夫人道我有一件東西與你看陶仁接來一看道此乃皇家之寶夫人哪里得來夫人道是女壻與鳳奴作表記的我看女壻相貌不凡決非李國作必是唐王李旦假冒前來成親定有別故你去試他一試陶仁點頭拿玉裹肚出廳待客散後叫聲賢壻那風奴我不難與你為妾但他是唐王李旦以玉裹肚聘下的我不久就差人送他到漢陽去賢壻不必想此女唐王聞言只認他是實話欠身答道實不相瞞我便是李旦王欽見唐王吐出真情吃了一驚急忙出去飛身上馬奔回漢陽去了當下陶仁試出真情假作失驚連連告罪唐王稱謝陶仁回至廳後暗暗分付把前後門重重關好急忙入內叫聲夫人此人果是李旦我欲將他拿下解上長安女兒終身怎處欲不拿他萬一長安聞知合家性命難保事在兩難如何是好徐英在旁道老爺可知武則天以陰人竊位終非真主唐王乃高宗太子又與小姐成親三月若拿了唐王叫小姐終身怎處小姐道有甚怎處月亮裏吊燈空挂其名徐媽媽道小姐可知一夜夫妻百夜恩若送唐王回去日後中興天下小姐難道不是皇后娘娘麼小姐道見什麼鬼如今尚未中興就無心與我若中興了天下做了朝廷有三宮六院一發無心與我了衆家人跪下道老爺休聽徐英母子之言目今公子現做著周家的山海關總兵之職如何反放李旦陶仁就問女兒你心下若何小姐道這不關我事爹爹若要抄家滅門放他去就是了陶仁定了主意分付拿下衆家人凶如虎狼奔到前廳把唐王拿下上了刑具鳳奴看見大放悲聲陶仁道鳳奴也放不得分付亦上了刑具與唐王一同送去湘州監中即時修下本章差人送上長安湘州城門緊閉只候旨下施行要知後事再聽下回
