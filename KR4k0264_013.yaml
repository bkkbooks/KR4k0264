body:
  text: 第十三回小神廟薛強遇師大宛國公主招夫再説李承業一到盜馬關開讀詔語當堂即拿了薛勇其余家人都已逃散只拿他夫妻二人國解長安而去且説薛強與四個將佐在太行山進了香正回長安路上聞聽薛剛大鬧花燈踢死皇子驚崩聖駕一門盡被拿入天牢又在盜馬關拿了薛勇不久盡行殺戮單走了薛剛薛強詔頒天下畫影圖形捉得十分緊急薛強一聞此信唬得魂飛魄散一句話也説不出來家將道四爺苦回長安必受其禍不如逃走為妙薛強道三爺造此大罪一門受戮我要獨逃何忍父母受誅不如前去長安同父母一死家將道此言差矣若回長安同死豈不絶了千歲的後代不如逃避也好傳宗接代薛強道此言有理但爾四人同行未免著人動疑只好分路各自逃走四人聽了此言無奈只得分路而去且説薛強往雁門代郡而逃果然遍處畫影圖形捉拿其急不敢從大路而行只向村僻小路而逃正行之間忽然陰雲四布下起雨來並無人家可躲只見土岡之下有一座坍塌破廟隱隱有小神廟三字入廟見四下無人便倒身下拜叫聲神聖我薛強今日遭此大難父母一門盡囚天牢我逃難至此但願神聖庇佑得脫虎口有處安身日後重整家聲情願重修廟宇再塑金身祝畢站起身來不想神後跳出一個人雙手把薛強抓住喝道好大膽外邊畫影圖形正要拿你和薛剛今日我先拿你去請賞薛強大驚把那人一看原來是個道人忙叫道人你當真要拿我去麼道人笑道貧道特有話與你説在此等你多時前言相戲耳我乃終南山林淡然大師門人興唐魏國公李靖便是薛強聞言下拜道原來老師就是興唐魏國公請問老師在此等待薛強有何分付李靖道我今勸你不必埋怨薛剛這也是前世之仇但新君不久廢黜大唐天下屬於女主日後滅武興李中興皇唐天下還在薛剛與你今日貧道特來送你一個所在完你宿世姻緣日後威鎮山後獨霸一方等有了親丁十二口方可歸保太極上皇光明大帝臨凡的真主重整李氏江山緊記吾言速隨我來看官你道這大帝臨凡的真主是誰就是高宗元配王皇后所生的太子李旦隱在江夏王府中的便是當下出了小神廟李靖袖中取出一方帕子鋪在地上叫薛強坐於帕上分付閉了雙眼口中喝聲道起一聲響亮騰空而起薛強緊閉雙眼身若浮雲傾刻間不知過了多少路又一聲響落於平地薛強開眼看時不見了李靖卻是荒郊野地把帕子一看卻是一塊石板但不知此處是何地方遠遠望見有人而來穿的衣服另是一樣頭髮打著六股結遂上前問那人道請問這裏是何地方那人道這裏是大宛國那邊就是國王住的城池看你打扮像是中國人為何來此薛強道家父經商外邦久客未回尋訪至此那人道你父既是客商必在城內可入城去問薛強別了那人竟往城內而來行不數裏已入城中只見人煙湊集街市熱鬧當下投了旅店吃了吃飯安眠一夜到了次日天明起來用過早飯遂走出店前見行路之人都打扮的齊齊整整一隊隊一陳陳如螞蟻一般往來薛強問店主今日街上為何如此熱鬧店主道小爺你初到此所以不知我這國裏的國王生了一個如花似玉的女兒名喚九環公主七歲能文又善用兵手使一杆梨花槍槍法精奇各邦鹹服今年長成一十七歲國王要與他招一個駙馬公主説姻緣原是天定求父王在教場中搭一座彩樓待孩兒擇日上樓對天拜祝拋球定婚不論外邦本國也不論相貌醜俊即招為駙馬國王依言發旨在教場搭一座彩樓擇定今日公主在樓上拋球招駙馬這些人都打扮了到教場去俱是想做駙馬小爺你也該教場中去看看熱鬧薛強道既如此我就去看看遂起身出店直往教場而來未知何如請看下回分解
