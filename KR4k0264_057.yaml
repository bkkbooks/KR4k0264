body:
  text: 第五十七回漢陽城災病立除仙丹藥救活王曹當下徐孝德見四人誠服就問姓甚名誰那金臉的道小人姓張名籍這三角頭的名常建這藍臉的名高郢這五花臉的名馬暢小人四人在此紅花山落草聚有三千人馬敢問仙師法號因何至此孝德道貧道姓徐名孝德乃皇唐英王茂公之孫江淮侯敬猷之子自幼在山學道今往漢陽保唐王中興路過此間我看你四人武藝超群何不歸保唐王日後中興自有蟒袍玉帶加身四人道老師若肯收納小人願從驅使孝德大喜四人相請入寨備齋款待齋畢孝德又分忖道目今唐王有難我先去漢陽相救你四人且在此等到七月十七日領衆到臨江九方山如此如此拿住李承業解往漢陽以見唐王其功不小四人允諾相送起行孝德山寨駕起雲光來至漢陽往下一看只見城內路無行人煙火斷絶孝德念動咒語拘到本城土地喝道好大膽毛神焉敢奉黃景亮之法安插妖旗快快與我拔去土地應諾即將二旗拔去城中上自唐王下及兵民頭痛俱備立止唐王坐殿文武齊集唐王道寡人心中以為天已滅孤不料頭痛上下俱止真國家之大幸也但只王欽曹彪二人將危加之奈何忽報道有一少年道人自稱是徐孝德要見千歲唐王分付請進來孝德至金階前俯伏山呼唐王親自下來扶起道王昆江淮侯為孤身亡至今懷恨尚未報仇今兄從何至此孝德道臣自五歲時蒙王鼎真人攝臣上山學法今已十二年今聞主公起兵漢陽被黃景亮妖旗所壓有頭疼目突之災臣特來救駕再者神嗷咬傷曹彪神鞭打傷王欽臣亦可救之唐王大悅分付快擡曹王二將到殿但見二人命在將危孝德取出丹藥用水灌入二人口中二人登時大叫一聲疼殺我也翻身跳起復舊如初見了唐王問明緣故二人拜謝孝德唐王即封徐孝德為護國軍師按下不表再説黃景亮正與李承業議事忽報漢陽城上兵將往來勝于往日李承業驚訝道將軍之法如何不靈了景亮按指一算大叫一聲是了進提刀上馬大怒出營來至城下大呼討戰不知後事若何且聽下回分解
