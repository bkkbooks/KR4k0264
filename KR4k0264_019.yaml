body:
  text: 第十九回江淮侯訴出原由通城虎知情痛哭話説馬周請小主李旦並杜回到家一面與二妻林氏李氏王欽曹彪説知情由悄悄連夜收拾到了五更林氏夫人並王欽曹彪妻子家小先行出城馬周與李氏夫人王欽曹彪杜回保小主一同上馬起身出了長安過了潼關向揚州一路而來一日到了揚州賃房安下家小馬周與王欽曹彪杜回保小主到節度大元帥英王轅門馬周對軍士道我們是京中來的有個柬帖煩你報進去軍士接了傳遞入府此時敬業在府中正與駱賓王商議恢復忽傳進一個柬帖來敬業把柬帖一看呵呀了一聲説小主駕到了忙整衣冠與駱賓王火速出府俯伏在地口稱小主老臣敬業與參謀駱賓王接駕李旦雙手相扶道老功勳請起敬業迎小主至銀安殿率駱賓王山呼朝見然後馬周率王欽曹彪杜回參見英王又與駱賓王見禮取出江夏王來書細述長安諸武專權武氏淫亂之事敬業看了書道小主老臣正欲興兵入長安以靖妖孽扶小主登龍不意小主駕臨實為萬幸待老臣修書差人星夜上長安知會臣弟敬猷叫他速來以免為武氏所害一面調集人馬操演軍兵保小主入長安中興天下駱賓王道老元戎速修書知會令弟待參謀做一道檄文遍告天下以討武氏名正言順萬無不克敬業大喜即刻修書差家人星夜奔長安一面調集人馬下教場操演且説家人趕到長安江淮侯府見敬猷呈上來書敬猷拆書看了方知其故忙上本回鄉祭掃即日收拾家小帶了薛蛟起身出了長安過了潼關取路往揚州進發一日行到徐州臥龍山忽聽一聲呐喊湧出百十嘍羅大呼來者休走留下買路錢方許過山敬猷提刀在手一馬上前喝道好大膽強盜擅敢攔阻官府去路只叫你賊頭過來受死衆嘍羅見來人不善不敢下手遂著一個嘍羅飛奔上山報知薛剛薛剛提戈上馬沖下山來敬猷橫刀一看認得是薛剛吃了一驚大叫一聲來的莫非是通城虎薛剛麼薛剛擡頭一看見是敬猷即拋戈下馬敬猷也下馬兩下相見薛剛道老功勳念薛剛正月十五夜酒後闖禍奪門而走逃到此山遇見寨主紀鸞英相招成親避身在此不知我父母並一門老少如何已差小校上京打聽尚未回來敬猷道你闖了大禍逃至此山得了妻子卻害得你父兄一門不淺且到你山上細細説與你知道薛剛即請敬猷上山敬猷分付家丁將車子且住在寨外自己同薛剛入聚義廳見了紀鸞英行了禮薛剛問道我父母怎樣了敬猷道説起來卻也傷心自從正月十五夜你大鬧花燈踢死皇子驚崩聖駕武後發旨差武三思統兵圍住府門將你父母兄嫂一門老少俱拿入天牢又差李承業去盜馬關拿你二兄夫婦至京因新君仁慈不忍殺你家被武氏廢為廬陵王貶在湖廣房州安置武氏自臨朝稱制衆功臣欲救無門我不得已將親子孝思悄入天牢換出你侄兒薛蛟可憐你父母兄嫂一門老少三百八十餘口盡行殺戮單單駕雲走了樊夫人並攝去了小兒孝思又在你家府中掘一大坑把這許多尸首堆垛坑內用三皮石板生鉛溶化澆蓋取名鐵丘墳薛剛聞言大叫一聲雙足一跳哭暈在地鸞英火速來扶薛剛哭死還魂敬猷道通城虎你就哭死也無濟於事薛剛道我闖此禍應該萬死若是新君把我家抄殺了也罷了這淫賤武氏無非是興龍庵內養漢的尼姑不念我祖父有天大的功勞竟將我全家殺戮這冤仇怎解我定要殺上長安拿住武氏井諸賊臣萬剮千刀開鐵丘墳以報三百八十余口之仇才出我這一口惡氣敬猷道但願你能報仇誠萬千之幸也出出衆功臣心口悶氣目今武氏專權親王的兵權盡皆削去將來必有大變我今有事要往揚州與家兄計議恰好與你相遇今將令侄薛蛟交還你也可完我一時仗義存孤之意説罷叫家丁抱過薛蛟付薛剛接了薛剛請敬猷上坐拜謝救侄之恩兩下對拜了四拜寨中早備下筵席款待敬猷略飲幾杯作別就行薛剛苦留不住夫妻二人相送下山而別敬猷自往揚州去了欲知後事再看下回分解
