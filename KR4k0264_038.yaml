body:
  text: 第三十八回楊繡娘為媒説合陳解元暗結英雄當下繡娘走進廚房來叫聲大安人我今夜三更夢見一位金甲神説楊氏一生行善今與你大大富貴又説幡桃會上結姻緣玉女真龍下九重入胎曾印朱砂記速定婚姻切莫遲叫我與鳳嬌做媒許配進興日後有大富貴所以老身起早來與安人説知正説之間恰好進興來取湯文氏道進興你左手上可是半個朱砂記麼進興道正是文氏叫女兒伸出右手來與進興左手一比比起來猶如一顆印印的一般繡娘道一點也不差進興你今晚等人都睡熟了悄悄進來大姆有話對你説進興應了一聲取湯出去了到了天晚進興見人都睡了悄地來至廚下文氏繡娘鳳嬌都在房中進興道大姆叫我晚間進來有何話説繡娘就把夢中之事説了一遍如今大姆央老身為媒把風娘許你為妻進興道大姆差矣我是下賤之人焉敢配小姐文氏道不必推辭是我情願把女兒許你一言為定永無改移進興便道嶽母請上受小婚一拜拜將下去文氏回以半禮繡娘恐英嬌尋他先回房去進興道小壻今日在患難之中無物為聘隨身有一玉裹肚權以為聘禮遂貼身解下送過來道此物付與小姐收藏切不可與人看見恐有不測文氏接來交與女兒叫聲賢壻天晚了你去睡罷進興聞言亦自去了母女二人在燈下細看玉裹肚上有兩條暗龍鱗甲如活毫光閃閃真為至寶母女二人想道此物非民間所有你看進興必非下賤之流日後定然大貴説畢母女二人亦自睡了按下不提卻説馬家擇定吉期要聚英嬌過門到了吉日馬迪親迎英嬌嫁到馬家去成親一到滿日擇日回門先一日刁氏叫丫環到廚下對文氏道明日英娘回門馬家豪富須要體面二安人説你母女衣服破碎不可出來撥一升米給叫你母女二人到柴房過一日要績一斤麻線母女聞言暗暗傷心話説繡娘一日到陳進家間走偶然説起胡發夫妻相待文氏母女之事便將神來托夢比合朱砂記已許與進興之事説知陳進夫婦道看進興相貌豈是久窮的人將來富貴了也與他母女出口氣再説到了回門之日陳進夫婦亦來到胡家陳進在外廳陪客鸞嬌入內與舅母刁氏表妹英嬌見禮鸞嬌道大舅母鳳妹為何不見刁氏道休問他二人在此吃死飯穿的又破碎如今關在柴房裏不許他出來鸞嬌道窮富也是人之常事卻有何妨刁氏道他母女若出來馬家衆人見了豈不笑殺叫你表妹何以做人鸞嬌聞言默默不語再説陳進在外廳上與馬迪衆親友行了禮回頭看見進興便深深一揖胡發道解元這是我家小廝如何與他行禮陳進道舅公人不可貌相水不可鬥量但他目下雖在此服役甥壻看他相貌不凡日後定居人上敢不以禮相待衆親友皆掩口而笑胡發道下賤之人日後如何能居你我之上解元還當自重及至入席進興侍立斟酒凡與陳進斟酒陳進必定立起雙手捧杯道得罪了馬迪仗著自己是總兵的公子便笑道陳進兄的本性敢是做上而敬下麼不知陳進如何回答且聽下回分解
