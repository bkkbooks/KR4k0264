body:
  text: 第九十八回武三思復弄權柄雙孝王出居外藩當下薛剛出朝將張天左張天右許敬宗薛敖曹張易之張昌宗一班姦犯令押至先人墳前開了囚車從新捆縛喝其跪下點起香燭叫薛蛟薛葵薛雲薛鬥取出利刀先將六人心肝挖出後把六人首級砍斷將心肝首級排在墳前薛剛跪下哭祭一番復令軍士將六人身尸萬刀砍碎不準收埋丟在墳外任鳥獸所食以警後來姦黨薛剛隨即進朝復命不題再説武三思自與武後入宮後常與韋後眉來眼去二人遂私通起來情如膠漆十分恩愛一日三思在韋後宮中忽遇著中宗中宗道汝來何事三思跪下奏道臣蒙陛下不殺之恩但臣在宮中國事不聞無由以報陛下臣想欲與群臣並列朝班分理國政庶幾得效犬馬之勞以報不殺之恩故特來見駕奏聞中宗道卿既有心代朕分勞仍居丞相之職並立朝班可也三思謝恩退出次早仍著舊日冠帶立在殿座邊候駕登殿衆臣進朝一見武三思如此形狀盡皆不解又見武三思勢位炎炎亦不敢多言朝罷各各退去不表卻説武三思再居相位之後凡遇中宗不在宮中之時即來與韋後歡飲戲謔言來語去已知韋後殘忍淫亂不減武後並欲效武後勾當遂與武三思共謀其事武三思道今請功臣在朝又且皆掌兵權所謀之事如何有濟娘娘當早奏陛下説衆功臣勞苦已久今已平安則當分疆令守一邑以享升平使他得以優遊安佚不可仍付兵權以勞其身陛下當以恩報恩方不失厚待功臣之意功臣一去然後娘娘得行其志韋後聞言大喜道此謀甚善我當言之是夜中宗適來與韋後共寢交歡事畢韋後遂以三思之言長篇大章説了一遍中宗想了一想即應道果是良佐之後朕明早出朝即當分發以安功臣之身次日早朝中宗升殿群臣朝賀畢中宗即宣薛府功臣及當日隨駕復唐功臣上前諭道朕因卿恢復之力得登大位每思及諸卿勞苦心甚不安今天下既定不令卿等安享升平是朕之過也朕今封卿等出鎮外藩各食一邑使無軍務以勞其身任卿安享富貴以樂天年衆功臣不知何故無言對答只是叩頭謝恩中宗隨令學士草詔頒發功臣出鎮衆功臣各分有土地忙忙收拾行李率領家口而去那武三思見衆功臣個個都去了遂又橫行無忌革逐君子進用小人乃以宗楚客宗晉卿紀處訥甘元東為羽翼又以周刊用冉祖雍李俊宋之遜姚紹之為耳目各加官爵付以重任其所革逐者或誣以大故或只為臣惡任意貶黜殺戮不可勝述當時若功臣中之正人君子者如敬暉桓彥范張柬之袁恕己崔元日韋俱誣以譭謗韋後穢行暗令人榜于天津橋使中宗大怒逐五人於邊地化外武三思又暗遣人於邊地殺之自此三思與韋後勢傾人主穢亂宮闈致四海怨望萬民嗟歎百官不敢言其過人主有旦夕之禍畢竟後來如何且聽下回解説
