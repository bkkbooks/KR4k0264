body:
  text: 第十回貧漢受恩得武職官民奉旨放花燈話説樊梨花見薛剛回來便問道今日有何事情你這般歡喜薛剛道母親有所不知今有山西絳州族中於爹爹叔侄之稱于孩兒同輩名叫薛義貧苦異常攜妻特來投奔爹爹誰料爹爹竟不念同宗之情不惟不肯提拔他一把連面也不容他見孩兒今日在路遇見將他帶回府來叫他暫住在外邊孩兒特來與母親商議我想我家有幾個世襲的總兵前程讓一個與他去做也見得宗誼之情使他感激大哥薛猛是應襲王爵不消説起二哥與孩兒並四弟等應襲總兵尚未就職孩兒的總兵願讓薛義母親可做主移文上兵部四弟年尚幼小未可為官只把二哥名字並薛義頂了孩兒名字開名送部遇缺即補況二哥在家無事也樂得去做做官母親在爹爹面前只説開二哥名字到部千萬不可説出薛義來樊梨花道此乃我兒一片好心我依你便了這樊梨花他能知過去未來之事豈不知這薛義是張天右的家人薛剛在京兆府中救出來的他因這薛剛乃九醜星楊凡轉世特來報前世之仇要殺盡薛氏滿門以此樊夫人諸事都一順他想要解冤釋仇卻不知前世之仇深了如何解得開這才是有債有仇方成父子無緣無怨不是夫妻當下樊梨花與丁山説知就開了薛勇並薛義名字送部候選過了一月就出了兩個總兵缺一個是盜馬關總兵一個是泗水關總兵把薛勇補了盜馬關薛義補了泗水關命旨一下薛剛即與薛義料理周全薛義並妻子拜謝了薛剛自往泗水關上任去了再説薛勇拜別父母兄嫂帶了夫人邵氏自往盜馬關上任去了當下薛剛打發了薛義送了他二哥起身完了公事依舊同這一班功臣子弟在外頑耍殘冬已過又到新正將進上元佳節天子旨下京兆府及金吾等衙門告諭長安居民百姓今年都要搭燈棚廣放花燈慶賀太平其餘王公侯伯文武百官各衙門首俱要搭過街燈樓大放花燈自十三日起至十七日止通宵徹夜與民同樂長安城向來花燈極盛與別處不同如今高宗在位三十餘年烽煙不舉天下太平又奉旨大放花燈四方哄傳比往年更勝幾倍至十一日大街小巷百姓門首就都搭起燈棚來了其餘王公侯伯文武百官門首俱叫奇手巧工搭造五彩燈樓及至十三日鄉間男女百姓並三教九流人等紛紛都來長安看燈長安城內比常更多了數萬人紛紛嚷嚷好不熱鬧又兼正月十五日是興唐開國魯王程千歲的百歲壽日那天下大小文武官員都差人齊至長安要趕上正月十五日給程千歲送上壽禮更加熱鬧你説外官如何都給他送禮只因他乃開國功臣興唐大將曆保三帝榮加九錫出入建天子旌旗服色只減天子一等就是高宗也差內官代為慶賀其時魯王府中自十一日早已門前搭起一座禦賜百歲金牌坊又搭五色彩緞燈樓裝成八仙上壽王母皤桃故事都用白玉金銀珠寶穿扎奢華奪目到了十五早巡城禦吏及金吾等衙門知道天下差官送禮的多在城外作寓發鎖匙三更就開了十個城門以便天下送禮官好趕上上壽每年天子受百官上元朝賀有規矩是五更如今早了一個時辰上朝讓五更等百官與魯王上壽魯王這一日坐了銀安殿手執禦賜八寶玉如意左右列二十四個美女乃是高宗賜與為晚年之樂越王羅章兩遼王薛丁山這一班功臣子弟並親王宗室大臣都來銀安殿慶賀拜壽程咬金俱回以半禮二子諸孫代為拜謝其餘文武百官俱在殿下排至端門外總拜慶賀自五更直鬧至日午方才安淨程統程飛虎不消説沒工夫不得出來看燈就是羅章秦海尉遲青山兄弟都在府中替魯王料理事情那裏得間看燈惟有一個薛剛乃是好動的人隨他父上過了壽即回府一時心急遂等不到日落即帶了家將步行出府到各處去看燈未知如何聽下回分解
