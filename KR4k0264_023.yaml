body:
  text: 第二十三回通城虎酒醉遭擒兩英雄截途搶劫話説薛剛因連日賓士滴酒不曾到口見了酒杯便杯杯幹又兼薛義殷勤相讓不覺開杯暢飲不多時吃得酩酊大醉人事不知睡在席上如死人一般薛義喚齊家丁將薛剛拿住知他勇冠三軍用七八條麻索緊緊捆住又用手扭腳鐐挂了手足上了囚車放在私衙一面取棺木收殮夫人一面傳令軍將裝束伺候天明押解進京請功到了三更時分薛剛酒醒睜眼一看只見滿身繩索捆綁在囚車上衆將持刀防守不覺大聲喝道薛義你今拿我卻欲何為薛義道你休怨我我既做了朝廷的官難道徇私情欺皇上藏你在此麼今將你解上長安以盡臣道薛剛聞言大怒罵道忘恩負義的狗賊可記得當初囚在府獄中三日一比你妻在街上求乞虧何人救你出牢得此地位薛義道我雖因你相救到此進位但先遵君命後盡私情難道因你私情就欺了君不成薛剛看見上邊的棺木罵道狗賊你扛這棺木卻是何意薛義道他便是報你大恩的人也須説與你知道棺中是我的妻子楊氏他婦人家不知法度叫我留你一時口角相爭誤將他踢死這就是報你的思了薛剛又罵道喪心賊你結髮之情尚且不顧何況於我罷罷由你解上長安去罷到了天明薛義領了人馬押解囚車離了泗水關直望長安而去行至漢州黃草山忽聽一聲鑼響湧出七八百嘍羅兩個山大王一個生得五色花臉赤發紅須獠牙突露宛同鬼判一個生得鴛鴦瞼左邊朱紅色右邊藍靛色左邊是白眉毛右邊是紅眉毛須黃發口相貌猙獰當時攔住去路大聲喝道來者留下三千黃金作買路錢方許過山薛義聞言擡頭一看見他二人的相貌吃了一驚唬得心頭亂跳強大著膽把刀一橫叫一聲強賊你斷路也須打聽明白或斷客商或斷百姓我乃押欽犯上長安的官將焉有銀錢與你兩個山大王喝道我知道你是泗水關的總兵盡有金銀去送與姦臣就送我三千黃金也不為多或説半個不字立刻叫你作刀下之鬼薛義喝道休得胡言舉刀便砍那五色臉的拿刀只一隔乘勢一伸手將薛義抓過馬來往地下一拋衆嘍羅一齊上前用索捆了那些押解軍兵見主帥被擒丟下囚車俱各四散而逃薛剛在囚車中喊道好漢快來救我兩個大王滾鞍下馬打開囚車急急解縛連聲叫道薛三哥受驚了薛剛道二位素不識面何以知我那五色臉的道小弟姓吳名奇這鴛鴦臉的名叫馬贊都是常山人皆在此山落草數日前有一個仙人乃京兆三原唐魏公李靖老爺到此他説今日今時有泗水關總兵薛義忘恩負義拿你解上長安路過此間叫我拿下薛義以救三哥且避此山日後唐王中興皇唐天下許我二人蟒袍玉帶所以在此等候果然不差請三哥上山做寨主發落薛義薛剛大喜嘍羅牽過一匹來薛剛與吳奇馬贊一齊上馬來到大寨下馬入了聚義廳吳奇道我等豪傑作事須要直捷我們休論年齒竟遵三哥為兄結為生死之交便了當下三人對拜八拜上邊擺下三張交椅正中坐了薛剛左邊是吳奇右邊是馬贊令衆嘍羅參見了薛剛分付把薛義抓進來一聲答應把薛義手卒進大寨擲翻在地薛剛罵道狼心狗肺的賊你當初在牢中追比身價我一時仗義救你出牢又與你幹此總兵之職到而今你不想知恩報恩反用酒來迷我拿住解京貪圖富貴不料天理昭彰你竟也有今日吳奇道三哥這等沒良心的人與他説麼或剮或殺速速處置我們好吃酒薛剛分付把他綁在大柱子上先砍去手足然後剖出五臟再斬其狗頭吳奇馬贊拍和稱快寨中大擺筵席慶賀吃酒欲知後事再看下回分解
