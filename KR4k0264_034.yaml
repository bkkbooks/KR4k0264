body:
  text: 第三十四回吳奇馬贊打擂臺浮魯薛剛同見駕話説這座擂臺遠近皆知也有想做教師來打擂臺的也有想趁錢合夥來做生意的十五府的人紛紛都往房州而來當時有十餘人合夥買些貨物要往房州做生意路從黃草山經過被嘍羅拿住押至寨中來見薛剛等薛剛見那些人下邊一齊磕頭道大王爺可憐小人們都是小本經紀趁錢養家的並無甚麼財物求大王爺開恩饒命薛剛道既是小本窮民我也不難為你你是往那裏去做生意衆人道只因房州廬陵王新立一個教師叫做屈浮魯打一百日擂臺小人們特合夥往房州去做生意薛剛心中明白就知是魯仲去太原聘請的人分付把貨交還他這些人皆叩頭而去薛剛道二位賢弟我們也去房州走走一來看看屈教師的手段二來打聽廬陵王可有赦我之心麼吳奇馬贊道該去該去三人扮作客商留美祖看守山寨薛剛三人即刻下山住房州而來一日到了房州天色已晚遂入城尋店安歇次日三人用過早飯出了店門往教場中來一到教場果然十分熱鬧湖廣十五府的人也有來打擂臺的也有來看打擂臺的也有來趕市做生意的人山人海擠擁不動他三人用力擠到擂臺跟前看那擂臺用五色彩緞扎成十分好看柱上有一副對聯左邊是拳打南山猛虎右邊是腳踢北海蛟龍此時屈澤魯尚未來又見臺上左邊桌上擺著五十兩重的元寶一個並金花兩朵右邊桌上擺著彩緞百匹吳奇道這銀子彩緞是作甚的旁邊看的人説這是廬陵王的旨有人打得教師一拳者就得此銀子彩緞為彩吳奇馬贊道妙呵妙呵等他來一拳頭打下他來得了此彩真真樂極正言間忽聽得鼓樂喧天一齊説道屈教師來了薛剛三人回頭一看只見屈浮魯身高八尺面如冠玉微有胡須頭戴大紅扎巾身穿大紅四花袍坐在馬上一行百餘人鼓樂迎來來到擂臺之上卸去大紅袍內穿一件白綾緊身望下説道衆人聽著本教師奉廬陵王之旨來此打擂臺有人勝我者簪花飲酒得此全禮即授以禦營教師若不能勝我而技勇可用者也量才酌用爾等衆人之中如有本事者不妨上來與本教師比試吳奇馬贊推薛剛上去薛剛道我不上去那位高興便上去與他交手吳奇道待我上去遂把衣曳起從左邊大步搶上擂臺屈浮魯一見他那一副五色臉的相貌便暗暗稱奇想來此人定有些本事遂做了一個勢子等著他吳奇搶上臺來那裏知道甚麼拳勢送大喝一聲舉拳亂打一動手浮魯就知他不懂拳法無非有些勇力而已見他拳頭一到面前浮魯把頭一低閃過一邊就回一拳打來吳奇雙手來接他手不防浮魯飛起左腳正踢中吳奇的胸膛仰後便倒一聲響跌下臺來看的人一齊呐喊吳奇爬起來好似晦氣將軍馬贊大怒從右邊搶上臺來浮魯一看光景又知是個不識拳的見他一拳迎面打來浮魯身子一彎把頭一低從馬贊肋下一鑽鑽將過來馬贊正待回身被浮魯左手一把抓住後背有手一把抓住褲襠喝聲下去往台下只一拋一聲響跌了一個童子拜觀音看的人又齊聲呐喊馬贊也爬起來張開大口看著吳奇並無一言猶如和合將軍一般薛剛憤怒喝聲我來了雙足一縱縱上擂臺浮魯把薛剛一看便有些關心兩手一拱道請了薛剛雙手一舉道請二人分了上下立住了身子各人自做個勢子開拳相搏交手三四個轉身如一對猛虎相鬥喜得吳奇馬贊大叫道妙妙我的三哥放出手段打他下來可與小弟出氣這屈浮魯雖未曾與薛剛識面聞得薛剛身長一丈面似鍋底今見此人面貌又聽見先打下去的二人叫他三哥諒此人必是三爵主薛剛那二人必是吳奇馬贊遂雙手一叉喝聲站住薛剛收住拳頭道怎説浮魯道我雖在此打擂臺實系要訪一人我看足下莫非是魯大夫所説的黃草山薛三爵主麼薛剛道正是浮魯道不用交手了千歲等候久矣且同到草舍説明再見千歲薛剛聞言大喜浮魯穿了袍挽薛剛下臺吳奇馬贊道奇哉莫非打不過和了麼薛剛搖頭浮魯分付牽三匹馬過來與三人騎四人上馬出了教場來到屈浮魯府中下馬入麻各各見禮坐下浮魯道小主聘我到此相托中興大事魯大夫又力舉足下保駕起兵小主大喜即欲差官召你因恐泄漏風聲為害不淺因此借擂台名色欲見足下果然三位俱到你雖有罪小主曾對我明言赦你如今可放心同我去見小主薛剛大喜三人同屈浮魯來至廬陵王府浮魯先進內奏知不知後事如何且看下回分解
