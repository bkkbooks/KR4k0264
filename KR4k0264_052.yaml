body:
  text: 第五十二回入繡房夫妻重會得寶鏡曹彪回營卻説徐英一心想著鳳奴不能遂意朝思暮想害了弱病想道不若去求姑爺送走至書房向唐王跪下道小人有一事求姑爺救小人一救唐王道你有何事起來説徐英道小人有一過繼的妹子名叫鳳奴是夫人從江巾撈救來的小人要想他做妻子求姑爺對老爺夫人説聲把風奴配了小人足感姑爺的大恩唐王道此事何難管保配你徐英大喜叩頭而去唐王暗想鳳奴是怎樣使他如此思想遂步入內宅來衆丫環齊齊站著唐王道那一個是鳳奴衆丫環指道那繡戰袍的手上有朱砂記就是鳳奴唐王擡頭一看不覺五內崩裂卻正是恩妻鳳嬌假將戰袍拿來觀看露出朱砂記鳳嬌見了認的是進興假作失針曲身尋取偷彈珠淚唐王惟恐淚下急急走出心如刀割至晚倒身床上暗暗流淚到了黎明假作肚痛出外出恭與鳳嬌相遇抱頭相哭鳳嬌道負心的郎臨別時只説一到邊庭即來接我一去古無音信只為傳説你做了強盜打死牢中我與母親放心不下到觀音庵求籤妖尼設局馬迪強通成親幸得胡完相救投在陵州崔姨母處不料表兄又要娶我哄他同來祭你投入江中被陶夫人撈救在此我為你受盡千辛萬苦死裏逃生那知你是這負心人忘了奴身又入贅於此唐王流淚道恩妻我若負你天地不容我到翠雲山與馬周取了漢陽因兩下交兵未曾差人接你後來差人至通州接你時杳無音信尋著王老方知你與嶽母逃奔陵州即欲差人接取又因李承業統兵犯界我今假冒李公子入贅他家因他家有女媧鏡可破賊兵欲來取此鏡不是成親至今和衣而睡並無近身在翠雲山納一申妃並不同床如此立心我豈是忘恩負義之人鳳嬌聞言失驚道如此説你是何等人唐王低聲道我非馬隱乃唐高宗皇帝元配王后的太子目今接唐王位於漢陽城的李旦便是早晚乘便盜取女媧鏡即回漢陽恩妻切不可漏了消息害我性命鳳嬌悲喜相半扯住唐王道你若動身須要帶我同去休要又拋了奴身自己去了唐王道恩妻放心此番死活與你同行二人説話之間天已大明各自散去過了數日陶仁因花園中牡丹盛開分付備酒花廳與女婚女兒賞花王欽曹彪隨唐王入內叩見陶仁陶仁道賢壻不曾問他二人姓名可曉得什麼技藝否唐王道此人姓王名漢那個姓曹名陽他二人武藝高強使他上陳必能取勝陶仁笑道你二人既精兵法必知局勢目今三齊王李承業又下漢陽與馬周交兵可曉得將來誰勝誰敗二人道啓爺爺三齊王雖然將勇兵多但名不正終不能成事馬周保太子中興名正言順不久定敗李承業陶仁笑道馬周與李承業相爭是猶犬與虎鬥目下李承業得一異寶名如意火輪牌最是厲害不久漢陽就破唐王道嶽父那火輪牌可有破法麼陶仁道破牌之寶卻在我家祖上傳下一鏡名女媧鏡只須此鏡一照其牌立碎唐王道嶽父有此異寶乞借小壻一觀陶仁取出鑰匙付與小姐道你同丈夫取出來看小姐唐王起身來至庫房門首小姐開入庫房進了五重門至內取出一個拜匣掇在外邊陶仁又取鑰匙開了拜匣上的鎖揭開拜匣內用黃綾包裹打開來便放出萬道霞光但見此女媧鏡如碗口大色分五彩唐王看了贊道果是人間異寶陶仁道此鏡乃上古女媧氏煉五色石以補天爐中結成此鏡故名女媧鏡此鏡專能破火輪如意牌所以留傳世守當下觀看了片時仍舊用黃綾包好放拜匣內鎖好依舊叫他夫妻二人送入庫內收藏小姐春情蕩漾不耐煩行走坐在外邊亭子上手托香腮長籲短歎卻叫唐王自去收藏唐王留心把內中四重門都不鎖只鎖了外邊的門依舊出來花廳上飲酒酒畢走至外邊書房暗對王欽曹彪説道庫內四重門都未鎖單鎖外邊一重門只是四面牆高如何進去取此寶鏡曹彪道不難只要主公今夜開門出來放臣入內在臣身上包取此鏡唐王大喜到晚入房安寢等到三更唐王假作肚疼出外解手輕輕從內門一重重開到大廳唐王引王欽曹彪入內悄悄來至庫房邊曹彪將身一聳扒上牆頭飛身下去不多時又縱身上來望下一跳輕輕落地叫主公寶鏡已取到手請主公速速同行唐王下淚道恩妻胡氏為我死裏逃生至此怎忍拋他先去死活須帶他去方好此刻不便卿可先回漢陽孤與胡氏乘便同去曹彪便叫王兄主公既要與娘娘同行待我先送此鏡去兄在此保駕倘有緩急必火速來報王欽允諾曹彪即時開門上馬挨城而出趕回漢陽去了王欽關上大門唐王把門重重關好入內而睡次日陶仁不見曹彪問曹家人那裏去了唐王道小壻差他往泗州去了陶仁信以為真不知唐王后來若何再看下回分解
