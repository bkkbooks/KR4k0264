body:
  text: 第八十六回武全忠偶遇佳麗夏去矜設計害人再説秦文有一胞妹嫁于大名府方侍中之子方表為妻夫妻二人十分恩愛方侍中在日得罪武後被難之後過了二載因清明祭掃方表與妻子同在墳上祭奠了一番秦氏乘轎往大慈庵中玩耍不期撞著一個貪花公子這公子乃是武則天嫡孫名全忠情勢橫行這日帶領家奴也來大慈庵中玩耍這方家家人阻擋不住武全忠闖入庵中恰好正遇秦氏在佛殿拈香武全忠定睛一看早已魂飛魄散方表見武全忠跟隨四五個家丁知是顯宦公子只得催娘子上轎回去武全忠忙令家人去打聽是何等人家自己回府到晚家人回稟道小人打聽得那女人是已故方待中之媳方表之妻金墉胡國公秦文之妹年方一十九歲卻不是好惹的武全忠聽了這話連日茶飯少進懨懨成病又不好對人講説貼身有一個家人叫做胡行見公子有病知是為著方家女人之事即與一個幫間的叫做夏去矜商議夏去矜道這病卻是心病自古道心病還用心藥醫怎生設計害了方表弄他妻子到手如今先去看看公子再作計議二人進內叫一聲公子貴體可輕些麼武全忠道不濟事了胡行道小人方才與夏大爺商議怎生害了方表慢慢騙他妻子夏去矜道公子有計了隨附武全忠耳邊説如此如此此事必成武全忠聽了大喜就差人暗暗去行事不提且説方表一日在家間坐忽見門公來説府太爺差人要見方表道叫他進來門公到外邊領了一二十個青衣進來見方表説太爺早間坐堂審事有一人説要認方相公故太爺在堂上立等相公去回話説罷衆人蜂聚捉方表出門去了門公急急入內報知秦氏秦氏大驚即差人到府前去打聽當下衆役將方表捉到府前忽聽得傳梆坐堂叫帶出牢內犯人又叫帶進方表這本府姓鄭名伯義是諸武心腹人不一時將牢犯帶進跪下伯義道王強你打劫武王親府中金珠等物意欲投九焰山反黨內中真有方表麼王強道真有方表他是窩家小的當初原與他交結甚密舊歲劫了武王親府中金珠等物俱在方表家中方表聞言吃了一大驚只聽堂上叫方表原差將方表推至丹墀跪下鄭伯義道方表你家中窩了強盜有何分説方表道老公祖小人宦室名門怎肯做那犯法之事況小人與王強並不相識王強道方相公你去年曾對我説説等候九焰山徐美祖的來信全家去投入夥我自倒運被捕役拿了監在牢內一年了如今受刑不過只得招出你來許多贓物在你家中休得抵賴伯義大怒道盜情叛黨不打不招分付扯下去打兩邊行役就把方表拖倒在地打了四十大板打得皮開肉破方表連連叫屈伯義道叛黨罪重分付押入牢中待本府上本奏聞聖上然後定奪衙役就把方表押送牢內方家家人打聽明白忙忙回來見了主母把這事稟知秦氏聞言哭得天昏地暗家人方彪道大娘哭也無益必須想一個計較去救相公才好秦氏一面打發家人入牢安頓丈夫一面差方龍星夜趕至金墉報知秦文看看天色將晚忽見一個媒婆綽號花蜜蜂走來見了秦氏説道聞知相公被害老身特來探望秦氏哭訴受屈事情如今怎生救他花蜜蜂道老身方才在武公子府中聞他家家人來報公子説打劫府中的強盜太爺當堂審他他又招出窩家來卻是方表武公子説方表他是老實君子怎肯做此事想是與王強有隙被他所害了依老身愚見不如去求節度使老爺就可救方相公了秦氏道那個節度使花蜜蜂道就是武老爺名元嗣的他現做本處的節度使出生入死的衙門誰人不知那武公子就是他的嫡親侄子如今娘子要救方相公必須有人去求武公子到節度使那邊説一聲就好解救了秦氏道我家無人誰人去求武公子花蜜蜂道武公子十分愛慕方相公説方相公無辜被害若娘子處沒人去求他待老身前去請他來娘子面求于他諒無不允之理且是武公子説曾見過娘子一面十分仰慕這事求他是極妥的秦氏聽得婆子説話夾七夾八肚內留心即問道那武公子在哪里見我來花蜜蜂笑道那武公子就是昔日在大慈庵會過娘子的難道忘了不成秦氏聞言心中一想就曉得此事是武賊設計謀害是要占我的遂假意悅色道你且去明後日來討回復花蜜蜂不敢再言恐秦氏生疑只得辭了出來原來這花蜜蜂是夏去矜所使叫他到方家來探口氣希圖成事欲知後來如何且看下回分解
