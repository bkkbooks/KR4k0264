body:
  text: 第十四回教場中神傷良緣金鑾殿夫妻交拜話説薛強出了店門見路上行人俱是往教場中去的遂不用問路跟了衆人直到了教場中四下一看見那些人也有外邦也有本國俱是奇形怪像薛強暗笑道這些人公主肯招為附馬不成又見那座彩樓搭在教場正中俱是用彩緞扎成單上留出一方月亮祠這公主今日正在樓上沐手焚香下拜祝告道我孟九環今日午刻在樓上拋球招親以完終身大事惟求過往神聖但願球打有緣人以完宿世姻緣祝畢起身步至月亮祠口往上看日當正午往下看人山人海公主遂雙手捧了鬥大的繡球往樓外只一拋這球轉東轉西再也落不下來看官你道這是怎説只因這大宛國公主孟九環乃是上界壽長星臨凡該配與天猛星薛強這球一拋空中值日神早已接定走東走西尋找天猛星下邊千萬人呐著喊齊齊仰面上看球到東擠到東球至西擠至西人人伸著手俱要接這繡球誰想這球偏偏落到薛強頭上薛強一伸手接住繡球前後左右的人一齊來搶薛強喝道天賜良緣繡球是我接著的誰敢來搶只見彩樓下跑出百十兵役打開衆人來至薛強面前見他手捧繡球齊聲喝采好一位駙馬可是中國人尊姓大名一一説明便於啓奏入朝成親薛強道我是中國山西絳州龍門人氏説起來料貴邦也必知道我祖乃先皇太宗駕前官拜平東安西開國兩遼王天保白袍大將軍姓薛名仁貴我父征西大元帥世襲兩遼王名薛丁山我兄弟四人長兄薛猛二兄薛勇三兄薛剛我是薛強兵役道原來是天朝白袍將之孫征西大元帥之子足堪以配公主請問為何來此薛強把薛剛大鬧花燈踢死皇子驚崩聖駕一門被囚自己脫逃路遇李靖送他至此一一説了一遍禁兵便傳奏上樓公主分付送薛強館驛住下公主自己入朝奏知薛強始末國王聞言大喜分付即日大排喜宴令文武百官去迎請駙馬入朝與公主完婚衆官到館驛迎薛強入朝見國王國王見薛強面如博粉儀容威麗心中大喜即令換了吉服讓坐進茶又命侍女扶公主出殿二人先拜了天地次拜國王國母然後夫婦交拜拜畢送入洞房外殿國王大宴文武百官這薛強在宮內與公主飲宴之時把公主一看真是如花似玉心中甚快公主也看薛強容貌不凡十分歡喜宴罷入錦帳中共成雲雨之樂不必細述自此薛強安心住在大宛國但未知薛剛當日如何逃避請再看下回分解
