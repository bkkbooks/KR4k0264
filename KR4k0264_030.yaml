body:
  text: 第三十回薛剛二掃鐵丘墳仁傑隱藏通城虎當下仁傑入宮向武後山呼萬歲拜伏在地武後連忙立起命內侍扶起賜坐仁傑謝恩坐下道張昌宗無禮該正法斬首陛下何故赦之臣已薄責乞陛下發出廢為庶人以警天下武後道朕已知道了國老請回以後見朕不必行禮不知何故朕見汝來滿身發戰以後只行常禮便了叫內侍送國老回府仁傑謝恩出宮自古道邪不勝正武後位極人王淫亂好殺而獨敬重仁傑凡仁傑所奏之事無不俞允所以武後篡位二十餘年年豐歲稔政治不亂皆仁傑一人之功也按下不表且説薛剛一行五人離了黃草山直往長安而來到了七月十五日午刻來至長安城外五人下馬薛剛分付嘍羅牽馬在這裏客店歇宿不可進城就在此伺候分付畢五人遂步行進城來至法雲寺日已沈西現出一輪明月這晚正是盂蘭大會各庵各寺俱誦經拜讖施食焰口這法雲寺乃武後禦建比別處大不相同更加熱鬧那些僧衆忙忙碌碌俱在各殿上做功德人山人海擠擁不動這法雲寺的寶塔卻在寺內殿后一個空園裏邊無甚熱鬧所以並無人往來遊看只有兩個小和尚在塔門首看守燈火薛剛五人悄悄來至塔前兩個小和尚早被吳奇馬贊抓住了喝道你若喊叫咱就殺了你只説徐千歲的首級在那裏唬的小和尚道在在在第七層塔塔塔上有一鐵鐵鐵匣便是徐美祖道你引我去取下來便饒了你小和尚就引了美祖思泉薛剛三人走上去吳奇馬贊在塔門首守候當下美祖三人到了塔頂上果見一個鐵匣打開看時果是兩個首級美祖拴在腰間把兩個小和尚也就殺在塔上三個送走下塔來吳奇便問有麼薛剛道有了走罷五人齊出了法雲寺直奔鐵丘墳而來來至墳邊見那些查巡鐵丘墳的軍士俱己睡覺五人把石碑掇倒將門上鎖扭去開門而進排下祭禮五人倒身下拜放聲大哭吳奇拜畢就將金紙取出在墳前燒起來了軍士們看見墳內的火光一齊喊道不好了薛剛又來了四面軍士各取兵器團團圍住了鐵丘墳又有幾個軍士飛報各衙門去了墳內五人見軍士圍住一齊動手薛剛是兩條鐵鞭魏思泉是兩口寶劍吳奇是兩柄金斧馬贊是兩把銅錘徐美祖是一對銀銅五人齊殺出墳來把那軍士殺了五六十個只見武三思領兵迎面而來五人並力衝殺又見武承嗣李承業領兵周圍殺來徐美祖大叫走罷五人衝開血路殺出重圍看前面又有人馬呐喊殺來薛剛道我們從小路走罷一直跑進小路不料卻是一條死路走不出去兩邊俱是高牆後面喊聲漸近美祖道路窮勢急這當如何吳奇道牆邊一株大樹不免爬上去跳入牆內再處五人一齊爬上樹跳入牆內一看卻是一所花園忽聽得亭子上有人説話五人悄悄鑽進假山洞內看官你道這花園是那家的原來是梁國公狄仁傑的仁傑仰觀天文見罡星落于鬥牛之間算定今夜有兵火之災當夜聽得呐喊之聲遂領家童步入園中在亭子上間坐看見黑影中有幾個人鑽入假山洞去仁傑叫道好漢不必躲我我是當朝狄仁傑五人聞言鑽出洞來來在亭子上一齊跪下求狄國公救命仁傑忙扶起道原來是兩遼王後裔老夫算定今日今時汝等有七日大難且躲在此間又見徐美祖問道賢侄為何也來在此美祖道小侄來取家父家叔骨骸故同此難仁傑道可曾取來否美祖道已取來了仁傑遂設席相待飲酒之間説道武後氣盛未表帝星不明廬陵王尚多患難未可舉手薛剛道小侄欲保廬陵王中興但恐他忌恨我踢死太子驚崩聖駕若去投他他若拿我我就不能脫身了仁傑道老夫身雖在朝心中實欲恢復唐家江山你若有心中興老夫當暗裏周全待過了七日救你們出去日後便可保廬陵王中興了説畢酒散仁傑對五人道列位房屋內宿恐不穩便莫若在地窖內存身方妥進引五人到萬花樓下令人揭起方磚指地窖道此內柴米酒肉水火皆備請下去過了七日老夫再來奉請五人作謝走下階坡見地窖內也起三間大房燈火照耀如同白日果然日用之物件件俱全遂在內住下仁傑在上面把方磚蓋好披發伏劍踏著地窖蹭罡步鬥壓鎮五星惡煞然後自去安寢不知後來如何再看下回分解
