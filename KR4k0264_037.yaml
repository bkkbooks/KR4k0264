body:
  text: 第三十七回七弦琴憂愁萬種朱砂記天神托夢當下胡發不得已收了銀子留他母女在家但刁氏十分不賢每日打張罵李將粗重之事派與他母女去做母女二人也只得忍氣吞聲竟與奴婢一般按下不表且説太子李旦在通州沿街求乞一日遇著胡發胡發見他不像求乞之人便問道你這少年何方人氏姓甚名誰為何求乞李旦道小人姓馬名隱長安人也只因兵荒父母雙亡流落在此胡發道你可能寫算麼李區道琴棋書畫吹彈寫算皆能胡發道我店中正少一人寫算你若肯許我就在我家中如何李旦便道得蒙收留願在此服役胡發道你既肯在此今改名進興早晚捧茶送飯在店中料理李旦應允就改名進興了一日進興到廚房取茶文氏見他舉止不凡遂叫住問道你是那裏人為何到此進興道大姆我姓馬名隱長安人也父母雙亡只因兵變逃難至此無處安身故在此眼役文氏道可憐可憐正説之間忽聽見嬌滴滴聲兒叫母親擡頭一看看見鳳嬌不覺驚訝自己暗想如此女子可謂天下無雙叫他母親定是他女兒取了茶自往外邊店中去了文氏對女兒道可憐這進興説起來也是好人家子弟一時落泊做了下賤之人他與我母女都是一般的苦命到了晚間文氏叫女兒道你自到這裏來心中無一日暢快今夜尚早何不取琴一彈以消愁悶鳳嬌聞言取過瑤琴整理絲弦彈將起來此時進興尚在未睡他的臥房是柴房與廚房相近忽聽見琴聲悠揚想到琴聲出於廚下必是大姆的女兒所彈及聽得入耳悄地來至廚下走到窗前側耳細聽琴中竟彈出斷腸之聲不覺心傷忍不住推門進內鳳嬌一見就住了手文氏道進興到此何干進興道大姆小姐恕進興大膽聽見小姐彈琴特來一聽聲中無限淒涼打動我的憂愁景況不覺大膽進房敢問小姐為何彈出此調文氏道原來進興也知琴音我只為先人亡後家業凋零在此吃他叔叔的一碗飯受盡了萬般的苦楚所以小女彈此一曲發揚心志進興道原來如此請小姐一發彈完此曲鳳嬌也不推辭復整弦彈起一高一低一緊一慢聽了之時不勝悽楚彈完進興連連稱妙文氏道進興你何不也彈一曲與老身散悶我兒過來讓他來彈鳳嬌抽身來母親身邊坐下進興亦不推辭把琴彈起鳳嬌細將進興一看白麵紅唇龍眉鳳目兩耳垂肩舉止不凡暗想這樣相貌目下雖然落泊日後定然大貴進興彈罷起身告退自回柴房去了母女二人亦關門而睡到了三更丈氏見一金甲神進房叫聲文氏聽吾分付我有四句言語你須記清蟠桃會上結姻緣玉女真龍下九重入胎曾印朱砂記速定婚姻切莫遲説罷而去文氏醒來卻是一夢道聲奇怪鳳嬌問母親為甚麼文氏就將所夢之事一説出我兒呀我想你右手上有半個朱砂記晚上進興彈琴見他左手上也有半個朱砂記明日進興來可與他一比莫非你的姻緣在他身上及至天明忽見繡娘楊氏匆匆進來未知何事且聽下回分解
